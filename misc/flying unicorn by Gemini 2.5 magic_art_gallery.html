
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Magic Art Gallery</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
            body { 
                font-family: 'Quicksand', sans-serif; 
                background-color: #fdf4ff; 
                background-image: radial-gradient(#fbcfe8 2px, transparent 2px);
                background-size: 30px 30px;
                color: #4c1d95; 
                margin: 0; 
                padding: 2rem; 
            }
            .header {
                text-align: center;
                background: white;
                padding: 2rem;
                border-radius: 2rem;
                border: 4px solid #c084fc;
                box-shadow: 0 10px 25px rgba(192, 132, 252, 0.2);
                margin-bottom: 3rem;
            }
            h1 { color: #d946ef; font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 0px #fdf4ff, 4px 4px 0px #fbcfe8; }
            .subtitle { font-size: 1.5rem; color: #8b5cf6; margin-top: 0.5rem; font-weight: bold; }
            
            .gallery-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 2rem;
                max-width: 1200px;
                margin: 0 auto;
            }
            .frame { 
                background: white; 
                border-radius: 1.5rem; 
                padding: 1.5rem; 
                box-shadow: 0 8px 20px rgba(0,0,0,0.05);
                border: 4px solid #e9d5ff;
                text-align: center;
                transition: transform 0.3s ease;
            }
            .frame:hover { transform: translateY(-10px); }
            .frame:nth-child(even) { border-color: #fbcfe8; }
            .frame:nth-child(3n) { border-color: #6ee7b7; }
            
            .svg-container {
                width: 100%;
                aspect-ratio: 1/1;
                background: #f8fafc;
                border-radius: 1rem;
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }
            .svg-container svg { width: 90%; height: 90%; }
            .title { color: #7c3aed; font-size: 1.8rem; margin: 0 0 0.5rem 0; font-weight: bold; }
            .action { 
                background: #fef08a; 
                display: inline-block; 
                padding: 0.5rem 1.5rem; 
                border-radius: 999px; 
                font-weight: bold; 
                color: #b45309;
                font-size: 1.2rem;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>🎨 My Magic Gallery ✨</h1>
            <div class="subtitle">Pictures that come to life!</div>
        </div>
        
        <div class="gallery-grid">
            
                <div class="frame">
                    <div class="svg-container">
                        <svg viewBox="0 0 400 400" width="100%" height="100%"><defs><style>.unicorn-body{fill:#FFDDEA;stroke:#333;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;}.horn{fill:#FFD700;stroke:#333;stroke-width:3;}.mane-tail{fill:url(#rainbowGradient);stroke:#333;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}.wing{fill:#E0FFFF;stroke:#333;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;}@keyframes float{0%{transform:translateY(0);}50%{transform:translateY(-15px);}100%{transform:translateY(0);}}.floating-unicorn{animation:float 2.5s ease-in-out infinite;transform-origin:200px 250px;}@keyframes flapLeft{0%{transform:rotate(10deg);}50%{transform:rotate(-20deg);}100%{transform:rotate(10deg);}}@keyframes flapRight{0%{transform:rotate(-10deg);}50%{transform:rotate(20deg);}100%{transform:rotate(-10deg);}}.wing-group-left{transform-origin:200px 170px;animation:flapLeft 0.7s ease-in-out infinite alternate;}.wing-group-right{transform-origin:200px 170px;animation:flapRight 0.7s ease-in-out infinite alternate;}</style><linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#FF0000" /><stop offset="20%" style="stop-color:#FFA500" /><stop offset="40%" style="stop-color:#FFFF00" /><stop offset="60%" style="stop-color:#008000" /><stop offset="80%" style="stop-color:#0000FF" /><stop offset="100%" style="stop-color:#8A2BE2" /></linearGradient></defs><g class="floating-unicorn"><g class="wing-group-left"><path class="wing" d="M200 170 L170 120 C140 100, 130 150, 160 180 Z" /></g><g class="wing-group-right"><path class="wing" d="M200 170 L230 120 C260 100, 270 150, 240 180 Z" /></g><ellipse cx="200" cy="250" rx="90" ry="60" class="unicorn-body" /><path d="M160 200 Q180 180 200 170 L210 200 Q190 220 160 200 Z" class="unicorn-body" /><ellipse cx="230" cy="170" rx="40" ry="30" class="unicorn-body" /><circle cx="250" cy="180" r="15" fill="#FFEFEF" stroke="#333" stroke-width="3" /><circle cx="255" cy="178" r="3" fill="#333" /><circle cx="245" cy="178" r="3" fill="#333" /><path d="M245 190 Q250 195 255 190" stroke="#333" stroke-width="2" fill="none" /><circle cx="235" cy="160" r="5" fill="#333" /><path d="M260 140 L270 110 L280 140 Z" class="horn" /><path d="M200 160 C190 130, 220 120, 240 140 C250 150, 230 170, 200 160 Z" class="mane-tail" /><rect x="150" y="290" width="20" height="40" rx="10" ry="10" class="unicorn-body" /><rect x="230" y="290" width="20" height="40" rx="10" ry="10" class="unicorn-body" /><rect x="170" y="295" width="20" height="40" rx="10" ry="10" class="unicorn-body" /><rect x="210" y="295" width="20" height="40" rx="10" ry="10" class="unicorn-body" /><path d="M120 250 C100 220, 100 280, 130 300 C150 280, 140 240, 120 250 Z" class="mane-tail" /></g></svg>
                    </div>
                    <h2 class="title">Flutterwing the Unicorn!</h2>
                    <div class="action">Zooming and flapping!</div>
                </div>
            
        </div>
    </body>
    </html>
