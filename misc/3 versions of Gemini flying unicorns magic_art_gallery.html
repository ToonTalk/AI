
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Magic Art Gallery</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
            body { 
                font-family: 'Quicksand', sans-serif; 
                background-color: #fdf4ff; 
                background-image: radial-gradient(#fbcfe8 2px, transparent 2px);
                background-size: 30px 30px;
                color: #4c1d95; 
                margin: 0; 
                padding: 2rem; 
            }
            .header {
                text-align: center;
                background: white;
                padding: 2rem;
                border-radius: 2rem;
                border: 4px solid #c084fc;
                box-shadow: 0 10px 25px rgba(192, 132, 252, 0.2);
                margin-bottom: 3rem;
            }
            h1 { color: #d946ef; font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 0px #fdf4ff, 4px 4px 0px #fbcfe8; }
            .subtitle { font-size: 1.5rem; color: #8b5cf6; margin-top: 0.5rem; font-weight: bold; }
            
            .gallery-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 2rem;
                max-width: 1200px;
                margin: 0 auto;
            }
            .frame { 
                background: white; 
                border-radius: 1.5rem; 
                padding: 1.5rem; 
                box-shadow: 0 8px 20px rgba(0,0,0,0.05);
                border: 4px solid #e9d5ff;
                text-align: center;
                transition: transform 0.3s ease;
            }
            .frame:hover { transform: translateY(-10px); }
            .frame:nth-child(even) { border-color: #fbcfe8; }
            .frame:nth-child(3n) { border-color: #6ee7b7; }
            
            .svg-container {
                width: 100%;
                aspect-ratio: 1/1;
                background: #f8fafc;
                border-radius: 1rem;
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }
            .svg-container svg { width: 90%; height: 90%; }
            .title { color: #7c3aed; font-size: 1.8rem; margin: 0 0 0.5rem 0; font-weight: bold; }
            .action { 
                background: #fef08a; 
                display: inline-block; 
                padding: 0.5rem 1.5rem; 
                border-radius: 999px; 
                font-weight: bold; 
                color: #b45309;
                font-size: 1.2rem;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>🎨 My Magic Gallery ✨</h1>
            <div class="subtitle">Pictures that come to life!</div>
        </div>
        
        <div class="gallery-grid">
            
                <div class="frame">
                    <div class="svg-container">
                        <svg viewBox="0 0 400 400" width="100%" height="100%"><defs><linearGradient id="rainbowHorn" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FFEB3B"/><stop offset="33%" stop-color="#FF9800"/><stop offset="66%" stop-color="#F44336"/><stop offset="100%" stop-color="#E91E63"/></linearGradient></defs><g id="unicornGroup" transform="translate(0,0)"><animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 0; 0 -15; 0 0" dur="3s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/><animateTransform attributeName="transform" attributeType="XML" type="rotate" values="0 200 240; 5 200 240; 0 200 240" dur="3s" repeatCount="indefinite" additive="sum" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/><!-- Body --><rect x="100" y="200" width="200" height="100" rx="50" ry="50" fill="#F8BBD0" stroke="#4A148C" stroke-width="5"/><!-- Neck --><path d="M260 200 Q260 180 270 160" fill="#F8BBD0" stroke="#4A148C" stroke-width="5" stroke-linejoin="round"/><!-- Head --><circle cx="280" cy="155" r="45" fill="#F8BBD0" stroke="#4A148C" stroke-width="5"/><!-- Snout --><ellipse cx="300" cy="165" rx="25" ry="18" fill="#FFFFFF" stroke="#4A148C" stroke-width="5"/><!-- Nostrils --><circle cx="295" cy="165" r="3" fill="#4A148C"/><circle cx="305" cy="165" r="3" fill="#4A148C"/><!-- Eye --><circle cx="275" cy="145" r="7" fill="#4A148C"/><circle cx="275" cy="145" r="3" fill="#FFFFFF"/><!-- Ear --><polygon points="270,120 285,110 300,120" fill="#F8BBD0" stroke="#4A148C" stroke-width="5" stroke-linejoin="round"/><!-- Horn --><g transform="rotate(-15 295 110)"><path d="M295 100 L305 70 L315 100 Z" fill="url(#rainbowHorn)" stroke="#4A148C" stroke-width="4" stroke-linejoin="round"/><!-- Stripes for horn effect --><path d="M300 85 L310 95" stroke="#4A148C" stroke-width="2" fill="none"/><path d="M297 92 L307 102" stroke="#4A148C" stroke-width="2" fill="none"/></g><!-- Mane --><path d="M260 135 C240 100 270 90 290 110 C310 130 300 160 280 155 Z" fill="#9C27B0" stroke="#4A148C" stroke-width="5" stroke-linejoin="round"/><!-- Legs (front and back pairs, simplified) --><rect x="140" y="280" width="30" height="70" rx="15" ry="15" fill="#F8BBD0" stroke="#4A148C" stroke-width="5"/><rect x="230" y="280" width="30" height="70" rx="15" ry="15" fill="#F8BBD0" stroke="#4A148C" stroke-width="5"/><!-- Tail --><path d="M100 250 Q80 230 70 270 Q60 310 100 320 C130 300 130 260 100 250 Z" fill="#9C27B0" stroke="#4A148C" stroke-width="5" stroke-linejoin="round"/><!-- Wings --><g transform="translate(190, 190)"><!-- Left Wing --><g transform-origin="0 0"><path d="M0 0 Q-20 -30 -5 -60 Q30 -70 50 -40 Q40 -20 0 0 Z" fill="#BBDEFB" stroke="#4A148C" stroke-width="5" stroke-linejoin="round"/><animateTransform attributeName="transform" attributeType="XML" type="rotate" values="-20 0 0; 20 0 0; -20 0 0" dur="1s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/></g><!-- Right Wing (mirrored) --><g transform-origin="0 0"><path d="M0 0 Q20 -30 5 -60 Q-30 -70 -50 -40 Q-40 -20 0 0 Z" fill="#BBDEFB" stroke="#4A148C" stroke-width="5" stroke-linejoin="round"/><animateTransform attributeName="transform" attributeType="XML" type="rotate" values="20 0 0; -20 0 0; 20 0 0" dur="1s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/></g></g></g></svg>
                    </div>
                    <h2 class="title">Sparklehoof's Sky Dance</h2>
                    <div class="action">Glittery Flap!</div>
                </div>
            
                <div class="frame">
                    <div class="svg-container">
                        <svg viewBox="0 0 400 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <g id="unicorn-bounce-group">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="1.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    
    <!-- Body and Head -->
    <path d="M200,180 A80,70 0 1,1 200,320 A80,70 0 1,1 200,180 Z" fill="#E0B0FF" stroke="#000" stroke-width="8"/> <!-- Body -->
    <circle cx="150" cy="180" r="50" fill="#E0B0FF" stroke="#000" stroke-width="8"/> <!-- Head -->
    <polygon points="150,130 140,80 160,80" fill="#FFD700" stroke="#000" stroke-width="8"/> <!-- Horn -->
    <circle cx="130" cy="170" r="8" fill="#000"/> <!-- Left Eye -->
    <circle cx="170" cy="170" r="8" fill="#000"/> <!-- Right Eye -->
    <circle cx="130" cy="170" r="4" fill="#FFF"/> <!-- Left Pupil -->
    <circle cx="170" cy="170" r="4" fill="#FFF"/> <!-- Right Pupil -->
    <circle cx="130" cy="190" r="10" fill="#FFC0CB"/> <!-- Cheeks -->
    <circle cx="170" cy="190" r="10" fill="#FFC0CB"/>
    <path d="M140,210 Q150,220 160,210" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/> <!-- Smile -->
    
    <!-- Mane and Tail -->
    <path d="M180,140 Q210,120 220,160 Q230,200 200,200 Z" fill="#ADD8E6" stroke="#000" stroke-width="8"/> <!-- Mane part 1 -->
    <path d="M220,160 Q250,150 240,190 Q230,230 200,200" fill="#FFFFCC" stroke="#000" stroke-width="8"/> <!-- Mane part 2 -->
    <path d="M280,260 Q320,240 330,280 Q340,320 300,310 Z" fill="#ADD8E6" stroke="#000" stroke-width="8"/> <!-- Tail part 1 -->
    <path d="M300,270 Q340,260 330,300 Q320,340 300,310" fill="#FFFFCC" stroke="#000" stroke-width="8"/> <!-- Tail part 2 -->
    
    <!-- Legs -->
    <ellipse cx="160" cy="330" rx="15" ry="30" fill="#E0B0FF" stroke="#000" stroke-width="8"/> <!-- Front Legs -->
    <ellipse cx="240" cy="330" rx="15" ry="30" fill="#E0B0FF" stroke="#000" stroke-width="8"/>
    <ellipse cx="160" cy="350" rx="15" ry="5" fill="#000"/> <!-- Hooves -->
    <ellipse cx="240" cy="350" rx="15" ry="5" fill="#000"/>

    <!-- Wings -->
    <!-- Left Wing -->
    <g transform="translate(140, 210)"> <!-- Translate to position -->
        <g>
          <animateTransform attributeName="transform" type="rotate" values="0; -25; 0" dur="1s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
          <!-- Wing path drawn from local (0,0) -->
          <path d="M0,0 C-30,-40 -110,-40 -130,0 C-150,40 -100,80 -60,100 L0,0 Z" fill="#FEF3B4" stroke="#000" stroke-width="8"/>
          <!-- Interior lines for feathers -->
          <path d="M-120,10 Q-100,30 -80,40" fill="none" stroke="#000" stroke-width="6"/>
          <path d="M-100,20 Q-80,40 -60,50" fill="none" stroke="#000" stroke-width="6"/>
        </g>
    </g>
    <!-- Right Wing -->
    <g transform="translate(260, 210)"> <!-- Translate to position -->
        <g>
          <animateTransform attributeName="transform" type="rotate" values="0; 25; 0" dur="1s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
          <!-- Wing path drawn from local (0,0), mirrored -->
          <path d="M0,0 C30,-40 110,-40 130,0 C150,40 100,80 60,100 L0,0 Z" fill="#FEF3B4" stroke="#000" stroke-width="8"/>
          <!-- Interior lines for feathers -->
          <path d="M120,10 Q100,30 80,40" fill="none" stroke="#000" stroke-width="6"/>
          <path d="M100,20 Q80,40 60,50" fill="none" stroke="#000" stroke-width="6"/>
        </g>
    </g>

  </g>
</svg>
                    </div>
                    <h2 class="title">The Magical Flying Unicorn</h2>
                    <div class="action">Up, down, flap flap!</div>
                </div>
            
                <div class="frame">
                    <div class="svg-container">
                        <svg viewBox="0 0 400 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"> <defs> <g id="cloud" fill="#d9f2ff"> <rect x="-40" y="-20" width="100" height="40" rx="20"/> <circle cx="-10" cy="-20" r="25"/> <circle cx="30" cy="-30" r="35"/> <circle cx="60" cy="-15" r="20"/> </g> <path id="sparkle" d="M 0 -12 L 2 -2 L 12 0 L 2 2 L 0 12 L -2 2 L -12 0 L -2 -2 Z" fill="#ffdf70" stroke="#333" stroke-width="2" stroke-linejoin="round"/> </defs> <g> <animateTransform attributeName="transform" type="translate" values="450, 60; -150, 60" dur="15s" repeatCount="indefinite" /> <use href="#cloud"/> </g> <g> <animateTransform attributeName="transform" type="translate" values="450, 320; -200, 320" dur="20s" repeatCount="indefinite" /> <g transform="scale(0.8)"> <use href="#cloud"/> </g> </g> <g> <animateTransform attributeName="transform" type="translate" values="450, 180; -200, 180" dur="12s" repeatCount="indefinite" /> <g transform="scale(0.6)"> <use href="#cloud"/> </g> </g> <g> <animateTransform attributeName="transform" type="translate" values="0,8; 0,-8; 0,8" dur="2.5s" repeatCount="indefinite" /> <g transform="translate(180, 210)"> <g> <animateTransform attributeName="transform" type="rotate" values="10; -30; 10" dur="0.5s" repeatCount="indefinite" /> <path d="M 0 0 C -20 -60 -50 -90 -100 -90 C -70 -70 -60 -40 -90 -30 C -60 -20 -50 0 -80 20 C -40 10 -20 10 0 0 Z" fill="#ffb3d9" stroke="#333" stroke-width="12" stroke-linejoin="round"/> </g> </g> <g transform="translate(150, 240)"> <g> <animateTransform attributeName="transform" type="rotate" values="35; 55; 35" dur="1s" repeatCount="indefinite"/> <rect x="-12" y="-5" width="24" height="60" rx="12" fill="#e6e6e6" stroke="#333" stroke-width="10"/> </g> </g> <g transform="translate(210, 240)"> <g> <animateTransform attributeName="transform" type="rotate" values="40; 60; 40" dur="1s" repeatCount="indefinite"/> <rect x="-12" y="-5" width="24" height="60" rx="12" fill="#e6e6e6" stroke="#333" str  stroke="#333" stroke-width="6" stroke-linecap="round"/> <path d="M 262 75 L 282 70" stroke="#333" stroke-width="6" stroke-linecap="round"/> <path d="M 255 120 C 240 100, 240 80, 250 80 C 260 80, 265 100, 265 115 Z" fill="#fff" stroke="#333" stroke-width="10" stroke-linejoin="round"/> <path d="M 255 115 C 248 100, 248 88, 252 88 C 256 88, 260 100, 260 110 Z" fill="#ffb3d9" /> <circle cx="275" cy="130" r="8" fill="#333" /> <circle cx="278" cy="127" r="2.5" fill="#fff" /> <circle cx="273" cy="132" r="1.5" fill="#fff" /> <circle cx="265" cy="150" r="12" fill="#ff90b3" opacity="0.6" /> <path d="M 300 160 Q 310 168 320 155" fill="none" stroke="#333" stroke-width="6" stroke-linecap="round"/> <circle cx="318" cy="142" r="3" fill="#333" /> <g transform="translate(200, 220)"> <g> <animateTransform attributeName="transform" type="rotate" values="10; -50; 10" dur="0.5s" repeatCount="indefinite" /> <path d="M 0 0 C -20 -60 -50 -90 -100 -90 C -70 -70 -60 -40 -90 -30 C -60 -20 -50 0 -80 20 C -40 10 -20 10 0 0 Z" fill="#fff" stroke="#333" stroke-width="10" stroke-linejoin="round"/> <path d="M -30 -20 Q -50 -40 -80 -45" fill="none" stroke="#333" stroke-width="6" stroke-linecap="round"/> <path d="M -20 -5 Q -40 -10 -65 -5" fill="none" stroke="#333" stroke-width="6" stroke-linecap="round"/> </g> </g> </g> <g transform="translate(80, 80)"><g><animateTransform attributeName="transform" type="scale" values="0; 1; 0" dur="2s" repeatCount="indefinite"/><use href="#sparkle"/></g></g> <g transform="translate(340, 60)"><g><animateTransform attributeName="transform" type="scale" values="0; 1; 0" dur="1.5s" repeatCount="indefinite"/><use href="#sparkle"/></g></g> <g transform="translate(50, 280)"><g><animateTransform attributeName="transform" type="scale" values="0; 1; 0" dur="2.5s" repeatCount="indefinite"/><use href="#sparkle"/></g></g> <g transform="translate(320, 320)"><g><animateTransform attributeName="transform" type="scale" values="0; 1; 0" dur="1.8s" repeatCount="indefinite"/><use href="#sparkle"/></g></g> </svg>
                    </div>
                    <h2 class="title">The Magical Flying Alicorn</h2>
