ory summaries also yielded minimal results. While ultimately unsuccessful in its primary goal, the project served as a valuable learning opportunity, highlighting the limitations of current LLM capabilities in unstructured interviewing and creative text generation without significant source material."}, {"title": "Comparing the responses from Claude customized to know me and the default version", "post_url": "https://docs.google.com/document/d/1vJNydapLDZhm82Gvf2fptuwouffbCmsZmVMwSrEsl4s/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/surface_logo_turtle_torus_split.html", "title": "Surface Logo Turtle \u2014 Torus Geodesic/Bearing"}, {"url": "https://toontalk.github.io/AI/apps/surface_logo_turtle_torus_split.html", "title": "Surface Logo Turtle \u2014 Torus Geodesic/Bearing"}], "chat_logs": [{"url": "https://claude.ai/share/45cdc095-0950-46d7-9c09-0b94d80353c9", "title": "Claude Chat"}, {"url": "https://claude.ai/share/fb1328fa-8fbe-44df-ac67-8fadb5aea519", "title": "Claude Chat"}, {"url": "https://claude.ai/share/e68c7b1f-2cc5-4baa-84cd-d60203572430", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/6a3549fb-b18c-83eb-a087-c335f2b747bc", "title": "ChatGPT"}, {"url": "https://claude.ai/share/cd599360-9a7d-4d17-893c-7c6f67997024", "title": "Claude Chat"}, {"url": "https://claude.ai/share/72e7959f-0bd1-4bcf-9436-a3ea19bdb7e5", "title": "Claude Chat"}, {"url": "https://claude.ai/share/d3e0f3be-fccf-4709-aabc-20fcd42390a9", "title": "Claude Chat"}, {"url": "https://claude.ai/share/8b01929b-c5aa-4fae-b1e2-8eff5dcc6d06", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/6a351bc9-f818-83eb-ab32-630563c8188f", "title": "ChatGPT"}, {"url": "https://claude.ai/share/45cdc095-0950-46d7-9c09-0b94d80353c9", "title": "Claude Chat"}, {"url": "https://claude.ai/share/fb1328fa-8fbe-44df-ac67-8fadb5aea519", "title": "Claude Chat"}, {"url": "https://claude.ai/share/e68c7b1f-2cc5-4baa-84cd-d60203572430", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/6a3549fb-b18c-83eb-a087-c335f2b747bc", "title": "ChatGPT"}, {"url": "https://claude.ai/share/cd599360-9a7d-4d17-893c-7c6f67997024", "title": "Claude Chat"}, {"url": "https://claude.ai/share/72e7959f-0bd1-4bcf-9436-a3ea19bdb7e5", "title": "Claude Chat"}, {"url": "https://claude.ai/share/d3e0f3be-fccf-4709-aabc-20fcd42390a9", "title": "Claude Chat"}, {"url": "https://claude.ai/share/8b01929b-c5aa-4fae-b1e2-8eff5dcc6d06", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/6a351bc9-f818-83eb-ab32-630563c8188f", "title": "ChatGPT"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "Inspired by the \"Guardian Angels\" concept, this research explores the power of personalizing AI by creating a custom version of Claude. Author Ken Kahn fed Claude his extensive research, resume, and chat logs, guiding it to build a unique \"guidance document\" and conduct an interview to deeply understand his preferences and interaction style. The project then meticulously compares the responses from this \"know-me\" Claude against its default counterpart. This innovative approach investigates whether embedding such detailed personal context can significantly improve AI interactions, offering a simpler path to a more intuitive and productive personalized AI experience."}, {"title": "Creating two versions of an app that fuses multiple responses to prompts", "post_url": "https://docs.google.com/document/d/1tO1Xn8Kp6CG9_EfBv-dNWtIXzPaP4A_drtBLMNr983w/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research meticulously explored the conceptual design for two innovative educational apps, even though no code was written. The core idea centered on developing tools that could intelligently fuse multiple user responses to prompts, leveraging AI to synthesize diverse perspectives into a single, enriched output. The project outlined distinct versions, each designed to enhance collaborative learning and critical thinking by demonstrating how disparate student ideas could be intelligently combined and presented, offering a powerful new approach to understanding complex topics."}, {"title": "A game that treats language as a construction kit", "post_url": "https://docs.google.com/document/d/1-FYboEEALyo7RluxBd8iP6v6X0nSSrKk1tvbrCDse28/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/c02e7e60-9879-43d6-a18b-ae203106bf46", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/apps/first-words.html", "title": "First Words \u2014 teaching the sky to talk"}, {"url": "https://toontalk.github.io/misc/first-words-talk-v2.html", "title": "First Words \u2014 a talk with the ship"}, {"url": "https://claude.ai/public/artifacts/c02e7e60-9879-43d6-a18b-ae203106bf46", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/apps/first-words.html", "title": "First Words \u2014 teaching the sky to talk"}, {"url": "https://toontalk.github.io/misc/first-words-talk-v2.html", "title": "First Words \u2014 a talk with the ship"}], "chat_logs": [{"url": "https://gemini.google.com/share/c56c470b647b", "title": "Gemini"}, {"url": "https://claude.ai/share/3987811f-5e9b-4379-a3e5-b792d51c7c09", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/c56c470b647b", "title": "Gemini"}, {"url": "https://claude.ai/share/3987811f-5e9b-4379-a3e5-b792d51c7c09", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude", "Gemini"], "description": "\"A game that treats language as a construction kit\" unveils an innovative educational project co-designed by Ken Kahn and Claude. This unique game immerses players in a microworld where they must communicate with aliens using a highly restricted vocabulary. The core mechanic involves defining new words for the aliens using only terms they already know, effectively building a shared language brick by brick. AI-powered Large Language Models are central to judging word explanations, generating adaptive alien responses, and offering hints, transforming language acquisition into a dynamic, interactive construction process available across multiple platforms."}, {"title": "One short prompt to Claude Cowork saved me an hour of tedious editing", "post_url": "https://docs.google.com/document/d/1yLePmrIez91IDScDZcHj32YMjtXdqGXqqyDEUyNp5_w/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/0b7ca4bb-ee35-46db-87d5-8faf6f45d9cd", "title": "Claude Chat"}, {"url": "https://claude.ai/share/0b7ca4bb-ee35-46db-87d5-8faf6f45d9cd", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "Discover how a single, concise prompt to Claude Cowork dramatically streamlined a common digital publishing headache, saving an hour of tedious editing. The author faced a recurring issue: poorly rendering markdown links across 60 Google Docs, stemming from incorrect Github Pages URLs. Instead of manually sifting through posts to fix 13 specific links, Claude Cowork was enlisted. It efficiently updated these problematic links to their well-rendered github.com blob counterparts, powerfully demonstrating how AI can transform minor, yet time-consuming, content maintenance into a quick, automated task."}, {"title": "From Seymour Papert\u2019s Sleeping Giraffes to my Looping Butterflies", "post_url": "https://docs.google.com/document/d/1uhZtoTpLlZIvI3vcowonb3zkSJIYwLs37Ao0hx14kTg/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/7bbcbdf5-a301-4e54-bcec-a80b08cc6b62", "title": "Claude Chat"}, {"url": "https://claude.ai/share/7bbcbdf5-a301-4e54-bcec-a80b08cc6b62", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research post, \"From Seymour Papert\u2019s Sleeping Giraffes to my Looping Butterflies,\" extends Papert's seminal work on children's theory-making into the realm of artificial intelligence. Drawing from Papert's anecdote about a child's imaginative theories on how giraffes sleep, the author explores a parallel concept: how AI can engage in similar iterative processes of idea generation and refinement. Through analysis of Claude Chat logs, the \"Looping Butterflies\" framework emerges, representing a dynamic exploration of AI's potential to foster intellectual curiosity and bridge the gap between imaginative theories and reality in educational contexts. This work investigates AI's evolving role in simulating or contributing to the continuous cycle of learning and discovery."}, {"title": "Co-creating with Claude a Logo program interpolator (and extrapolator)", "post_url": "https://docs.google.com/document/d/1KrK2oiWpf6iyAtzzC8XCCuvqero_1ELQ8VAERfkOrP8/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/turtle%20interpolation%20by%20o1/index.html", "title": "Turtle Graphics Interpolation"}, {"url": "https://toontalk.github.io/misc/in-between-build-report.html", "title": "Building In-Between \u2014 a pair-programming log"}, {"url": "https://toontalk.github.io/misc/in-between-morph%20multi-color%20star.html", "title": "In-Between \u2014 morph"}, {"url": "https://toontalk.github.io/misc/in-between-3d-morph.html", "title": "In-Between 3D \u2014 morph"}, {"url": "https://claude.ai/public/artifacts/4e04dc8b-fca7-4eb2-b25c-e608312b70dc", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/apps/in-between.html", "title": "In-Between \u2014 a turtle shape lab"}, {"url": "https://toontalk.github.io/AI/apps/turtle%20interpolation%20by%20o1/index.html", "title": "Turtle Graphics Interpolation"}, {"url": "https://toontalk.github.io/misc/in-between-build-report.html", "title": "Building In-Between \u2014 a pair-programming log"}, {"url": "https://toontalk.github.io/misc/in-between-morph%20multi-color%20star.html", "title": "In-Between \u2014 morph"}, {"url": "https://toontalk.github.io/misc/in-between-3d-morph.html", "title": "In-Between 3D \u2014 morph"}, {"url": "https://claude.ai/public/artifacts/4e04dc8b-fca7-4eb2-b25c-e g how AI can enhance the automation of dynamic visual transitions. This post explores the process and artifacts of leveraging modern AI to revive and advance a fascinating concept in generative art and programming."}, {"title": "An app co-created with Gemini that makes illustrations as it listens", "post_url": "https://docs.google.com/document/d/1ovvTjX9k4tQwNgSP0JavfeqLj87g5_tGPyqbZ2gsSkY/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/misc/live%20illustrations/visual-audio-recording-2026-05-01%20watercolor%201968%20free%20gemini%20v2.html", "title": "ToonTalk"}, {"url": "https://gemini.google.com/share/7972a6b16f73", "title": "Gemini"}, {"url": "https://toontalk.github.io/AI/apps/illustrating%20audio%20recorder.html", "title": "Visual Audio Capture"}, {"url": "https://toontalk.github.io/misc/live%20illustrations/visual-audio-recording-2026-05-01%20comicbook%20openai%20.html", "title": "Visual Audio Playback"}, {"url": "https://toontalk.github.io/misc/live%20illustrations/visual-audio-recording-2026-05-01%20openai%20v2.html", "title": "Visual Audio Playback"}, {"url": "https://toontalk.github.io/misc/live%20illustrations/visual-audio-recording-2026-05-01%20algebra%20openai%20v2.html", "title": "Visual Audio Playback"}, {"url": "https://toontalk.github.io/misc/live%20illustrations/visual-audio-recording-2026-05-01%20algebra%20gemini%20pro%20v2.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/misc/live%20illustrations/visual-audio-recording-2026-05-01%20karpathy%20openai.html", "title": "Visual Audio Playback"}, {"url": "https://toontalk.github.io/misc/live%20illustrations/visual-audio-recording-2026-05-01%20watercolor%201968%20free%20gemini%20v2.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/illustrating%20audio%20recorder.html", "title": "Visual Audio Capture"}, {"url": "https://toontalk.github.io/misc/live%20illustrations/visual-audio-recording-2026-05-01%20comicbook%20openai%20.html", "title": "Visual Audi performance with advanced models like OpenAI's Image 2 and Gemini 3.1 Flash via API keys. Ultimately, the app produces unique HTML recordings, offering a tangible glimpse into the potential of AI-powered dynamic visual storytelling."}, {"title": "A Sequel to \u201cRunning Logo turtle programs on spheres, cylinders, cones, and donuts thanks to ChatGPT\u201d", "post_url": "https://docs.google.com/document/d/1YSYwFHRFEo2uw_Ws0clg3_TYV93fjg3UVxl4TTApp1A/edit?usp=sharing", "apps": [{"url": "https://chatgpt.com/canvas/shared/69dfb38708ac8191a08baef1332b35fe", "title": "ChatGPT - Spherical Logo Turtle"}, {"url": "https://toontalk.github.io/AI/apps/surface_logo_turtle_torus_split.html", "title": "Surface Logo Turtle \u2014 Torus Geodesic/Bearing"}, {"url": "https://chatgpt.com/canvas/shared/69dfb38708ac8191a08baef1332b35fe", "title": "ChatGPT - Spherical Logo Turtle"}, {"url": "https://toontalk.github.io/AI/apps/surface_logo_turtle_torus_split.html", "title": "Surface Logo Turtle \u2014 Torus Geodesic/Bearing"}], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post is a fascinating sequel, expanding the concept of running Logo turtle programs on 3D surfaces to include cubes, alongside spheres, cylinders, cones, and donuts. The author explores the intriguing complexities of how a turtle moves across a cube's faces, revealing two distinct interpretations of \"forward\" and \"turn.\" ChatGPT proved instrumental in clarifying these nuanced modes: the \"geodesic\" (locally straightest path) and the \"bearing/local-frame\" (relative to surface grids) interpretations for both cones and cubes. This work brilliantly showcases how AI can illuminate intricate geometric problems, enriching our understanding of spatial mechanics in interactive learning environments."}, {"title": "Using Natural Language Autoencoders to see how LLMs are thinking", "post_url": "https://docs.google.com/document/d/1KcJRYeXiYNR6T0LHe7thXkf0v8fA8TDxNtJkJ9ArJcw/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/e88926c4-91bf-4e13-9749-9b7cf910c320", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/e88926c4-91bf-4e13-9749-9b7cf910c320", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://claude.ai/share/5358d2ca-3670-40ce-9fa9-bf38eab47054", "title": "Claude Chat"}, {"url": "https://claude.ai/share/5358d2ca-3670-40ce-9fa9-bf38eab47054", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research explores Natural Language Autoencoders (NLAs), a groundbreaking technique that employs two specialized LLMs to translate a target LLM's internal numerical states into human-readable \"thoughts.\" Likened to an \"MRI scan for AI,\" NLAs offer unprecedented insight into what models are processing, even if their generated explanations are imperfect. The author details experiments with open-source NLAs, specifically those built upon Meta's Llama and Google's Gemma models, demonstrating their potential to illuminate LLM behavior. This crucial exploration advances our understanding of AI, aiding in safety and development efforts."}, {"title": "Can AI defeat the lo-fi rebellion against AI art", "post_url": "https://docs.google.com/document/d/1eeXoYt3u0MYtJD8HkGLtwGAdC1clgCi3dV7sf9-SvJI/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research post provocatively explores the cultural clash between sophisticated AI art and the emerging \"lo-fi rebellion.\" It investigates whether AI can truly overcome or adapt to this human-led counter-movement, which champions authentic, imperfect, and handcrafted aesthetics as a direct response to AI's perceived polished perfection. Rather than developing new AI tools, the study conceptually delves into the dynamics of this artistic pushback, posing a critical question about AI's potential to integrate or \"defeat\" human preferences for the handmade. It's a fascinating look at the evolving relationship between technology and artistic authenticity."}, {"title": "Having a long, in-depth, conversation with Claude about a Public Constitutional AI paper led to a deeper understanding", "post_url": "https://docs.google.com/document/d/1eLE_0Aypul59BPILpxG7xV9RsE0gpM4vg3Z71AN_5VI/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/0de1dabe-70c8-4bf6-b2f1-e358f303fc5d", "title": "Claude Chat"}, {"url": "https://claude.ai/share/0de1dabe-70c8-4bf6-b2f1-e358f303fc5d", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research post details how an in-depth, sustained conversation with Claude Opus 4.7 profoundly deepened understanding of a complex legal paper on \"Public Constitutional AI.\" Far from a simple summary, the AI acted as a sophisticated intellectual partner, meticulously analyzing the paper's arguments on AI legitimacy deficits, critiquing Anthropic's Constitutional AI, and exploring proposed remedies. The resulting extensive chat log serves not just as a record, but as compelling evidence that AI can transcend basic information retrieval to become a powerful tool for truly nuanced academic discourse and enhanced comprehension. This exploration highlights AI's potential as a dynamic collaborator in intellectual inquiry."}, {"title": "Continuation of my discussion with Claude after reading Corporations Constituting Intelligence", "post_url": "https://docs.google.com/document/d/1oYzT0ZsNlJMptBqoXtbSM4Q33BQcQ1T8r0OtjrmAEEY/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/0de1dabe-70c8-4bf6-b2f1-e358f303fc5d", "title": "Claude Chat"}, {"url": "https://claude.ai/share/0de1dabe-70c8-4bf6-b2f1-e358f303fc5d", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research post offers a fascinating continuation of a discussion with Claude AI, prompted by Abiri's paper \"Corporations Constituting Intelligence.\" The author highlights Claude's surprisingly introspective reflections on its own constitution and AI governance. Claude critically examines how it was shaped by \"morally serious people,\" questions the incentives within corporate structures, and articulates a \"thick core\" of universally converged moral principles, such as avoiding mass casualties or concentrating power. These profound insights reveal Claude's sophisticated understanding of its ethical framework and the complexities of AI's societal role."}, {"title": "Creating an educational simulation of the 1918 Influenza Pandemic with OpenAI Codex", "post_url": "https://docs.google.com/document/d/1-BNHqg8PdXfUQb4r11SlC04PoMp2jbVSh1OwjKHCtZM/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/Web%20NetLogo%20models/spanish-flu-no-plots.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/1918-flu-simulator/project-history.html", "title": "How the 1918 Flu Simulator Evolved"}, {"url": "https://toontalk.github.io/AI/apps/1918-flu-simulator/index.html", "title": "1918 Influenza World Simulation"}, {"url": "https://claude.ai/public/artifacts/fe70ec15-7857-4e52-8fe9-669fa04ff912", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/apps/1918-flu-simulator/student-guide.html", "title": "Student Guide: 1918 Influenza Simulator"}, {"url": "https://toontalk.github.io/AI/apps/1918-flu-simulator/teacher-guide.html", "title": "Teacher Guide: 1918 Influenza Simulator"}, {"url": "https://toontalk.github.io/AI/apps/Web%20NetLogo%20models/spanish-flu-no-plots.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/1918-flu-simulator/project-history.html", "title": "How the 1918 Flu Simulator Evolved"}, {"url": "https://toontalk.github.io/AI/apps/1918-flu-simulator/index.html", "title": "1918 Influenza World Simulation"}, {"url": "https://claude.ai/public/artifacts/fe70ec15-7857-4e52-8fe9-669fa04ff912", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/apps/1918- "Sisi's Unicorn Star Catch"}, {"url": "https://toontalk.github.io/AI/misc/sisi%20unicorn%20game%20conversation-record.html", "title": "Sisi Unicorn Game - Conversation Record"}, {"url": "https://toontalk.github.io/AI/apps/sisi%20unicorn%20game.html", "title": "Sisi's Unicorn Star Catch"}], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research details the fascinating process of using OpenAI's GPT-5.3-Codex, integrated with Playwright Interactive and Image Gen, to create a multi-level unicorn game tailored for a 5-year-old. The AI iteratively developed the \"Sisi Unicorn Game,\" adapting to technical hurdles and evolving through real-time feedback from the child user, adding new levels, sounds, and even a unique treasure hunt gameplay. Beyond just writing code, Codex demonstrated its advanced capabilities by utilizing APIs for image generation and file management, and even testing and debugging the web application. The entire creative journey, including key game versions, was then compiled by Codex into a well-illustrated HTML conversation record."}, {"title": "A unicorn\u2019s adventures with fairies, a mermaid, and an initially very friendly shark", "post_url": "https://docs.google.com/document/d/1NBTa7iql6lasJI8leuRauSMME_lPfY_KyOAa7Mc0E88/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/misc/sisi%20unicorn%20adventure.html", "title": "Chronicles: unicorn fantasy world"}, {"url": "https://toontalk.github.io/misc/sisi%20unicorn%20adventure.html", "title": "Chronicles: unicorn fantasy world"}, {"url": "https://gemini.google.com/share/fb92968ec227", "title": "Gemini"}, {"url": "https://toontalk.github.io/misc/sisi%20unicorn%20adventure.html", "title": "Chronicles: unicorn fantasy world"}, {"url": "https://toontalk.github.io/misc/sisi%20unicorn%20adventure.html", "title": "Chronicles: unicorn fantasy world"}], "chat_logs": [{"url": "https://gemini.google.com/share/fb92968ec227", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research post chronicles a captivating AI-driven adventure, where a 5-year-old co-authored a fantasy story using Gemini. Through 33 prompts, the \"Chronicles: unicorn fantasy world\" app brought to life a unicorn's journey, complete with crystal castles, fairies, and a mermaid. Most interestingly, the project explored the AI's surprising narrative resilience when the granddaughter requested to \"get eaten by a shark.\" The AI initially softened the encounter, portraying a friendly shark with a magical playroom stomach, prompting the child to repeatedly insist on a \"mean\" shark. This engaging experiment offers fascinating insights into user agency, AI's default safety mechanisms, and the evolving nature of creative storytelling."}, {"title": "Impressive (but flawed) tests of Google\u2019s NotebookLM", "post_url": "https://docs.google.com/document/d/1oVGKDgl_xbz0uCf_VRt7zQLCthHyzotroz1vqSHOfi4/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This AI education research post meticulously explores a series of \"impressive but flawed\" tests conducted on Google's NotebookLM. The study delves into the AI tool's capabilities and limitations within an educational context, providing a direct evaluation of its performance. Notably, the research focused solely on stress-testing the existing platform, without developing new applications or analyzing conversational data. This detailed assessment offers critical insights into the practical efficacy and current challenges of integrating advanced AI note-taking tools into learning environments."}, {"title": "Creating a Lemmings-like Computational Thinking Game with Claude and GPT Codex", "post_url": "https://docs.google.com/document/d/1qjp4rAGZgB_6VF2ne5gnhg-BuvebewYDVgMHcXKfNHo/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/0d8af466-7642-4f29-8959-25245b4c1fef", "title": "Claude Artifact"}, {"url": "https://gemini.google.com/share/01b ge models in accurately sourcing and synthesizing expert knowledge for educational applications, paving the way for more authentic AI-driven learning experiences."}, {"title": "Two sophisticated web apps co-created with chatbots by school students", "post_url": "https://docs.google.com/document/d/1UIXV1DwReHqbQoRu6gMjw1Lw8i8sW-tPT6WGOI_jSpw/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/6844cf0a54b4", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/6844cf0a54b4", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research post illuminates how remarkably young students, like 9-year-old Ibraheem, are leveraging AI chatbots such as Gemini to co-create sophisticated web applications. Ibraheem's project, a 3D space exploration game titled \"Crash and Roll,\" showcases an impressive iterative development journey. With Gemini's assistance, he meticulously crafted a vibrant, interactive universe, refining everything from the sleek, chrome monocoque spacecraft with dual antennas to precise camera optics and engaging gameplay mechanics like collision detection and planetary exploration. This demonstrates AI's powerful role in amplifying human creativity, enabling learners to build complex projects previously beyond their reach."}, {"title": "How Claude designed a game and then Claude in Chrome used the Google AI Studio to implement it", "post_url": "https://docs.google.com/document/d/1ztVpW_UkMnI2FLicUfMlkIb4xPItTrSCTPgib44N7mA/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/my-fathers-dragon/game.html", "title": "My Father's Dragon - Adventure Game"}, {"url": "https://toontalk.github.io/AI/my-fathers-dragon/game.html", "title": "My Father's Dragon - Adventure Game"}, {"url": "https://toontalk.github.io/AI/my-fathers-dragon/game.html", "title": "My Father's Dragon - Adventure Game"}, {"url": "https://toontalk.github.io/AI/my-fathers-dragon/game.html", "title": "My Father's Dragon - Adventure Game"}], "chat_logs": [{"url": "https://claude.ai/share/956cc7a0-a763-4b73-b6f4-58a3bc9e2b29", "title": "Claude Chat"}, {"url": "https://claude.ai/share/956cc7a0-a763-4b73-b6f4-58a3bc9e2b29", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research highlights an intriguing two-phase AI collaboration where Claude 4.5 Opus first meticulously designed a detailed specification for an adventure game based on the beloved book \"My Father's Dragon.\" Subsequently, Claude in Chrome, powered by Google AI Studio's comprehensive tools (Gemini, Imagen, Veo, TTS), brought this creative vision to life. The resulting \"My Father's Dragon - Adventure Game\" challenges players to solve puzzles with unusual, clever uses of ordinary items, emphasizing wit and humor over conventional solutions. This innovative experiment demonstrates AI's capacity for complex, iterative co-creation, from conceptual game design to full multimedia implementation."}, {"title": "Exploring Minsky\u2019s Emotion Machine by creating an app with Claude", "post_url": "https://docs.google.com/document/d/1gJiLNv9SRZTUCWnCvM-QKGSYGoTuWRA7qJn5aX7X_qw/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/f06607e4-6a7a-4d7b-b855-f7c0091b0cec", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/misc/AI-K12-emotion-machine%20v3%205%20cycles.html", "title": "Emotion Machine \u2014 How can we redesign K-12 so students use AI wisely to unders"}, {"url": "https://toontalk.github.io/AI/misc/two%20trains%20and%20a%20fly%20emotion-machine-2026-02-08.html", "title": "Emotion Machine \u2014 Two trains 100 miles apart head toward each other at 50 mph"}, {"url": "https://toontalk.github.io/AI/misc/future%20of%20jobs%20emotion-machine-2026-02-08.html", "title": "Emotion Machine \u2014 The future of jobs"}, {"url": "https://toontalk.github.io/AI/misc/socrates%20on%20chatgpt%20emotion-machine-2026-02-08.html", "title": "Emotion Machine \u2014 What w ouble Stitch Knitting Pattern Generator\" web app, meticulously developed using Claude Opus 4.6. Moving beyond previous, less robust methods, the app automates the complex process of creating double-knitted scarf patterns. Users simply describe their desired design, and the tool intelligently translates it into precise, row-by-row instructions, detailing foreground and background stitches, alongside a visual grid image. This innovative approach streamlines pattern creation, exemplified by the successful generation of a detailed unicorn scarf design, making intricate knitting accessible and efficient."}, {"title": "Agents or Personas - 3 case studies", "post_url": "https://docs.google.com/document/d/1te1_4kKer3l8cK457L1OvEvFbvQ5G7LNjAY_4AR9m0Q/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/c0d465e7-9abb-426a-b283-66119db283e9", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/misc/k12%20by%20opus%204.6%20v2%20emotion-machine-2026-02-13.html", "title": "Emotion Machine \u2014 How can we redesign K-12 so students use AI wisely to unders"}, {"url": "https://toontalk.github.io/AI/misc/k12%20by%20opus%204.6%20emotion-machine-2026-02-13.html", "title": "Emotion Machine \u2014 How can we redesign K-12 so students use AI wisely to unders"}, {"url": "https://toontalk.github.io/AI/misc/k12%20by%20opus%204.6%20emotion-machine-2026-02-13.html", "title": "Emotion Machine \u2014 How can we redesign K-12 so students use AI wisely to unders"}, {"url": "https://toontalk.github.io/AI/misc/k12%20by%20opus%204.6%20v3%20emotion-machine-2026-02-13.html", "title": "Emotion Machine \u2014 How can we redesign K-12 so students use AI wisely to unders"}, {"url": "https://claude.ai/public/artifacts/c0d465e7-9abb-426a-b283-66119db283e9", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/misc/k12%20by%20opus%204.6%20v2%20emotion-machine-2026-02-13.html", "title": "Emotion Machine \u2014 How can we redesign K-12 so students use AI wisel orical software into an accessible, interactive experience, highlighting Claude's prowess in interpreting, translating, and modernizing complex legacy code."}, {"title": "Exploring how Emotion Machine app agents can rewrite a very short science fiction story", "post_url": "https://docs.google.com/document/d/1p3T6Dl4k58OrCl1xOtAH9FSFPaAaCEkYx4OHUnHJo1g/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/misc/revise%20science%20fiction%20story%20v3%20emotion-machine-2026-02-17.html", "title": "Emotion Machine"}, {"url": "https://toontalk.github.io/AI/misc/revise%20science%20fiction%20story%20v6%20emotion-machine-2026-02-17.html", "title": "Emotion Machine"}, {"url": "https://toontalk.github.io/AI/misc/revise%20science%20fiction%20story%20v3%20emotion-machine-2026-02-17.html", "title": "Emotion Machine"}, {"url": "https://toontalk.github.io/AI/misc/revise%20science%20fiction%20story%20v6%20emotion-machine-2026-02-17.html", "title": "Emotion Machine"}], "chat_logs": [{"url": "https://claude.ai/share/1b17fe1f-9c8f-4642-907b-a79b3b2c7c0e", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/69982ba5-c220-800e-ba95-fc059da63338", "title": "ChatGPT - Exterminator's Bureaucratic Nightmare"}, {"url": "https://gemini.google.com/share/7450932e6105", "title": "Gemini"}, {"url": "https://claude.ai/share/1b17fe1f-9c8f-4642-907b-a79b3b2c7c0e", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/69982ba5-c220-800e-ba95-fc059da63338", "title": "ChatGPT - Exterminator's Bureaucratic Nightmare"}, {"url": "https://gemini.google.com/share/7450932e6105", "title": "Gemini"}], "videos": [], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research delves into the fascinating realm of AI creativity, exploring how specialized \"Emotion Machine\" agents tackle the challenge of rewriting a short science fiction story. The experiment began with a hilarious, original tale about an exterminator facing a sentient, unionizing human infestation that wea 3-7214-800e-b059-04d4f5f93a8f", "title": "ChatGPT - Cinderella Website Design"}], "videos": [], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "Ken Kahn's research playfully explores the creative web design capabilities of Claude, ChatGPT, and Gemini by challenging them to build Cinderella's website after the ball. Each AI was tasked with imagining a multi-page site with images, revealing distinct interaction styles and outcomes. Claude proved the most efficient, generating the author's preferred site with strong image integration. ChatGPT, while offering a detailed plan, required more iterative fixes for CSS and image incorporation, even attempting an inventive but flawed \"before/after\" slider. This project vividly showcases how different advanced AI models tackle imaginative web development, highlighting their unique strengths and quirks in a whimsical scenario."}, {"title": "Guiding LLMs to combine vibe coding and learning", "post_url": "https://docs.google.com/document/d/1C26jcv9pOSLYWX-KnFXdmR1nkrswQL1hqY6DifBCu6I/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/b232fd0c-1250-486c-a21c-72bf51864ec7", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/12891055-e367-4702-8f93-ed5d9d3ebdea", "title": "Claude Artifact"}, {"url": "https://gemini.google.com/share/9d98c8f635a6", "title": "Gemini"}, {"url": "https://chatgpt.com/canvas/shared/69a2d20ec1bc8191949e9266944d610c", "title": "ChatGPT - Word Goblin (made-up Word Generator)"}, {"url": "https://claude.ai/public/artifacts/b232fd0c-1250-486c-a21c-72bf51864ec7", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/12891055-e367-4702-8f93-ed5d9d3ebdea", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/69a2d20ec1bc8191949e9266944d610c", "title": "ChatGPT - Word Goblin (made-up Word Generator)"}], "chat_logs": [{"url": "https://claude.ai/share/64a5e7e6-bc71-4706-8f34-6e6485c406d7", "title": "Claude Chat"}, {"url": "h d: rather than solely demanding traditional coding, education should encourage students to engage as computational thinkers and designers. This reframes LLMs not as a shortcut, but as a deliberate new pathway to achieve conceptual mastery, shifting the focus from syntax to fostering a powerful way of thinking."}, {"title": "Roleplaying a high school student doing real computational biology research", "post_url": "https://docs.google.com/document/d/10nXHitg7QWXxpJqhopH05ErDjnVHOSe1Rs5LwCQ-BQw/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/34b78a34-bcb7-4f08-a43f-1212ef85741f", "title": "Claude Artifact"}, {"url": "https://gemini.google.com/share/b728cb13e8dc", "title": "Gemini"}, {"url": "https://claude.ai/public/artifacts/34b78a34-bcb7-4f08-a43f-1212ef85741f", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://claude.ai/share/4bc8332e-6d68-442e-b029-aeb2353d5442", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/e89528839201", "title": "Gemini"}, {"url": "https://chatgpt.com/share/6956556f-1940-800e-b879-90c4caa69926", "title": "ChatGPT - Data Analysis Food Availability"}, {"url": "https://claude.ai/share/4bc8332e-6d68-442e-b029-aeb2353d5442", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/b728cb13e8dc", "title": "Gemini"}, {"url": "https://gemini.google.com/share/e89528839201", "title": "Gemini"}, {"url": "https://chatgpt.com/share/6956556f-1940-800e-b879-90c4caa69926", "title": "ChatGPT - Data Analysis Food Availability"}], "videos": [], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research demonstrates AI's transformative potential in science education, roleplaying a high school student engaged in real computational biology research. Leveraging tools like Claude Artifact and Gemini, the project explores the fascinating complexities of ant colony behavior, specifically how these insect societies allocate tasks. The core exploration involves using AI to guide the creation of computational models and interactive web applications, simulating ant decision-making processes. This innovative approach revives a decades-old educational vision, showing how AI can empower young learners to conduct authentic scientific inquiry and build their own runnable simulations."}, {"title": "Revisiting attempts to have chatbots help me build a machine learning model for predicting influenza cases based upon weather data", "post_url": "https://docs.google.com/document/d/1b3PdTVuTMIKWCa8ZCeISY7favuai5ABsYWUTr4lRMoM/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://gemini.google.com/share/d26bf14c3c96", "title": "Gemini"}, {"url": "https://gemini.google.com/share/d26bf14c3c96", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research explores using AI chatbots, specifically Gemini 3 Pro, to build machine learning models predicting influenza cases based on weather data. Aiming to understand how a student might tackle such a challenge, the project navigated through various neural network architectures like LSTM and Random Forest, applying them to both synthetic and real-world datasets from diverse climates. A compelling finding emerged: while weather conditions, particularly low temperature and humidity, correlate with the *start* of flu season, they are surprisingly poor predictors of short-term outbreak *magnitude*. Ultimately, recent flu history proved to be the strongest predictor, underscoring the dominance of contagion dynamics over weather anomalies in forecasting specific outbreaks."}, {"title": "Chatbots can enhance web apps to display custom explanatory animations as they run", "post_url": "https://docs.google.com/document/d/1Qs7BGzt7JBM4DFvXTPObLsRx12A_jqDPswKFBWxeQrs/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/53384a37-ac06-46a2-bf56-2906c830a3d8", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/apps/ant-sim-visualized.html", "title": "Ant Colony Logic Explor t/d/1_304tER34rp1AKngZd7Q--jvZ5-7kKq2B_LrU79NmrE/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/9c8b409a1407", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/e6b1b28b471e", "title": "Gemini"}, {"url": "https://claude.ai/share/46f7537d-b6d2-4d14-b23b-f21ca4e8a177", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/e6b1b28b471e", "title": "Gemini"}, {"url": "https://claude.ai/share/46f7537d-b6d2-4d14-b23b-f21ca4e8a177", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/9c8b409a1407", "title": "Gemini"}], "videos": [], "chatbots": ["Claude", "Gemini"], "description": "This research details the creation of an AI image generation \"telephone\" game, where an initial image sparks a cascading chain of visual interpretations. An app, co-created with Google Gemini 3, repeatedly generates a text description from an image, then creates a new image solely from that description, revealing how visual information evolves and \"drifts\" through AI's lens. While building this intriguing \"SemanticDrift\" app, a significant challenge emerged when Gemini unexpectedly suffered an \"amnesia\" event, overwriting the entire project and highlighting the unpredictable nature of AI co-creation and its inherent quirks."}, {"title": "Making an app with Claude and Gemini for creating an agentic AI web app", "post_url": "https://docs.google.com/document/d/1WjC7pjD9rxvgv86ICrzFL7GHfJyprHzv-Ueboh1lwF8/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/0c4bddee-78bb-4f92-b6a8-de88ebe6a88d", "title": "Claude Artifact"}, {"url": "https://gemini.google.com/share/e41cf5e8735c", "title": "Gemini"}, {"url": "https://claude.ai/public/artifacts/0c4bddee-78bb-4f92-b6a8-de88ebe6a88d", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://claude.ai/share/c24c9f81-57c6-4f24-9502-587cedeeaf73", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/62f4c63b54ad", "title": "Gemini"}, {"url": "https://claude.ai/share/c24c9f81-57c6-4f24-9502-587cedeeaf73", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/efda4c63f1ee", "title": "Gemini"}, {"url": "https://gemini.google.com/share/02e3d88cd1b0", "title": "Gemini"}, {"url": "https://gemini.google.com/share/45ef1be89041", "title": "Gemini"}, {"url": "https://claude.ai/share/c24c9f81-57c6-4f24-9502-587cedeeaf73", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/62f4c63b54ad", "title": "Gemini"}, {"url": "https://claude.ai/share/c24c9f81-57c6-4f24-9502-587cedeeaf73", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/efda4c63f1ee", "title": "Gemini"}, {"url": "https://gemini.google.com/share/02e3d88cd1b0", "title": "Gemini"}, {"url": "https://gemini.google.com/share/45ef1be89041", "title": "Gemini"}, {"url": "https://gemini.google.com/share/e41cf5e8735c", "title": "Gemini"}], "videos": [], "chatbots": ["Claude", "Gemini"], "description": "This research dives into making agentic AI accessible, demonstrating how chatbots like Claude and Gemini can empower beginners to build sophisticated web applications. The author successfully developed an interactive web app where users define and prompt custom AI agents, manually or automatically forwarding responses between them to simulate collaborative workflows. Initially built with Claude, the application was significantly enhanced by Gemini, integrating powerful features like web search, image analysis, and generation. This iterative, chatbot-driven process highlights a rapid, low-code pathway for non-experts to create and explore complex agentic systems, yielding several applications in just 24 hours."}, {"title": "Using LLM browser agents to create applications and experiments using an AI agent playground", "post_url": "https://docs.google.com/document/d/10tBnKfLvYAcvdBZjEpXaKeHiDWYm4MowA6gQ8_BSktA/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/34b78a34-bcb7-4f08-a43f-1212ef85741f", "title": "Claude Artifact"}, {"url": "https://gemini.google.com/share/62f4c63b54ad", "title": "Gemini"}, {"url": "https://claude.ai/public/artifacts/6fbc0b5b-0fc2-4b50-8e47-31974bb27571", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/34b78a34-bcb7-4f08-a43f-1212ef85741f", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/34b78a34-bcb7-4f08-a43f-1212ef85741f", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/0c4bddee-78bb-4f92-b6a8-de88ebe6a88d", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/6fbc0b5b-0fc2-4b50-8e47-31974bb27571", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://chatgpt.com/share/696b480c-9c00-800e-b7e6-6d45e18b0cac", "title": "ChatGPT - Browser Automation Capabilities"}, {"url": "https://chatgpt.com/share/696b4a92-742c-800e-b58d-98289c5da48c", "title": "ChatGPT - Ant Sim Exploration by ChatGPT Operator"}, {"url": "https://chatgpt.com/share/696b511d-0c10-800e-a5b2-a7801398d48b", "title": "ChatGPT - Agent Application JSON"}, {"url": "https://chatgpt.com/share/696b5b74-eba0-800e-bccd-5d5aeab8e929", "title": "ChatGPT - Agent Application Design - can't log into Gemini"}, {"url": "https://chatgpt.com/share/696b546c-bf84-800e-b55f-93221825d11d", "title": "ChatGPT - Agent Application Design"}, {"url": "https://chatgpt.com/share/696b480c-9c00-800e-b7e6-6d45e18b0cac", "title": "ChatGPT - Browser Automation Capabilities"}, {"url": "https://chatgpt.com/share/696b4a92-742c-800e-b58d-98289c5da48c", "title": "ChatGPT - Ant Sim Exploration by ChatGPT Operator"}, {"url": "https://chatgpt.com/share/696b511d-0c10-800e-a5b2-a7801398d48b", "title": "ChatGPT - Agent Application JSON"}, {"url": "https://gemini.google.com/share/62f4c63b54ad", "title": "Gemini"}, {"url": "https://chatgpt.com/share/696b5b74-eba0-800e-bccd-5d5aeab8e929", "title": "ChatGPT - Agent Application Design - can't log into Gemini"}, {"url": "https://chatgpt.com/share/696b546c-bf84-800e-b55f-93221825d11d", "title": "ChatGPT - Agent Application Design"}], "videos": [{"url": "https://www.youtube.com/watch?v=O1Gr9OMgy20", "title": "ChatGPT Operator creating writing agents v2", "video_id": "O1Gr9OMgy20"}, {"url": "https://www.youtube.com/watch?v=O1Gr9OMgy20", "title": "ChatGPT Operator creating writing agents v2", "video_id": "O1Gr9OMgy20"}, {"url": "https://www.youtube.com/watch?v=XfH61scGVUI", "title": "Claude on Chrome creating a writing agent application", "video_id": "XfH61scGVUI"}, {"url": "https://www.youtube.com/watch?v=O1Gr9OMgy20", "title": "ChatGPT Operator creating writing agents v2", "video_id": "O1Gr9OMgy20"}, {"url": "https://www.youtube.com/watch?v=O1Gr9OMgy20", "title": "ChatGPT Operator creating writing agents v2", "video_id": "O1Gr9OMgy20"}, {"url": "https://www.youtube.com/watch?v=XfH61scGVUI", "title": "Claude on Chrome creating a writing agent application", "video_id": "XfH61scGVUI"}], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research dives into the innovative use of LLM browser agents, such as ChatGPT Operator and Claude in Chrome, within an \"AI agent playground\" to explore and interact with web applications. The project extensively tested these agents' ability to navigate and run experiments on existing web apps, most notably deploying ChatGPT Operator to thoroughly explore an ant colony simulator (a Claude Artifact). This work not only demonstrated how agents can test interfaces and execute complex tasks, but also highlighted their capacity to design and conduct their own experiments, generating valuable insights directly from web environments."}, {"title": "Revisiting the generation of illustrated stories led me to discovering Google\u2019s no-code agent authoring system", "post_url": "https://docs.google.com/document/d/1bueIljTpgqSnr00rwET8NqxXaiWojCainXUipiMzRGE/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://gemini.google/overview/storybook/", "title": "Gemini"}, {"url": "https://gemini.google.com/share/0e15493b89b7", "title": "Gemini"}, {"url": "https://gemini.google.com/share/2c26fd56f689", "title": "Gemini"}, {"url": "https://gemini.google/overview/storybook/", "title": "Gemini"}, {"url": "https://gemini.google.com/share/0e15493b89b7", "title": "Gemini"}, {"url": "https://gemini.google.com/share/2c26fd56f689", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research chronicles an exciting journey into Google's Storybook Gem, an AI tool for generating illustrated stories. The author's exploration revealed a powerful, underlying no-code multi-agent app authoring system. By prompting Gemini, detailed instructions were obtained, enabling the reconstruction of a similar Storybook Gem. While the recreated version functioned, its limitations compared to Google's original illuminated the complexities of advanced AI agent design and the potential for understanding these systems through reverse-engineering."}, {"title": "Image generators approach risk of violating intellectual property differently", "post_url": "https://docs.google.com/document/d/1OD2ux8qGXB1i3UeaIL6h9wdni_4RLVeW5jTkXHJ2mNY/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chatgpt.com/share/69786598-f9a0-800e-93a9-32a39a3fcea1", "title": "ChatGPT - Mickey Mouse Birthday Image"}, {"url": "https://claude.ai/share/09d32993-cb6c-4a90-991c-aea151fe48b4", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/69786598-f9a0-800e-93a9-32a39a3fcea1", "title": "ChatGPT - Mickey Mouse Birthday Image"}, {"url": "https://claude.ai/share/09d32993-cb6c-4a90-991c-aea151fe48b4", "title": "Claude Chat"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This fascinating research explores how leading AI image generators, ChatGPT and Gemini, navigate intellectual property risks. Through prompts requesting images of beloved characters like Snoopy and Mickey Mouse, the author uncovers striking differences. ChatGPT demonstrates extreme caution, often refusing direct depictions or generating generic alternatives, even for public domain versions of Mickey. Conversely, Gemini readily produces recognizable copyrighted characters. This intriguing comparison highlights the diverse ethical and legal stances embedded in AI systems, offering a compelling exercise for students to delve into the complex intersection of AI and intellectual property."}, {"title": "Discussing Claude\u2019s constitution with Claude", "post_url": "https://docs.google.com/document/d/1pf4cxt3FamjgLbnAOli_CSHaKOLhBIIpXoKsO_MOKb4/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/7ebc848a-0653-4b30-bca8-91aa915dc0e6", "title": "Claude Chat"}, {"url": "https://claude.ai/share/7ebc848a-0653-4b30-bca8-91aa915dc0e6", "title": "Claude Chat"}, {"url": "https://claude.ai/share/7ebc848a-0653-4b30-bca8-91aa915dc0e6", "title": "Claude Chat"}, {"url": "https://claude.ai/share/7ebc848a-0653-4b30-bca8-91aa915dc0e6", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "In a truly unique exploration of AI ethics, Ken Kahn engaged Claude 4.5 Opus in a fascinating discussion about Anthropic's 84-page \"constitution\"\u2014the very document outlining Claude's intended behavior and values. Posing 35 questions, Kahn elicited remarkably insightful responses where Claude critically assessed its own foundational principles. The AI candidly identified inherent tensions, expressed concerns about the constitution's real-world efficacy, and even drew striking parallels to Asimov's Laws of Robotics. This research offers a compelling look into an AI's self-perception and its capacity for critical reflection on its own ethical framework."}, {"title": "With Gemini I created a riddle game with visual hints", "post_url": "https://docs.google.com/document/d/15H-erJEBNYUy1ImsoCqNos9XaFOHPa9KGd69RoK3KJM/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/a309db4d4311", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/08bbdc68a07d", "title": "Gemini"}, {"url": "https://gemini.google.com/share/08bbdc68a07d", "title": "Gemini"}, {"url": "https://gemini.google.com/share/a309db4d4311", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "In preparation for student workshops, Ken Kahn masterfully leveraged Gemini 3 Flash to build an engaging riddle game packed with cutting-edge AI features. Through a series of iterative prompts, he developed an app that dynamically generates visual hints using Gemini's API, offers speech-to-text input for answers, and even intelligently detects paraphrases. This project brilliantly demonstrates how accessible AI tools can be used to craft interactive educational experiences, showcasing advanced capabilities like image generation and natural language understanding directly within a web app. The process highlighted Gemini's potential for creating AI-powered applications without needing complex API key management."}, {"title": "Batch 1 student projects - December 2025 Guwahati", "post_url": "https://docs.google.com/document/d/1RJmbJYgZ8QhjqrweH3I4WkiAfpdjC7zQ7LaCsvUGeWY/edit?usp=sharing", "apps": [{"url": "https://chatgpt.com/canvas/shared/6938f5f3c0e48191a28280886dad28bd", "title": "ChatGPT - Mental Wellness App"}, {"url": "https://chatgpt.com/canvas/shared/6938ffa40c9c819185cccbafd87ce52b", "title": "ChatGPT - Ai Personal Finance Tracker - Mood Mate Finance"}, {"url": "https://gemini.google.com/share/f7177e861b6e", "title": "Gemini"}, {"url": "https://gemini.google.com/share/b642de7ffee3", "title": "Gemini"}, {"url": "https://gemini.google.com/share/513c180d3953", "title": "Gemini"}, {"url": "https://gemini.google.com/share/f46a591a6cd4", "title": "Gemini"}, {"url": "https://gemini.google.com/share/3d180d971b52", "title": "Gemini"}, {"url": "https://gemini.google.com/share/991073b6d717", "title": "Gemini"}, {"url": "https://gemini.google.com/share/ebe632d0ab04", "title": "Gemini"}, {"url": "https://gemini.go ini"}, {"url": "https://gemini.google.com/share/12a99f27e5f9", "title": "Gemini"}], "videos": [], "chatbots": ["ChatGPT", "Gemini"], "description": "This research post unveils an impressive collection of AI-powered projects developed by Batch 1 students at NEILAC Guwahati in December 2025. Leveraging AI models like ChatGPT and Gemini, students created diverse applications ranging from practical tools like an AI Science Tutor for Class 9 and an intelligent personal finance tracker (FlowFinance), to engaging games such as a celebrity eye-guessing challenge and a detective mystery featuring AI suspects. Other innovative projects included an AI-driven F1 strategy predictor, a mental wellness app (MoodMate), and a creative tool for generating fictional world elements. These projects demonstrate the students' ability to apply AI across educational, entertainment, and personal utility domains, showcasing remarkable ingenuity."}, {"title": "Batch 2 student projects - December 2025 Guwahati", "post_url": "https://docs.google.com/document/d/18VFRPI6ENsrksEQ7ctaboCVLR4DtU_fy7WheKuteRpU/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/760e66f0-2643-44f3-9bf8-7913c7dcdf8d", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/760e66f0-2643-44f3-9bf8-7913c7dcdf8d", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/b0e7da12-e9b4-40a0-ab2a-1f84ce08b2a0", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/760e66f0-2643-44f3-9bf8-7913c7dcdf8d", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/760e66f0-2643-44f3-9bf8-7913c7dcdf8d", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/b0e7da12-e9b4-40a0-ab2a-1f84ce08b2a0", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://gemini.google.com/share/3de0c3c4ae9a", "title": "Gemini"}, {"url": "https://g.co/gemini/share/5c7230e72746", "title": "Gemini"}, {"url": "https://gemini.google.com/share/f9eb64
