o 3s, and even implemented mobile tilt controls. This demonstrates a promising future where users can actively customize and enhance their digital experiences with simple conversational prompts, restoring agency over locked-down apps."}, {"title": "LLMs can\u2019t stick to the rules of chess", "post_url": "https://docs.google.com/document/d/1Q6slKmbY129iKCtkDx92_1noU3DvBj59VtrW2YBEeyQ/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/e1d32aae-fdc6-47a8-bce9-c3cee8adf156", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/928da04a-593a-4533-82e3-0574d658f7ad", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/e1d32aae-fdc6-47a8-bce9-c3cee8adf156", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/928da04a-593a-4533-82e3-0574d658f7ad", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://chatgpt.com/share/686174ac-655c-800e-aa93-15ac3e7902d6", "title": "ChatGPT - Stockfish API Integration"}, {"url": "https://claude.ai/share/f5919af6-f4af-45ec-b285-f7643b5a6dd1", "title": "Claude Chat"}, {"url": "https://claude.ai/share/cdcf3613-bca2-4c1b-9c0c-db9323ca07ff", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/686174ac-655c-800e-aa93-15ac3e7902d6", "title": "ChatGPT - Stockfish API Integration"}, {"url": "https://claude.ai/share/f5919af6-f4af-45ec-b285-f7643b5a6dd1", "title": "Claude Chat"}, {"url": "https://claude.ai/share/cdcf3613-bca2-4c1b-9c0c-db9323ca07ff", "title": "Claude Chat"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This research dives into the critical challenge of Large Language Models (LLMs) adhering to complex rules, specifically using chess as a testbed. Inspired by observed LLM failures, the author developed a Python script within Google Colab to automate experiments, pitting various LLMs (including Gemini and OpenAI models) against the powerful Stockfish chess engine. The findings were stark: across numerous games and models, LLMs consistently made illegal moves, demonstrating a fundamental struggle with rule-following even when prompted for corrections. This highlights a significant limitation in current generative AI's ability to internalize and apply robust models of the world."}, {"title": "A game created by a 6-year old speaking to Gemini", "post_url": "https://docs.google.com/document/d/12xnsNrkoMujpNaVCv-R9_T9wz1dSiqvVOW6pcZAAZo4/edit?usp=sharing", "apps": [{"url": "https://g.co/gemini/share/7b28b199c3e3", "title": "Gemini"}], "chat_logs": [{"url": "https://g.co/gemini/share/0f9651dc07cf", "title": "Gemini"}, {"url": "https://g.co/gemini/share/7b28b199c3e3", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "Imagine a 6-year-old dictating game ideas to Gemini, even with garbled speech and a 4-year-old's interjections! This research post details that remarkable collaboration, where Gemini initially crafted a game featuring a \"spike\" avoiding \"houses\" that explode like bombs. Despite confusing follow-up prompts, the AI impressively adapted, making houses give points and introducing separate loss-inducing \"bombs.\" The child enthusiastically played his challenging, AI-generated game, showcasing the surprising potential for very young children to manifest their creative visions with conversational AI, overcoming significant communication barriers."}, {"title": "How with Gemini\u2019s help I created a Pong game whose ball is a live Pong game", "post_url": "https://docs.google.com/document/d/1_CHJ8j7C_687VRn6V6N7bmYef1iKm0nRFZW8uk0Wmuc/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/recursive-pong-by-gemini-2.5-05-06%20-%20rectangles/index.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/recursive-pong-by-gemini-2.5-05-06/index.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/recursive-pong-by-gemini-2.5-05-06%20-%20rectangles/index.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/recursive-pong-by-gemini-2.5-05-06/index.html", "title": "ToonTalk"}], "chat_logs": [], "videos": [], "chatbots": ["Gemini"], "description": "This research post details the creation of a mind-bending \"Pong-ception\" game where the ball itself is a fully playable miniature Pong game. Originally conceived in 2000 using ToonTalk to impress students, the author recently leveraged Gemini 2.5 Pro to recreate this recursive marvel as a web app. Gemini even coined the intriguing name, though several iterations were needed to perfect the challenging gameplay. The result is an innovative demonstration of AI-assisted creativity, pushing the boundaries of classic game design into a fascinating, multi-layered experience."}, {"title": "So easy to make a cartoon with ChatGPT - so hard to perfect it", "post_url": "https://docs.google.com/document/d/1C1mgQYSSiBU1mhCFUCjcfk2CgC7q4mewTv4iv-igt-s/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chatgpt.com/share/681f2cdb-5090-800e-9e84-532d8d2f1b28", "title": "ChatGPT - Chatbot Creativity Explained"}, {"url": "https://chatgpt.com/share/681f2cdb-5090-800e-9e84-532d8d2f1b28", "title": "ChatGPT - Chatbot Creativity Explained"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post, \"So easy to make a cartoon with ChatGPT - so hard to perfect it,\" delves into the fascinating challenges of using AI for creative projects. Author Ken Kahn explored ChatGPT's ability to generate a multi-panel cartoon based on his book, \"The Learner\u2019s Apprentice,\" initially finding the AI surprisingly capable of drafting a script and visuals. However, the core of the exploration quickly shifted to the frustrating, iterative process of *perfection*. The post vividly details numerous attempts to fix seemingly minor issues\u2014from misspelled words and insufficient text bubbles to incorrect character expressions and even duplicate figures\u2014highlighting that while AI can kickstart complex creative tasks, achieving polished, error-free results still demands significant human oversight and problem-solving."}, {"title": "Multi-panel story generation", "post_url": "https://docs.google.com/document/d/1bWXsQR6abWiWmzizYVSNXRdwKXNSFd6bjHvBA5nYQcY/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/app/7a80c79b92f93b42", "title": "Gemini"}], "chat_logs": [{"url": "https://chatgpt.com/share/681dd81d-ee08-800e-8c3d-83dee290cd26", "title": "ChatGPT - Sisi's Unicorn Adventure"}, {"url": "https://chatgpt.com/share/681f6e1d-3310-800e-aa8e-9f019cbab87a", "title": "ChatGPT - Sisi's Unicorn Adventure"}, {"url": "https://chatgpt.com/share/681f6ea3-72b0-800e-a632-b440233c55ed", "title": "ChatGPT - Sisi's Unicorn Adventure"}, {"url": "https://chatgpt.com/share/681f6f8a-88d4-800e-ad56-b9ff8cf05343", "title": "ChatGPT - Sisi Unicorn Butterfly Adventure"}, {"url": "https://chatgpt.com/share/681dd81d-ee08-800e-8c3d-83dee290cd26", "title": "ChatGPT - Sisi's Unicorn Adventure"}, {"url": "https://chatgpt.com/share/681dd81d-ee08-800e-8c3d-83dee290cd26", "title": "ChatGPT - Sisi's Unicorn Adventure"}, {"url": "https://chatgpt.com/share/681f6e1d-3310-800e-aa8e-9f019cbab87a", "title": "ChatGPT - Sisi's Unicorn Adventure"}, {"url": "https://chatgpt.com/share/681f6e1d-3310-800e-aa8e-9f019cbab87a", "title": "ChatGPT - Sisi's Unicorn Adventure"}, {"url": "https://chatgpt.com/share/681f6ea3-72b0-800e-a632-b440233c55ed", "title": "ChatGPT - Sisi's Unicorn Adventure"}, {"url": "https://chatgpt.com/share/681f6ea3-72b0-800e-a632-b440233c55ed", "title": "ChatGPT - Sisi's Unicorn Adventure"}, {"url": "https://chatgpt.com/share/681f6f8a-88d4-800e-ad56-b9ff8cf05343", "title": "ChatGPT - Sisi Unicorn Butterfly Adventure"}, {"url": "https://chatgpt.com/share/681f6f8a-88d4-800e-ad56-b9ff8cf05343", "title": "ChatGPT - Sisi Unicorn Butterfly Adventure"}, {"url": "https://gemini.google.com/app/7a80c79b92f93b42", "title": "Gemini"}, {"url": "https://gemini.google.com/app/7a80c79b92f93b42", "title": "Gemini"}], "videos": [], "chatbots": ["ChatGPT", "Gemini"], "description": "This research delves into the fascinating challenge of multi-panel story generation using AI, primarily ChatGPT, centered around \"Sisi's Unicorn Adventure.\" While initial cartoon creation proved surprisingly easy, perfecting details was notably difficult. Experiments involved uploading Sisi's photo to generate separate and combined panels, even depicting a unicorn transforming into Sisi. Despite successes like one-shot panel generation, challenges included clipped text, unfixable errors, and a failed attempt with Gemini Flash 2.0, highlighting the nuanced struggle between initial AI capability and achieving polished, error-free visual narratives."}, {"title": "Chatbots are bad at depicting a collision between a bowling ball and ping pong ball", "post_url": "https://docs.google.com/document/d/1JNxdXpgwKMWf8BAF-DHgwr2JtzkzR7OUXLRFDo6sJs0/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/5f1c1d65-c77b-49d6-831a-6051b53e43e7", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/6820b37c-7668-800e-9611-53e7a3a8e47b", "title": "ChatGPT - Bowling Ball vs Ping Pong"}, {"url": "https://chatgpt.com/share/6820b37c-7668-800e-9611-53e7a3a8e47b", "title": "ChatGPT - Bowling Ball vs Ping Pong"}, {"url": "https://chatgpt.com/share/6820bcca-9050-800e-872a-284310f53aed", "title": "ChatGPT - Bowling vs Ping Pong"}, {"url": "https://chatgpt.com/share/6820b9a0-cd5c-800e-8cf9-30a620f65ac4", "title": "ChatGPT - Object Collision Simulation"}, {"url": "https://claude.ai/share/5f1c1d65-c77b-49d6-831a-6051b53e43e7", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/6820b37c-7668-800e-9611-53e7a3a8e47b", "title": "ChatGPT - Bowling Ball vs Ping Pong"}, {"url": "https://chatgpt.com/share/6820b37c-7668-800e-9611-53e7a3a8e47b", "title": "ChatGPT - Bowling Ball vs Ping Pong"}, {"url": "https://chatgpt.com/share/6820bcca-9050-800e-872a-284310f53aed", "title": "ChatGPT - Bowling vs Ping Pong"}, {"url": "https://chatgpt.com/share/6820b9a0-cd5c-800e-8cf9-30a620f65ac4", "title": "ChatGPT - Object Collision Simulation"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This research dives into a deceptively simple physics challenge: asking AI chatbots to depict a collision between a fast-moving bowling ball and a slow-moving ping pong ball. The experiment aimed to assess their grasp of basic mechanics and ability to generate accurate visual sequences. Strikingly, most chatbots struggled, producing flawed graphical representations\u2014like objects passing through each other\u2014even when their textual descriptions were verbally correct. Intriguingly, the few models that succeeded often did so by secretly writing and executing Python code, rather than \"understanding\" the physics directly. This highlights a fundamental challenge in AI's ability to truly comprehend and simulate real-world phenomena, especially when asked for visual output."}, {"title": "Creating an app by answering a chatbot\u2019s questions", "post_url": "https://docs.google.com/document/d/1915w_z_IH1NBKBw3T1VyN_4xE0dFL4jdh3585fzXP4A/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/72de42a2-3739-4f02-bd7b-e1dc9dc9dd10", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/68271537e3f08191a0e1e73ff34b5289", "title": "ChatGPT - Time Travel History Game"}, {"url": "https://g.co/gemini/share/b522dd328131", "title": "Gemini"}, {"url": "https://claude.ai/public/artifacts/72de42a2-3739-4f02-bd7b-e1dc9dc9dd10", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/68271537e3f08191a0e1e73ff34b5289", "title": "ChatGPT - Time Travel History Game"}], "chat_logs": [{"url": "https://claude.ai/share/4965f795-3980-4d39-917d-db8ddc06e0dd", "title": "Claude Chat"}, {"url": "https://claude.ai/share/4965f795-3980-4d39-917d-db8ddc06e0dd", "title": "Claude Chat"}, {"url": "https://g.co/gemini/share/b522dd328131", "title": "Gemini"}], "videos": [], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research explores a novel method for app creation: designing an educational game by simply answering a chatbot's questions. Posing as a middle school student, the author engaged Claude 3.7 in a detailed Q&A, iteratively developing a \"Time Anomaly Game Development\" concept. This collaborative process yielded a \"Time Travel History Game\" for middle schoolers, featuring mini-games set in historical periods like the Roman Empire and the Moon Landing, where players must fix timeline anomalies. The project demonstrates how AI can guide students through complex ideation and design, fostering both creativity and historical understanding, with multiple app prototypes emerging from these AI-driven conversations."}, {"title": "Animating \u201cColorless green ideas sleep furiously\u201d", "post_url": "https://docs.google.com/document/d/1Rmjf6qLqVlJpekaNcCFslwgQALI8e10gxq9VjKQdtWA/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research post delves into the fascinating conceptual challenge of animating Noam Chomsky's iconic phrase, \"Colorless green ideas sleep furiously.\" Rather than developing a tangible application, the project explores the theoretical paradox of visually representing a sentence that is grammatically correct yet semantically nonsensical. It investigates the intricate boundaries of artificial intelligence's understanding, questioning how an AI might interpret and visualize concepts that defy logical meaning. This thought-provoking exploration offers insights into the sophisticated demands of teaching AI to grasp nuance, context, and the fundamental limits of literal interpretation."}, {"title": "Two ways of combining Pong and Space Invaders with Gemini", "post_url": "https://docs.google.com/document/d/1g7aaDAA8UkWNEjpXcS_9Co-F8WaI8v0HlJ0gjkBG11A/edit?usp=sharing", "apps": [{"url": "https://g.co/gemini/share/1c9e1c3372f6", "title": "Gemini"}, {"url": "https://g.co/gemini/share/b6483385f32a", "title": "Gemini"}], "chat_logs": [{"url": "https://g.co/gemini/share/083a019a9225", "title": "Gemini"}, {"url": "https://g.co/gemini/share/1f478975aaac", "title": "Gemini"}, {"url": "https://g.co/gemini/share/680c2499650c", "title": "Gemini"}, {"url": "https://g.co/gemini/share/a6ec1ef65a4a", "title": "Gemini"}, {"url": "https://g.co/gemini/share/083a019a9225", "title": "Gemini"}, {"url": "https://g.co/gemini/share/1f478975aaac", "title": "Gemini"}, {"url": "https://g.co/gemini/share/1c9e1c3372f6", "title": "Gemini"}, {"url": "https://g.co/gemini/share/680c2499650c", "title": "Gemini"}, {"url": "https://g.co/gemini/share/a6ec1ef65a4a", "title": "Gemini"}, {"url": "https://g.co/gemini/share/b6483385f32a", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "Step into the future of game design education where classic arcade mashups are reimagined with AI. This research details an experiment using Gemini to combine the iconic games Pong and Space Invaders, echoing a preschooler's ingenious \"Space Pong\" creation from years past. The author explored two distinct AI interaction styles: iterative modification of a quickly generated draft, and a structured question-and-answer design approach. Through these conversations, Gemini evolved the initial concept from a Breakout-like game into a unique web experience featuring dynamic invaders, missile combat, and clear win/lose conditions, illustrating AI's potential as a creative co-designer for complex game concepts."}, {"title": "Fun combining photos with ChatGPT", "post_url": "https://docs.google.com/document/d/1PWhhwGB5BhqO4Ha9OSWYi-GVa0x5-HzIhPOtThQtSbA/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "Veteran AI researcher Ken Kahn showcases the playful potential of ChatGPT for creative image blending. He explored combining personal photos\u2014like his wife's portrait or pictures of his grandchildren\u2014with diverse images, including a teddy bear and even an El Greco painting. Using the simple prompt, \"Can you make a new image that draws from both of these images please,\" Kahn generated unique, artistic hybrids. This hands-on experiment highlights how chatbots can transform everyday photos into imaginative new creations, demonstrating a fun and accessible avenue for AI-driven creativity."}, {"title": "A Cuneiform/Roman/Arabic Calculator created by Claude 4", "post_url": "https://docs.google.com/document/d/1a1ObDe5eGVNwXB-YGC2ITlRdP18KHbJWfXxVJ2C_I88/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/2ade5150-25fc-4df7-89b0-f05b87690b7d", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/6835e51f4478819195ab7fc4c3d63a94", "title": "ChatGPT - Cuneiform Calculator"}, {"url": "https://claude.ai/public/artifacts/2ade5150-25fc-4df7-89b0-f05b87690b7d", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/6835e51f4478819195ab7fc4c3d63a94", "title": "ChatGPT - Cuneiform Calculator"}], "chat_logs": [{"url": "https://claude.ai/share/70e6fc06-599a-419c-ae53-cfba3460c0e0", "title": "Claude Chat"}, {"url": "https://claude.ai/share/70e6fc06-599a-419c-ae53-cfba3460c0e0", "title": "Claude Chat"}, {"url": "https://claude.ai/share/70e6fc06-599a-419c-ae53-cfba3460c0e0", "title": "Claude Chat"}, {"url": "https://claude.ai/share/70e6fc06-599a-419c-ae53-cfba3460c0e0", "title": "Claude Chat"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "AI education researcher Ken Kahn astonishingly co-created a unique Cuneiform, Roman, and Arabic numeral calculator using Claude 4 Sonnet. This web-based tool allows users to toggle between modern Arabic, ancient Roman, and Mesopotamian cuneiform displays for calculations, even featuring an ancient-inspired color scheme. Kahn found the process \"surprisingly easy\" with conversational prompts guiding Claude, though fixing the cuneiform's base-60 grouping required more effort. This exploration beautifully demonstrates Claude 4's capability in rapidly generating complex, multi-functional applications, contrasting sharply with the struggles encountered using ChatGPT for the same task."}, {"title": "Making illustrated stories with ChatGPT 4o and Gemini 2", "post_url": "https://docs.google.com/document/d/1-KfehI-f2Iw-ZpZtL371LmxK0TkAUJHCHkzb0G3iUc0/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://developers.googleblog.com/en/experiment-with-gemini-20-flash-native-image-generation/", "title": "Gemini"}, {"url": "https://chatgpt.com/share/67ecf2d0-0458-800e-afb2-7113ed7d8cfa", "title": "ChatGPT - Gron and Infinite Primes"}, {"url": "https://developers.googleblog.com/en/experiment-with-gemini-20-flash-native-image-generation/", "title": "Gemini"}, {"url": "https://chatgpt.com/share/67ecf2d0-0458-800e-afb2-7113ed7d8cfa", "title": "ChatGPT - Gron and Infinite Primes"}], "videos": [], "chatbots": ["ChatGPT", "Gemini"], "description": "This research dives into the cutting-edge integrated text-to-image capabilities of ChatGPT 4o and Gemini 2.0 Flash, specifically exploring their potential to generate illustrated stories. The author recreated an engaging tale about a prehistoric girl, Gron, who uses pebbles to explore the concept of prime numbers. Interestingly, ChatGPT 4o initially prompted with illustration placeholders before generating visuals in a requested \"cave painting style.\" This hands-on exploration provides fascinating insights into how these advanced AI models handle both compelling narrative generation and integrated visual storytelling, pushing the boundaries of creative and educational content."}, {"title": "Making an office full of The Learner\u2019s Apprentice using ChatGPT 4o", "post_url": "https://docs.google.com/document/d/1qtGy_FvLuKkDGCeSvHQogufjCooJTsWlr0MmoTno9YI/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post showcases ChatGPT 4o's remarkable creative image generation capabilities by transforming a single book cover into an immersive, hyper-themed environment. Ken Kahn uploaded \"The Learner's Apprentice\" cover and prompted ChatGPT 4o to fill an entire office with it. The AI masterfully rendered a room where wallpaper, overflowing bookshelves, and even furniture fabric were adorned with the book's design. It further extended the theme to the outside world visible through a window, creating a visually impressive, all-encompassing space. This vivid demonstration highlights ChatGPT 4o's sophisticated ability to extrapolate a theme across diverse visual elements, producing a unique digital creation."}, {"title": "How the 60 Shocking Actions by the Trump Administration app was created", "post_url": "https://docs.google.com/document/d/1z7OZK4HTjtSmHrNtu_WXfOxC9xp8TFDYQA5FP8xpVPQ/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/trump-actions/by-o3-mini.html", "title": "60 Shocking Actions from Trump\u2019s Second Term (2025)"}, {"url": "https://toontalk.github.io/AI/apps/trump-actions/by-claude-3.7.html", "title": "60 Shocking Actions from Trump's Second Term (2025)"}, {"url": "https://toontalk.github.io/AI/apps/trump-actions/by-o3-mini.html", "title": "60 Shocking Actions from Trump\u2019s Second Term (2025)"}, {"url": "https://toontalk.github.io/AI/apps/trump-actions/by-claude-3.7.html", "title": "60 Shocking Actions from Trump's Second Term (2025)"}, {"url": "https://toontalk.github.io/AI/apps/trump-actions/by-o3-mini.html", "title": "60 Shocking Actions from Trump\u2019s Second Term (2025)"}, {"url": "https://toontalk.github.io/AI/apps/trump-actions/by-claude-3.7.html", "title": "60 Shocking Actions from Trump's Second Term (2025)"}, {"url": "https://toontalk.github.io/AI/apps/trump-actions/by-o3-mini.html", "title": "60 Shocking Actions from Trump\u2019s Second Term (2025)"}, {"url": "https://toontalk.github.io/AI/apps/trump-actions/by-claude-3.7.html", "title": "60 Shocking Actions from Trump's Second Term (2025)"}], "chat_logs": [{"url": "https://chatgpt.com/share/67f4e9b2-e2d8-800e-a1ca-a3baa93f3694", "title": "ChatGPT - Trump Administration Actions List"}, {"url": "https://chatgpt.com/share/67f65c06-8960-800e-aebf-58d92bda8607", "title": "ChatGPT - Web App Creation Guide"}, {"url": "https://chatgpt.com/share/67f4e9b2-e2d8-800e-a1ca-a3baa93f3694", "title": "ChatGPT - Trump Administration Actions List"}, {"url": "https://chatgpt.com/share/67f65c06-8960-800e-aebf-58d92bda8607", "title": "ChatGPT - Web App Creation Guide"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This research post details a fascinating experiment in AI-driven app development, specifically focusing on creating an interactive web application titled \"60 Shocking Actions from Trump\u2019s Second Term.\" The project aimed to test the capabilities of ChatGPT, Claude, and Gemini in generating an app that lists surprising actions (as perceived by a 2000 US citizen), complete with one-sentence summaries, full entries, and source links. Users are tasked with selecting and ordering their top 10 most important actions. While Gemini struggled with the task, ChatGPT produced an acceptable app, and Claude successfully delivered a highly functional and \"very nice\" application, showcasing the varying proficiencies of large language models in complex software creation."}, {"title": "Using ChatGPT Deep Research to explore connections between Minsky\u2019s Society of Mind and Anthropic\u2019s On the Biology of a Large Language Model", "post_url": "https://docs.google.com/document/d/1WvjstSwijZxYNy0ovtrlYODhArZzGOkPG4YIVTJlwMs/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chatgpt.com/share/67fccb09-3518-800e-83b3-e0924118d66c", "title": "ChatGPT - Minsky Society of Mind Mapping"}, {"url": "https://chatgpt.com/share/67fccb58-356c-800e-8edb-3eea7a9abeec", "title": "ChatGPT - Minsky Society Haiku Connections"}, {"url": "https://chatgpt.com/share/67fccdbe-58f0-800e-9c06-63ed474863f0", "title": "ChatGPT - Minsky and Haiku Connections"}, {"url": "https://chatgpt.com/share/67fccb09-3518-800e-83b3-e0924118d66c", "title": "ChatGPT - Minsky Society of Mind Mapping"}, {"url": "https://chatgpt.com/share/67fccb58-356c-800e-8edb-3eea7a9abeec", "title": "ChatGPT - Minsky Society Haiku Connections"}, {"url": "https://chatgpt.com/share/67fccdbe-58f0-800e-9c06-63ed474863f0", "title": "ChatGPT - Minsky and Haiku Connections"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post details a fascinating conceptual exploration, using ChatGPT Deep Research to bridge Marvin Minsky's *Society of Mind* theory with Anthropic's \"On the Biology of a Large Language Model.\" The author, Ken Kahn, sought to map how elements like LLM attention heads might resemble Minsky's \"agents\" or \"societies.\" Despite initial AI hiccups, including an irrelevant GPT-2 reference and a generation bug, the project successfully prompted ChatGPT to generate reports connecting the complex internal workings of models like Claude Haiku to Minsky's foundational ideas. This unique approach showcases the potential of AI tools to uncover novel theoretical parallels across seemingly disparate fields."}, {"title": "Using Claude to obtain a pizza recipe from a video", "post_url": "https://docs.google.com/document/d/1uU1T_WB1e9ilJ9C254tVbD1cihWnwVFs8ySJZJMUkYE/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [{"url": "https://youtu.be/Cq90lUQUCUo?si=TXaiHl32Ndw6nuLj", "title": "Pizza napoletana fatta in casa: la ricetta di Davide Civitiello", "video_id": "Cq90lUQUCUo"}, {"url": "https://youtu.be/Cq90lUQUCUo?si=TXaiHl32Ndw6nuLj", "title": "Pizza napoletana fatta in casa: la ricetta di Davide Civitiello", "video_id": "Cq90lUQUCUo"}], "chatbots": ["Claude"], "description": "Ever wondered if AI could help you bake a champion's pizza? This research post dives into using AI models to extract a detailed recipe from a YouTube video. The author successfully leveraged Claude, providing it with the video's transcript and refining the output to create a usable recipe for two delicious pizzas. In contrast, while Gemini 2.5 could process the video directly, its resulting recipe was notably less effective. This hands-on exploration underscores Claude's power, particularly with focused prompting, to transform raw video data into precise, actionable culinary instructions for real-world application."}, {"title": "A number to English and French app by ChatGPT o4-mini-high", "post_url": "https://docs.google.com/document/d/1YlnQA_W1M5QX4gZmOMZVvRyg1m1B2ie5GvAPVtqncnY/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/number-to-english-and-french-by-o4-mini-high.html", "title": "Big Integer Evaluator"}, {"url": "https://toontalk.github.io/AI/apps/number-to-english-and-french-by-o4-mini-high.html", "title": "Big Integer Evaluator"}], "chat_logs": [{"url": "https://claude.ai/share/fedbdf4a-d69c-4286-acde-30b33917e37f", "title": "Claude Chat"}, {"url": "https://claude.ai/share/fedbdf4a-d69c-4286-acde-30b33917e37f", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/68012e43-fd3c-800e-ad6e-cacaf37770fc", "title": "ChatGPT - Big Integer Evaluator"}, {"url": "https://claude.ai/share/fedbdf4a-d69c-4286-acde-30b33917e37f", "title": "Claude Chat"}, {"url": "https://claude.ai/share/fedbdf4a-d69c-4286-acde-30b33917e37f", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/68012e43-fd3c-800e-ad6e-cacaf37770fc", "title": "ChatGPT - Big Integer Evaluator"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "Ken Kahn's research unveils an innovative web app, \"Big Integer Evaluator,\" crafted with ChatGPT o4-mini-high, designed to translate numbers of unprecedented scale into words. This remarkable tool calculates expressions like 2^12345678, generating integers with millions of digits (specifically 3,716,420), and then translates these colossal figures into their full English and French word equivalents. The app's output, spanning thousands of pages with terms like \"octocentsexillion,\" showcases the AI's extraordinary ability to manage vast numerical representations and linguistic complexity. It highlights the potential of large language models to tackle specialized, high-precision tasks, pushing the boundaries of digital and linguistic processing."}, {"title": "Playing Tic Tac Toe with a snarky AI", "post_url": "https://docs.google.com/document/d/1CzbfTZUulzUbbfnIonD2ryNUtB6VEG0KLx9vLhMEtBU/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/tic-tac-toe.html", "title": "Tic\u2011Tac\u2011Toe \u2022 AI\u00a0vs\u00a0You"}, {"url": "https://claude.ai/public/artifacts/90b9c2b8-b349-4620-ab67-4603f22ef9a8", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/68027e1fc8b88191879cf8fd1bd4e82b", "title": "ChatGPT - Tic Tac Toe Perfect"}, {"url": "https://toontalk.github.io/AI/apps/tic-tac-toe.html", "title": "Tic\u2011Tac\u2011Toe \u2022 AI\u00a0vs\u00a0You"}, {"url": "https://claude.ai/public/artifacts/90b9c2b8-b349-4620-ab67-4603f22ef9a8", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://chatgpt.com/share/680291e2-14e0-800e-bff5-9d2c7ac93c2a", "title": "ChatGPT - Perfect Tic-Tac-Toe AI"}, {"url": "https://gemini.google.com/share/6ccae3243bd3", "title": "Gemini"}, {"url": "https://gemini.google.com/share/764d5f007f41", "title": "Gemini"}, {"url": "https://chatgpt.com/share/680291e2-14e0-800e-bff5-9d2c7ac93c2a", "title": "ChatGPT - Perfect Tic-Tac-Toe AI"}, {"url": "https://gemini.google.com/share/6ccae3243bd3", "title": "Gemini"}, {"url": "https://gemini.google.com/share/764d5f007f41", "title": "Gemini"}], "videos": [{"url": "https://youtu.be/oZq9enktvyk?si=kSv-NtPscd11BgoN", "title": "Talking Tic Tac Toe", "video_id": "oZq9enktvyk"}, {"url": "https://youtu.be/oZq9enktvyk?si=kSv-NtPscd11BgoN", "title": "Talking Tic Tac Toe", "video_id": "oZq9enktvyk"}], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research chronicles the creation of a dynamic Tic-Tac-Toe game featuring a snarky AI opponent. Beginning with ChatGPT for perfect gameplay, the project rapidly integrated Gemini to generate humorous, move-specific remarks. The experience was further elevated by enabling players to speak, with Gemini responding conversationally to both moves and dialogue. Though speech recognition faced limitations in certain AI environments, the post details the iterative development of multiple game versions, showcasing the engaging and personalized experience of playing against a truly witty AI."}, {"title": "Chatbots can create games from books", "post_url": "https://docs.google.com/document/d/120-Rma5ulZTN64Ggh_0MTOHMz1HP4Y5N7CfaKVN85xo/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/chapter1-game.html", "title": "AI Creative Quest"}, {"url": "https://toontalk.github.io/AI/apps/chapter1-game-v2.html", "title": "AI Creative Quest \u2013 Constructionist Edition"}, {"url": "https://toontalk.github.io/AI/apps/chapter1-game-v3.html", "title": "AI Creative Quest \u2013 Laugh\u2011structionist Edition"}, {"url": "https://toontalk.github.io/AI/apps/mindswap.html", "title": "Mindswap: The Experience"}, {"url": "https://toontalk.github.io/AI/apps/chapter1-game.html", "title": "AI Creative Quest"}, {"url": "https://toontalk.github.io/AI/apps/chapter1-game-v2.html", "title": "AI Creative Quest \u2013 Constructionist Edition"}, {"url": "https://toontalk.github.io/AI/apps/chapter1-game-v3.html", "title": "AI Creative Quest \u2013 Laugh\u2011structionist Edition"}, {"url": "https://toontalk.github.io/AI/apps/mindswap.html", "title": "Mindswap: The Experience"}], "chat_logs": [{"url": "https://chatgpt.com/share/68073a29-f124-800e-a99f-97e189ef7643", "title": "ChatGPT - Web Game Creation"}, {"url": "https://claude.ai/share/5a3bc5c2-1584-4059-ba30-d3084dbd65aa", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/68073a29-f124-800e-a99f-97e189ef7643", "title": "ChatGPT - Web Game Creation"}, {"url": "https://claude.ai/share/5a3bc5c2-1584-4059-ba30-d3084dbd65aa", "title": "Claude Chat"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This research explores the intriguing potential of chatbots like ChatGPT and Claude to transform books into interactive games. Starting with \"The Learner\u2019s Apprentice,\" the author iteratively prompted the AI, evolving an initial \"boring quiz\" into more \"constructionist\" applications like \"AI Creative Quest.\" Through persistent guidance, the chatbots generated variations including \"Laugh-structionist\" editions and even a humorous text adventure about returning a library book to a dragon. The study also ventured into creating a game from the novel \"Mindswap,\" demonstrating both the AI's creative capacity and the crucial role of human prompting in shaping engaging, educational, or entertaining digital experiences."}, {"title": "Asking 3 chatbots to co-create web apps that convert a video feed to emojis", "post_url": "https://docs.google.com/document/d/1oEQNCJ_xlZqHk828W79lubn1DeIsSSaCQgKjkvtT4uo/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/camera-emojis-by-gemini-2.5.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/camera-emojis-by-o3.html", "title": "Emoji Video Feed \u2013 Palette Picker"}, {"url": "https://toontalk.github.io/AI/apps/camera-emojis-bt-claude-3.7.html", "title": "Emoji Video Feed with Color Analysis"}, {"url": "https://toontalk.github.io/AI/apps/camera-emojis-by-gemini-2.5.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/camera-emojis-by-o3.html", "title": "Emoji Video Feed \u2013 Palette Picker"}, {"url": "https://toontalk.github.io/AI/apps/camera-emojis-bt-claude-3.7.html", "title": "Emoji Video Feed with Color Analysis"}], "chat_logs": [{"url": "https://chatgpt.com/share/680bbcf8-145c-800e-9611-935ce658daed", "title": "ChatGPT - Emoji video feed"}, {"url": "https://claude.ai/share/297edcc8-c189-401a-970a-822224e48c4a", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/680bbcf8-145c-800e-9611-935ce658daed", "title": "ChatGPT - Emoji video feed"}, {"url": "https://claude.ai/share/297edcc8-c189-401a-970a-822224e48c4a", "title": "Claude Chat"}], "videos": [], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research explores the fascinating frontier of AI-driven creative coding, tasking Claude 3.7, Gemini 2.5 Pro, and ChatGPT o3 with co-creating web applications. These apps transform a live video feed into dynamic emoji art, mapping real-time pixel data to various emojis based on brightness or color. While the chatbots successfully generated the necessary code, the author manually tested each app, navigating challenges like webcam permission limitations. The experiment pushed the AI's creative boundaries, requesting specific customizations such as using food emojis or color-matching, revealing unique insights into each model's practical coding capabilities and adaptability. This offers a compelling look at AI's potential in collaborative, real-time software development."}, {"title": "An app for exploring creativity in chatbots", "post_url": "https://docs.google.com/document/d/1psNLuXuY3xQOVbX9coMWwNh1IB6sO2CQLwuIEB8jrIQ/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/llm-creativity-explorer.html", "title": "Gemini Response Explorer"}, {"url": "https://claude.ai/public/artifacts/4a8b1786-5063-4051-a4ea-82ea392727ee", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/apps/llm-creativity-explorer.html", "title": "Gemini Response Explorer"}, {"url": "https://claude.ai/public/artifacts/4a8b1786-5063-4051-a4ea-82ea392727ee", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://claude.ai/share/e7edf33f-a25b-4000-87f0-3b9bc8fabd2f", "title": "Claude Chat"}, {"url": "https://claude.ai/share/e7edf33f-a25b-4000-87f0-3b9bc8fabd2f", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research delves into the intriguing paradox of AI creativity, where chatbots can boost individual human creativity while potentially reducing the overall diversity of content. Inspired by a Science Advances study, the author developed the \"Gemini Response Explorer\" and \"Claude Artifact\" apps to meticulously investigate this phenomenon. Running 12 experiments, the project explored how factors like chatbot \"temperature\" and specific prompts influence the uniqueness of AI-generated story summaries. Initial findings indicate that increasing the temperature parameter effectively enhances diversity, providing valuable insights into steering AI's creative output. A dedicated data visualization app further brings these compelling results to life."}, {"title": "Generative AI adventures of a 4 and 6 year old", "post_url": "https://docs.google.com/document/d/1GUSclTMCZrbuHiZTXZ88jq_hWwp_7qB0RwLHh5D0L3A/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/b51ebb69-be03-4e97-9281-b0bec4125154", "title": "Claude Chat"}, {"url": "https://claude.ai/share/559ad83b-055c-4cf3-a850-9e06604d98b7", "title": "Claude Chat"}, {"url": "https://claude.ai/share/b51ebb69-be03-4e97-9281-b0bec4125154", "title": "Claude Chat"}, {"url": "https://claude.ai/share/559ad83b-055c-4cf3-a850-9e06604d98b7", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research explores the delightfully unconventional world of generative AI through the eyes of a 4 and 6-year-old. Using Claude Chat, the children co-created a series of unique digital experiences based on their imaginative prompts. This included a surprisingly good game about \"butterfly and spider toilets\" and another involving \"squishing poo together,\" both of which sparked intense sibling rivalry to play. Their creative journey culminated in a widely appreciated song ab ai/share/de80ec18-9d45-4972-bd31-9b8bfbefe84d", "title": "Claude Chat"}, {"url": "https://claude.ai/share/f41e74c5-dce8-400a-8418-22e1f10e0e99", "title": "Claude Chat"}, {"url": "https://claude.ai/share/bd9f8a69-0ab2-4376-8b88-ccf422abd1e3", "title": "Claude Chat"}, {"url": "https://claude.ai/share/4f1da14a-8cf0-462b-8b52-6955191ad4bb", "title": "Claude Chat"}, {"url": "https://claude.ai/share/4f1da14a-8cf0-462b-8b52-6955191ad4bb", "title": "Claude Chat"}, {"url": "https://claude.ai/share/84c84e0d-077e-42b2-a104-6e2fe4e0432e", "title": "Claude Chat"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This research explores how effectively Claude can emulate the advanced functionalities of Stephen Wolfram's Notebook Assistant, focusing on its ability to generate interactive web-based applications. The author rigorously tested Claude with diverse examples, from crafting JavaScript for graph manipulation and 2D cellular automata to visualizing interactive Bode plots and 3D terrain. While Wolfram's proprietary datasets presented a minor hurdle, Claude remarkably handled most tasks, offering the distinct advantage of creating and sharing functional web apps directly within the chat. This suggests Claude provides a powerful, accessible alternative for numerous computational and visualization challenges, even demonstrating improved accuracy with later versions."}, {"title": "A visit to ancient Athens", "post_url": "https://docs.google.com/document/d/1UHM1VWHxogYiq4mG3jJi770X_jEO5fjO4zVWZQ2iWoQ/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This AI education research unveils a fascinating, voice-driven adventure to ancient Athens, powered solely by speaking to ChatGPT 4o. A high school student embarks on an immersive journey, freely exploring the Agora and Acropolis, engaging in Socratic dialogue about consciousness, and learning about Greek gods from a priestess. This user-directed experience highlights the remarkable potential of conversational AI to create personalized, open-ended learning environments, transforming historical and philosophical exploration into a spontaneous, interactive dialogue."}, {"title": "A story about the cardinality of infinite sets", "post_url": "https://docs.google.com/document/d/1GrGDdgXu2AqQJ8XklGp0ki-eLygjtqDtjPUKvS78s6A/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/cac20b4b-2d2a-419a-9480-514ac8f953b3", "title": "Claude Chat"}, {"url": "https://claude.ai/share/cac20b4b-2d2a-419a-9480-514ac8f953b3", "title": "Claude Chat"}], "videos": [{"url": "https://www.youtube.com/watch?v=UY4-x4zI_O8", "title": "Cardinality story", "video_id": "UY4-x4zI_O8"}, {"url": "https://www.youtube.com/watch?v=UY4-x4zI_O8", "title": "Cardinality story", "video_id": "UY4-x4zI_O8"}], "chatbots": ["Claude"], "description": "This research post details the co-creation of an interactive web page with Claude 3.7, designed to explore the fascinating concept of infinite set cardinality. Aimed at high school students passionate about programming, the \"story\" visually demonstrates that natural and rational numbers share the same cardinality, while real numbers do not. It features captivating animations, including a method for counting rational numbers and Cantor's diagonalization argument, powered by JavaScript generator functions. This project highlights AI's potential in crafting engaging, interactive educational tools that make complex mathematical proofs accessible and fun."}, {"title": "Turning conversations into audio files", "post_url": "https://docs.google.com/document/d/13q3zkCPZFXp7pBWvdnYoV9v4UrbXpGPRiiRNWmx9kuA/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/1de3d6c3-a790-4529-88da-807f796a32d9", "title": "Claude Chat"}, {"url": "https://claude.ai/share/d62aafee-8d01-4eb2-bb00-bac0563ea011", "title": "Claude Chat"}, {"url": "https://claude.ai/share/1de3d6c3-a790-4529-88da-807f796a32d9", "title": "Claude Chat"}, {"url": "https://claude.ai/share/d62aafee-8d01-4eb2-bb00-bac0563ea011", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research details the creation of an innovative web app designed to transform written dialogue into dynamic audio files. Leveraging Claude Chat and OpenAI's text-to-speech API, the project aimed to generate distinct, described voices for each character within a transcript. Through an iterative process of prompting, debugging, and refining with Claude 3.7 and Opus, a functional application emerged. It successfully produced engaging audio for diverse scenarios, from a prime number courtroom drama to a philosophical debate between scientific laws, with each character speaking in a unique, AI-generated voice. This entire development, including extensive testing, was achieved for a remarkable 79\u00a2."}, {"title": "Asking o3-mini to create a number to English and French apps", "post_url": "https://docs.google.com/document/d/1gRIMiVMDtkRn1Ya_589_jQlDXY392EUA7d_3_iqeqPA/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/number-to-english-by-o3-mini.html", "title": "Number to English Converter"}, {"url": "https://toontalk.github.io/AI/apps/number-to-french-by-o3-mini.html", "title": "Nombre en toutes lettres (Version Fran\u00e7aise)"}, {"url": "https://toontalk.github.io/AI/apps/number-to-english-by-o3-mini-first-version.html", "title": "Number to English Converter"}, {"url": "https://toontalk.github.io/AI/apps/number-to-english-and-french-by-o3-mini.html", "title": "Number Converter (English & French)"}, {"url": "https://toontalk.github.io/AI/apps/number-to-english-by-o3-mini.html", "title": "Number to English Converter"}, {"url": "https://toontalk.github.io/AI/apps/number-to-french-by-o3-mini.html", "title": "Nombre en toutes lettres (Version Fran\u00e7aise)"}, {"url": "https://toontalk.github.io/AI/apps/number-to-english-by-o3-mini-first-version.html", "title": "Number to English Converter"}, {"url": "https://toontalk.github.io/AI/apps/number-to-english-and-french-by-o3-mini.html", "title": "Number Converter (English & French)"}], "chat_logs": [{"url": "https://chatgpt.com/share/679da217-ff84-800e-95ab-b15e7694c1d7", "title": "ChatGPT - Number to English Converter"}, {"url": "https://chatgpt.com/share/679dddfe-eba0-800e-b604-e33cd9cdc180", "title": "ChatGPT - Number Converter English French"}, {"url": "https://chatgpt.com/share/679da217-ff84-800e-95ab-b15e7694c1d7", "title": "ChatGPT - Number to English Converter"}, {"url": "https://chatgpt.com/share/679dddfe-eba0-800e-b604-e33cd9cdc180", "title": "ChatGPT - Number Converter English French"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research explores o3-mini's remarkable ability to generate sophisticated number-to-word converter applications in both English and French. Through iterative conversational prompts, the AI swiftly produced functional HTML apps capable of handling thousands of digits, a task where DeepSeek R1 reportedly failed. While largely successful, the exploration uncovered interesting limitations, including buggy code for extremely large scale numbers (beyond 10^63) and a minor misunderstanding of \"canvas\" features. Despite these challenges, o3-mini's reasoning was found to be \"reasonable,\" demonstrating its impressive capacity to translate complex linguistic rules into working code and even generate missing scale names effectively."}, {"title": "The making of a birthday app with the help of Gemini 2.0, ChatGPT 4o and o3-mini, and Claude 3.5", "post_url": "https://docs.google.com/document/d/11Zc_ShnhL2vEsDNXK0tVvXcOIh0v7FrwDTzQ8h_f-CM/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/sisi-4/index.html", "title": "Sisi's Equinox Birthday Ride"}, {"url": "https://toontalk.github.io/AI/apps/sisi-4/index.html", "title": "Sisi's Equinox Birthday Ride"}], "chat_logs": [{"url": "https://chatgpt.com/share/67a2dc37-4530-800e-90fa-8a9863c7165b" nced app was developed, supporting turtle graphics and broadcasting graphical output, errors, and console messages between AI personas. This unique setup enabled dynamic, turn-based dialogues, leading to fascinating artistic outcomes. From initial geometric turtle designs to bizarre emoji animations, and even interactive graphics with sound, the project vividly showcases the unexpected creative potential when AI agents engage in visual dialogue."}, {"title": "A Roman numeral calculator created with help from Claude", "post_url": "https://docs.google.com/document/d/11zYBSB7f2d7Mkk1eGZFLGrIPWBWF4eo-n1TXuYAmaZk/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/785bfafb-7a17-4b79-adb5-c23ab213d56d", "title": "Claude Chat"}, {"url": "https://claude.ai/share/785bfafb-7a17-4b79-adb5-c23ab213d56d", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research post details the iterative creation of a functional Roman numeral calculator, entirely developed with the assistance of Claude AI. Starting with an initial prompt, the author engaged in a conversational process, providing feedback and requesting new features to refine the calculator's functionality. The \"final app\" showcases how AI can serve as a collaborative coding partner, transforming abstract ideas into a tangible, working utility through a series of thoughtful interactions. This practical example explores the potential of large language models in agile software development and creative problem-solving."}, {"title": "Asking ChatGPT o1 to create a game that shows off Web Audio", "post_url": "https://docs.google.com/document/d/1r9YOlT3gznzkdoXQdkasvWouRTDvElZT91553Bcs3qQ/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/whack-a-mole-by-o1.html", "title": "Web Audio Whack-a-Mole (Very Different Sounds)"}, {"url": "https://toontalk.github.io/AI/apps/whack-a-mole-by-o1.html", "title": "Web Audio Whack-a-Mole (Very Different Sounds)"}], "chat_logs": [{"url": "https://chatgpt.com/share/6779ebae-7424-800e-a221-62658548581b", "title": "ChatGPT - Web Audio Game Demo"}, {"url": "https://chatgpt.com/share/6779ebae-7424-800e-a221-62658548581b", "title": "ChatGPT - Web Audio Game Demo"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research showcases an impressive 10-minute journey with ChatGPT o1, exploring its ability to generate a dynamic Web Audio game. Starting without a specific concept, the AI iteratively developed a \"Whack-a-Mole\" style game, refining its sound design through user prompts. Initially producing simple pops, ChatGPT was guided to create five distinctly different sound effects for various colored moles, including a \"laser sweep,\" \"white noise hiss,\" a \"3-note chord,\" \"beep-beep pulses,\" and a \"bell-like tone\"\u2014all generated purely with Web Audio. This highlights the model's rapid prototyping potential for interactive audio experiences."}, {"title": "Claude co-creating an app to speak any integer while only showing me pseudocode", "post_url": "https://docs.google.com/document/d/1jk175Y7wYRDmeYP9oyw41TToxGQ0SQ5t23UQyNGf7xM/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["Claude"], "description": "This research showcases a novel programming collaboration where an expert human guided Claude to develop an app, with Claude communicating *only* via pseudocode. The experiment's focus was on exploring how an AI can act as a programmer, presenting its logic and rationale abstractly. Together, they designed an innovative app capable of speaking any integer, regardless of its magnitude, by evaluating mathematical expressions and converting results into spoken English. This unique interaction method demonstrates Claude's ability to engage in high-level design and iterative development, making it a powerful conceptual programming partner."}, {"title": "Using \u201cReasoning\u201d chatbots to improve the Connections Puzzle game generator", "post_url": "https://docs.google.com/document/d/14Yl4mC8jtiA56T3CdPOAiRIQ1V4d1a557wXYRywbNTc/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}, {"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}], "chat_logs": [{"url": "https://chatgpt.com/share/67975b96-3f48-800e-8eb9-cc30e7e39276", "title": "ChatGPT - Word Categorization Challenge"}, {"url": "https://chatgpt.com/share/67975b96-3f48-800e-8eb9-cc30e7e39276", "title": "ChatGPT - Word Categorization Challenge"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research unveils a novel method for refining AI prompts, specifically for a Connections Puzzle game generator. Instead of solely observing outputs, the author leveraged \"reasoning\" chatbots like ChatGPT o1 to reveal their internal thought processes and \"chain of thought.\" This deep dive uncovered critical ambiguities and misunderstandings in the original prompt, even though simpler LLMs executed it successfully. Through iterative conversations with these reasoning models, a significantly improved prompt was developed, demonstrating a powerful new strategy for debugging and enhancing AI interactions by understanding *how* models interpret instructions."}, {"title": "Chatbot-assisted co-creation of a neural net to judge confidence from text", "post_url": "https://docs.google.com/document/d/1AuhwCuprcrtREaT8zRW3RWdNSpf0ILlVHRzGBq4-I18/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/confidence/index.html", "title": "Confidence Predictor"}, {"url": "https://toontalk.github.io/AI/apps/confidence/confidence-by-o1.html", "title": "Confidence Classifier (All Updates)"}, {"url": "https://toontalk.github.io/AI/apps/confidence/confidence-by-deepseek-r1-fixed-by-claude.html", "title": "Confidence Level Predictor"}, {"url": "https://toontalk.github.io/AI/apps/confidence/index.html", "title": "Confidence Predictor"}, {"url": "https://toontalk.github.io/AI/apps/confidence/confidence-by-o1.html", "title": "Confidence Classifier (All Updates)"}, {"url": "https://toontalk.github.io/AI/apps/confidence/confidence-by-deepseek-r1-fixed-by-claude.html", "title": "Confidence Level Predictor"}], "chat_logs": [{"url": "https://chat.openai.com/share/3767033d-7da0-47e3-9383-a5556e4dc1eb", "title": "ChatGPT - Text Confidence Predictor."}, {"url": "https://chat.openai.com/share/3767033d-7da0-47e3-9383-a5556e4dc1eb", "title": "ChatGPT - Text Confidence Predictor."}], "videos": [], "chatbots": ["Claude"], "description": "This research presents an engaging journey into the chatbot-assisted co-creation of a neural network designed to judge confidence levels from text. Beginning as a foundational Snap! model, the project evolved into web-based applications like the \"Confidence Predictor,\" built iteratively with ChatGPT. A crucial step involved using LLMs, such as Claude 3.5, to significantly enlarge the training dataset, dramatically improving the model's accuracy. This showcases the profound utility of reasoning models in developing specialized machine learning apps, providing not only direct assistance but also suggesting architectural and training enhancements for more effective and accessible AI education."}, {"title": "My largely unsuccessful attempt to generate a movie of a praying mantis eating a pizza using Sora", "post_url": "https://docs.google.com/document/d/1yo0D37ZUGMwVeYSc6_KJaKytc0slJZUpebKHYq5u3fc/edit?tab=t.0", "apps": [{"url": "https://toontalk.github.io/AI/apps/video-concatenator.html", "title": "Video Concatenator"}, {"url": "https://toontalk.github.io/AI/apps/video-concatenator.html", "title": "Video Concatenator"}], "chat_logs": [], "videos": [{"url": "https://youtu.be/RUi06eGc4nQ", "title": "Sora did a poor job of showing a praying mantis eating a pizza", "video_id": "RUi06eGc4nQ"}, {"url": "https://youtu.be/RUi06eGc4nQ", "title": "Sora did a poor job of showing a prayi 002-9ca9-f445e14ff5c9", "title": "ChatGPT - Reaction Time Game Update"}, {"url": "https://chatgpt.com/share/675a9f6b-e05c-8002-b730-dbf3c29930fd", "title": "ChatGPT - Due Date Validation"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research showcases engaging NEILAC workshops where school children from Northeast India (ages 12-14) explored the creative potential of AI chatbots. Participants quickly learned to have productive conversations with ChatGPT, transforming their imaginations into a diverse array of applications. Their innovative projects ranged from interactive quizzes like the \"Taylor Swift Songs Quiz\" and \"Greek Mythology Quiz\" to dynamic games such as \"Catch the Falling Stars\" and \"Draw the Object.\" The workshops fostered remarkable creativity and technical skill, with students enthusiastically planning to continue building AI-powered apps, highlighting the immense potential of AI literacy in young learners."}, {"title": "Mixed impressions of Qwen\u2019s reasoning", "post_url": "https://docs.google.com/document/d/1f6sZbnjjdY3RTnk8cvuIPbw-GKJ9kqTksxJAR4Bltio/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/number%20to%20english%20by%20qwen/index.html", "title": "Number to Words Converter"}, {"url": "https://toontalk.github.io/AI/apps/number%20to%20english%20by%20qwen/index.html", "title": "Number to Words Converter"}], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research explored Qwen/QwQ-32B's reasoning capabilities by tasking it with building a \"Number to Words Converter\" web page. The AI produced a nearly perfect solution after 29 pages of detailed, \"thinking out loud\" reasoning, uniquely displaying its process of making, catching, and fixing mistakes\u2014a transparency offering significant pedagogic value. While the final app required a minor manual fix for a reversed digit triples bug, attempts to get Qwen to self-correct led to confusion and incorrect language generation, possibly due to an overloaded context. Despite this, the detailed log of Qwen's problem-solving journey provided fascinating insights into its internal workings."}, {"title": "Learning to program by conversing with chatbots", "post_url": "https://docs.google.com/document/d/1ahOXqBKo_FOr8osrKYukscYnvojn5AhWfcsIx16PK1E/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/learn-javascript.html", "title": "Learning JavaScript"}, {"url": "https://toontalk.github.io/AI/apps/learn-javascript.html", "title": "Learning JavaScript"}], "chat_logs": [{"url": "https://chatgpt.com/share/6735e497-e62c-800e-9802-549ac2f562e4", "title": "ChatGPT - Turtle Graphics Introduction"}, {"url": "https://chatgpt.com/share/6735e497-e62c-800e-9802-549ac2f562e4", "title": "ChatGPT - Turtle Graphics Introduction"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research showcases an innovative approach to teaching programming, where novices learn by conversing directly with AI chatbots like ChatGPT and Claude. A central creation is a \"Learning JavaScript\" app, co-developed with ChatGPT, which implements turtle graphics commands such as `forward` and `right`. This app is paired with a meticulously designed chatbot prompt that transforms the AI into a Socratic tutor, guiding 8th graders through discovery-based learning with brief, encouraging feedback and strategic nudges. The project also explored a similar methodology for learning Python, demonstrating a highly personalized and adaptive environment for making programming accessible and engaging."}, {"title": "Claude displays pseudo code while hiding real code", "post_url": "https://docs.google.com/document/d/1CTZu48mBOyrT39ukZLzsZVERHqvC5U7Y94BwZCGQQsw/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["Claude"], "description": "This AI education research unveils an innovative method for learning programming without ever writing a line of code. The experiment leverages Claude to generate functional JavaScript or Python applications, yet deliberately *hides* the real code, presenting users solely with clear, descriptive English \"pseudocode.\" This allows learners to grasp complex app logic, like building a \"fireworks display,\" by reading simple conceptual steps rather than struggling with syntax. The core exploration is whether humans can effectively understand, iterate on, and even guide app development purely through this accessible pseudocode, making the intricacies of software creation universally approachable."}, {"title": "A conversation with Claude about my sourdough bread baking experiences", "post_url": "https://docs.google.com/document/d/1sji0Vnf3qEhveG9W8JYqYEx-SXtRyQIjFRvvxc5AVjU/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["Claude"], "description": "This research post captures a fascinating dialogue where Ken Kahn consults Claude, an AI, about his sourdough bread baking experiences. Initially, Kahn seeks to understand why his bread became unusually sour after a longer fermentation. Claude expertly explains the microbial science behind lactic and acetic acid production, linking it to fermentation time and temperature, and even offers practical tips for adjusting sourness. The conversation deepens as Kahn reveals his unique use of kefir as a starter, prompting Claude to further elaborate on how different microbial strains influence flavor profiles. This interaction showcases AI's impressive capacity to provide detailed, adaptive scientific explanations and practical troubleshooting in a real-world context."}, {"title": "Stories involving programming on topics in science, mathematics, and language", "post_url": "https://docs.google.com/document/d/1cfRh__IrStR2cszcbG_otphx1MQiu4-b5afhpKd4A48/edit#heading=h.s7z0upc466xi", "apps": [{"url": "https://toontalk.github.io/AI/misc/turning%20posts%20into%20a%20table/ken_kahn_posts.html", "title": "Ken Kahn Research Posts"}, {"url": "http://toontalk.github.io/AI/apps
