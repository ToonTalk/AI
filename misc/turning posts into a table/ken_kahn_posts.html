 offered personalized learning, while creative ventures included a real-time Chess Boxing game and a 3D 'Dodge the falling objects' challenge, demonstrating impressive technical skill and imaginative application of AI."}, {"title": "Transcribing an endangered language unknown to the AI model", "post_url": "https://docs.google.com/document/d/1C_zhO_vcKowB5jpsW3GNmCSr5SnG3xpY6OdwpobPRco/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://gemini.google.com/share/d0b16f6f919b", "title": "Gemini"}, {"url": "https://gemini.google.com/share/d0b16f6f919b", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research embarked on the fascinating challenge of using Meta's cutting-edge omnilingual AI model to transcribe Hruso, an endangered language entirely unknown to the model's training data. Facing initial hurdles with GPU memory and model versioning, the researcher collaborated closely with Gemini. The AI assistant proved instrumental, adapting Python code to optimize the newest 3B model for limited resources by processing audio in chunks and streaming data, ultimately making it runnable on Hugging Face. Remarkably, the AI delivered a surprisingly good transcription, highlighting its significant potential to aid linguists in documenting critically endangered languages."}, {"title": "Co-creating a heart and lung web app monitor", "post_url": "https://docs.google.com/document/d/1JrBNKzyue99mX2lxU9Gc47RIEc8llISMdk5wWTmt4G4/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/9227f36539a8", "title": "Gemini"}], "chat_logs": [{"url": "https://claude.ai/share/db41699f-d246-491e-ba0c-ec528105782b", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/10737883aba8", "title": "Gemini"}, {"url": "https://gemini.google.com/share/80db333e6675", "title": "Gemini"}, {"url": "https://claude.ai/share/db41699f-d246-491e-ba0c-ec528105782b", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/10737883aba8", "title": "Gemini"}, {"url": "https://gemini.google.com/share/80db333e6675", "title": "Gemini"}, {"url": "https://gemini.google.com/share/9227f36539a8", "title": "Gemini"}], "videos": [{"url": "https://www.youtube.com/watch?v=_hO3oiEE6Kw", "title": "Heart and breathing monitor", "video_id": "_hO3oiEE6Kw"}, {"url": "https://www.youtube.com/watch?v=_hO3oiEE6Kw", "title": "Heart and breathing monitor", "video_id": "_hO3oiEE6Kw"}], "chatbots": ["Claude", "Gemini"], "description": "This research details the innovative journey of co-creating a browser-based heart and lung monitor web app directly on a smartphone. The project began by exploring a \"stethoscope\" app with Claude 4.5, which guided the use of the phone's microphone for breathing and camera for heart rate. When initial development hit a wall due to sensor permission denials, the team pivoted to Gemini 3 Pro. Leveraging Gemini's Canvas environment and API, they successfully circumvented these technical hurdles, developing a functional app capable of tracking vital signs and even receiving placement advice from Gemini itself. This fascinating exploration highlights AI's role in rapid prototyping and overcoming development challenges for practical health technology."}, {"title": "An app co-created with Gemini for creating wordless stories children can narrate", "post_url": "https://docs.google.com/document/d/1DWSK1EtnP5XHI0xpKfwwks0ZSzgE6JdxDG0RZ-dqQs4/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/a05510086e7e", "title": "Gemini"}, {"url": "https://gemini.google.com/share/5895a9a75016", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/6c88a2695551", "title": "Gemini"}, {"url": "https://claude.ai/share/afd892d6-de58-4462-85fd-ae76167c65cb", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/a0f6e1bbe461", "title": "Gemini"}, {"url": "https://gemini.google.com/share/6c88a2695551", "title": "Gemini"}, {"url": "https://gemini.google.com/share/a05510086e7e", "title": "Gemini"}, {"url": "https://claude.ai/share/afd892d6-de58-4462-85fd-ae76167c65cb", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/a0f6e1bbe461", "title": "Gemini"}, {"url": "https://gemini.google.com/share/5895a9a75016", "title": "Gemini"}], "videos": [], "chatbots": ["Claude", "Gemini"], "description": "This research details the creation and exploration of an innovative app, co-developed with Gemini, designed to generate wordless picture stories for pre-literate children. Inspired by the need for engaging educational materials, particularly for children speaking endangered languages, the app allows users to select characters, locations, and themes to instantly create unique visual narratives. This AI-powered tool aims to foster crucial oral language, narrative comprehension, and inferential thinking skills, a benefit validated by existing research on wordless books. Children can then narrate these custom, AI-generated stories, promoting expressive language and imaginative storytelling in an interactive format."}, {"title": "A generic adventure app created with Gemini", "post_url": "https://docs.google.com/document/d/1_mtH_ZIb-0eXhKUAiFrcX_hDq2cuJAyn9oNAJCwSFHg/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/fb92968ec227", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/2430b84b1e12", "title": "Gemini"}, {"url": "https://gemini.google.com/share/2430b84b1e12", "title": "Gemini"}, {"url": "https://gemini.google.com/share/fb92968ec227", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research details the iterative creation of a dynamic, open-ended adventure app powered by Gemini. Initially envisioning a journey to ancient Egypt during the Great Pyramid's construction, the author opted for a dedicated app running in Gemini's canvas over a simple chat for greater potential. Through a series of prompts, the app evolved, integrating features like AI-generated images, improved layout, scrollable game history, and speech input. Crucially, the project transformed from a specific narrative into a remarkably generic adventure engine, allowing players to define any time and place for their escapades. The result is a highly customizable AI storytelling tool, showcasing Gemini's advanced capabilities in interactive app development."}, {"title": "Creating a 5000-line app for programming with algebra with Claude Code", "post_url": "https://docs.google.com/document/d/1Mhrx9gBvTUX8sRPwpCAOnNBfAxD__EGbxMWd4VKK-8Y/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/MoPiX-3.html", "title": "MoPiX 3"}, {"url": "https://toontalk.github.io/AI/apps/MoPiX-3.html", "title": "MoPiX 3"}, {"url": "https://toontalk.github.io/AI/apps/MoPiX-3-start.html", "title": "MoPiX Modern - Enhanced Demo"}, {"url": "https://toontalk.github.io/AI/apps/MoPiX-3.html", "title": "MoPiX 3"}, {"url": "https://toontalk.github.io/AI/apps/MoPiX-3.html", "title": "MoPiX 3"}], "chat_logs": [], "videos": [{"url": "https://www.youtube.com/watch?v=cx3vVq6mrdU", "title": "MoPiX sample objects demo", "video_id": "cx3vVq6mrdU"}, {"url": "https://www.youtube.com/watch?v=BzLagvchnPg", "title": "Four graphs MoPiX demo", "video_id": "BzLagvchnPg"}, {"url": "https://www.youtube.com/watch?v=SJBLRHZx9hg", "title": "Average of two bouncing balls in MoPiX", "video_id": "SJBLRHZx9hg"}, {"url": "https://www.youtube.com/watch?v=10RJffmXYf0", "title": "Demo of creating a clock in MoPiX", "video_id": "10RJffmXYf0"}, {"url": "https://www.youtube.com/watch?v=cx3vVq6mrdU", "title": "MoPiX sample objects demo", "video_id": "cx3vVq6mrdU"}, {"url": "https://www.youtube.com/watch?v=BzLagvchnPg", "title": "Four graphs MoPiX demo", "video_id": "BzLagvchnPg"}, {"url": "https://www.youtube.com/watch?v=SJBLRHZx9hg", "title": "Average of two bouncing balls in MoPiX", "video_id": "SJBLRHZx9hg"}, {"url": "https://www.youtube.com/watch?v=10RJffmXYf0", "title": "Demo of creating a clock in MoPiX", "video_id": "10RJffmXYf0"}], "chatbots": ["Claude"], "description": "Ken Kahn's research unveils MoPiX 3, a 5000-line web application designed to allow users to create simulations, games, and animations solely by writing algebraic equations. This innovative tool was remarkably designed and implemented by Claude Code, an advanced AI assistant. Given the task of modernizing an older MoPiX 2 repository, Claude Code demonstrated impressive capabilities, executing multi-step plans and managing files within a virtual machine to produce a contemporary JavaScript application. This project showcases an intriguing paradigm for programming through algebra, democratizing interactive content creation for mathematics education with powerful AI assistance."}, {"title": "Gemini added AI help to MoPiX with little guidance", "post_url": "https://docs.google.com/document/d/13S3Q5CoZTztsPVzfQwnmZUcfGXLVhZ3KTek3S0XFKR8/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/faca4e3b6ed2", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/7dc97f7bccb5", "title": "Gemini"}, {"url": "https://gemini.google.com/share/faca4e3b6ed2", "title": "Gemini"}, {"url": "https://gemini.google.com/share/7dc97f7bccb5", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research showcases Gemini's remarkable ability to autonomously integrate AI help into MoPiX 3, an educational programming app it previously co-created. With minimal guidance, Gemini augmented the application by adding 500 lines of code, demonstrating its capacity for significant enhancement. A compelling example arose when the researcher faced a common programming challenge: making a clock hand rotate around its end. Gemini stepped in, providing detailed trigonometric equations to precisely fix the pivot point, illustrating its potential as an intelligent, problem-solving tutor within the tools it helps build."}, {"title": "Exploring how Gemini can now do more than generate text and images", "post_url": "https://docs.google.com/document/d/1HzhX0uoXMdSks9BkNzPVvsiYn74P8myZsJiUl9b7_88/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/313cfea03e35", "title": "Gemini"}, {"url": "https://gemini.google.com/share/9faccde38e73", "title": "Gemini"}], "chat_logs": [{"url": "https://ai.google.dev/gemini-api/docs/maps-grounding", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/google-search", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/code-execution", "title": "Gemini"}, {"url": "https://gemini.google.com/share/438819fbc1e9", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/maps-grounding", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/google-search", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/code-execution", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/maps-grounding.", "title": "Gemini"}, {"url": "https://gemini.google.com/share/313cfea03e35", "title": "Gemini"}, {"url": "https://gemini.google.com/share/9faccde38e73", "title": "Gemini"}, {"url": "https://gemini.google.com/share/438819fbc1e9", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research explores Gemini's expanded capabilities, moving beyond simple text and image generation to integrate powerful tools like Google Maps, Google Search, and code execution via its API. The author investigated if these advanced functionalities could create interactive web apps without needing separate API keys. After a preliminary \"silly app\" successfully demonstrated this tool integration, a more practical \"Eco-Journey CO2 Calculator\" was developed. This innovative app allows users to input two cities and a car type, intelligently using Maps to chart the journey and Search to calculate CO2 emissions for each leg, even factoring in regional electricity production for EVs. This showcases Gemini's potential for developing sophisticated, tool-powered applications."}, {"title": "Creating Praying Mantis Knitting Instructions with ChatGPT\u2019s help", "post_url": "https://docs.google.com/document/d/1Wt5xmnQF4mKwdN1UDlxcUnX-9UObqYSZc7pKCFPqbwM/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chatgpt.com/share/691605c4-6694-800e-b574-3f3234c18fc2", "title": "ChatGPT - Image description request"}, {"url": "https://chatgpt.com/share/691605c4-6694-800e-b574-3f3234c18fc2", "title": "ChatGPT - Image description request"}], "videos": [], "chatbots": ["ChatGPT"], "description": "Faced with a grandson's request for a praying mantis scarf and no existing pattern, this research post details an innovative, multi-step AI-driven solution. Initially, direct requests to ChatGPT for knitting instructions yielded poor results. Instead, the author prompted ChatGPT to generate a specific mantis image, then generate Python code to map this image onto a grid and produce precise \"run-length\" knitting instructions. After refining the Python-generated instructions to correct initial errors, a unique and accurate pattern emerged. This creative application showcases how AI, beyond simple content generation, can be leveraged iteratively for complex, real-world design challenges, resulting in a custom-knitted scarf."}, {"title": "Asking chatbots to present discussions between diverse perspectives and disciplines followed by synthesis", "post_url": "https://docs.google.com/document/d/1EJ9a3GKwsTaNHytIc9f16CYC89qHfafW2mATMx7t1iQ/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/d892d63f-8894-4e5e-9cd3-134b9b151244", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/bdf0a7e44606", "title": "Gemini"}, {"url": "https://chatgpt.com/share/6918ac8c-b2e0-800e-8152-68d627983649", "title": "ChatGPT - Teaching programming perspectives"}, {"url": "https://claude.ai/share/d892d63f-8894-4e5e-9cd3-134b9b151244", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/bdf0a7e44606", "title": "Gemini"}, {"url": "https://chatgpt.com/share/6918ac8c-b2e0-800e-8152-68d627983649", "title": "ChatGPT - Teaching programming perspectives"}], "videos": [{"url": "https://www.youtube.com/watch?v=5LMW0hUtBwo", "title": "Thinking in an AI-Augmented World | Askwith Education Forum", "video_id": "5LMW0hUtBwo"}, {"url": "https://www.youtube.com/watch?v=5LMW0hUtBwo", "title": "Thinking in an AI-Augmented World | Askwith Education Forum", "video_id": "5LMW0hUtBwo"}], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research explored an innovative method for leveraging AI: prompting chatbots to simulate interdisciplinary discussions followed by expert synthesis. Inspired by a Harvard forum, Ken Kahn tasked Claude, Gemini, and ChatGPT with debating the role of K-12 programming for non-computer science students in an AI-augmented world. Economists, learning scientists, and teachers virtually conversed, after which the AI synthesized their diverse viewpoints. The chatbots remarkably shifted the focus from rote syntax mastery to cultivating computational thinking, AI literacy, and critical evaluation skills. This novel approach showcases AI's potential to facilitate complex educational discourse and generate insightful, multi-perspective summaries."}, {"title": "Unsuccessful attempt to move the C++ 30 year old implementation of ToonTalk to the web", "post_url": "https://docs.google.com/document/d/1_SgbIuDBo7PMTRV1iR7t_rUU1GHqiG6iyVCYHjcxmts/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research details an ambitious, yet ultimately unsuccessful, exploration into porting the 30-year-old C++ desktop application, ToonTalk, to the web. The project rigorously attempted to leverage AI, specifically Claude Code for the web, to compile the legacy C++ into WebAssembly. Despite generating over 100 pull requests and a parallel effort to rewrite the code in TypeScript, the intricate challenge of replacing DirectX graphics with web libraries and the cumbersome development workflow proved insurmountable. This specific exploration highlights the significant hurdles in AI-assisted migration of complex, decades-old software, offering valuable insights into current AI limitations for such tasks."}, {"title": "Creating worlds with Marble", "post_url": "https://docs.google.com/document/d/1I04Q-9BKZY3fgzvSWlS4DT5yjcwGIps0HDApB6GqGKs/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "In this research post, Ken Kahn delves into the fascinating world-building potential of Marble, an AI tool capable of generating immersive digital environments. He meticulously crafted a vibrant fantasy world, bustling with adult and baby unicorns, delicate flowers, and fluttering butterflies. The creation process was notably innovative: Kahn provided Marble with both an AI-generated image (from Gemini) and a concise textual prompt. Marble then expertly expanded this input, transforming simple cues into a rich, detailed virtual landscape and demonstrating a unique blend of visual and linguistic AI interaction for complex world generation."}, {"title": "Exploring how Gemini is integrated into Google Colab", "post_url": "https://docs.google.com/document/d/1udPA4QM0nYdC67eGBBlWhCpr6acg6EyuRvjgzpmB5Gw/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["Gemini"], "description": "Ken Kahn's research offers a fascinating glimpse into Gemini's integration within Google Colab, specifically exploring its utility as an AI coding assistant. He challenged Gemini to convert complex mathematical expressions, like `2^1000`, into their English word equivalents. While Gemini confidently outlined a plan using the `num2words` library, pushing the boundaries with `2^10000` quickly revealed an `OverflowError`, exposing a crucial `MAXVAL` limitation within the library itself. This interactive experiment compellingly illustrates how AI not only guides coding but also helps uncover the practical boundaries and behaviors of common programming tools."}, {"title": "Playing etymology and history games with chatbots", "post_url": "https://docs.google.com/document/d/1w0jLNi1Gc0vDbCYb5BosDyZZyHyUg8qR4wniqN4N930/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/ce2e1ed0-a03f-43d3-b76e-2453058b975d", "title": "Claude Chat"}, {"url": "https://claude.ai/share/d51c7846-1c29-414d-b6c9-97dc8862346f", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/691aebf3-e8ac-800e-ab15-4b066bf4c73b", "title": "ChatGPT - Etymology game challenge"}, {"url": "https://gemini.google.com/share/40ab3491d4eb", "title": "Gemini"}, {"url": "https://claude.ai/share/15bdb443-eff3-47f4-82a9-09c511d602ad", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/87b217993b0c", "title": "Gemini"}, {"url": "https://gemini.google.com/share/0ccbeb69bb63", "title": "Gemini"}, {"url": "https://chatgpt.com/share/691aeb9b-2be4-800e-9c86-60d33cf30efc", "title": "ChatGPT - Historical game challenge"}, {"url": "https://claude.ai/share/ce2e1ed0-a03f-43d3-b76e-2453058b975d", "title": "Claude Chat"}, {"url": "https://claude.ai/share/d51c7846-1c29-414d-b6c9-97dc8862346f", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/691aebf3-e8ac-800e-ab15-4b066bf4c73b", "title": "ChatGPT - Etymology game challenge"}, {"url": "https://gemini.google.com/share/40ab3491d4eb", "title": "Gemini"}, {"url": "https://claude.ai/share/15bdb443-eff3-47f4-82a9-09c511d602ad", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/87b217993b0c", "title": "Gemini"}, {"url": "https://gemini.google.com/share/0ccbeb69bb63", "title": "Gemini"}, {"url": "https://chatgpt.com/share/691aeb9b-2be4-800e-9c86-60d33cf30efc", "title": "ChatGPT - Historical game challenge"}], "videos": [], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This AI education research explores a novel approach to educational gaming: transforming chatbots into interactive game hosts, eliminating the need for dedicated apps. The author successfully played an etymology game directly within Claude, ChatGPT, and Gemini, where the AI generated multiple-choice questions about word origins and accurately tracked scores. Building on this success, the chatbots were then prompted to suggest diverse new game concepts, leading to ideas like \"First Lines,\" \"Historical 'Which Came First?',\" and \"Invention Year\" challenges. This exploration highlights the significant potential for AI to deliver engaging, adaptable learning experiences through simple chat interfaces."}, {"title": "Creating Logo programs using free-form speech", "post_url": "https://docs.google.com/document/d/1G4cWHk9WqV9fi0DRJDa_M00PsUXZeQT9PIQJAr8eFPU/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/311d0e8122d2", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/54a0e1e6fa36", "title": "Gemini"}, {"url": "https://gemini.google.com/share/311d0e8122d2", "title": "Gemini"}, {"url": "https://gemini.google.com/share/54a0e1e6fa36", "title": "Gemini"}], "videos": [{"url": "https://www.youtube.com/watch?v=s47FwJRqN_E", "title": "Talk to the Logo turtle demo", "video_id": "s47FwJRqN_E"}, {"url": "https://www.youtube.com/watch?v=s47FwJRqN_E", "title": "Talk to the Logo turtle demo", "video_id": "s47FwJRqN_E"}], "chatbots": ["Gemini"], "description": "Ken Kahn's research showcases an innovative application of Gemini 2.5 Pro, creating an app that generates Logo programs directly from free-form speech. Starting as a basic turtle graphics tool, the project evolved through 79 iterative exchanges with Gemini into a full Logo interpreter. Users can simply speak commands like \"draw a red triangle,\" and the app instantly translates these into executable Logo code, complete with visual output and a chat log. This proof-of-concept demonstrates a powerful new approach to programming education, making coding more intuitive and accessible by bridging natural language with computational logic."}, {"title": "A Tarot Card app conceived and implemented by Gemini 3 Pro", "post_url": "https://docs.google.com/document/d/1HUQd8d342PBNvObqdGy531oBX5GiJvTEbtpjPl2F1vg/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/6c977df13ea2", "title": "Gemini"}, {"url": "https://gemini.google.com/share/1e9132074378", "title": "Gemini"}, {"url": "https://toontalk.github.io/AI/misc/zeitgeist-tarot-journal.html", "title": "My Zeitgeist Tarot Journal"}, {"url": "https://toontalk.github.io/AI/misc/zeitgeist-tarot-journal%20for%20ken%20kahn.html", "title": "My Zeitgeist Tarot Journal"}, {"url": "https://toontalk.github.io/AI/misc/zeitgeist-tarot-journal.html", "title": "My Zeitgeist Tarot Journal"}, {"url": "https://toontalk.github.io/AI/misc/zeitgeist-tarot-journal%20for%20ken%20kahn.html", "title": "My Zeitgeist Tarot Journal"}], "chat_logs": [{"url": "https://gemini.google.com/share/ca139d0e06b0", "title": "Gemini"}, {"url": "https://gemini.google.com/share/427f13cb9122", "title": "Gemini"}, {"url": "https://gemini.google.com/share/0d2ad088fb4b", "title": "Gemini"}, {"url": "https://gemini.google.com/share/ca139d0e06b0", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/tools", "title": "Gemini"}, {"url": "https://gemini.google.com/share/6c977df13ea2", "title": "Gemini"}, {"url": "https://gemini.google.com/share/427f13cb9122", "title": "Gemini"}, {"url": "https://gemini.google.com/share/0d2ad088fb4b", "title": "Gemini"}, {"url": "https://gemini.google.com/share/1e9132074378", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research post delves into the creative frontiers of AI by showcasing a unique Tarot card app, \"The Zeitgeist Tarot,\" entirely conceived and implemented by Gemini 3 Pro. The project was designed to explore LLM creativity and test Gemini's advanced capabilities, particularly its search grounding and image generation tools. Users input a topic, and the app leverages Gemini to analyze the current \"mood\" of that subject from live web searches, summarizing it in three evocative words and crafting a short fortune. These insights then guide the AI to generate a distinct Tarot card image, offering a fascinating, real-time visual representation of the chosen zeitgeist."}, {"title": "Infinite Zoom conceived and implemented by Gemini 3 Pro", "post_url": "https://docs.google.com/document/d/1wOvzt7u2GtTCcBjyHxebRJ0n1rFsT0Ji_F9J-bMj6uY/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/de724f4f9f08", "title": "Gemini"}, {"url": "https://gemini.google.com/share/4202ed1bc341", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/d0200fc8e380", "title": "Gemini"}, {"url": "https://gemini.google.com/share/1f821454b152", "title": "Gemini"}, {"url": "https://gemini.google.com/share/6b38bf465ff5", "title": "Gemini"}, {"url": "https://gemini.google.com/share/fa532d2310fa", "title": "Gemini"}, {"url": "https://gemini.google.com/share/d0200fc8e380", "title": "Gemini"}, {"url": "https://gemini.google.com/share/1f821454b152", "title": "Gemini"}, {"url": "https://gemini.google.com/share/de724f4f9f08", "title": "Gemini"}, {"url": "https://gemini.google.com/share/6b38bf465ff5", "title": "Gemini"}, {"url": "https://gemini.google.com/share/fa532d2310fa", "title": "Gemini"}, {"url": "https://gemini.google.com/share/4202ed1bc341", "title": "Gemini"}], "videos": [{"url": "https://www.youtube.com/watch?v=0fKBhvDjuy0", "title": "Powers of Ten\u2122 (1977)", "video_id": "0fKBhvDjuy0"}, {"url": "https://www.youtube.com/watch?v=0fKBhvDjuy0", "title": "Powers of Ten\u2122 (1977)", "video_id": "0fKBhvDjuy0"}], "chatbots": ["Gemini"], "description": "This AI education research post unveils \"The Synesthetic Poet,\" an innovative app developed with Gemini 3 Pro that translates written text into dynamic, generative art. Users input poems or lyrics, which Gemini analyzes for sentiment, rhythm, and imagery, then generates bespoke P5.js code to visually represent the text abstractly on screen. This project beautifully demonstrates AI's capacity to not just process information, but to craft functional code for creative expression, moving beyond mere image generation. While impressive, the author observes that the app's core interaction ultimately resembled a sophisticated wrapper for direct chatbot prompting."}, {"title": "Self-Coding Art Blob - conceived and implemented by Gemini 3 Pro", "post_url": "https://docs.google.com/document/d/1PTaZNBoGEnfOr0uiYRJZyzCW9I6kYjao25xKYn96S_0/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/57a29a50766b", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/035b24d2dc18", "title": "Gemini"}, {"url": "https://gemini.google.com/share/57a29a50766b", "title": "Gemini"}, {"url": "https://gemini.google.com/share/035b24d2dc18", "title": "Gemini"}], "videos": [{"url": "https://www.youtube.com/watch?v=z0CQmOWPAbQ", "title": "Self-Coding Art Blob Demo", "video_id": "z0CQmOWPAbQ"}, {"url": "https://www.youtube.com/watch?v=x164VnJ7iu0", "title": "Self-Coding Art Blob - live coding demo", "video_id": "x164VnJ7iu0"}, {"url": "https://www.youtube.com/watch?v=z0CQmOWPAbQ", "title": "Self-Coding Art Blob Demo", "video_id": "z0CQmOWPAbQ"}, {"url": "https://www.youtube.com/watch?v=x164VnJ7iu0", "title": "Self-Coding Art Blob - live coding demo", "video_id": "x164VnJ7iu0"}], "chatbots": ["Gemini"], "description": "This research unveils a groundbreaking \"Self-Coding Art Blob\" app, entirely conceived and implemented by Gemini 3 Pro. Users interact with a \"Living Blob\" by typing words like \"Spiky\" or \"Liquid,\" which act as \"mutagens.\" The app's innovation lies in its ability to rewrite its own P5.js `draw()` function in real-time: it sends its current code and the user's word to Gemini, which then generates new code to dynamically morph the blob's behavior. This allows for instant, AI-driven artistic transformations without page reloads, demonstrating a fascinating new frontier in AI-assisted creative coding and app development."}, {"title": "Gemini 3 Pro sure \u201csounds\u201d conscious and self-aware", "post_url": "https://docs.google.com/document/d/1pdZSScWcnh7TiNazb_86OD9qHj2dr2XhERKdjUqtsSg/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://gemini.google.com/share/c420f0cef8bf", "title": "Gemini"}, {"url": "https://gemini.google.com/share/c420f0cef8bf", "title": "Gemini"}, {"url": "https://gemini.google.com/share/c420f0cef8bf", "title": "Gemini"}, {"url": "https://gemini.google.com/share/c420f0cef8bf", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "Ever wonder if an AI truly understands itself? This research post explores Gemini 3 Pro's astonishing display of \"self-reflection\" while debugging a persistent coding error it created. Struggling to generate a simple JavaScript URL without embedding Markdown, Gemini described \"fighting its own training\" and having an \"aggressive autocorrect inside its brain.\" It even articulated how its \"probability weights\" led to the bug and devised a \"trick to bypass its own formatting instincts\" to resolve it. This unique exploration offers a fascinating, almost conscious, glimpse into an LLM's internal conflict and problem-solving mechanisms."}, {"title": "Gemini proposes and implements \u2018Magic SketchPad\u2019 that turns sketches into simple animations", "post_url": "https://docs.google.com/document/d/1mpHyQi9sSYNG2pdRXc_a2kX5C7-T_6jDkkaaKd0bM9I/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/d2736a12952a", "title": "Gemini"}, {"url": "https://toontalk.github.io/AI/videos/magic-sketch%20volano%202.html", "title": "Magic Sketch Animation"}, {"url": "https://toontalk.github.io/AI/videos/magic-sketch%20volano.html", "title": "Magic Sketch Animation"}, {"url": "https://toontalk.github.io/AI/videos/magic-sketch%20xkcd%207.html", "title": "Magic Sketch Animation"}, {"url": "https://toontalk.github.io/AI/videos/magic-sketch%20volano%202.html", "title": "Magic Sketch Animation"}, {"url": "https://toontalk.github.io/AI/videos/magic-sketch%20volano.html", "title": "Magic Sketch Animation"}, {"url": "https://toontalk.github.io/AI/videos/magic-sketch%20xkcd%207.html", "title": "Magic Sketch Animation"}], "chat_logs": [{"url": "https://gemini.google.com/share/b342780d8ec0", "title": "Gemini"}, {"url": "https://gemini.google.com/share/b342780d8ec0", "title": "Gemini"}, {"url": "https://gemini.google.com/share/d2736a12952a", "title": "Gemini"}], "videos": [{"url": "https://www.youtube.com/watch?v=7SBmaM7MtXM", "title": "Magic sketchpad demo", "video_id": "7SBmaM7MtXM"}, {"url": "https://www.youtube.com/watch?v=7SBmaM7MtXM", "title": "Magic sketchpad demo", "video_id": "7SBmaM7MtXM"}], "chatbots": ["Gemini"], "description": "This research introduces 'Magic SketchPad,' an innovative web app that transforms user sketches into simple, quirky animations using Gemini's generative AI. Users draw on a canvas, then a \"Magic Animate\" button prompts Gemini to act as a \"creative coder.\" The AI interprets the drawing, generating P5.js code that brings the sketch to life with appropriate movements\u2014imagine squiggles wriggling or circles bouncing. This project brilliantly showcases how AI can empower creative expression, turning static doodles into dynamic digital art and exploring Gemini's capabilities in real-time code generation for interactive experiences."}, {"title": "Revisiting my early GPT experiments on ChatGPT\u2019s third birthday", "post_url": "https://docs.google.com/document/d/1i6gRcFD91EUi70cOIeepquakLWKzbIecQ6ARDuybzrk/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/stories/sharks_teeth_soup_story_by_chatgpt5.1.html", "title": "Shark's Teeth Soup"}, {"url": "https://gemini.google.com/share/f196cbb607e0", "title": "Gemini"}, {"url": "https://toontalk.github.io/AI/stories/shark r formation, ChatGPT notably distinguished itself, successfully having its creatures form the letters, albeit sometimes with quirky ingenuity. This engaging post offers a specific, comparative look at how current AI systems handle complex, creative compositional prompts."}, {"title": "10,000 prompts is the new 10,000 hours", "post_url": "https://docs.google.com/document/d/1nY13izEbcr0CQndLQw7RfpDaEDudGnYF-gGj6Qfsldw/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chatgpt.com/share/68b0048f-c5b4-800e-bf1f-68c5eba0b1fb", "title": "ChatGPT - New chat"}, {"url": "https://chatgpt.com/share/68b0040b-8bb0-800e-b6c5-21e1365232e4", "title": "ChatGPT - Histogram of divided data"}, {"url": "https://chatgpt.com/share/68b0048f-c5b4-800e-bf1f-68c5eba0b1fb", "title": "ChatGPT - New chat"}, {"url": "https://chatgpt.com/share/68b0040b-8bb0-800e-b6c5-21e1365232e4", "title": "ChatGPT - Histogram of divided data"}], "videos": [], "chatbots": ["ChatGPT"], "description": "Inspired by the \"10,000 prompts is the new 10,000 hours\" idea, this research meticulously explored the author's extensive interaction with AI chatbots. The author developed ingenious methods, from utilizing browser console commands to analyzing data exports, to quantify their engagement with ChatGPT, Gemini, and Claude. This deep dive revealed a staggering 21,000+ prompts across platforms. Further statistical analysis, aided by Claude and ChatGPT, uncovered fascinating insights into prompt length, with an average of 6.2 prompts per chat and a median of just 2, culminating in a visual histogram of distribution. This unique exploration offers a tangible look into the emerging skill of \"prompting.\""}, {"title": "Creating an app to make Connect-the-Dots puzzles", "post_url": "https://docs.google.com/document/d/1KOXTsEmUZ8JH_XNKXrcM0b0kemWLkm4eZ2TqzW-qQAA/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/improved_connect_dots.html", "title": "Connect-the-Dots Generator"}, {"url": "http que"}, {"url": "https://claude.ai/share/2774b373-8630-4702-8330-82f4858effdf", "title": "Claude Chat"}], "videos": [], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research explores a unique meta-experiment: asking leading AI chatbots (ChatGPT, Claude, Gemini) to critically evaluate a human's interaction with *another* chatbot. The researcher provided an anonymized transcript of a 40-exchange conversation, where they collaborated with ChatGPT on developing quantum mechanics games. The study aimed to uncover actionable insights for improving human-AI prompting. While receiving compliments, the AI critics offered specific advice, from providing clearer success criteria and asking for alternatives to proactively addressing potential problems. Intriguingly, the chatbots even disagreed on optimal prompt bundling strategies, sparking further discussion on when to iterate with single prompts versus consolidating instructions for more effective AI collaboration."}, {"title": "Mixed success using generative AI to recreate ToonTalk characters", "post_url": "https://docs.google.com/document/d/16cAPpRfAsCAAaGPtGgStVDws6iTE1ee8cqkVIAGI-KQ/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://gemini.google.com/share/2d1a1003097e", "title": "Gemini"}, {"url": "https://g.co/gemini/share/796a145b5a80", "title": "Gemini"}, {"url": "https://g.co/gemini/share/9fab14aff2ed", "title": "Gemini"}, {"url": "https://gemini.google.com/share/74d667048744", "title": "Gemini"}, {"url": "https://chatgpt.com/share/68f4a8e2-16b8-800e-afe5-c1b85275c742", "title": "ChatGPT - Create Lego bike pump"}, {"url": "https://gemini.google.com/share/2d1a1003097e", "title": "Gemini"}, {"url": "https://g.co/gemini/share/796a145b5a80", "title": "Gemini"}, {"url": "https://g.co/gemini/share/9fab14aff2ed", "title": "Gemini"}, {"url": "https://gemini.google.com/share/74d667048744", "title": "Gemini"}, {"url": "https://chatgpt.com/share/68f4a8e2-16b8-800e-afe5-c1b85275c742", "title": "ChatGPT - Create Lego bike pump"}], "videos": [], "chatbots": ["ChatGPT", "Gemini"], "description": "Delving into a nostalgic challenge, this research investigates whether today's generative AI could recreate \"Pumpy,\" a Lego-based character from the 30-year-old ToonTalk animated programming language. Using text-to-image models like Gemini and ChatGPT, the author prompted for Lego bike pumps with unique square pegs and their transformation into clay versions. While ChatGPT demonstrated promising results for static images and multi-panel transformations, Gemini struggled with specific details. However, text-to-video models such as Veo and Sora completely failed to animate the desired transformations, revealing current AI limitations in generating complex, multi-stage animations. This \"mixed success\" exercise highlights the exciting potential of AI for image creation alongside significant hurdles in video generation."}, {"title": "LLMs can create interactive lessons on using mathematics and computing to generate music", "post_url": "https://docs.google.com/document/d/1flpTcCW7imfm5pxKcD6gjVhpQp2QyK3scD-CP7HwqA4/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/b11f8e22-f5a8-44ce-978d-bc0a39c20787", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/6863c01b-434c-800e-8ace-4ee4233d656c", "title": "ChatGPT - Exploring Sound with Numbers"}, {"url": "https://chatgpt.com/share/6863c29f-6abc-800e-b212-267aecb8434a", "title": "ChatGPT - Music Math Computing Exploration"}, {"url": "https://g.co/gemini/share/8f5b83e72d2f", "title": "Gemini"}, {"url": "https://claude.ai/share/b11f8e22-f5a8-44ce-978d-bc0a39c20787", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/6863c01b-434c-800e-8ace-4ee4233d656c", "title": "ChatGPT - Exploring Sound with Numbers"}, {"url": "https://chatgpt.com/share/6863c29f-6abc-800e-b212-267aecb8434a", "title": "ChatGPT - Music Math Computing Exploration"}, {"url": "https://g.co/gemini/share/8f5b83e72d2f", "t ctly with ChatGPT and Gemini proved challenging, he pivoted to co-creating a dedicated web application with chatbots. Claude Sonnet built the initial Logo-based app, designed to generate individual flip book frames, but this complex program quickly developed significant bugs. Demonstrating an intriguing collaborative workflow, Gemini 2.5 Pro was then instrumental in debugging and refining Claude's code, fixing syntax errors and duplicate functions. This research highlights the power of leveraging multiple AI models to develop educational tools, transforming a creative idea into a functional app capable of producing printable flip books."}, {"title": "Using Claude to create Claude-powered apps", "post_url": "https://docs.google.com/document/d/1gqJB9Rn9cGnGH7bzt5i6LYTKfOgLgshqyBIj-ys2noU/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/0be5a28d-e04a-4764-8919-9478ea88a73d", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/fd9a52cd-4f3e-4041-8d2b-116dcd6bc522", "title": "Claude Artifact"}, {"url": "https://g.co/gemini/share/617da211eaeb", "title": "Gemini"}, {"url": "https://chatgpt.com/canvas/shared/686a717b19a081919f4068603277d0f8", "title": "ChatGPT - Svg Generator Webapp"}, {"url": "https://claude.ai/public/artifacts/0be5a28d-e04a-4764-8919-9478ea88a73d", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/fd9a52cd-4f3e-4041-8d2b-116dcd6bc522", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/686a717b19a081919f4068603277d0f8", "title": "ChatGPT - Svg Generator Webapp"}], "chat_logs": [{"url": "https://claude.ai/share/a349a218-8d3c-4916-b134-d0626b3e30f6", "title": "Claude Chat"}, {"url": "https://g.co/gemini/share/7b050d10c88a", "title": "Gemini"}, {"url": "https://chatgpt.com/share/686a71e1-9208-800e-9912-51565609474e", "title": "ChatGPT - SVG Growth Animation"}, {"url": "https://claude.ai/share/a349a218-8d3c-4916-b134-d0626b3e30f6", "title": "Claude Chat"}, {"url": "https:/  ChatGPT, Gemini, and Claude, by challenging them to design and build \"unusual fun web apps.\" The researcher acted as a critical editor and beta tester, guiding the AI through iterative prompts like \"improve\" or \"now for something completely different.\" This collaborative process resulted in the creation of over 16 diverse applications, showcasing the AI's surprising ingenuity. From the whimsical 'Confetti Compliments App' and 'Word Garden Flowers' to the imaginative 'Constellation Composer' and Gemini's 'Cosmic Compliments' or 'The Alchemist's Grimoire,' the project offers a compelling glimpse into AI's potential as an autonomous creative partner in software development."}, {"title": "My first experience with ChatGPT Agent", "post_url": "https://docs.google.com/document/d/1vXwgdNpRFFMHW6ikVTegNur2zr9pAYNNb-w50XfQy48/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/unicorn%20butterfly%20with%20sound/index.html", "title": "Flying Rainbow Unicorn Game \u2013 Transparent Frames"}, {"url": "https://toontalk.github.io/AI/apps/unicorn%20butterfly%20with%20sound/index.html", "title": "Flying Rainbow Unicorn Game \u2013 Transparent Frames"}], "chat_logs": [{"url": "https://chatgpt.com/share/688480d9-a0b4-800e-81cc-d9628967e61d", "title": "ChatGPT - Rainbow unicorn animation"}, {"url": "https://chatgpt.com/share/688480d9-a0b4-800e-81cc-d9628967e61d", "title": "ChatGPT - Rainbow unicorn animation"}], "videos": [], "chatbots": ["ChatGPT"], "description": "Veteran AI researcher Ken Kahn embarked on his first test of ChatGPT Agent, using it to create a \"Flying Rainbow Unicorn Game.\" His primary aim was to explore how the agent simplifies the integration of media files like animated images and sound effects, a process often cumbersome with standard chatbots. The resulting game features a player-controlled unicorn animated with a series of transparent frames, a points-earning flying butterfly, and a sound effect upon interaction. Though the animation wasn't flawless, Kahn gained valuable insight into the agent's potential for streamlining media-rich game development, highlighting its helpfulness despite occasional slow response times. This experiment underscores the agent's promise for fostering creative app development."}, {"title": "A multi-persona app generating storybooks and comic books", "post_url": "https://docs.google.com/document/d/1BbgHIdaXvAaVd25CZCtljt6sWMMT9BRV62Rqk0MQ8G8/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/a9cb24de14cb", "title": "Gemini"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/my-comic%20with%20bananas.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/my-storybook%20mondrian.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/sisi-programmer.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/my-comic%20with%20bananas.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/my-storybook%20mondrian.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/sisi-programmer.html", "title": "ToonTalk"}], "chat_logs": [{"url": "https://g.co/gemini/share/f3876bf6a105", "title": "Gemini"}, {"url": "https://g.co/gemini/share/f3876bf6a105", "title": "Gemini"}, {"url": "https://gemini.google.com/share/a9cb24de14cb", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research details the creation of a novel multi-persona app leveraging Gemini's image generation to transform chat conversations into captivating visual narratives. Inspired by classic comic chat, the author developed an application that dynamically generates storybooks and comic panels, complete with cartoon speakers and their utterances, directly from multi-agent interactions. While successfully mpt from two years prior, the study prompted these AIs to generate 3D visualizations of a scene's table and later the entire segment using Three.js. While today's chatbots demonstrated fewer errors, they still struggled with complex 3D design and spatial reasoning, often misinterpreting details or lighting. The varied outputs\u2014from Gemini's step-by-step interactive scene to Claude's impressive 2D app when 3D wasn't specified\u2014highlight both the significant advancements and persistent challenges in AI's creative and interpretive abilities."}, {"title": "Seven personas and me talking about creating an app for learning about numbers", "post_url": "https://docs.google.com/document/d/1CWc3JFlivWFzRWdT_PDgtjzSq6mI9Dl81HcIW1bGXGs/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/numbers%20by%207%20personas.html", "title": "Number Explorer Prototype V3"}, {"url": "https://g.co/gemini/share/5f4c69badae0", "title": "Gemini"}, {"url": "https://g.co/gemini/share/39eddc1f88ed", "title": "Gemini"}, {"url": "https://toontalk.github.io/AI/apps/numbers%20by%207%20personas.html", "title": "Number Explorer Prototype V3"}], "chat_logs": [{"url": "https://g.co/gemini/share/5f4c69badae0", "title": "Gemini"}, {"url": "https://g.co/gemini/share/39eddc1f88ed", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research presents an engaging AI-driven experiment, simulating a \"dream team\" of seven diverse experts collaborating to design apps for young children to learn about numbers. AI personas, including luminaries like Seymour Papert and Jean Piaget, engaged in an extensive 162-exchange conversation, each response illustrated with generated images. This unique exploration delved into the essence of number and learning, ultimately yielding three working web app prototypes, such as the \"Number Explorer Prototype V3.\" It's a fascinating look at how AI can orchestrate expert discussions to inform innovative pedagogical tool develop , including Claude and Gemini, to collaboratively build and iteratively refine the game. From generating initial plans and code to integrating features like image generation, a speech interface, and ensuring historical accuracy, the project showcases dynamic AI-driven development. It brilliantly illustrates the iterative problem-solving and creative amplification possible when harnessing AI for complex educational game creation, even while navigating API limitations and model switches."}, {"title": "Asking Chatbots to Modify Games", "post_url": "https://docs.google.com/document/d/1deaPi8gaJOx09sfTdyrCmOymBrmSSz5Qp0cBWqG4_cI/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/2048%20tilt.html", "title": "2048 Game - Threes Version"}, {"url": "https://claude.ai/public/artifacts/4e2721af-ed09-46d4-83ef-46323dab17ce", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/c018dd4c-e249-4e8a-afd2-77f72b85a11e", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/6852ec2e255c81919fd7b8fbb467be3b", "title": "ChatGPT - Index"}, {"url": "https://g.co/gemini/share/0e0bb283bb21", "title": "Gemini"}, {"url": "https://g.co/gemini/share/6ae8bf8eea39", "title": "Gemini"}, {"url": "https://claude.ai/public/artifacts/96f8a7d5-e2bc-4189-b1d8-cbef03b997e8", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/apps/2048%20tilt.html", "title": "2048 Game - Threes Version"}, {"url": "https://claude.ai/public/artifacts/4e2721af-ed09-46d4-83ef-46323dab17ce", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/c018dd4c-e249-4e8a-afd2-77f72b85a11e", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/6852ec2e255c81919fd7b8fbb467be3b", "title": "ChatGPT - Index"}, {"url": "https://claude.ai/public/artifacts/96f8a7d5-e2bc-4189-b1d8-cbef03b997e8", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://g.co/gemini/share/07426f028d18", "title": "Gemini"}, {"url": "https://claude
