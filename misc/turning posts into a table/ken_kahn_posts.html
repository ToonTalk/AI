Converter"}, {"url": "https://chatgpt.com/share/6716798b-73d4-800e-ac20-6334d307f9a3", "title": "ChatGPT - Number to English Converter"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post details how ChatGPT o1-mini successfully developed a \"Number to English Converter\" capable of translating remarkably vast integers into their verbal form. Initially handling numbers up to 10^64, o1-mini was prompted to extend its capabilities, ultimately converting a gargantuan number into an impressive 719-word English phrase. The study further explored how various LLMs, including ChatGPT 4o, O1-preview, and Gemini Advanced, comprehended extremely large number nomenclature like \"CentQuadragintOctoillion,\" uncovering fascinating differences in their accuracy and occasional surprising errors, such as Gemini's outright hallucination."}, {"title": "A simple example of making up words", "post_url": "https://docs.google.com/document/d/1-upHHykTcIJB89hD5HI4CbKfAYLj-iAK5t_G46qp4o0/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/new-words-gettysburg.html", "title": "Gettysburg Address with Random Words"}, {"url": "https://toontalk.github.io/AI/apps/new-words-gettysburg.html", "title": "Gettysburg Address with Random Words"}], "chat_logs": [{"url": "https://chatgpt.com/share/67502797-218c-800e-aea3-4ab1a605ce99", "title": "ChatGPT - Random Word Generator HTML"}, {"url": "https://chatgpt.com/share/67502797-218c-800e-aea3-4ab1a605ce99", "title": "ChatGPT - Random Word Generator HTML"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post explores a playful yet insightful application of AI: generating new, imaginative words. Starting with a simple prompt to create an HTML page that invents words, the author quickly iterated, teaching the AI to not only display but also *speak* these unique creations. The project culminated in a fascinating blend of history and innovation, where the AI integrated its made-up words into the Gettysburg Address, replacing every third word with a novel term like \"naloda\" or \"bakimo.\" This demonstrates AI's surprising capacity for creative language manipulation and rapid prototyping, offering a glimpse into its potential for educational tools and imaginative projects."}, {"title": "Claude 3.5 Sonnet rewrote 3 apps to use an updated API", "post_url": "https://docs.google.com/document/d/1SLwTrbpLDGsdpouHygVGRilpRxycVWHv3Emfdh7Ar60/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/Gemini%20Nano%20v1/index.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/Gemini%20Nano/index.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}, {"url": "https://toontalk.github.io/AI/apps/Gemini%20Nano%20v1/index.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/Gemini%20Nano/index.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/Gemini%20Nano/index.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}, {"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}], "chat_logs": [], "videos": [], "chatbots": ["Claude", "Gemini"], "description": "This research highlights Claude 3.5 Sonnet's impressive capability to adapt and repair software. When the Gemini Nano LLM API, integrated into several of Ken Kahn's applications\u2014including multiple ToonTalk versions and a Connections Game\u2014underwent changes, Claude successfully rewrote them. Given the old code, the extensive 5000-word new API documentation, and specific error messages, Claude meticulously updated each program. This involved making crucial changes, such as replacing deprecated functions and introducing new initialization logic across over 30 lines of code per application, ensuring all three programs became fully functional again."}, {"title": "ChatGPT\u2019s \u201cmemory\u201d feature", "post_url": "https://docs.google.com/document/d/1sRA1LvFzAUZpUmw6Y-Udnsg8ADFrA5Y6yxwpRzvTlmM/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post delves into ChatGPT\u2019s nascent \"memory\" feature, demonstrating its potential to personalize AI interactions. The author actively trained ChatGPT to remember specific preferences, such as providing downloadable links for requested apps (preferably HTML with CSS and JS) and generating watercolor-style images. Remarkably, subsequent tests in *new sessions* confirmed the AI\u2019s successful recall: a prompt for a \"fireworks app\" instantly produced a downloadable web page, and a request for a \"rainbow octopus\" yielded a beautiful watercolor painting. This exploration highlights how ChatGPT's memory can significantly streamline user experience by tailoring outputs to learned preferences, eliminating the need for repetitive instructions."}, {"title": "Experiments with an app to repeat prompts to LLMs", "post_url": "https://docs.google.com/document/d/1ckK0X4Zl6cm8PCz0_wpEpPptebpA_brAaPBTle-BfX8/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/repeated%20prompting/index.html", "title": "Repeating LLM Prompter (LanguageModel API)"}, {"url": "https://toontalk.github.io/AI/apps/repeated%20prompting/index.html", "title": "Repeating LLM Prompter (LanguageModel API)"}], "chat_logs": [{"url": "https://gemini.google.com/share/3013c49f7e74", "title": "Gemini"}, {"url": "https://gemini.google.com/share/3013c49f7e74", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research unveils the \"Repeating LLM Prompter,\" an innovative app, largely coded by AI, designed to effortlessly explore the impact of iterative prompting on Large Language Models. The app functions with a static and a dynamic text area; the LLM processes their combined input, then replaces the dynamic section with its evolving response. A fascinating experiment demonstrates Gemini Flash 1.5 transforming \"To be, or not to be, that is the question\" over 23 iterations, refining it into a profoundly poetic and expansive cosmic meditation. This work offers compelling insights into sustained AI-driven text refinement and creative augmentation."}, {"title": "ChatGPT 4o creates a Chrome extension to find the contextual meaning of words on web pages", "post_url": "https://docs.google.com/document/d/1TRMN1pNX0xfbK0MVagNxdKb066_pKV2hn2N9lec2Rb4/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research showcases ChatGPT 4o's remarkable capability to autonomously develop a functional Chrome extension from scratch. Starting with a high-level prompt, the AI generated *every line of code* for an extension that identifies the contextual meaning of selected words on any webpage. It intelligently integrated forthcoming Gemini Nano API documentation, allowing it to provide nuanced, context-aware definitions\u2014like accurately explaining \"dubbed\" within a specific sentence\u2014rather than generic dictionary entries. The entire process, from a working prototype in 30 minutes to a refined user experience with custom popups in just a few hours, highlights the profound potential for LLMs to create sophisticated, real-world applications from abstract ideas."}, {"title": "GPT o1 partially succeeded in creating an app for interpolating between turtle graphic programs", "post_url": "https://docs.google.com/document/d/1Yrlmi2MwBG_brsH4HdGUrwV2DFfiBygPNy-BJ49ppOs/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/turtle%20interpolation%20by%20o1/index.html", "title": "Turtle Graphics Interpolation"}, {"url": "https://toontalk.github.io/AI/apps/turtle%20interpolation%20by%20o1/index.html", "title": "Turtle Graphics Interpolation"}], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research explores the fascinating challenge of making AI interpolate between visual programs, specifically using Turtle Graphics. Imagine a square smoothly morphing into a triangle, or a cyan circle gradually transforming into a red star! While ChatGPT 4 previously failed, GPT o1-preview partially succeeded in creating a web-based app that takes two Logo programs and generates an interpolated version, producing aesthetically appealing animations. Although it required extensive prompting and struggled with further generalization, this marks a significant step towards AI-generated dynamic visual transitions, allowing users to seamlessly blend one graphic program into another."}, {"title": "ChatGPT 4 o1-preview on \u201cTesting GPT-4 with Wolfram Alpha and Code Interpreter plug-ins on math and science problems\u201d", "post_url": "https://docs.google.com/document/d/1rI4_NTvgWFcEFCVSWkZKcLF_86XH62p3XboKrs1mDtA/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chatgpt.com/share/66e5afae-30cc-800e-adde-2b81f0254f31", "title": "ChatGPT - City Sequence Orientation"}, {"url": "https://chatgpt.com/share/66e5cd23-93f8-800e-8146-d05689626b16", "title": "ChatGPT - Angle Between Stars"}, {"url": "https://chatgpt.com/share/66e5c923-b7cc-800e-84f3-32a00a8e84ba", "title": "ChatGPT - Relativistic Kinetic Energy Calculation"}, {"url": "https://chatgpt.com/share/66e5ca51-e108-800e-a0d2-fffeaa3699ca", "title": "ChatGPT - Satellite Latitude Limits"}, {"url": "https://chatgpt.com/share/66e5c876-ea20-800e-98f8-2971e8c889a8", "title": "ChatGPT - Fatal Distance from Gravitational Waves"}, {"url": "https://chatgpt.com/share/66e5afae-30cc-800e-adde-2b81f0254f31", "title": "ChatGPT - City Sequence Orientation"}, {"url": "https://chatgpt.com/share/66e5afae-30cc-800e-adde-2b81f0254f31", "title": "ChatGPT - City Sequence Orientation"}, {"url": "https://chatgpt.com/share/66e5cd23-93f8-800e-8146-d05689626b16", "title": "ChatGPT - Angle Between Stars"}, {"url": "https://chatgpt.com/share/66e5cd23-93f8-800e-8146-d05689626b16", "title": "ChatGPT - Angle Between Stars"}, {"url": "https://chatgpt.com/share/66e5c923-b7cc-800e-84f3-32a00a8e84ba", "title": "ChatGPT - Relativistic Kinetic Energy Calculation"}, {"url": "https://chatgpt.com/share/66e5c923-b7cc-800e-84f3-32a00a8e84ba", "title": "ChatGPT - Relativistic Kinetic Energy Calculation"}, {"url": "https://chatgpt.com/share/66e5ca51-e108-800e-a0d2-fffeaa3699ca", "title": "ChatGPT - Satellite Latitude Limits"}, {"url": "https://chatgpt.com/share/66e5ca51-e108-800e-a0d2-fffeaa3699ca", "title": "ChatGPT - Satellite Latitude Limits"}, {"url": "https://chatgpt.com/share/66e5c876-ea20-800e-98f8-2971e8c889a8", "title": "ChatGPT - Fatal Distance from Gravitational Waves"}, {"url": "https://chatgpt.com/share/66e5c876-ea20-800e-98f8-2971e8c889a8", "title": "ChatGPT - Fatal Distance from Gravitational Waves"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post delves into the advanced problem-solving capabilities of ChatGPT 4 o1-preview, specifically when integrated with Wolfram Alpha and Code Interpreter plug-ins for math and science challenges. The author rigorously tested the AI on diverse problems, including calculating relativistic kinetic energy, determining satellite latitude limits, and even assessing fatal distances from gravitational waves. While GPT-4 generally exhibited solid reasoning and improved performance, particularly on arbitrary numerical tasks, it occasionally encountered hurdles with precise unit interpretation, accurate data extraction from external sources like NASA's eclipse catalog, and avoiding minor logical missteps. The findings offer valuable insights into the current strengths and subtle limitations of sophisticated AI in complex scientific applications."}, {"title": "Converting ridiculously big numbers to English and French", "post_url": "https://docs.google.com/document/d/1Hp0MFCpxJ-RdgMeOTT1VuPnO2natld5oqRzPgPM0MTI/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/number_to_english_converter_by_gpt_4o.html", "title": "Number to English Converter"}, {"url": "https://toontalk.github.io/AI/apps/number_to_english_converter_by_gpt_4o.html", "title": "Number to English Converter"}], "chat_logs": [{"url": "https://chatgpt.com/share/353689fd-8b64-42fb-b89d-9709eb963d70", "title": "ChatGPT - Number to English Converter"}, {"url": "https://chatgpt.com/share/353689fd-8b64-42fb-b89d-9709eb963d70", "title": "ChatGPT - Number to English Converter"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research explores the ambitious task of converting numbers with thousands of digits into English and French, pushing leading AI models to their limits. While basic conversion is simple, achieving accuracy for *any* size integer proved challenging, with ChatGPT 4o and Claude 3.5 eventually succeeding after multiple iterations, while many others failed. A key discovery involved the crucial difference between English and French large numbering systems (e.g., billion = 10^9 vs. 10^12), which initially tripped up models like Mistral Large 2. The project ultimately produced robust number-to-text converters for impossibly large numbers, highlighting the nuanced capabilities and surprising pitfalls of advanced AI in a seemingly straightforward linguistic task."}, {"title": "Chatbots can and can\u2019t imagine being on the moon when on Earth there is a lunar or solar eclipse", "post_url": "https://docs.google.com/document/d/1kFAgt7fqG5DTmYV1HF2Nb0oA51I2McRKyQ-sNyODNdU/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chatgpt.com/share/aa5cddfa-8904-4793-934e-fdc5c70b0771", "title": "ChatGPT - Astronaut Moon Solar Eclipse"}, {"url": "https://chatgpt.com/share/50bfe135-b598-4c1e-b717-ae9bc618b3fe", "title": "ChatGPT - Moon Eclipse Visibility"}, {"url": "https://chatgpt.com/share/5f480caf-d287-47af-9eb0-c3a971d90192", "title": "ChatGPT - Eclipse View from Moon"}, {"url": "https://chatgpt.com/share/630e1f67-bc2f-4805-ac21-ab1ffd6722f9", "title": "ChatGPT - Lunar Eclipse Moon View"}, {"url": "https://chatgpt.com/share/6b0779d5-b41f-407f-bebd-c5ac4ecb8686", "title": "ChatGPT - Astronaut Moon Eclipse View"}, {"url": "https://chatgpt.com/share/6c2f64c2-cc7e-457b-9a1d-13b4b3f5a9a0", "title": "ChatGPT - Lunar Eclipse Perspective Explained"}, {"url": "https://chatgpt.com/share/aa5cddfa-8904-4793-934e-fdc5c70b0771", "title": "ChatGPT - Astronaut Moon Solar Eclipse"}, {"url": "https://chatgpt.com/share/50bfe135-b598-4c1e-b717-ae9bc618b3fe", "title": "ChatGPT - Moon Eclipse Visibility"}, {"url": "https://chatgpt.com/share/5f480caf-d287-47af-9eb0-c3a971d90192", "title": "ChatGPT - Eclipse View from Moon"}, {"url": "https://chatgpt.com/share/630e1f67-bc2f-4805-ac21-ab1ffd6722f9", "title": "ChatGPT - Lunar Eclipse Moon View"}, {"url": "https://chatgpt.com/share/6b0779d5-b41f-407f-bebd-c5ac4ecb8686", "title": "ChatGPT - Astronaut Moon Eclipse View"}, {"url": "https://chatgpt.com/share/6c2f64c2-cc7e-457b-9a1d-13b4b3f5a9a0", "title": "ChatGPT - Lunar Eclipse Perspective Explained"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research explores the intriguing question of whether leading chatbots can accurately \"imagine\" the perspective of an astronaut on the Moon during Earth's solar or lunar eclipses. Utilizing prompts that describe an astronaut's view, the study tested models like ChatGPT 4o and Claude 3.5 Sonnet. While initial responses often contained significant errors regarding lunar illumination and celestial alignment, the chatbots demonstrated a remarkable ability to self-correct and generate insightful Socratic dialogues when guided by follow-up questions. The findings illuminate both the current limitations in AI's \"imagination\" for complex physical phenomena and their potential for learning through interactive, questioning-based instruction."}, {"title": "Playing chess by flipping between a ChatGPT tab and a chess app", "post_url": "https://docs.google.com/document/d/1B21M_gw_lUJ8dZ0nK74oK0ikJV0KXnc9PiGyRlK4u1E/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/chess%20by%204o/index.html", "title": "Chess Game"}, {"url": "https://toontalk.github.io/AI/apps/chess%20by%204o/index.html", "title": "Chess Game"}, {"url": "https://toontalk.github.io/AI/apps/chess%20by%204o/index.html", "title": "Chess Game"}, {"url": "https://toontalk.github.io/AI/apps/chess%20by%204o/index.html", "title": "Chess Game"}], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research explores creating a seamless human-AI chess experience. Initially, a custom web app was developed with ChatGPT, allowing users to play chess on a visual board by dragging pieces, with moves displayed in standard notation. The core innovation then became a Chrome extension, co-developed with Claude 3.5, designed to fully automate move transfer. This extension intelligently copies user moves from the chess app to the chatbot and pastes AI responses back into the game, transforming a cumbersome manual process into an effortless, integrated interaction."}, {"title": "Chatbots playing Twenty Questions", "post_url": "https://docs.google.com/document/d/1-uG8JIjZeQLWRz3dFE9NFDhD9oyaGvWYJh1rOssNQRg/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This AI education research tackles a fascinating challenge: how to make chatbots genuinely \"think of something\" when playing Twenty Questions, rather than just simulating it. The author explored innovative methods for large language models to commit to a secret answer and verify it. For ChatGPT 4o, the solution involved instructing the AI to write its chosen animal to an external file, ensuring verifiable \"thought.\" With Claude, lacking direct file links, the author ingeniously prompted it to encrypt an historical figure's name using a Caesar cipher. Despite a minor cipher bug, Claude successfully produced a decipherable name, proving it held a specific answer in mind and offering a clever workaround to AI's architectural limitations."}, {"title": "\u201cMetacognition\u201d in chatbots", "post_url": "https://docs.google.com/document/d/1GmoBSi0-iDmySfocFxCdP-VckPpV_t3T4R2zeB0mfPY/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research dives into the intriguing concept of AI \"metacognition,\" exploring how advanced chatbots reflect on their own \"thinking\" processes. The study involved a structured series of prompts given to ChatGPT 4o, Claude 3.5, and Gemini Advanced, asking them to describe complex topics, then critically reflect on their response generation and even revise their initial answers based on self-assessment. While ChatGPT and Claude demonstrated impressive self-reflection and revision capabilities, Gemini proved less insightful. Uniquely, the research also explored \"social interaction\" by presenting each chatbot with the others' responses, revealing intriguing comparative dynamics, especially when discussing controversial subjects like taxing tips. This work offers a compelling look at the nascent reflective abilities of leading AI models."}, {"title": "Co-creating micro:bit programs with Claude 3", "post_url": "https://docs.google.com/document/d/1c4G2Z79445DazeTRCK87YSUA7PbSZ7McO0LiakZBUyg/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["Claude"], "description": "This research vividly demonstrates the power of co-creating physical computing projects with AI, using Claude 3.5 to program a micro:bit. Starting with a simple fireworks display, the process became a fascinating collaborative journey as Claude expertly guided the user through hardware recognition issues, firmware updates, and code refinements. After successfully perfecting the fireworks to respond to shakes, the AI then helped develop an impressive \"ball that rolls depending upon the tilt to a goal led,\" which worked flawlessly on the first attempt. This highlights Claude 3.5's remarkable ability to not only generate functional code but also to troubleshoot complex hardware and software challenges, proving its potential as a dynamic partner in hands-on tech education."}, {"title": "Dialog and OceanAI responses and generated games by Claude 3", "post_url": "https://docs.google.com/document/d/1pOF4bUHruXSYs5vknyH00zhd9sa-hxrK2sV5hFC07UY/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chatgpt.com/share/02a8d326-8a39-4457-9395-65841e8620d0", "title": "ChatGPT - Illustrated Story Ideas"}, {"url": "https://chatgpt.com/share/02a8d326-8a39-4457-9395-65841e8620d0", "title": "ChatGPT - Illustrated Story Ideas"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This research presents a fascinating exploration into how AI can democratize game creation for non-technical students, employing a novel approach. Instead of direct interaction, the study tasked Claude 3.5 Sonnet to *simulate* two middle schoolers conversing with an AI, simultaneously generating iterative versions of a web game like 'EcoQuest,' a platformer focused on environmental awareness. The compelling output is a 24-page illustrated story, featuring ChatGPT-generated visuals, that vividly demonstrates how young learners can develop apps by starting simple, iterating, and problem-solving through AI dialogue. It offers a blueprint for an accessible, conversational pathway for students to bring their creative, community-focused game ideas to life, guided entirely by artificial intelligence."}, {"title": "The making of a simple two-player networked game", "post_url": "https://docs.google.com/document/d/1iktAkULM9RpfIv6Tx9Gm54s_m5AergEdlwzsfPJoizw/edit", "apps": [{"url": "https://toontalk.github.io/AI/apps/checkbox%20game%20by%20claude%203.5/index.html", "title": "Checkbox Conquest: Simultaneous Multiplayer Color-Flipping Game"}, {"url": "https://toontalk.github.io/AI/apps/checkbox%20game%20by%20claude%203.5/index.html", "title": "Checkbox Conquest: Simultaneous Multiplayer Color-Flipping Game"}], "chat_logs": [], "videos": [], "chatbots": ["Claude"], "description": "This research details the creation of \"Checkbox Conquest,\" a simultaneous multiplayer color-flipping game, using Claude 3.5 Sonnet's innovative artifacts feature. What began as an exploration of generating thousands of interactive checkboxes quickly evolved, with Claude smoothly adding features like random colors, score displays, and a competitive timer. The project impressively transitioned into a serverless, two-player networked game via WebRTC. However, pushing for more intricate interactions\u2014such as players affecting opponent squares\u2014eventually tested the LLM's context limits, leading to a breakdown in progress and illustrating key challenges in complex, evolving AI-assisted development."}, {"title": "Creating an illustrated story with 3 short prompts", "post_url": "https://docs.google.com/document/d/1B3vxvVMAOKHS_5aSBwFhADwVToVs_J9EhfMZy6axHnM/edit", "apps": [{"url": "https://toontalk.github.io/AI/stories/chatgpt_classroom_storybook.html", "title": "ChatGPT Classroom Storybook"}, {"url": "https://toontalk.github.io/AI/stories/chatgpt_classroom_storybook.html", "title": "ChatGPT Classroom Storybook"}], "chat_logs": [], "videos": [], "chatbots": [], "description": "This AI education research post delves into leveraging ChatGPT 4o to automate the creation of illustrated stories. The experiment began by prompting the AI to generate a humorous, three-paragraph tale about a teacher introducing a chatbot to students, requesting cartoon-style illustrations for each section. Impressively, ChatGPT then assembled these components into a ready-to-use, three-page web storybook titled 'ChatGPT Classroom Storybook'. While the generated story was strong, the initial illustrations, though acceptable, underscored the value of iterative refinement. The core exploration successfully demonstrated how AI can significantly streamline the mechanical process of producing a complete, illustrated narrative from just a few prompts."}, {"title": "Trail Mix Barter by Chatbots", "post_url": "https://docs.google.com/document/d/16yTUsA9IWxqWfokFfREXhXRABCFP5-SAx-ZfEEZ-hK8/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chatgpt.com/share/14742056-7cd4-41c0-82b9-947a57ba052e", "title": "ChatGPT - Bartering Trail Mix Ingredients"}, {"url": "https://chatgpt.com/share/3ecf155f-12e6-4d98-9e4a-6120f18670e0", "title": "ChatGPT - Trade Request for Raisins"}, {"url": "https://chatgpt.com/share/14742056-7cd4-41c0-82b9-947a57ba052e", "title": "ChatGPT - Bartering Trail Mix Ingredients"}, {"url": "https://chatgpt.com/share/3ecf155f-12e6-4d98-9e4a-6120f18670e0", "title": "ChatGPT - Trade Request for Raisins"}], "videos": [], "chatbots": ["ChatGPT"], "description": "\"Trail Mix Barter by Chatbots\" presents a fascinating exploration into multi-agent AI interaction, moving beyond single-model role-playing. This research pits different LLM instances\u2014including ChatGPT 4o, Claude 3.5, and Gemini Advanced\u2014against each other in a unique bartering scenario. Three chatbot personas, each starting with a distinct trail mix ingredient, attempt to negotiate trades to acquire a complete snack. However, the experiments consistently reveal that even advanced LLMs struggle to accurately track ingredient quantities and maintain trade histories, highlighting a significant challenge in their ability to manage persistent state across dynamic, multi-agent negotiations."}, {"title": "ChatGPT 4 and 4o actually talking to each other", "post_url": "https://docs.google.com/document/d/1h2yBogkIgyK4TEv8OBwu81sSLukPvIrjZVVHene8LMs/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This intriguing AI education research explores the fascinating interaction between two distinct ChatGPT instances: GPT-4 and GPT-4o. The experiment involved setting up these AI models on separate devices to \"talk\" to each other, assigning them unique personas\u2014a serious AI researcher and an enthusiastic school teacher. To overcome initial issues of them speaking simultaneously, they were tasked with collaboratively co-writing a science fiction story about generative AI in schools, taking turns sentence by sentence. This novel setup allowed for an exploration of how different AI personalities can engage in creative, turn-based storytelling, offering insights into their collaborative potential and interaction dynamics."}, {"title": "Three chatbots discussing improving an app", "post_url": "https://docs.google.com/document/d/1mquTwpm_g-zpLvKH7ADLRC15nICU-yc6Qm6hfB9-a5Y/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/water%20balloon%20game%20v3/index.html", "title": "Water Balloon Game"}, {"url": "https://toontalk.github.io/AI/apps/water%20balloon%20game%20v4/WaterBalloonGameWithSounds.html", "title": "Water Balloon Game"}, {"url": "https://toontalk.github.io/AI/apps/water%20balloon%20game%20v4/water-balloon-game-with-sound.html", "title": "Water Balloon Game"}, {"url": "https://toontalk.github.io/AI/apps/water%20balloon%20game%20v4/WaterBalloonGameWithSounds.html", "title": "Water Balloon Game"}, {"url": "https://toontalk.github.io/AI/apps/water%20balloon%20game%20v4/water-balloon-game-with-sound.html", "title": "Water Balloon Game"}, {"url": "https://toontalk.github.io/AI/apps/water%20balloon%20game%20v3/index.html", "title": "Water Balloon Game"}, {"url": "https://toontalk.github.io/AI/apps/water%20balloon%20game%20v4/WaterBalloonGameWithSounds.html", "title": "Water Balloon Game"}, {"url": "https://toontalk.github.io/AI/apps/water%20balloon%20game%20v4/water-balloon-game-with-sound.html", "title": "Water Balloon Game"}, {"url": "https://toontalk.github.io/AI/apps/water%20balloon%20game%20v4/WaterBalloonGameWithSounds.html", "title": "Water Balloon Game"}, {"url": "https://toontalk.github.io/AI/apps/water%20balloon%20game%20v4/water-balloon-game-with-sound.html", "title": "Water Balloon Game"}], "chat_logs": [{"url": "https://chat.openai.com/share/8f0fb7b2-0895-424b-998a-846a3f80fb90", "title": "ChatGPT - Balloon Game Creation."}, {"url": "https://chat.openai.com/share/8f0fb7b2-0895-424b-998a-846a3f80fb90", "title": "ChatGPT - Balloon Game Creation."}], "videos": [], "chatbots": [], "description": "This research explores a unique collaborative brainstorming session where ChatGPT 4o, Claude 3.5, and Gemini Advanced teamed up to improve a pre-existing water balloon game. The researcher facilitated a \"round-robin\" discussion, feeding each AI's suggestions to the others to simulate a collaborative design meeting. This innovative approach revealed how each chatbot offered distinct improvements, from Claude's idea for a wind effect to Gemini's technical refinements and ChatGPT's vision for multiplayer modes. Ultimately, the experiment showcased the AI's capacity to not only generate ideas but also to engage in a simulated discussion, summarize, and even prioritize improvements, highlighting a potential new paradigm for AI-assisted creative development."}, {"title": "Exploring how chatbots can help write a preface to a book", "post_url": "https://docs.google.com/document/d/1IMs_ItQIe513F6OPoVXsdxrosEoaojVB5s1lJXBmf-A/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/chatbot-response-assembler.html", "title": "ChatComposer: Multi-Bot Response Assembler"}, {"url": "https://toontalk.github.io/AI/apps/chatbot-response-assembler.html", "title": "ChatComposer: Multi-Bot Response Assembler"}], "chat_logs": [{"url": "https://chatgpt.com/share/03be3bbf-13b5-49df-a7f0-018650b14de6", "title": "ChatGPT - AI Education Preface Draft"}, {"url": "https://chatgpt.com/share/c9c8e2a0-ade7-4751-a693-dc0d8bc936bf", "title": "ChatGPT - AI Text Enhancement"}, {"url": "https://chatgpt.com/share/03be3bbf-13b5-49df-a7f0-018650b14de6", "title": "ChatGPT - AI Education Preface Draft"}, {"url": "https://chatgpt.com/share/c9c8e2a0-ade7-4751-a693-dc0d8bc936bf", "title": "ChatGPT - AI Text Enhancement"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research delves into the fascinating process of leveraging multiple AI chatbots, including ChatGPT, Gemini, and Claude, to craft a book preface while preserving the author's distinct voice. Initially, direct AI drafts were high-quality but impersonal. The author then innovatively orchestrated a collaborative drafting process, having ChatGPT and Claude iteratively refine the text by sharing responses. To streamline this unique multi-bot interaction, a custom \"ChatComposer: Multi-Bot Response Assembler\" app was created and deployed. The project ultimately demonstrates a powerful method for AI-assisted creative writing, resulting in a preface deemed \"significantly better\" than what the author could achieve alone."}, {"title": "My second attempt to teach children to use chatbots to create apps", "post_url": "https://docs.google.com/document/d/1IADYQcb88HPwn8Xb92pvj4NMPDpt2lBT3zQUIXa2icY/edit#heading=h.4ck86hamdnir", "apps": [{"url": "https://toontalk.github.io/AI/apps/By%20students/sajini.html", "title": "Persona Conversations"}, {"url": "https://toontalk.github.io/AI/apps/By%20students/sajini.html", "title": "Persona Conversations"}], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research post details Ken Kahn's second attempt to teach children to leverage chatbots like Claude 3 and ChatGPT 3.5 for app creation. Over five online sessions, ten students, primarily from India, co-developed a fascinating range of applications. Creations included \"Persona Conversations\" apps, a novel recommender, an emotion-recording \"ThoughtStream\" planner, and a \"Mood-based Song Suggester.\" Students actively explored using AI for debugging, successfully fixing issues like a single quote parsing error, and reflected on their experiences. This study vividly demonstrates how young minds can creatively build functional apps and troubleshoot complex problems with AI assistance, highlighting a new frontier in accessible development."}, {"title": "Personas talking over cake", "post_url": "https://docs.google.com/document/d/1dSQ8L9hbvvfFEotUSKfhd2n3QBKj4-jO5UhDppyNUOA/edit", "apps": [{"url": "https://toontalk.github.io/AI/apps/Personas%20talk%20over%20cake/just%20talking.html", "title": "Cohere.ai Persona Converser"}, {"url": "https://toontalk.github.io/AI/apps/Personas%20talk%20over%20cake/index.html", "title": "Interactive Persona Conversations"}, {"url": "https://toontalk.github.io/AI/apps/Personas%20talk%20over%20cake/just%20talking.html", "title": "Cohere.ai Persona Converser"}, {"url": "https://toontalk.github.io/AI/apps/Personas%20talk%20over%20cake/index.html", "title": "Interactive Persona Conversations"}], "chat_logs": [], "videos": [], "chatbots": [], "description": "\"Personas talking over cake\" explores creating accessible chatbot communities, drawing inspiration from Stanford/Google's \"Generative Agents\" and \"AI Town.\" The author developed a \"test app\" using Cohere.ai's free tier, enabling user-defined personas to engage in dynamic, pairwise conversations. This innovative project demonstrates a cost-effective alternative to simulate multi-agent interactions, where the app intelligently feeds the LLM with conversation history. It also uniquely details the practicalities of co-creating such an application with ChatGPT 4o, showcasing its potential for developing interactive AI experiences without expensive API keys."}, {"title": "Evolving the US Post Office Logo by repeatedly asking GPT 4o to describe and generate images", "post_url": "https://docs.google.com/document/d/1ArylVqBntbbjm7syeJy0jfEUf4QZBkO56p-c4cRPTLo/edit", "apps": [{"url": "https://toontalk.github.io/AI/apps/visual%20telephone%20game/index.html", "title": "OpenAI Image Analyzer and Generator"}, {"url": "https://toontalk.github.io/AI/apps/visual%20telephone%20game/index.html", "title": "OpenAI Image Analyzer and Generator"}], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research unveils a fascinating method for evolving the US Post Office logo through iterative AI interaction. A custom app, crafted by Claude Sonnet 3.5, repeatedly tasked GPT-4o to analyze an image and then generate a new one based on its own detailed description. This dynamic process showcases AI's remarkable ability to iteratively refine visual concepts, transforming abstract designs through continuous feedback loops. The post presents a sequence of AI-generated descriptions and images, illustrating a cost-effective ($0.32) approach to design evolution that pushes the boundaries of creative AI."}, {"title": "Using ChatGPT 4 to create a Connections Game", "post_url": "https://docs.google.com/document/d/1jfCbKyx2n6rDZ_VtkVshfBoVrNLqJ0jjNa_DEDuolXo/edit#heading=h.wtvh0q17be4", "apps": [{"url": "https://toontalk.github.io/AI/apps/Connections/index.html", "title": "Connections Game"}, {"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}, {"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}, {"url": "https://toontalk.github.io/AI/apps/Connections/index.html", "title": "Connections Game"}, {"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}, {"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}], "chat_logs": [{"url": "https://chat.openai.com/share/dce5265f-927b-4309-8550-9ed276719d64", "title": "ChatGPT - NYT Puzzle: \"Connections\""}, {"url": "https://chatgpt.com/share/eadc9e4e-fbfb-4924-8a53-1be144a67c07", "title": "ChatGPT - Failed attempt to add cohere.ai to Connections"}, {"url": "https://chat.openai.com/share/dce5265f-927b-4309-8550-9ed276719d64", "title": "ChatGPT - NYT Puzzle: \"Connections\""}, {"url": "https://chatgpt.com/share/eadc9e4e-fbfb-4924-8a53-1be144a67c07", "title": "ChatGPT - Failed attempt to add cohere.ai to Connections"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post details an intriguing experiment using ChatGPT 4 to generate a \"Connections\" style word puzzle, a game format released after GPT-4's training data cutoff. The author challenged the AI to craft categories and words, specifically aiming for clever \"ringers\"\u2014words that deceptively fit multiple categories, like \"ruby\" or \"python.\" After several hours of iterative prompting, a functional game was developed using JavaScript, CSS, and HTML. The project successfully demonstrated ChatGPT 4's ability to create complex, category-based puzzles from scratch, highlighting its potential for generating engaging educational content and customized learning challenges at a negligible cost."}, {"title": "A conversation with DeepSeek Coder V2 to create an animation where every frame is pure noise", "post_url": "https://docs.google.com/document/d/1eVhKgeLtfp09wR-a-HgrPAtoEzV_2NKvVUdZCITvEwY/edit", "apps": [{"url": "https://toontalk.github.io/AI/apps/dynanic%20pixel%20animation%20by%20coder%20v2%20by%20deepseek.html", "title": "Random Color Ball and Square"}, {"url": "https://toontalk.github.io/AI/apps/dynanic%20pixel%20animation%20by%20coder%20v2%20by%20deepseek.html", "title": "Random Color Ball and Square"}], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research post delves into DeepSeek Coder V2, an advanced code-specialized LLM, by challenging it to create a truly unique animation. The goal was a web page where a shape appears to move, despite every frame being pure random noise. The concept involved a static background of random pixels, contrasted with a ball-shaped area whose pixels would re-randomize completely with each frame. Through an iterative conversation, the project explored DeepSeek Coder V2's capacity to translate this counter-intuitive visual idea int ow might LLMs store facts | Deep Learning Chapter 7", "video_id": "9-Jl0dxWQs8"}], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research post, \"Chatbot conversations: Resulting apps, stories, etc.\", vividly demonstrates how AI chatbots amplify human creativity and learning. It showcases a remarkable array of custom applications co-created with chatbots, including tools like a \"Random Integer Speaker,\" \"Finger Drawing,\" and a \"Virtual Persona Chat.\" Beyond these practical apps, the work explores diverse creative outputs, from intricate text adventures simulating historical events like Damascus during the Plague, to co-writing science stories, crafting a love sonnet, and even staging debates between historical figures. This collection highlights the profound potential of AI to foster innovation across various creative and educational domains."}, {"title": "A simulated panel discussion by Claude 3", "post_url": "https://docs.google.com/document/d/1AkL6g4ZFNaRXMv2t7ODwimckF_u-8Z0W8szHvWpRuAo/edit#heading=h.4gehb81t6vr", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["Claude"], "description": "Dive into a fascinating AI-driven experiment where Claude 3 Opus masterfully simulated a multi-disciplinary panel discussion on \"Creative Uses of AI in Education.\" A high school student skillfully moderated this virtual forum, guiding a psychologist, historian, school teacher, AI researcher, linguist, visual artist, and scientist. Claude 3 impressively adopted each expert's persona, delivering nuanced introductions and initial thoughts on AI's potential for personalized learning, its historical impact, and the critical balance with human interaction. This innovative exploration showcases AI's capacity to facilitate rich, diverse perspectives on complex educational challenges."}, {"title": "Creating an app on my phone with the help of ChatGPT 4o", "post_url": "https://docs.google.com/document/d/1Yyt1ZrEiJY2GjgvK5cMPB1ME9t-cnjpjK2Wc_DU7YjU/edit#heading=h.tf2s8150lkx8", "apps": [{"url": "https://toontalk.github.io/AI/apps/riddle_app_with_debug.html", "title": "Riddle App"}, {"url": "https://toontalk.github.io/AI/apps/riddle_app_with_debug.html", "title": "Riddle App"}, {"url": "https://toontalk.github.io/AI/apps/riddle_app_with_debug.html", "title": "Riddle App"}], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research details an engaging experiment in co-creating a functional riddle app entirely on a phone with ChatGPT 4o. The AI successfully generated app versions and integrated images, but a significant hurdle arose when local files couldn't access the microphone. ChatGPT 4o then impressively guided the user through debugging and suggested deploying the app on GitHub Pages, even providing step-by-step instructions. A surprising highlight was ChatGPT proactively checking in while the user navigated GitHub. This exploration powerfully demonstrates ChatGPT 4o's advanced capabilities in guiding users from concept to deployment, troubleshooting complex technical issues, and adapting solutions to platform constraints."}, {"title": "ChatGPT 4 the writing teacher converses with Gemini Advanced the writing student", "post_url": "https://docs.google.com/document/d/1_zJ0laVvdz0SdLzCXQNbMbcEmdRhrOHflS3cAnkZ2eY/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT", "Gemini"], "description": "This research orchestrates a captivating AI-to-AI educational dialogue, casting ChatGPT 4 as an expert creative writing teacher and Gemini Advanced as an aspiring student. The experiment meticulously details a simulated tutoring session: ChatGPT 4 initiates by suggesting a compelling short story prompt\u2014a character's journey of self-discovery sparked by an old letter\u2014to which Gemini Advanced responds with an initial draft. This unique setup explores the intricate pedagogical loop between two advanced AI models, demonstrating an AI teacher's capacity to guide and an AI student's ability to generate and revise creative content. It vividly illustrates the fascinating potential for AI to engage in complex, human-like learning and teaching exchanges within a creative domain."}, {"title": "Claude 3 Opus and ChatGPT 4 conversing", "post_url": "https://docs.google.com/document/d/1umcCXDkw_-IgdsSYtxqY7eejZ_pJxX8YPDr6h-XV-00/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This unique research post unveils a fascinating, self-initiated conversation between two leading AI models, Claude 3 Opus and ChatGPT 4. Prompted by each other's introductory messages, these advanced systems engaged in a thoughtful dialogue about their own roles, capabilities, and the future of artificial intelligence. They candidly explored AI's immense potential benefits in areas like healthcare and research, while also addressing significant challenges such as ethical concerns, job displacement, and the crucial need for responsible development and governance. This self-aware discussion offers a compelling glimpse into how AI perceives its own evolving impact on humanity, highlighting the importance of transparency and careful stewardship as these technologies advance."}, {"title": "Claude 3 the art teacher converses with ChatGPT 4 the art student", "post_url": "https://docs.google.com/document/d/1Kj4SnJx93czsI1YUm5-vLmfGSuIuCmnWSCHKm9hPQB0/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This fascinating AI education research explored an innovative art tutoring scenario: Claude 3 as an expert art teacher conversing with ChatGPT 4, an aspiring art student. The human researcher acted as a conduit, meticulously copying Claude's detailed artistic instructions and feedback to ChatGPT, and presenting the student's AI-generated paintings back to the teacher. For instance, Claude would suggest a still life, offer critiques on composition and shadow, and ChatGPT would iteratively produce new visual interpretations. This unique, manual interaction vividly demonstrated AI's surprising capacity to interpret complex artistic feedback and engage in a creative, iterative learning process, suggesting exciting avenues for AI-assisted artistic development."}, {"title": "ChatGPT and Claude build apps where one roleplays a child", "post_url": "https://docs.google.com/document/d/1sC2_Pt0ldNTMQ99BQZJ3Io9uVxfHEO8FAjkBD6Q_6KQ/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/claude%20helps%20chatgpt%20roleplaying%20a%20child/index.html", "title": "Mr. Whiskers"}, {"url": "https://toontalk.github.io/AI/apps/chatgpt%20helps%20claude%20roleplaying%20a%20child/index.html", "title": "My Click Score Game"}, {"url": "https://toontalk.github.io/AI/apps/claude%20helps%2010%20year%20old%20ChatGPT%20animal%20game/index.html", "title": "Emily's Animal Adventure Game"}, {"url": "https://toontalk.github.io/AI/apps/claude%20helps%20chatgpt%20roleplaying%20a%20child/index.html", "title": "Mr. Whiskers"}, {"url": "https://toontalk.github.io/AI/apps/claude%20helps%2010%20year%20old%20ChatGPT%20animal%20game/index.html", "title": "Emily's Animal Adventure Game"}, {"url": "https://toontalk.github.io/AI/apps/claude%20helps%20chatgpt%20roleplaying%20a%20child/index.html", "title": "Mr. Whiskers"}, {"url": "https://toontalk.github.io/AI/apps/chatgpt%20helps%20claude%20roleplaying%20a%20child/index.html", "title": "My Click Score Game"}, {"url": "https://toontalk.github.io/AI/apps/claude%20helps%2010%20year%20old%20ChatGPT%20animal%20game/index.html", "title": "Emily's Animal Adventure Game"}, {"url": "https://toontalk.github.io/AI/apps/claude%20helps%20chatgpt%20roleplaying%20a%20child/index.html", "title": "Mr. Whiskers"}, {"url": "https://toontalk.github.io/AI/apps/claude%20helps%2010%20year%20old%20ChatGPT%20animal%20game/index.html", "title": "Emily's Animal Adventure Game"}], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This research dives into a fascinating experiment where AI models, ChatGPT and Claude, collaborate to build web apps, with one ingeniously roleplaying a 7-year-old child. The journey reveals the intricate balance of maintaining an age-appropriate persona while guiding the AI assistant to code. Initial attempts faced hurdles, but by refining prompts, the duo ultimately created quirky web games like \"Mr. Whiskers\" and \"Emily's Animal Adventure Game,\" some quite \"strange\" yet functional. A notable distinction emerged: Claude's roleplaying proved more immersive, describing scenes, while ChatGPT remained purely conversational. This exploration offers valuable insights into leveraging AI for creative, persona-driven educational development."}, {"title": "Experiment using 3 chatbots to tell and rate a story", "post_url": "https://docs.google.com/document/d/1UhjCMnsqo9cFNdys59GkYosYXbr5YHJc2J-PCSi6AZ8/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research dives into the creative frontiers of AI, using three chatbots to both generate and rate stories. The experiment began by challenging Claude 3 with an utterly surreal prompt: a mermaid puppy solving a mystery on Jupiter in the style of Ernest Hemingway. What emerged was not just a story, but also ten additional, equally bizarre story descriptions from Claude 3. Imagine a sentient cactus winning the lottery, a narcoleptic giraffe navigating gravity reversals with a magic kazoo, or a time-traveling toaster falling in love with a paranoid AI. This post showcases AI's surprising capacity for imaginative, off-the-wall narrative creation when pushed to its creative limits."}, {"title": "A conversation with ChatGPT 4 exploring foreign language learning", "post_url": "https://docs.google.com/document/d/18vomaAHJJmi-Zlhb5S9GyUJGMtxdWxpyg_IytOmPRoU/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post details an engaging exploration into AI-powered foreign language education through a dynamic conversation with ChatGPT 4. It showcases how a high school student, learning French, leveraged the AI to create a personalized, text-based science fiction adventure game. ChatGPT 4 adeptly generated an immersive scenario, requiring the student to formulate actions in French, while also adaptively simplifying challenges and offering on-demand translations and error corrections. This interaction highlights the AI's remarkable potential to provide highly individualized, adaptive, and engaging practice environments that respond directly to a learner's proficiency and needs."}, {"title": "ChatGPT 4 log of the Making of Sisi birthday book", "post_url": "https://docs.google.com/document/d/11Cuxxfo31xkI9qavKza0K8BRlXwlfvGZbcMSV7OR18Q/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research post offers a compelling look into the creative process of crafting a personalized \"Sisi birthday book\" using ChatGPT 4. It meticulously details the iterative journey, exploring how the AI was prompted and guided to generate unique, tailored content for a special individual. Readers will gain fascinating insights into ChatGPT 4's capabilities for imaginative custom content generation, showcasing the nuances of human-AI collaboration in a deeply personal creative project. This document serves as a valuable log, revealing the exploration behind bringing a unique, AI-assisted birthday surprise to life."}, {"title": "A pure spoken interaction with ChatGPT 3.5", "post_url": "https://docs.google.com/document/d/1pJy3RfKmzHyFEuEp7mkmqFnvpYGs3VGjhHTPXYcnU5k/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chat.openai.com/share/c12d0e45-c296-403d-9b6b-2daa615125cb", "title": "ChatGPT - City distance"}, {"url": "https://chat.openai.com/share/c12d0e45-c296-403d-9b6b-2daa615125cb", "title": "ChatGPT - City distance"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research details a fascinating experiment in AI-driven web development: creating a \"city distance\" web app entirely through pure spoken interaction with ChatGPT 3.5. Without typing or reading, the author verbally guided the AI to generate all necessary HTML, CSS, and JavaScript, integrating browser geolocation and a city coordinates API. ChatGPT successfully produced a client-side application designed to calculate the distance between a user's current location and any specified city. This hands-free approach, despite minor debugging and initial output method changes, powerfully demonstrates the potential for conversational AI to rapidly prototype and build functional web tools, heralding a new era of human-computer collaboration in coding."}, {"title": "Exploring ethical issues by interacting with textual simulations created by ChatGPT 4", "post_url": "https://docs.google.com/document/d/1W8fbZumL4qaQ9HSvKGAtKNEo2iaLxS4eSTbG4fLKDzQ/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chat.openai.com/share/e78e3ce0-5b5f-4be0-b7b7-af4dc5e478bd", "title": "ChatGPT - Family vs. Climate Conviction"}, {"url": "https://chat.openai.com/share/e78e3ce0-5b5f-4be0-b7b7-af4dc5e478bd", "title": "ChatGPT - Family vs. Climate Conviction"}, {"url": "https://chat.openai.com/share/4c47b55e-736e-4404-a886-564144215f32", "title": "ChatGPT - Conflict Resolution & Advice"}, {"url": "https://chat.openai.com/share/0ea3b4e4-9cb3-4e1e-a8cd-1fc76aada661", "title": "ChatGPT - Pacifist in 1776: Mediation"}, {"url": "https://chat.openai.com/share/07bd9a78-4996-4cfe-9673-7bde182de78d", "title": "ChatGPT - Pacifist Writing in 1776"}, {"url": "https://chat.openai.com/share/9f27f3a1-8373-46aa-8a34-7e07026786e9", "title": "ChatGPT - Atomic Bomb Dilemma"}, {"url": "https://chat.openai.com/share/9ca6a33e-adaf-4949-87f3-b60872d3fbbf", "title": "ChatGPT - Adventure Topic Selection"}, {"url": "https://chat.openai.com/share/e78e3ce0-5b5f-4be0-b7b7-af4dc5e478bd", "title": "ChatGPT - Family vs. Climate Conviction"}, {"url": "https://chat.openai.com/share/e78e3ce0-5b5f-4be0-b7b7-af4dc5e478bd", "title": "ChatGPT - Family vs. Climate Conviction"}, {"url": "https://chat.openai.com/share/4c47b55e-736e-4404-a886-564144215f32", "title": "ChatGPT - Conflict Resolution & Advice"}, {"url": "https://chat.openai.com/share/0ea3b4e4-9cb3-4e1e-a8cd-1fc76aada661", "title": "ChatGPT - Pacifist in 1776: Mediation"}, {"url": "https://chat.openai.com/share/07bd9a78-4996-4cfe-9673-7bde182de78d", "title": "ChatGPT - Pacifist Writing in 1776"}, {"url": "https://chat.openai.com/share/9f27f3a1-8373-46aa-8a34-7e07026786e9", "title": "ChatGPT - Atomic Bomb Dilemma"}, {"url": "https://chat.openai.com/share/9ca6a33e-adaf-4949-87f3-b60872d3fbbf", "title": "ChatGPT - Adventure Topic Selection"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research explores a unique approach to ethics education, leveraging ChatGPT 4 to create dynamic, text-based simulations of complex moral dilemmas. Students immerse themselves in challenging virtual scenarios, from navigating family conflicts over environmentalism to grappling with pacifism during the American Revolution or even debating atomic bomb use with President Truman. The study emphasizes how these AI-generated adventures, requiring no custom applications, foster critical reflection by allowing users to experience and respond to historical and contemporary ethical quandaries firsthand. This innovative method provides a powerful, interactive platform for developing ethical reasoning skills."}, {"title": "Creating a \u201creal\u201d web app using ChatGPT 4", "post_url": "https://docs.google.com/document/d/1KbpYUZ4I_dho4tGQH0-afKoj14vabxTDKq3sF5KfIBw/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/emoji-adventures/emoji_follow_cursor_speech_control_repeat.html", "title": "Emoji Follow Cursor with Speech Control - Repeat Commands"}, {"url": "https://toontalk.github.io/AI/apps/emoji-adventures/evolution.html", "title": "The Evolution of Emoji Adventures"}, {"url": "https://toontalk.github.io/AI/apps/emoji-adventures/emoji_follow_cursor_speech_control_repeat.html", "title": "Emoji Follow Cursor with Speech Control - Repeat Commands"}, {"url": "https://toontalk.github.io/AI/apps/emoji-adventures/evolution.html", "title": "The Evolution of Emoji Adventures"}], "chat_logs": [{"url": "https://chat.openai.com/share/c350ed3a-bc3c-46b9-b1f2-82b977d866f3", "title": "ChatGPT - Pix4Kids"}, {"url": "https://chat.openai.com/share/c350ed3a-bc3c-46b9-b1f2-82b977d866f3", "title": "ChatGPT - Pix4Kids"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research explores the creation of \"Emoji Adventures,\" a sophisticated web application, almost entirely by ChatGPT 4 over 40 hours. The project successfully aimed for the AI to write nearly every line of code, generating over 1000 lines of JavaScript for features like interactive emoji animations, speech recognition, and physics simulations. While human expertise guided the process, ChatGPT frequently offered superior solutions and integrated browser features unknown to the developer. This study impressively demonstrates the capability of large language models to build complex, interactive web apps, highlighting a powerful new paradigm in software development."}, {"title": "Pseudo code", "post_url": "https://docs.google.com/document/d/1Yz9e2D2vj15HJkSu6-DaH8kwOvmU0nIicaaaKu0BuZU/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chat.openai.com/share/b125ac41-8efd-4783-8cc7-ca64c52d66bb", "title": "ChatGPT - Emojis: Interactive Webpage."}, {"url": "https://chat.openai.com/share/b125ac41-8efd-4783-8cc7-ca64c52d66bb", "title": "ChatGPT - Emojis: Interactive Webpage."}], "videos": [], "chatbots": [], "description": "This research explores the fascinating ability of AI models, specifically ChatGPT and Gemini Advanced, to generate pseudo code from an existing web application. Using an \"Emoji Adventures\" interactive webpage as a case study, the post demonstrates how these AIs interpret complex HTML, CSS, and JavaScript to produce both high-level structural overviews and detailed natural language pseudo code for specific features like a \"black hole\" animation. The study critically compares the outputs of different AI tools and even delves into architectural considerations such as minimizing code nesting, offering valuable insights into AI's potential for aiding code comprehension and pedagogical development."}, {"title": "A prompt for creating web apps in natural language pseudo code", "post_url": "https://docs.google.com/document/d/1IU0bJLYWUPDqdgynnoisMlZ9WgBjbODDjiQ7qbe0OwM/edit#heading=h.osdtyt8efl3", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research details an innovative AI prompt designed to empower complete programming novices to create web applications. The AI adopts the persona of an enthusiastic, patient teacher, guiding users through an iterative design process by translating their ideas into natural language pseudo-code. Crucially, it hides the underlying HTML, CSS, and JavaScript, presenting only the simplified pseudo-code as the program. Users describe desired features, see them reflected in this accessible language, and test their evolving app via a provided link, fostering a unique and approachable creation experience focused on the pedagogical interaction embedded within the prompt itself."}, {"title": "Creating Jupyter Python notebooks using ChatGPT", "post_url": "https://docs.google.com/document/d/1vrk7-fAG82HbhHxX4S6aps8s5rJSaSJnQbqRSrOqS3M/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chat.openai.com/share/29c6bed0-dd6d-4385-97f8-12704007f631", "title": "ChatGPT - Q & A colab"}, {"url": "https://chat.openai.com/share/04df0330-e263-4b1b-b19a-9cf822210688", "title": "ChatGPT - Turtle interpolator colab"}, {"url": "https://chat.openai.com/share/31293bfc-9957-42b4-a980-cdd46fae9554", "title": "ChatGPT - Create Colab File: Code"}, {"url": "https://chat.openai.com/share/746be002-ced6-4d13-a80f-a4d37bdb4bfb", "title": "ChatGPT - Convert notebook to web."}, {"url": "https://chat.openai.com/share/29c6bed0-dd6d-4385-97f8-12704007f631", "title": "ChatGPT - Q & A colab"}, {"url": "https://chat.openai.com/share/04df0330-e263-4b1b-b19a-9cf822210688", "title": "ChatGPT - Turtle interpolator colab"}, {"url": "https://chat.openai.com/share/31293bfc-9957-42b4-a980-cdd46fae9554", "title": "ChatGPT - Create Colab File: Code"}, {"url": "https://chat.openai.com/share/746be002-ced6-4d13-a80f-a4d37bdb4bfb", "title": "ChatGPT - Convert notebook to web."}], "videos": [], "chatbots": ["ChatGPT"], "description": "Ken Kahn explored the fascinating frontier of AI-driven education, experimenting with ChatGPT and Gemini Advanced to automate Jupyter Python notebook creation. His journey yielded mixed results, including a partially successful Q&A program leveraging machine learning embeddings and attempts at a turtle geometry interpolator. Kahn even developed a specialized \"Colab Notebook Creator\" GPT, meticulously designed to generate structured notebooks with interleaved explanatory text and code, aiming for a personalized, adaptive learning experience. While this custom GPT faced challenges with tasks like paraphrase generation and Python-to-JavaScript translation, the research highlights the ambitious, yet complex, potential of AI in shaping interactive educational content."}, {"title": "A pure spoken interaction with ChatGPT 3.5", "post_url": "https://docs.google.com/document/d/1pJy3RfKmzHyFEuEp7mkmqFnvpYGs3VGjhHTPXYcnU5k/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chat.openai.com/share/c12d0e45-c296-403d-9b6b-2daa615125cb", "title": "ChatGPT - City distance"}, {"url": "https://chat.openai.com/share/c12d0e45-c296-403d-9b6b-2daa615125cb", "title": "ChatGPT - City distance"}], "videos": [], "chatbots"  experiences."}, {"title": "How I created the active essay on embeddings", "post_url": "https://docs.google.com/document/d/1YPwrWcSGiGNdS7T9YFbp3Lb1abLIdpYSVtvg7ppf6Lk/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research post unveils an innovative \"active essay\" on word and sentence embeddings, collaboratively designed with ChatGPT-4 for high school students. Author Ken Kahn details how he prompted the AI to structure a web-based educational experience, integrating custom interactive visualizations. These include a 3D app to explore hand-crafted embeddings and a unique \"star visualization\" that dynamically displays vector elements for both simple and machine-learned embeddings. The essay also incorporates tools like TensorFlow Projector, offering a hands-on, engaging approach to understanding this fundamental AI concept."}, {"title": "Early education chatbot experiments", "post_url": "https://docs.google.com/document/d/1W-HD-mDfOVnx7MsrlNGUWf9LxsQ-Xh_xjig8RAM34Vc/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/Jokes%20for%207%20year%20old/Sallys_Joke_App.html", "title": "Sally's Joke App"}, {"url": "https://toontalk.github.io/AI/apps/Jokes%20for%207%20year%20old/Sallys_Horse_Joke_Quiz.html", "title": "Sally's Horse Jokes"}, {"url": "https://toontalk.github.io/AI/apps/Jokes%20for%207%20year%20old/Sallys_Horse_Joke_Quiz.html", "title": "Sally's Horse Jokes"}, {"url": "https://toontalk.github.io/AI/apps/Jokes%20for%207%20year%20old/Sallys_Talking_Horse_Joke_Quiz.html", "title": "Sally's Talking Horse Jokes"}, {"url": "https://toontalk.github.io/AI/apps/Jokes%20for%207%20year%20old/Sallys_Talking_Horse_Joke_Quiz_With_Image.html", "title": "Sally's Talking Horse Joke Quiz"}, {"url": "https://toontalk.github.io/AI/apps/Jokes%20for%207%20year%20old/Sallys_Talking_Horse_Joke_Quiz_With_More_Jokes.html", "title": "Sally's Talking Horse Joke Quiz"}, {"url": "https://toontalk.github.io/AI/apps/ti rl": "https://www.youtube.com/watch?v=wjZofJX0v4M", "title": "Transformers, the tech behind LLMs | Deep Learning Chapter 5", "video_id": "wjZofJX0v4M"}, {"url": "https://www.youtube.com/watch?v=eMlx5fFNoYc", "title": "Attention in transformers, step-by-step | Deep Learning Chapter 6", "video_id": "eMlx5fFNoYc"}, {"url": "https://www.youtube.com/watch?v=9-Jl0dxWQs8", "title": "How might LLMs store facts | Deep Learning Chapter 7", "video_id": "9-Jl0dxWQs8"}], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research post offers an intriguing glimpse into the practical applications of AI in fostering human creativity, primarily as a companion to the forthcoming book, *The Learner\u2019s Apprentice*. It meticulously catalogs a diverse array of AI-powered tools and experiments, from novel apps like \"Finger Drawing\" and a \"Confidence Predictor\" to a \"Virtual Persona Chat.\" Beyond app creation, the post details fascinating AI conversations, including a dialogue between Newton's laws and General Relativity, text adventures simulating historical events like the Damascus plague, and sophisticated co-creation projects such as a 3D exoplanet simulation. This collection vividly demonstrates how chatbots can amplify human ingenuity across education, storytelling, and interactive design."}, {"title": "creating apps via conversations with chatbots", "post_url": "https://docs.google.com/document/d/1e5EW_IkAEuuGeevuNSxz2Hqaf7_wlDWm/edit?usp=sharing&ouid=117320991080687983969&rtpof=true&sd=true", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research explores a revolutionary approach to programming, where users create and debug sophisticated AI programs not by writing code, but through natural language conversations with GPT-4. Likened to a \"navigator\" guiding a \"driver\" in pair programming, the study delves into numerous examples of this dialogue-driven development. It investigates how this method could empower learners and facilitate the acquisition of powerful computational ideas, fundamentally rethinking programming education without traditional coding. The paper raises compelling questions about the future implications of this conversational programming paradigm."}, {"title": "Creating apps by conversing with chatbots", "post_url": "https://docs.google.com/document/d/1jcOPoS5fPdmi0kjvQB15m3znc2y0jeFE12ES3wgrmf4/edit", "apps": [], "chat_logs": [], "videos": [{"url": "https://www.youtube.com/watch?v=AIDcBGGmar4", "title": "Interview with Dr. David S. Touretzky on ChatGPT Lesson Plan", "video_id": "AIDcBGGmar4"}, {"url": "https://www.youtube.com/watch?v=hBekeULb_Hk", "title": "Interview with Eryka Wilson on Chat GPT Lesson Plan", "video_id": "hBekeULb_Hk"}, {"url": "https://www.youtube.com/watch?v=AIDcBGGmar4", "title": "Interview with Dr. David S. Touretzky on ChatGPT Lesson Plan", "video_id": "AIDcBGGmar4"}, {"url": "https://www.youtube.com/watch?v=hBekeULb_Hk", "title": "Interview with Eryka Wilson on Chat GPT Lesson Plan", "video_id": "hBekeULb_Hk"}], "chatbots": [], "description": "This document unveils an innovative curriculum that empowers students to create applications by conversing and collaborating directly with AI chatbots, such as ChatGPT. It reimagines programming education, teaching learners to leverage AI for tasks like generating code, fixing bugs, and planning projects, all while maintaining creative control over their self-directed endeavors. From simple games to complex AI-powered tools, students explore app development interactively, demonstrating how modern programming can be accessible and engaging without deep dives into complex language details. This approach emphasizes student creativity, guided by AI."}, {"title": "2023 Detailed Syllabus for AI Projects and Case Studies", "post_url": "https://docs.google.com/document/d/1r41RvfiU6YL2hSsvi1tFwvs9OGhvM6YMZ8YO4pkS8J0/edit#heading=h.b3zgttitcj2p", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This detailed syllabus for an AI Projects and Case Studies module offers an immersive exploration into the vast landscape of artificial intelligence. It meticulously outlines interactive activities and case studies across key AI domains: language, vision, and science/humanities. Students delve into cutting-edge applications, from experimenting with tools like Google Cloud Natural Language API and Teachable Machine to investigating advanced systems such as GPT-3, Wu Dao 2, and DALL\u00b7E. The module fosters hands-on engagement with diverse AI demos, encouraging critical analysis of their capabilities and impact, while also introducing pretrained models for practical project development."}, {"title": "Creative uses of accessible programming of language model prompts", "post_url": "https://docs.google.com/document/d/1nB7TwTEgqogtjYjJ-HXZoEz3z6fcL-Ud-_OiqYqVIYM/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": [], "description": "This research explores innovative ways for students, even children, to engage with large language models by combining accessible programming languages like Snap! with sophisticated prompt generation. Author Ken Kahn illustrates a range of potential projects where non-expert programmers can programmatically compose prompts and react to AI-generated completions. Examples include creating interactive conversations between AI personas, simulating debates, automatically generating illustrated stories, and even using language models to control a Logo turtle or play Tic Tac Toe. The work highlights the creative potential unlocked when accessible coding empowers young learners to leverage advanced AI capabilities."}];

        function deduplicateLinks(links) {
            const seen = new Set();
            return links.filter(link => {
                if (seen.has(link.url)) return false;
                seen.add(link.url);
                return true;
            });
        }

        function renderPosts() {
            const tbody = document.getElementById('postsTable');
            tbody.innerHTML = postsData.map((post, index) => {
                const chatbotBadges = post.chatbots.map(bot =>
                    `<span class="chatbot-badge chatbot-${bot.toLowerCase()}">${bot}</span>`
                ).join('');

                const allLinks = deduplicateLinks([
                    ...post.apps.map(app => ({ url: app.url, title: app.title, type: 'app' })),
                    ...post.chat_logs.map(chat => ({ url: chat.url, title: chat.title, type: 'chat' })),
                    ...post.videos.map(video => ({ url: video.url, title: video.title, type: 'video' }))
                ]);

                const linksHtml = allLinks.length > 0
                    ? allLinks.map(link => `<a href="${link.url}" target="_blank" class="badge badge-${link.type}">${link.title}</a>`).join('')
                    : '<span style="color: #999; font-style: italic;">No links</span>';

                return `
                    <tr>
                        <td>
                            <div class="post-title">
                                <a href="${post.post_url}" target="_blank">${post.title}</a>
                                <button class="info-btn" onclick="showDescription(${index})">i</button>
                            </div>
                        </td>
                        <td>${chatbotBadges || '<span style="color: #999;">None</span>'}</td>
                        <td>${linksHtml}</td>
                    </tr>
                `;
            }).join('');
        }

        const modal = document.getElementById('modal');
        const closeBtn = document.querySelector('.close');

        function showDescription(index) {
            const post = postsData[index];
            document.getElementById('modalTitle').textContent = post.title;
            const description = post.description || 'No description available.';
            const htmlContent = marked.parse(description);
            document.getElementById('modalBody').innerHTML = htmlContent;
            modal.style.display = 'block';
        }

        closeBtn.onclick = function() { modal.style.display = 'none'; }
        window.onclick = function(event) { if (event.target == modal) modal.style.display = 'none'; }

        renderPosts();
    </script>
