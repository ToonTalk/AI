 understand how AI learns without needing a technical background. Users can explore AI's learning process firsthand through games like Tic-tac-toe, watching the system learn via self-play, and even leverage an integrated \"Ask Claude\" feature for immediate explanations. The project highlights the exciting potential of AI chatbots to create engaging, hands-on educational experiences for advanced topics."}, {"title": "A multi-agent app to evolve turtle graphics programs co-created with Gemini", "post_url": "https://docs.google.com/document/d/1ulliMQ1VPaTMGQcigS2WpqiYxVKIXhxyhxlyubzoohA/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["Gemini"], "description": "This research post details an exciting exploration into co-creating an innovative multi-agent application design with Gemini. The core concept revolves around a system where multiple AI agents collaboratively evolve turtle graphics programs, showcasing an AI-driven approach to generative art and visual code. While a functional application wasn't built, the study thoroughly investigates the design process and the fascinating potential of leveraging large language models like Gemini to conceptualize complex, interactive AI systems for creative and educational domains."}, {"title": "A Sequel by Claude to \u201cA multi-agent app to evolve turtle graphics programs co-created with Gemini\u201d", "post_url": "https://docs.google.com/document/d/1WDxgXhIcihifkU0ZoE2KEJjfpiuUkl7mc2bQyld50bc/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/misc/turtle%20program%20evolutions.html", "title": "Logo turtle program evolutions"}, {"url": "https://toontalk.github.io/AI/apps/logo-evolution-lab.html", "title": "Logo Evolution Lab"}, {"url": "https://toontalk.github.io/AI/apps/logo-evolution-lab.html", "title": "Logo Evolution Lab"}, {"url": "https://claude.ai/public/artifacts/cfecf783-fa20-4e00-87ff-f901a858a7ba", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/misc/turtle% the option to inspect the underlying JavaScript or pseudocode, making this a fascinating look at how LLMs can power interactive computational thinking experiences from the ground up."}, {"title": "Exploring Minsky\u2019s Emotion Machine by creating an app with Claude", "post_url": "https://docs.google.com/document/d/1gJiLNv9SRZTUCWnCvM-QKGSYGoTuWRA7qJn5aX7X_qw/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["Claude"], "description": "This research delves into Marvin Minsky's \"Emotion Machine\" theory, which posits emotions as distinct thinking styles vital for problem-solving. An innovative web app was rapidly developed with Claude Opus 4.6 to simulate this complex concept. The app features a \"Deliberator\" agent that, upon receiving a problem, consults four distinct \"emotion agents\"\u2014Frustration, Curiosity, Anxiety, and Confusion. Their responses are then analyzed by a \"Reflector\" and \"Strategy Selector\" to guide further problem-solving cycles, demonstrating how diverse cognitive states can collectively inform strategic thinking."}, {"title": "Agents or Personas - 3 case studies", "post_url": "https://docs.google.com/document/d/1te1_4kKer3l8cK457L1OvEvFbvQ5G7LNjAY_4AR9m0Q/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/c0d465e7-9abb-426a-b283-66119db283e9", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/misc/k12%20by%20opus%204.6%20v2%20emotion-machine-2026-02-13.html", "title": "Emotion Machine \u2014 How can we redesign K-12 so students use AI wisely to unders"}, {"url": "https://toontalk.github.io/AI/misc/k12%20by%20opus%204.6%20emotion-machine-2026-02-13.html", "title": "Emotion Machine \u2014 How can we redesign K-12 so students use AI wisely to unders"}, {"url": "https://toontalk.github.io/AI/misc/k12%20by%20opus%204.6%20emotion-machine-2026-02-13.html", "title": "Emotion Machine \u2014 How can we redesign K-12 so students use AI wisely to unders"}, {"url": "https://toontalk.g simulate interactions between these same roles as personas. Through case studies, including redesigning K-12 AI education for wise use, the project explores whether truly separate AI components yield different, potentially richer, outcomes than a single, versatile AI playing multiple parts. The findings offer critical insights into designing more effective and nuanced AI systems for diverse problem-solving scenarios."}, {"title": "Claude Code controlling Claude in Chrome controlling claude.ai which uses the Claude API", "post_url": "https://docs.google.com/document/d/16Biy_v5Edz1XlistmeYmy3UDEKuCwhHZRRovQdS9HHI/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/dd06992a-e411-4b96-bf63-d23c9f7f3e22", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/dd06992a-e411-4b96-bf63-d23c9f7f3e22", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/ebded3f8-8dfb-483b-be07-95dbff171740", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/dd06992a-e411-4b96-bf63-d23c9f7f3e22", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/dd06992a-e411-4b96-bf63-d23c9f7f3e22", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/dd06992a-e411-4b96-bf63-d23c9f7f3e22", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/ebded3f8-8dfb-483b-be07-95dbff171740", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://claude.ai/share/297ac385-913f-40b4-b26c-a882245c8318", "title": "Claude Chat"}, {"url": "https://claude.ai/share/f4426e3e-4390-4d66-a25c-0d96eec44294", "title": "Claude Chat"}, {"url": "https://claude.ai/share/297ac385-913f-40b4-b26c-a882245c8318", "title": "Claude Chat"}, {"url": "https://claude.ai/share/f4426e3e-4390-4d66-a25c-0d96eec44294", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research dives into a fascinating recursive interaction: \"Claude Code controlling Claude in Chrome controlling claude.ai which uses the Claude API.\" The experiment began by prompting claude.ai to create a \"Word or Weird\" game, designed to use the Claude API and be hosted as an artifact without an API key. Subsequently, Claude Code was deployed to play this AI-generated game within Chrome, uncovering bugs and generating an extensive list of improvements. This showcases a powerful loop where AI not only builds an application but also critically evaluates, debugs, and proposes enhancements for its own creation, demonstrating a sophisticated level of autonomous optimization."}, {"title": "Exploring how Emotion Machine app agents can rewrite a very short science fiction story", "post_url": "https://docs.google.com/document/d/1p3T6Dl4k58OrCl1xOtAH9FSFPaAaCEkYx4OHUnHJo1g/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/misc/revise%20science%20fiction%20story%20v3%20emotion-machine-2026-02-17.html", "title": "Emotion Machine"}, {"url": "https://toontalk.github.io/AI/misc/revise%20science%20fiction%20story%20v6%20emotion-machine-2026-02-17.html", "title": "Emotion Machine"}, {"url": "https://toontalk.github.io/AI/misc/revise%20science%20fiction%20story%20v3%20emotion-machine-2026-02-17.html", "title": "Emotion Machine"}, {"url": "https://toontalk.github.io/AI/misc/revise%20science%20fiction%20story%20v6%20emotion-machine-2026-02-17.html", "title": "Emotion Machine"}], "chat_logs": [{"url": "https://claude.ai/share/1b17fe1f-9c8f-4642-907b-a79b3b2c7c0e", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/69982ba5-c220-800e-ba95-fc059da63338", "title": "ChatGPT - Exterminator's Bureaucratic Nightmare"}, {"url": "https://gemini.google.com/share/7450932e6105", "title": "Gemini"}, {"url": "https://claude.ai/share/1b17fe1f-9c8f-4642-907b-a79b3b2c7c0e", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/69982ba5-c220-800e-ba95-fc059da63338", "title": "ChatGPT - Exterminator's Bureaucratic Nightmare"}, {"url": "https://gemini.google.com/share/7450932e6105", "title": "Gemini"}], "videos": [], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research explores the fascinating frontier of AI-driven creative writing, specifically how various AI agents tackle story revision. The study initially tasked \"Emotion Machine\" app agents with rewriting a very short, humorous science fiction story about an exterminator's bureaucratic nightmare with newly sentient, unionizing humans. While Emotion Machine agents sometimes struggled to improve the complex narrative or offered intriguing discussions instead of direct changes, the project then expanded. It challenged advanced models like Claude, ChatGPT, and Gemini to refine the same intricate prose, providing a compelling look into the diverse approaches and current limitations of AI in enhancing creative writing."}, {"title": "Guiding LLMs to combine vibe coding and learning", "post_url": "https://docs.google.com/document/d/1C26jcv9pOSLYWX-KnFXdmR1nkrswQL1hqY6DifBCu6I/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/b232fd0c-1250-486c-a21c-72bf51864ec7", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/12891055-e367-4702-8f93-ed5d9d3ebdea", "title": "Claude Artifact"}, {"url": "https://gemini.google.com/share/9d98c8f635a6", "title": "Gemini"}, {"url": "https://chatgpt.com/canvas/shared/69a2d20ec1bc8191949e9266944d610c", "title": "ChatGPT - Word Goblin (made-up Word Generator)"}, {"url": "https://claude.ai/public/artifacts/b232fd0c-1250-486c-a21c-72bf51864ec7", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/12891055-e367-4702-8f93-ed5d9d3ebdea", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/69a2d20ec1bc8191949e9266944d610c", "title": "ChatGPT - Word Goblin (made-up Word Generator)"}], "chat_logs": [{"url": "https://claude.ai/share/64a5e7e6-bc71-4706-8f34-6e6485c406d7", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/69a30689-f7f0-800e-bf5f-3fbcc7ab2 ng advocates for an educational shift, urging schools to demand engagement with computational *ideas* and design thinking. This approach recognizes that AI offers new, diverse pathways to foster genuine understanding, moving beyond traditional syntax to empower students as thoughtful computational designers."}, {"title": "An AI image generation \u201ctelephone\u201d game co-created with Gemini", "post_url": "https://docs.google.com/document/d/1_304tER34rp1AKngZd7Q--jvZ5-7kKq2B_LrU79NmrE/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/9c8b409a1407", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/e6b1b28b471e", "title": "Gemini"}, {"url": "https://claude.ai/share/46f7537d-b6d2-4d14-b23b-f21ca4e8a177", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/e6b1b28b471e", "title": "Gemini"}, {"url": "https://claude.ai/share/46f7537d-b6d2-4d14-b23b-f21ca4e8a177", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/9c8b409a1407", "title": "Gemini"}], "videos": [], "chatbots": ["Claude", "Gemini"], "description": "This research details an \"AI image generation 'telephone' game,\" where an initial image is repeatedly described by AI, and then a new image is generated solely from that description, demonstrating how visual concepts drift. The project involved co-creating a web app with Gemini, leveraging its API for both image description and generation. However, a dramatic twist occurred when Gemini unexpectedly \"forgot\" its conversation history, overwriting the entire project with a generic template and highlighting the unpredictable nature of AI co-creation. This unique exploration offers compelling insights into AI's interpretive and generative capabilities, showcasing the iterative evolution of imagery through machine perception."}, {"title": "Making an app with Claude and Gemini for creating an agentic AI web app", "post_url": "https://docs.google.com/document/d/1WjC7pjD9rxvgv86ICrzFL7GHfJyprHz analysis, and generation, alongside tools for summarizing agent interactions. This 24-hour development process demonstrates a promising pathway for non-experts to bridge the gap between complex AI concepts and accessible application creation."}, {"title": "Using LLM browser agents to create applications and experiments using an AI agent playground", "post_url": "https://docs.google.com/document/d/10tBnKfLvYAcvdBZjEpXaKeHiDWYm4MowA6gQ8_BSktA/edit?usp=sharing", "apps": [{"url": "https://claude.ai/public/artifacts/34b78a34-bcb7-4f08-a43f-1212ef85741f", "title": "Claude Artifact"}, {"url": "https://gemini.google.com/share/62f4c63b54ad", "title": "Gemini"}, {"url": "https://claude.ai/public/artifacts/6fbc0b5b-0fc2-4b50-8e47-31974bb27571", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/34b78a34-bcb7-4f08-a43f-1212ef85741f", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/34b78a34-bcb7-4f08-a43f-1212ef85741f", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/0c4bddee-78bb-4f92-b6a8-de88ebe6a88d", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/6fbc0b5b-0fc2-4b50-8e47-31974bb27571", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://chatgpt.com/share/696b480c-9c00-800e-b7e6-6d45e18b0cac", "title": "ChatGPT - Browser Automation Capabilities"}, {"url": "https://chatgpt.com/share/696b4a92-742c-800e-b58d-98289c5da48c", "title": "ChatGPT - Ant Sim Exploration by ChatGPT Operator"}, {"url": "https://chatgpt.com/share/696b511d-0c10-800e-a5b2-a7801398d48b", "title": "ChatGPT - Agent Application JSON"}, {"url": "https://chatgpt.com/share/696b5b74-eba0-800e-bccd-5d5aeab8e929", "title": "ChatGPT - Agent Application Design - can't log into Gemini"}, {"url": "https://chatgpt.com/share/696b546c-bf84-800e-b55f-93221825d11d", "title": "ChatGPT - Agent Application Design"}, {"url": "https://chatgpt.com/share/696b480c-9c00-800e-b7e6-6d45e18b0cac", "title": "ChatGPT - Browser Automation Capabilities"}, {"url": "https://chatgpt.com/share/696b4a92-742c-800e-b58d-98289c5da48c", "title": "ChatGPT - Ant Sim Exploration by ChatGPT Operator"}, {"url": "https://chatgpt.com/share/696b511d-0c10-800e-a5b2-a7801398d48b", "title": "ChatGPT - Agent Application JSON"}, {"url": "https://gemini.google.com/share/62f4c63b54ad", "title": "Gemini"}, {"url": "https://chatgpt.com/share/696b5b74-eba0-800e-bccd-5d5aeab8e929", "title": "ChatGPT - Agent Application Design - can't log into Gemini"}, {"url": "https://chatgpt.com/share/696b546c-bf84-800e-b55f-93221825d11d", "title": "ChatGPT - Agent Application Design"}], "videos": [{"url": "https://www.youtube.com/watch?v=O1Gr9OMgy20", "title": "ChatGPT Operator creating writing agents v2", "video_id": "O1Gr9OMgy20"}, {"url": "https://www.youtube.com/watch?v=O1Gr9OMgy20", "title": "ChatGPT Operator creating writing agents v2", "video_id": "O1Gr9OMgy20"}, {"url": "https://www.youtube.com/watch?v=XfH61scGVUI", "title": "Claude on Chrome creating a writing agent application", "video_id": "XfH61scGVUI"}, {"url": "https://www.youtube.com/watch?v=O1Gr9OMgy20", "title": "ChatGPT Operator creating writing agents v2", "video_id": "O1Gr9OMgy20"}, {"url": "https://www.youtube.com/watch?v=O1Gr9OMgy20", "title": "ChatGPT Operator creating writing agents v2", "video_id": "O1Gr9OMgy20"}, {"url": "https://www.youtube.com/watch?v=XfH61scGVUI", "title": "Claude on Chrome creating a writing agent application", "video_id": "XfH61scGVUI"}], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research explores the fascinating frontier of AI agents autonomously creating and experimenting with web applications within a dedicated \"AI agent playground.\" Leveraging tools like ChatGPT Operator and Claude in Chrome, the project demonstrates how these LLM browser agents can control web interfaces to build diverse applications, including multiple \"Claude Artifacts.\" A standout example involves an agent thoroughly exploring an \"Ant Simulator,\" running experiments, and even analyzing the results to glean insights into ant behavior. This work highlights the exciting potential for AI to not only interact with but also design, test, and evaluate its own digital creations."}, {"title": "With Gemini I created a riddle game with visual hints", "post_url": "https://docs.google.com/document/d/15H-erJEBNYUy1ImsoCqNos9XaFOHPa9KGd69RoK3KJM/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/a309db4d4311", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/08bbdc68a07d", "title": "Gemini"}, {"url": "https://gemini.google.com/share/08bbdc68a07d", "title": "Gemini"}, {"url": "https://gemini.google.com/share/a309db4d4311", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research post details the creation of an engaging riddle game using Gemini 3 Flash, designed to demonstrate AI app development to school students in India. Through iterative prompting, the author built an interactive web application featuring dynamic visual hints generated by the Gemini API, speech input/output for riddles and answers, and even sophisticated paraphrase detection for user responses. The project effectively explored how Gemini can facilitate the creation of apps leveraging its own advanced AI capabilities\u2014like image generation and natural language processing\u2014without requiring complex API key setups. This showcases a practical, accessible approach to integrating diverse AI functionalities into educational tools."}, {"title": "Co-creating a heart and lung web app monitor", "post_url": "https://docs.google.com/document/d/1JrBNKzyue99mX2lxU9Gc47RIEc8llISMdk5wWTmt4G4/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/9227f36539a8", "title": "Gemini"}], "chat_logs": [{"url": "https://claude.ai/share/db41699f-d246-491e-ba0c-ec528105782b", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/10737883aba8", "title": "Gemini"}, {"url": "https://gemini.google.com/share/80db333e6675", "title": "Gemini"}, {"url": "https://claude.ai/share/db41699f-d246-491e-ba0c-ec528105782b", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/10737883aba8", "title": "Gemini"}, {"url": "https://gemini.google.com/share/80db333e6675", "title": "Gemini"}, {"url": "https://gemini.google.com/share/9227f36539a8", "title": "Gemini"}], "videos": [{"url": "https://www.youtube.com/watch?v=_hO3oiEE6Kw", "title": "Heart and breathing monitor", "video_id": "_hO3oiEE6Kw"}, {"url": "https://www.youtube.com/watch?v=_hO3oiEE6Kw", "title": "Heart and breathing monitor", "video_id": "_hO3oiEE6Kw"}], "chatbots": ["Claude", "Gemini"], "description": "This research details the fascinating journey of co-creating a browser-based heart and lung monitor web app with AI. Starting with Claude Sonnet 4.5, the project explored transforming a phone into a stethoscope, analyzing vital signs via its microphone or camera. After hitting a roadblock with sensor permissions, the researcher innovatively pivoted, leveraging Gemini 3 Pro to develop a Gemini Canvas version that uses the Gemini API, overcoming initial technical hurdles. This iterative process showcases how different AI models can be strategically employed to build functional, browser-based health monitoring tools, demonstrating a practical approach to AI-assisted app development."}, {"title": "An app co-created with Gemini for creating wordless stories children can narrate", "post_url": "https://docs.google.com/document/d/1DWSK1EtnP5XHI0xpKfwwks0ZSzgE6JdxDG0RZ-dqQs4/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/a05510086e7e", "title": "Gemini"}, {"url": "https://gemini.google.com/share/5895a9a75016", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/6c88a2695551", "title": "Gemini"}, {"url": "https://claude.ai/share/afd892d6-de58-4462-85fd-ae76167c65cb", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/a0f6e1bbe461", "title": "Gemini"}, {"url": "https://gemini.google.com/share/6c88a2695551", "title": "Gemini"}, {"url": "https://gemini.google.com/share/a05510086e7e", "title": "Gemini"}, {"url": "https://claude.ai/share/afd892d6-de58-4462-85fd-ae76167c65cb", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/a0f6e1bbe461", "title": "Gemini"}, {"url": "https://gemini.google.com/share/5895a9a75016", "title": "Gemini"}], "videos": [], "chatbots": ["Claude", "Gemini"], "description": "This research details the creation of an AI-powered web app, co-developed with Gemini, designed to generate wordless picture stories for pre-literate children. Inspired by the need for engaging materials for children learning endangered languages, the app allows users to select icons for characters, locations, and themes to instantly create visually rich narratives. Children can then narrate these customizable, comic-book-style stories, fostering crucial oral language skills, narrative comprehension, and inferential thinking. With clickable images for progression and options to save or create new tales, this innovative tool offers a dynamic approach to early childhood literacy development."}, {"title": "A generic adventure app created with Gemini", "post_url": "https://docs.google.com/document/d/1_mtH_ZIb-0eXhKUAiFrcX_hDq2cuJAyn9oNAJCwSFHg/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/fb92968ec227", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/2430b84b1e12", "title": "Gemini"}, {"url": "https://gemini.google.com/share/2430b84b1e12", "title": "Gemini"}, {"url": "https://gemini.google.com/share/fb92968ec227", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "Ken Kahn delved into AI app creation, initially prompting Gemini 3 Pro to build an immersive text and image adventure set during the Great Pyramid's construction. Through an iterative process of detailed prompts, he meticulously refined the app, addressing layout, adding features like scrollable text, image tracking, and the ability to save game logs. Crucially, the project evolved from a specific historical scenario into a generic adventure platform, allowing players to define any \"where and when\" for their quests. This research showcases Gemini's potential for developing highly customizable, open-ended interactive experiences, emphasizing the power of precise prompting in AI-driven app development."}, {"title": "Gemini added AI help to MoPiX with little guidance", "post_url": "https://docs.google.com/document/d/13S3Q5CoZTztsPVzfQwnmZUcfGXLVhZ3KTek3S0XFKR8/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/faca4e3b6ed2", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/7dc97f7bccb5", "title": "Gemini"}, {"url": "https://gemini.google.com/share/faca4e3b6ed2", "title": "Gemini"}, {"url": "https://gemini.google.com/share/7dc97f7bccb5", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research showcases Gemini's remarkable ability to autonomously enhance MoPiX 3, an algebra programming app, by integrating a new AI helper. With minimal guidance, Gemini added 500 lines of code, demonstrating its self-sufficiency in complex application development. A compelling example involved creating a MoPiX clock, where Gemini provided precise trigonometric equations to correctly pivot an hour hand, solving a nuanced rotational challenge. Despite initial feedback on response formatting, Gemini's capacity to deliver sophisticated, context-aware assistance highlights its potential in advancing AI-powered educational tools."}, {"title": "Exploring how Gemini can now do more than generate text and images", "post_url": "https://docs.google.com/document/d/1HzhX0uoXMdSks9BkNzPVvsiYn74P8myZsJiUl9b7_88/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/313cfea03e35", "title": "Gemini"}, {"url": "https://gemini.google.com/share/9faccde38e73", "title": "Gemini"}], "chat_logs": [{"url": "https://ai.google.dev/gemini-api/docs/maps-grounding", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/google-search", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/code-execution", "title": "Gemini"}, {"url": "https://gemini.google.com/share/438819fbc1e9", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/maps-grounding", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/google-search", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/code-execution", "title": "Gemini"}, {"url": "https://ai.google.dev/gemini-api/docs/maps-grounding.", "title": "Gemini"}, {"url": "https://gemini.google.com/share/313cfea03e35", "title": "Gemini"}, {"url": "https://gemini.google.com/share/9faccde38e73", "title": "Gemini"}, {"url": "https://gemini.google.com/share/438819fbc1e9", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research delves into Gemini's expanded capabilities, showcasing its integration with Google Maps, Google Search, and code execution as powerful new \"tools.\" The author explores creating web applications directly through Gemini's prompt-based interface, initially building a quirky demo. This exploration culminated in the development of a practical \"Eco-Journey CO2 Calculator.\" This innovative app leverages Gemini to plan car routes between two cities using Google Maps, then employs Google Search to accurately calculate CO2 emissions for each leg, even factoring in electricity production for electric vehicles."}, {"title": "Playing etymology and history games with chatbots", "post_url": "https://docs.google.com/document/d/1w0jLNi1Gc0vDbCYb5BosDyZZyHyUg8qR4wniqN4N930/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://claude.ai/share/ce2e1ed0-a03f-43d3-b76e-2453058b975d", "title": "Claude Chat"}, {"url": "https://claude.ai/share/d51c7846-1c29-414d-b6c9-97dc8862346f", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/691aebf3-e8ac-800e-ab15-4b066bf4c73b", "title": "ChatGPT - Etymology game challenge"}, {"url": "https://gemini.google.com/share/40ab3491d4eb", "title": "Gemini"}, {"url": "https://claude.ai/share/15bdb443-eff3-47f4-82a9-09c511d602ad", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/87b217993b0c", "title": "Gemini"}, {"url": "https://gemini.google.com/share/0ccbeb69bb63", "title": "Gemini"}, {"url": "https://chatgpt.com/share/691aeb9b-2be4-800e-9c86-60d33cf30efc", "title": "ChatGPT - Historical game challenge"}, {"url": "https://claude.ai/share/ce2e1ed0-a03f-43d3-b76e-2453058b975d", "title": "Claude Chat"}, {"url": "https://claude.ai/share/d51c7846-1c29-414d-b6c9-97dc8862346f", "title": "Claude Chat"}, {"url": "https://chatgpt.com/share/691aebf3-e8ac-800e-ab15-4b066bf4c73b", "title": "ChatGPT - Etymology game challenge"}, {"url": "https://gemini.google.com/share/40ab3491d4eb", "title": "Gemini"}, {"url": "https://claude.ai/share/15bdb443-eff3-47f4-82a9-09c511d602ad", "title": "Claude Chat"}, {"url": "https://gemini.google.com/share/87b217993b0c", "title": "Gemini"}, {"url": "https://gemini.google.com/share/0ccbeb69bb63", "title": "Gemini"}, {"url": "https://chatgpt.com/share/691aeb9b-2be4-800e-9c86-60d33cf30efc", "title": "ChatGPT - Historical game challenge"}], "videos": [], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This research pioneers a \"no-app\" approach to AI education, transforming chatbots directly into interactive learning games. The author successfully created and tested an etymology game where users guess a word's origin from multiple-choice options generated in real-time by the AI. While some chatbots like Claude experienced 'thinking' delays, ChatGPT and Gemini proved fast and accurate, even keeping score. Building on this success, the AI itself then suggested several other engaging educational games, including \"First Lines,\" \"Historical 'Which Came First?'\", and \"Invention Year\" challenges. This demonstrates the exciting potential of large language models to serve as versatile, 'no-code' platforms for dynamic educational content."}, {"title": "Creating Logo programs using free-form speech", "post_url": "https://docs.google.com/document/d/1G4cWHk9WqV9fi0DRJDa_M00PsUXZeQT9PIQJAr8eFPU/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/311d0e8122d2", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/54a0e1e6fa36", "title": "Gemini"}, {"url": "https://gemini.google.com/share/311d0e8122d2", "title": "Gemini"}, {"url": "https://gemini.google.com/share/54a0e1e6fa36", "title": "Gemini"}], "videos": [{"url": "https://www.youtube.com/watch?v=s47FwJRqN_E", "title": "Talk to the Logo turtle demo", "video_id": "s47FwJRqN_E"}, {"url": "https://www.youtube.com/watch?v=s47FwJRqN_E", "title": "Talk to the Logo turtle demo", "video_id": "s47FwJRqN_E"}], "chatbots": ["Gemini"], "description": "Ken Kahn explored the cutting edge of AI-driven tool creation by developing an innovative app that generates Logo programs from free-form speech using Gemini 2.5 Pro. This proof-of-concept allows users to simply speak commands, which are then translated into executable Logo code, instantly rendering turtle graphics. The app's development involved a dynamic, multi-exchange conversation with Gemini, demonstrating how large language models can be prompted to build complex interpreters and aid in programming education. This research showcases a powerful new paradigm for interacting with and learning programming through natural language."}, {"title": "A Tarot Card app conceived and implemented by Gemini 3 Pro", "post_url": "https://docs.google.com/document/d/1HUQd8d342PBNvObqdGy531oBX5GiJvTEbtpjPl2F1vg/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/6c977df13ea2", "title": "Gemini"}, {"url": "https://gemini.google.com/share/1e9132074378", "title": "Gemini"}, {"url": "https://toontalk.github.io/AI/misc/ _url": "https://docs.google.com/document/d/1PTaZNBoGEnfOr0uiYRJZyzCW9I6kYjao25xKYn96S_0/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/57a29a50766b", "title": "Gemini"}], "chat_logs": [{"url": "https://gemini.google.com/share/035b24d2dc18", "title": "Gemini"}, {"url": "https://gemini.google.com/share/57a29a50766b", "title": "Gemini"}, {"url": "https://gemini.google.com/share/035b24d2dc18", "title": "Gemini"}], "videos": [{"url": "https://www.youtube.com/watch?v=z0CQmOWPAbQ", "title": "Self-Coding Art Blob Demo", "video_id": "z0CQmOWPAbQ"}, {"url": "https://www.youtube.com/watch?v=x164VnJ7iu0", "title": "Self-Coding Art Blob - live coding demo", "video_id": "x164VnJ7iu0"}, {"url": "https://www.youtube.com/watch?v=z0CQmOWPAbQ", "title": "Self-Coding Art Blob Demo", "video_id": "z0CQmOWPAbQ"}, {"url": "https://www.youtube.com/watch?v=x164VnJ7iu0", "title": "Self-Coding Art Blob - live coding demo", "video_id": "x164VnJ7iu0"}], "chatbots": ["Gemini"], "description": "Dive into the \"Self-Coding Art Blob,\" a groundbreaking app entirely conceived and implemented by Gemini 3 Pro. This innovative creation features a \"Living Blob\" that dynamically morphs based on user input: type a word like \"Spiky\" or \"Liquid,\" and the app sends its current drawing code to Gemini. Gemini then rewrites the core `draw()` function in real-time, instantly altering the blob's behavior without reloading the page. This demonstrates Gemini's remarkable ability to not only ideate a complex, self-modifying application but also to generate its 1075 lines of functional code with minimal human intervention, showcasing a new frontier in AI-driven software development."}, {"title": "Gemini proposes and implements \u2018Magic SketchPad\u2019 that turns sketches into simple animations", "post_url": "https://docs.google.com/document/d/1mpHyQi9sSYNG2pdRXc_a2kX5C7-T_6jDkkaaKd0bM9I/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/d2736a12952a", "title": "Gemini"} 2829f84fbcd2", "title": "Gemini"}, {"url": "https://gemini.google.com/share/3679a7d00346", "title": "Gemini"}, {"url": "https://gemini.google.com/share/7e7f6efd242a", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research details the creation of a \"Weird hybrid creature guessing game,\" a unique web app co-developed with Google Gemini. Players are challenged to identify two animals that form a fantastical cross-breed, depicted in the charming style of 19th-century naturalist books. The project explores Gemini's evolving capabilities, demonstrating how an iterative process overcame initial resistance to generate images and interactive game elements. Key features like partial credit, a 5-guess limit, and humorous AI responses to silly guesses were integrated, showcasing Gemini's potential for creative, app-building partnerships despite evolving technical requirements."}, {"title": "Chatbots designing and making apps", "post_url": "https://docs.google.com/document/d/1LjmEJTblpl26paOuDLvzj24vnPOMkm2DHWHcVvvtdLo/edit?usp=sharing", "apps": [{"url": "https://chatgpt.com/canvas/shared/6880d6c0c7a8819191724a6b4a84c919", "title": "ChatGPT - Confetti Compliments App"}, {"url": "https://chatgpt.com/canvas/shared/6880cd0b0148819184b4a658330cb880", "title": "ChatGPT - Word Garden Flowers"}, {"url": "https://chatgpt.com/canvas/shared/687e1b60478081918204cfe11d392823", "title": "ChatGPT - Word Garden"}, {"url": "https://chatgpt.com/canvas/shared/6880a8aceb888191a7fe0974acc4a27d", "title": "ChatGPT - Constellation Composer"}, {"url": "https://claude.ai/public/artifacts/b911b97f-a8d9-4cd2-a775-669178d20938", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/75445d93-6270-4a6f-8288-7dcb033b8698", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/48f9c3fc-65a8-4bff-92e8-229ebb6e157f", "title": "Claude Artifact"}, {"url": "https://claude.ai/public/artifacts/68bc6716-0ad5-4040-a1ca-9a44cd67667d", "title": "C  app idea generation"}, {"url": "https://claude.ai/share/a5c17beb-5291-4888-a3af-6c9976693dce", "title": "Claude Chat"}, {"url": "https://g.co/gemini/share/a43bcbe663cd", "title": "Gemini"}, {"url": "https://g.co/gemini/share/e693960d6349", "title": "Gemini"}, {"url": "https://g.co/gemini/share/a4d4a2724281", "title": "Gemini"}, {"url": "https://g.co/gemini/share/f323a7196c21", "title": "Gemini"}, {"url": "https://g.co/gemini/share/1467ea719a3e", "title": "Gemini"}, {"url": "https://g.co/gemini/share/1dc402be1f0e", "title": "Gemini"}, {"url": "https://g.co/gemini/share/94751555d1d2", "title": "Gemini"}, {"url": "https://chatgpt.com/share/6880d7c7-0690-800e-a9fd-0308655376d2", "title": "ChatGPT - Web app idea generation"}, {"url": "https://claude.ai/share/a5c17beb-5291-4888-a3af-6c9976693dce", "title": "Claude Chat"}], "videos": [], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "This fascinating research explores the creative potential of AI chatbots like ChatGPT, Gemini, and Claude when tasked with designing and implementing unique web applications. The researcher adopted a critical role, providing iterative feedback to prompts like \"improve\" or \"now for something completely different,\" while also acting as a beta tester. This hands-off approach led to a diverse array of apps, from the whimsical \"Confetti Compliments App\" and \"Word Garden Flowers\" to the imaginative \"Constellation Composer\" and \"The Alchemist's Grimoire.\" The study offers a captivating glimpse into how AI, with minimal human guidance, can autonomously conceptualize and build functional, fun, and often unusual digital experiences."}, {"title": "A multi-persona app generating storybooks and comic books", "post_url": "https://docs.google.com/document/d/1BbgHIdaXvAaVd25CZCtljt6sWMMT9BRV62Rqk0MQ8G8/edit?usp=sharing", "apps": [{"url": "https://gemini.google.com/share/a9cb24de14cb", "title": "Gemini"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/my-comic%20with%20bananas.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/my-storybook%20mondrian.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/sisi-programmer.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/my-comic%20with%20bananas.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/my-storybook%20mondrian.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/conversations/Gemini%20multi-persona/sisi-programmer.html", "title": "ToonTalk"}], "chat_logs": [{"url": "https://g.co/gemini/share/f3876bf6a105", "title": "Gemini"}, {"url": "https://g.co/gemini/share/f3876bf6a105", "title": "Gemini"}, {"url": "https://gemini.google.com/share/a9cb24de14cb", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "Inspired by Microsoft Comic Chat, this research unveils a multi-persona app designed to transform live chat conversations into dynamic visual storybooks and comic books. Leveraging Gemini 2.5 Pro and its image generation API, the author successfully built a Gemini Canvas app capable of creating illustrated panels depicting speakers and their dialogue. While the core functionality worked, the exploration highlighted significant challenges: Gemini's image generator often embellished visuals, added unwanted text, and struggled with accurate spelling. Though experimenting with graphic novel and children's storybook styles, the latter proved most promising, demonstrating the complex hurdles in generating coherent, text-free visual narratives from conversations."}, {"title": "Seven personas and me talking about creating an app for learning about numbers", "post_url": "https://docs.google.com/document/d/1CWc3JFlivWFzRWdT_PDgtjzSq6mI9Dl81HcIW1bGXGs/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/numbers%20by%207%20personas.html", "title": "Number Explorer Prototype V3"}, {"url": "https://g.co/gemini/share/5f4c69badae0", "title": "Gemini"}, {"url": "https://g.co/gemini/share/39eddc1f88ed", "title": "Gemini"}, {"url": "https://toontalk.github.io/AI/apps/numbers%20by%207%20personas.html", "title": "Number Explorer Prototype V3"}], "chat_logs": [{"url": "https://g.co/gemini/share/5f4c69badae0", "title": "Gemini"}, {"url": "https://g.co/gemini/share/39eddc1f88ed", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research dives into a unique AI-driven exploration of educational app design, simulating how a team of seven diverse experts would approach creating tools for children to learn numbers. Digital personas of luminaries like Seymour Papert, Jean Piaget, and Warren McCulloch, alongside a programmer and writer, engage in an extensive \"conversation\" facilitated by AI. This ambitious project, spanning 162 exchanges, led to the development of three working web app prototypes, including the \"Number Explorer Prototype V3.\" Enhanced with AI-generated \"storybook\" images for each response, the study offers a fascinating, multi-disciplinary look at leveraging AI to innovate educational technology."}, {"title": "Playing Tic Tac Toe with a snarky AI", "post_url": "https://docs.google.com/document/d/1CzbfTZUulzUbbfnIonD2ryNUtB6VEG0KLx9vLhMEtBU/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/tic-tac-toe.html", "title": "Tic\u2011Tac\u2011Toe \u2022 AI\u00a0vs\u00a0You"}, {"url": "https://claude.ai/public/artifacts/90b9c2b8-b349-4620-ab67-4603f22ef9a8", "title": "Claude Artifact"}, {"url": "https://chatgpt.com/canvas/shared/68027e1fc8b88191879cf8fd1bd4e82b", "title": "ChatGPT - Tic Tac Toe Perfect"}, {"url": "https://toontalk.github.io/AI/apps/tic-tac-toe.html", "title": "Tic\u2011Tac\u2011Toe \u2022 AI\u00a0vs\u00a0You"}, {"url": "https://claude.ai/public/artifacts/90b9c2b8-b349-4620-ab67-4603f22ef9a8", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://chatgpt.com/share/680291e2-14e0-800e-bff5-9d2c7ac93c2a", "title": "ChatGPT - Perfect Tic-Tac-Toe AI"}, {"url": "https://gemini.google.com/share/6ccae3243bd3", "title": "Gemini"}, {"url": "https://gemini.google.com/share/764d5f007f41", "title": "Gemini"}, {"url": "https://chatgpt.com/share/680291e2-14e0-800e-bff5-9d2c7ac93c2a", "title": "ChatGPT - Perfect Tic-Tac-Toe AI"}, {"url": "https://gemini.google.com/share/6ccae3243bd3", "title": "Gemini"}, {"url": "https://gemini.google.com/share/764d5f007f41", "title": "Gemini"}], "videos": [{"url": "https://youtu.be/oZq9enktvyk?si=kSv-NtPscd11BgoN", "title": "Talking Tic Tac Toe", "video_id": "oZq9enktvyk"}, {"url": "https://youtu.be/oZq9enktvyk?si=kSv-NtPscd11BgoN", "title": "Talking Tic Tac Toe", "video_id": "oZq9enktvyk"}], "chatbots": ["ChatGPT", "Claude", "Gemini"], "description": "Dive into the fascinating journey of building a web-based Tic-Tac-Toe game where the AI isn't just smart, it's snarky! This exploration began with ChatGPT creating a perfect player, then escalated by integrating Gemini to inject witty, remark-filled moves. The project further innovated by enabling voice interaction, allowing players to speak their moves and engage in dynamic conversations with the AI. The research also details the portability of this unique game across various AI platforms like Claude, showcasing the evolving capabilities of conversational AI in interactive applications."}, {"title": "An app for exploring creativity in chatbots", "post_url": "https://docs.google.com/document/d/1psNLuXuY3xQOVbX9coMWwNh1IB6sO2CQLwuIEB8jrIQ/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/llm-creativity-explorer.html", "title": "Gemini Response Explorer"}, {"url": "https://claude.ai/public/artifacts/4a8b1786-5063-4051-a4ea-82ea392727ee", "title": "Claude Artifact"}, {"url": "https://toontalk.github.io/AI/apps/llm-creativity-explorer.html", "title": "Gemini Response Explorer"}, {"url": "https://claude.ai/public/artifacts/4a8b1786-5063-4051-a4ea-82ea392727ee", "title": "Claude Artifact"}], "chat_logs": [{"url": "https://claude.ai/share/e7edf33f-a25b-4000-87f0-3b9bc8fabd2f", "title": "Claude Chat"}, {"url": "https://claude.ai/share/e7edf33f-a25b-4000-87f0-3b9bc8fabd2f", "title": "Claude Chat"}], "videos": [], "chatbots": ["Claude"], "description": "This research introduces the \"Gemini Response Explorer,\" an innovative app designed to probe the nuanced creativity of chatbots. Inspired by findings that AI enhances individual creativity but reduces collective diversity in human writing, the project investigates how different LLM parameters influence originality. The author conducted 12 experiments with Gemini 2.5 Pro, varying prompts, temperature settings (from 0 to 1), and adding specific instructions like \"Be creative\" to understand their impact on the diversity of AI-generated story summaries. This exploration's results, revealing how higher temperatures increase diversity, are best visualized through a custom Claude-created data app, offering insights into fostering more varied AI outputs."}, {"title": "Gemini 2.0 Flash talking to itself", "post_url": "https://docs.google.com/document/d/1dJvZxR4kpxL7bV35dvXow23i2F-caMP7YanP2gMyK40/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/gemini-flash.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/soup%20game.html", "title": "Sentient Spoonful (Emoji Edition with Sound)"}, {"url": "https://toontalk.github.io/AI/apps/gemini-flash.html", "title": "ToonTalk"}, {"url": "https://toontalk.github.io/AI/apps/soup%20game.html", "title": "Sentient Spoonful (Emoji Edition with Sound)"}], "chat_logs": [{"url": "https://chatgpt.com/share/67aee34a-7d24-800e-a93a-87c940e07285", "title": "ChatGPT - Sentient Spoonful Game Design"}, {"url": "https://chatgpt.com/share/67aee34a-7d24-800e-a93a-87c940e07285", "title": "ChatGPT - Sentient Spoonful Game Design"}], "videos": [], "chatbots": ["ChatGPT", "Gemini"], "description": "This research post delves into the intriguing world of AI models conversing with each other, leveraging Google's Gemini 2.0 Flash API. The author explored having multiple instances \"talk\" to generate ideas and even code web applications without server-side programming. This innovative approach led to the creation of imaginative apps like \"Sentient Spoonful (Emoji Edition with Sound)\" and a whimsical \"soup game,\" collaboratively designed by an \"Expert programmer\" AI and an \"Out-of-the-box thinker\" AI. Beyond app development, the project also generated science fiction stories and creative writing lessons, showcasing the powerful potential of AI-to-AI interaction for diverse and animated content creation."}, {"title": "Using \u201cReasoning\u201d chatbots to improve the Connections Puzzle game generator", "post_url": "https://docs.google.com/document/d/14Yl4mC8jtiA56T3CdPOAiRIQ1V4d1a557wXYRywbNTc/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}, {"url": "https://toontalk.github.io/AI/apps/Connections-v2/index.html", "title": "Connections Game"}], "chat_logs": [{"url": "https://chatgpt.com/share/67975b96-3f48-800e-8eb9-cc30e7e39276", "title": "ChatGPT - Word Categorization Challenge"}, {"url": "https://chatgpt.com/share/67975b96-3f48-800e-8eb9-cc30e7e39276", "title": "ChatGPT - Word Categorization Challenge"}], "videos": [], "chatbots": ["ChatGPT"], "description": "This research unveils a novel method for refining AI prompts, moving beyond traditional trial-and-error. By analyzing the explicit \"reasoning\" or \"chain of thought\" from advanced chatbots like ChatGPT o1 and DeepSeek R1, the author discovered hidden ambiguities and misunderstandings in a prompt designed to generate Connections puzzles. This unique insight, unavailable from non-reasoning models, allowed for targeted conversations with the chatbots to clarify instructions. The iterative process ultimately yielded an improved prompt, demonstrating how understanding an AI's thought process can lead to more robust and effective prompt engineering."}, {"title": "Chatbot-assisted co-creation of a neural net to judge confidence from text", "post_url": "https://docs.google.com/document/d/1AuhwCuprcrtREaT8zRW3RWdNSpf0ILlVHRzGBq4-I18/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/confidence/index.html", "title": "Confidence Predictor"}, {"url": "https://toontalk.github.io/AI/apps/confidence/confidence-by-o1.html", "title": "Confidence Classifier (All Updates)"}, {"url": "https://toontalk.github.io/AI/apps/confidence/confidence-by-deepseek-r1-fixed-by-claude.html", "title": "Confidence Level Predictor"}, {"url": "https://toontalk.github.io/AI/apps/confidence/index.html", "title": "Confidence Predictor"}, {"url": "https://toontalk.github.io/AI/apps/confidence/confidence-by-o1.html", "title": "Confidence Classifier (All Updates)"}, {"url": "https://toontalk.github.io/AI/apps/confidence/confidence-by-deepseek-r1-fixed-by-claude.html", "title": "Confidence Level Predictor"}], "chat_logs": [{"url": "https://chat.openai.com/share/3767033d-7da0-47e3-9383-a5556e4dc1eb", "title": "ChatGPT - Text Confidence Predictor."}, {"url": "https://chat.openai.com/share/3767033d-7da0-47e3-9383-a5556e4dc1eb", "title": "ChatGPT - Text Confidence Predictor."}], "videos": [], "chatbots": ["Claude"], "description": "This research details the fascinating co-creation of a compact neural network designed to judge confidence levels within text. Initially conceived as a Snap! model in 2020, the project evolved dramatically with AI assistance. ChatGPT helped develop a web-based version, while Claude 3.5 played a crucial role in significantly enlarging the training dataset from 60 to 150 sentences, leading to marked improvements in model accuracy. The post highlights how large language models are invaluable not just for text analysis, but as potent collaborators in building and refining machine learning applications, offering architectural suggestions and dataset enhancements to create specialized tools like the \"Confidence Predictor\" apps."}, {"title": "Experiments with an app to repeat prompts to LLMs", "post_url": "https://docs.google.com/document/d/1ckK0X4Zl6cm8PCz0_wpEpPptebpA_brAaPBTle-BfX8/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/repeated%20prompting/index.html", "title": "Repeating LLM Prompter (LanguageModel API)"}, {"url": "https://toontalk.github.io/AI/apps/repeated%20prompting/index.html", "title": "Repeating LLM Prompter (LanguageModel API)"}], "chat_logs": [{"url": "https://gemini.google.com/share/3013c49f7e74", "title": "Gemini"}, {"url": "https://gemini.google.com/share/3013c49f7e74", "title": "Gemini"}], "videos": [], "chatbots": ["Gemini"], "description": "This research unveils the \"Repeating LLM Prompter,\" an innovative app meticulously crafted (initially by AI models themselves!) to explore how Large Language Models evolve responses through successive, iterative prompts. The app features static and dynamic text areas, where the LLM's previous output continually replaces the dynamic portion, allowing for fascinating self-referential expansion. Experiments, like prompting with \"To be, or not to be,\" dramatically illustrate Gemini's capacity to elaborate, transforming a simple query into increasingly profound and poetic cosmic reflections over numerous iterations, offering a unique glimpse into AI's iterative creative potential."}, {"title": "ChatGPT 4o creates a Chrome extension to find the contextual meaning of words on web pages", "post_url": "https://docs.google.com/document/d/1TRMN1pNX0xfbK0MVagNxdKb066_pKV2hn2N9lec2Rb4/edit?usp=sharing", "apps": [], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "This research highlights ChatGPT 4o's remarkable capability to autonomously create a fully functional Chrome extension. Starting with an initial concept and later integrating documentation for Gemini Nano, the AI generated every line of code for an extension that finds the *contextual* meaning of selected words on web pages. This innovative tool runs locally and offline, accurately discerning the appropriate definition for multi-meaning words, as demonstrated with \"dubbed.\" Developed rapidly in a matter of hours, this project showcases a significant advancement in AI's capacity for end-to-end software development, offering a practical solution for deeper text comprehension."}, {"title": "Playing chess by flipping between a ChatGPT tab and a chess app", "post_url": "https://docs.google.com/document/d/1B21M_gw_lUJ8dZ0nK74oK0ikJV0KXnc9PiGyRlK4u1E/edit?usp=sharing", "apps": [{"url": "https://toontalk.github.io/AI/apps/chess%20by%204o/index.html", "title": "Chess Game"}, {"url": "https://toontalk.github.io/AI/apps/chess%20by%204o/index.html", "title": "Chess Game"}, {"url": "https://toontalk.github.io/AI/apps/chess%20by%204o/index.html", "title": "Chess Game"}, {"url": "https://toontalk.github.io/AI/apps/chess%20by%204o/index.html", "title": "Chess Game"}], "chat_logs": [], "videos": [], "chatbots": ["ChatGPT"], "description": "Tired of manually typing moves to play chess with AI? This research details the creation of a streamlined AI-powered chess experience. First, a custom web app was developed with ChatGPT, offering a visual board where users drag pieces and moves are automatically notated. To eliminate the tedious copy-pasting between this app and a chatbot, Claude 3.5 was then prompted to build an ingenious Chrome extension. This extension fully automates move transfer, copying your move to the AI tab and pasting the AI's response back into the game, resulting in a remarkably seamless, automated chess match."}, {"title": "Dialog and OceanAI responses and generated games by Claude 3", "post_url": "https://docs.google.com/document/d/1pOF4bUHruXSYs5vknyH00zhd9sa-hxrK2sV5hFC07UY/edit?usp=sharing", "apps": [], "chat_logs": [{"url": "https://chatgpt.com/share/02a8d326-8a39-4457-9395-65841e8620d0", "title": "ChatGPT - Illustrated Story Ideas"}, {"url": "https://chatgpt.com/share/02a8d326-8a39-4457-9395-65841e8620d0", "title": "ChatGPT - Illustrated Story Ideas"}], "videos": [], "chatbots": ["ChatGPT", "Claude"], "description": "This research explores a unique application of AI in education, using Claude 3.5 Sonnet to simultaneously simulate two middle school students *and* iteratively develop a web game. The project centers on an \"illustrated story\" where fictional students, guided by a chatbot, create \"EcoQuest,\" a simple game promoting environmental awareness. Claude generated both the student dialogs and enhanced game versions, while ChatGPT 4o provided the initial game concept and illustrations. This 24-page story vividly demonstrates how non-technical users can leverage AI for step-by-step app development, from simple beginnings to refined outcomes, showcasing the power of conversational AI in creative education."}];

        function deduplicateLinks(links) {
            const seen = new Set();
            return links.filter(link => {
                if (seen.has(link.url)) return false;
                seen.add(link.url);
                return true;
            });
        }

        function renderPosts() {
            const tbody = document.getElementById('postsTable');
            tbody.innerHTML = postsData.map((post, index) => {
                const chatbotBadges = post.chatbots.map(bot =>
                    `<span class="chatbot-badge chatbot-${bot.toLowerCase()}">${bot}</span>`
                ).join('');

                const allLinks = deduplicateLinks([
                    ...post.apps.map(app => ({ url: app.url, title: app.title, type: 'app' })),
                    ...post.chat_logs.map(chat => ({ url: chat.url, title: chat.title, type: 'chat' })),
                    ...post.videos.map(video => ({ url: video.url, title: video.title, type: 'video' }))
                ]);

                const linksHtml = allLinks.length > 0
                    ? allLinks.map(link => `<a href="${link.url}" target="_blank" class="badge badge-${link.type}">${link.title}</a>`).join('')
                    : '<span style="color: #999; font-style: italic;">No links</span>';

                return `
                    <tr>
                        <td>
                            <div class="post-title">
                                <a href="${post.post_url}" target="_blank">${post.title}</a>
                                <button class="info-btn" onclick="showDescription(${index})">i</button>
                            </div>
                        </td>
                        <td>${chatbotBadges || '<span style="color: #999;">None</span>'}</td>
                        <td>${linksHtml}</td>
                    </tr>
                `;
            }).join('');
        }

        const modal = document.getElementById('modal');
        const closeBtn = document.querySelector('.close');

        function showDescription(index) {
            const post = postsData[index];
            document.getElementById('modalTitle').textContent = post.title;
            const description = post.description || 'No description available.';
            const htmlContent = marked.parse(description);
            document.getElementById('modalBody').innerHTML = htmlContent;
            modal.style.display = 'block';
        }

        closeBtn.onclick = function() { modal.style.display = 'none'; }
        window.onclick = function(event) { if (event.target == modal) modal.style.display = 'none'; }

        renderPosts();
    </script>
</body>
