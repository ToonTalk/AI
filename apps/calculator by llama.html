<!DOCTYPE html>
<html>
<head>
  <title>Calculator App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    #calculator {
      width: 300px;
      margin: 40px auto;
      background-color: #f0f0f0;
      padding: 20px;
      border: 1px solid #ccc;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    #display {
      font-size: 36px;
      font-weight: bold;
      padding: 10px;
      text-align: right;
    }
    button {
      width: 50px;
      height: 30px;
      margin: 5px;
      font-size: 18px;
      cursor: pointer;
    }
    button:hover {
      background-color: #ccc;
    }
  </style>
</head>
<body>
  <div id="calculator">
    <div id="display"></div>
    <button id="clear">C</button>
    <button id="backspace">⌫</button>
    <button id="7">7</button>
    <button id="8">8</button>
    <button id="9">9</button>
    <button id="divide">/</button>
    <button id="4">4</button>
    <button id="5">5</button>
    <button id="6">6</button>
    <button id="multiply">*</button>
    <button id="1">1</button>
    <button id="2">2</button>
    <button id="3">3</button>
    <button id="subtract">-</button>
    <button id="0">0</button>
    <button id="dot">.</button>
    <button id="add">+</button>
    <button id="exp">^</button>
    <button id="equals">=</button>
  </div>

  <script>
    let display = document.getElementById("display");
    let buttons = document.querySelectorAll("button");
    let currentNumber = "";
    let lastOperation = "";
    let result = 0;
    let runningTotal = 0;

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        if (button.id === "clear") {
          currentNumber = "";
          display.textContent = "";
        } else if (button.id === "backspace") {
          currentNumber = currentNumber.slice(0, -1);
          display.textContent = currentNumber;
        } else if (button.id === "equals") {
          if (lastOperation === "add") {
            result += parseInt(currentNumber);
          } else if (lastOperation === "subtract") {
            result -= parseInt(currentNumber);
          } else if (lastOperation === "multiply") {
            result *= parseInt(currentNumber);
          } else if (lastOperation === "divide") {
            result /= parseInt(currentNumber);
          } else if (button.id === "exp") {
            result = BigInt(result).pow(BigInt(currentNumber));
          }
          display.textContent = result.toString();
          currentNumber = "";
          lastOperation = "";
        } else {
          if (button.id === "0" && currentNumber === "") {
            currentNumber += "0";
          } else {
            currentNumber += button.textContent;
          }
          display.textContent = currentNumber;
          if (button.id === "dot") {
            currentNumber += ".";
          }
          if (button.id === "add" || button.id === "subtract" || button.id === "multiply" || button.id === "divide" || button.id === "exp") {
            lastOperation = button.id;
          }
        }
      });
    });
  </script>
</body>
</html>
