    <!DOCTYPE html>
<html>
<head>
  <title>Calculator App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #calculator {
      width: 300px;
      height: 400px;
      border: 1px solid #ccc;
      padding: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    #calculator input[type="number"] {
      width: 100%;
      height: 30px;
      padding: 10px;
      font-size: 18px;
      border: 1px solid #ccc;
    }
    #calculator button {
      width: 30px;
      height: 30px;
      padding: 10px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: #fff;
      cursor: pointer;
    }
    #calculator button:hover {
      background-color: #3e8e41;
    }
  </style>
</head>
<body>
  <div id="calculator">
    <input type="number" id="num1" value="0">
    <input type="number" id="num2" value="0">
    <button id="add">+</button>
    <button id="subtract">-</button>
    <button id="multiply">*</button>
    <button id="divide">/</button>
    <button id="exponent">^</button>
    <button id="equal">=</button>
    <button id="clear">C</button>
  </div>
  <script>
    const num1Input = document.getElementById('num1');
    const num2Input = document.getElementById('num2');
    const addBtn = document.getElementById('add');
    const subtractBtn = document.getElementById('subtract');
    const multiplyBtn = document.getElementById('multiply');
    const divideBtn = document.getElementById('divide');
    const exponentBtn = document.getElementById('exponent');
    const equalBtn = document.getElementById('equal');
    const clearBtn = document.getElementById('clear');

    let num1 = 0n;
    let num2 = 0n;
    let operation = '';

    addBtn.addEventListener('click', () => {
      num1 = BigInt(num1Input.value);
      operation = '+';
      num1Input.value = '';
      num2Input.value = '';
    });

    subtractBtn.addEventListener('click', () => {
      num1 = BigInt(num1Input.value);
      operation = '-';
      num1Input.value = '';
      num2Input.value = '';
    });

    multiplyBtn.addEventListener('click', () => {
      num1 = BigInt(num1Input.value);
      operation = '*';
      num1Input.value = '';
      num2Input.value = '';
    });

    divideBtn.addEventListener('click', () => {
      num1 = BigInt(num1Input.value);
      operation = '/';
      num1Input.value = '';
      num2Input.value = '';
    });

    exponentBtn.addEventListener('click', () => {
      num1 = BigInt(num1Input.value);
      operation = '^';
      num1Input.value = '';
      num2Input.value = '';
    });

    equalBtn.addEventListener('click', () => {
      num2 = BigInt(num2Input.value);
      if (operation === '+') {
        num1 = num1 + num2;
      } else if (operation === '-') {
        num1 = num1 - num2;   
      } else if (operation === '*') {
        num1 = num1 * num2;
      } else if (operation === '/') {
        num1 = num1 / num2;
      } else if (operation === '^') {
        num1 = BigInt(Math.pow(Number(num1), Number(num2)));
      }
      num1Input.value = num1.toString();
      num2Input.value = '';
      operation = '';
    });

    clearBtn.addEventListener('click', () => {
      num1 = 0n;
      num2 = 0n;
      num1Input.value = '';
      num2Input.value = '';
      operation = '';
    });

    num1Input.addEventListener('input', () => {
      num1 = BigInt(num1Input.value);
    });

    num2Input.addEventListener('input', () => {
      num2 = BigInt(num2Input.value);
    });
  </script>
</body>
</html>
