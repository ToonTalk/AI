<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sisi's Magical Unicorns</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E%F0%9F%A6%84%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg1: #160726;
      --bg2: #2b0b4b;
      --bg3: #4d2a90;
      --pink1: #f58ee9;
      --pink2: #ff54eb;
      --blue1: #8ecfff;
      --ink: #331f4d;
      --panel: rgba(255,255,255,0.11);
      --border: rgba(255,255,255,0.16);
      --shadow: 0 18px 60px rgba(0,0,0,0.33);
      --glow: 0 0 48px rgba(201, 134, 255, 0.28);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
      background:
        radial-gradient(circle at 50% 20%, rgba(120, 80, 230, 0.28), transparent 30%),
        radial-gradient(circle at 50% 48%, rgba(132, 98, 255, 0.22), transparent 42%),
        radial-gradient(circle at 50% 50%, var(--bg3) 0%, var(--bg2) 43%, var(--bg1) 100%);
      overflow: hidden;
    }

    .stars,
    .stars::before,
    .stars::after {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
      opacity: 0.72;
      background-repeat: repeat;
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 6% 12%, rgba(255,255,255,.86), transparent),
        radial-gradient(1.5px 1.5px at 16% 52%, rgba(255,255,255,.65), transparent),
        radial-gradient(2px 2px at 34% 28%, rgba(255,180,250,.8), transparent),
        radial-gradient(1.6px 1.6px at 58% 10%, rgba(255,255,255,.76), transparent),
        radial-gradient(2px 2px at 72% 76%, rgba(255,255,255,.75), transparent),
        radial-gradient(1.5px 1.5px at 90% 32%, rgba(255,180,250,.82), transparent);
      animation: twinkle 8s linear infinite;
    }

    .stars::before {
      background-image:
        radial-gradient(1.5px 1.5px at 21% 20%, rgba(255,255,255,.8), transparent),
        radial-gradient(2px 2px at 41% 70%, rgba(255,255,255,.65), transparent),
        radial-gradient(1.5px 1.5px at 64% 30%, rgba(255,180,250,.85), transparent),
        radial-gradient(2px 2px at 84% 16%, rgba(255,255,255,.7), transparent);
      animation: twinkle 12s linear infinite reverse;
    }

    .stars::after {
      background-image:
        radial-gradient(2px 2px at 8% 84%, rgba(255,255,255,.8), transparent),
        radial-gradient(1.6px 1.6px at 29% 44%, rgba(255,255,255,.7), transparent),
        radial-gradient(2px 2px at 54% 92%, rgba(255,180,250,.85), transparent),
        radial-gradient(1.5px 1.5px at 79% 56%, rgba(255,255,255,.7), transparent);
      animation: twinkle 16s linear infinite;
    }

    @keyframes twinkle {
      0% { transform: translateY(0px); opacity: 0.62; }
      50% { opacity: 0.9; }
      100% { transform: translateY(-12px); opacity: 0.62; }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-9px) scale(1.03); }
    }

    @keyframes shimmer {
      0%, 100% { box-shadow: var(--glow); }
      50% { box-shadow: 0 0 64px rgba(255, 131, 230, 0.34); }
    }

    .app {
      position: relative;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding: 12px 18px 18px;
      z-index: 1;
      gap: 10px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      font-size: clamp(36px, 4vw, 68px);
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.06em;
      color: #ffffff;
      text-shadow: 0 4px 26px rgba(255,255,255,0.12);
      user-select: none;
    }

    .world-chip {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.12);
      color: white;
      min-height: 72px;
      border-radius: 999px;
      padding: 10px 18px 10px 10px;
      display: inline-flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      cursor: pointer;
      font: inherit;
    }

    .world-avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--pink1), #de74dd);
      color: #2f124f;
      font-size: 22px;
      font-weight: 900;
      border: 3px solid rgba(255,255,255,0.88);
      flex: 0 0 auto;
    }

    .world-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: rgba(255,255,255,0.78);
      white-space: nowrap;
    }

    .main {
      flex: 1 1 auto;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .stage {
      width: min(1240px, 100%);
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(360px, 1fr) minmax(280px, 0.82fr);
      gap: clamp(28px, 5vw, 88px);
      align-items: end;
      justify-items: center;
      position: relative;
      padding: 8px 0 8px;
    }

    .center-glow {
      position: absolute;
      left: 50%;
      bottom: 12%;
      transform: translateX(-50%);
      width: min(700px, 70vw);
      height: min(360px, 38vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(169,116,255,0.25) 0%, rgba(159,116,255,0.08) 48%, transparent 74%);
      filter: blur(8px);
      pointer-events: none;
    }

    .character {
      position: relative;
      width: 100%;
      min-height: 430px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: end;
    }

    .bubble {
      position: absolute;
      top: 6px;
      max-width: 330px;
      min-width: 210px;
      min-height: 92px;
      padding: 18px 22px;
      border-radius: 32px;
      box-shadow: var(--shadow);
      font-size: 18px;
      line-height: 1.35;
      transform: translateY(8px);
      opacity: 0;
      transition: opacity .22s ease, transform .22s ease;
      pointer-events: none;
      z-index: 2;
    }

    .bubble.show {
      opacity: 1;
      transform: translateY(0px);
    }

    .bubble.sparkle {
      left: 6%;
      background: rgba(255,255,255,0.95);
      color: var(--ink);
    }

    .bubble.bubbles {
      right: 4%;
      background: rgba(255, 226, 247, 0.96);
      color: #7b2c60;
    }

    .bubble::after {
      content: "";
      position: absolute;
      bottom: -16px;
      width: 34px;
      height: 34px;
      background: inherit;
      transform: rotate(45deg);
    }

    .bubble.sparkle::after { left: 70px; }
    .bubble.bubbles::after { right: 74px; }

    .sparkle-tag {
      display: inline-block;
      margin-bottom: 6px;
      font-size: 12px;
      letter-spacing: 0.08em;
      font-style: italic;
      font-weight: 900;
      color: #ff88f3;
      text-transform: uppercase;
    }

    .word-active {
      color: var(--pink2);
      font-weight: 900;
      display: inline-block;
      transform: scale(1.08);
    }

    .unicorn-wrap {
      position: relative;
      display: grid;
      place-items: end center;
      width: 100%;
      min-height: 320px;
      z-index: 1;
    }

    .unicorn {
      line-height: 1;
      user-select: none;
      filter: drop-shadow(0 24px 32px rgba(0,0,0,0.2));
      animation: floaty 4.3s ease-in-out infinite;
      text-shadow: 0 0 30px rgba(255,165,245,0.18);
      position: relative;
    }

    .unicorn.sparkle {
      font-size: clamp(190px, 23vw, 300px);
      transform-origin: center bottom;
    }

    .unicorn.bubbles {
      font-size: clamp(130px, 14vw, 186px);
      animation-duration: 3.5s;
      transform-origin: center bottom;
    }

    .egg-btn {
      border: 0;
      background: transparent;
      color: white;
      font-size: clamp(94px, 12vw, 142px);
      cursor: pointer;
      animation: bob 3.2s ease-in-out infinite;
      line-height: 1;
      padding: 0;
      filter: drop-shadow(0 16px 22px rgba(0,0,0,0.25));
    }

    .baby-bottle {
      position: absolute;
      left: 10px;
      bottom: 24px;
      font-size: 92px;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,0.18));
      animation: bob 3s ease-in-out infinite;
    }

    .status {
      min-height: 26px;
      font-weight: 800;
      letter-spacing: 0.01em;
      color: #ffd3fc;
      text-align: center;
      text-shadow: 0 4px 18px rgba(0,0,0,0.28);
      padding-top: 4px;
    }

    .dock {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 6px 0 0;
      position: relative;
      z-index: 5;
    }

    .dock-btn,
    .song-btn,
    .volume-panel {
      min-height: 84px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.1);
      color: white;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .dock-btn,
    .song-btn {
      font: inherit;
      cursor: pointer;
      padding: 0 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: clamp(20px, 2vw, 25px);
      font-weight: 800;
      transition: transform .16s ease, background-color .16s ease;
      position: relative;
      overflow: hidden;
    }

    .dock-btn:hover,
    .song-btn:hover,
    .world-chip:hover,
    .send-btn:hover,
    .secondary-btn:hover,
    .setup-btn:hover,
    .egg-btn:hover {
      transform: translateY(-1px) scale(1.01);
    }

    .dock-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      filter: grayscale(0.35);
    }

    .song-btn {
      min-width: min(390px, 92vw);
      background: linear-gradient(90deg, rgba(245,142,233,0.95), rgba(142,207,255,0.95));
      color: #2f1846;
      animation: shimmer 3.2s ease-in-out infinite;
    }

    .volume-panel {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      min-width: 275px;
      justify-content: center;
    }

    .volume-panel input[type="range"] { width: 150px; }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(10, 5, 24, 0.72);
      backdrop-filter: blur(10px);
      z-index: 20;
      padding: 24px;
    }

    .panel {
      width: min(460px, 100%);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 36px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .panel h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .panel p {
      margin: 0 0 18px;
      text-align: center;
      color: rgba(255,255,255,0.82);
      line-height: 1.5;
    }

    .field {
      display: grid;
      gap: 10px;
      margin: 14px 0;
    }

    .text-input,
    .key-input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: white;
      border-radius: 18px;
      padding: 16px 18px;
      outline: none;
      font: inherit;
    }

    .text-input::placeholder,
    .key-input::placeholder { color: rgba(255,255,255,0.58); }

    .setup-row,
    .composer-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .setup-btn,
    .send-btn,
    .secondary-btn {
      border: 0;
      font: inherit;
      cursor: pointer;
      border-radius: 18px;
      min-height: 56px;
      padding: 0 20px;
      font-weight: 800;
      color: white;
      box-shadow: var(--shadow);
    }

    .setup-btn,
    .send-btn {
      background: linear-gradient(135deg, var(--pink1), var(--pink2));
      flex: 1 1 auto;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.14);
      flex: 0 0 auto;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.86);
      font-size: 15px;
    }

    .setup-status,
    .composer-status {
      min-height: 22px;
      margin-top: 12px;
      text-align: center;
      color: rgba(255,255,255,0.76);
      font-size: 13px;
    }

    .tiny {
      margin-top: 12px;
      text-align: center;
      color: rgba(255,255,255,0.66);
      line-height: 1.45;
      font-size: 13px;
    }

    .hidden { display: none !important; }

    .flying-gift {
      position: fixed;
      left: 0;
      top: 0;
      font-size: 92px;
      pointer-events: none;
      z-index: 30;
      transform: translate(-50%, -50%) scale(1.35);
      transition: transform 900ms cubic-bezier(.2,.8,.2,1), opacity 900ms ease;
      will-change: transform, opacity;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.22));
    }

    @media (max-width: 1050px) {
      body { overflow: auto; }
      .stage {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .character { min-height: 290px; }
      .bubble.sparkle,
      .bubble.bubbles {
        left: 50%;
        right: auto;
        transform: translate(-50%, 8px);
      }
      .bubble.sparkle.show,
      .bubble.bubbles.show {
        transform: translate(-50%, 0px);
      }
      .bubble.sparkle::after,
      .bubble.bubbles::after {
        left: calc(50% - 17px);
        right: auto;
      }
      .baby-bottle { left: -10px; }
    }

    @media (max-width: 720px) {
      .app { padding: 12px 12px 14px; }
      .brand { font-size: 42px; }
      .world-chip {
        min-height: 62px;
        gap: 10px;
        padding-right: 14px;
      }
      .world-avatar {
        width: 48px;
        height: 48px;
        font-size: 18px;
      }
      .world-text { display: none; }
      .dock { gap: 12px; }
      .dock-btn,
      .song-btn,
      .volume-panel {
        min-height: 68px;
        font-size: 18px;
      }
      .song-btn { min-width: 100%; }
      .volume-panel { min-width: min(100%, 320px); }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="app">
    <header class="topbar">
      <div class="brand">MagicFriends</div>
      <button id="worldBtn" class="world-chip" type="button" aria-label="Open Sisi's World settings">
        <span id="worldAvatar" class="world-avatar">S</span>
        <span id="worldText" class="world-text">Sisi's World</span>
      </button>
    </header>

    <main class="main">
      <section class="stage">
        <div class="center-glow"></div>

        <section class="character">
          <div id="sparkleBubble" class="bubble sparkle show">
            <div class="sparkle-tag">SPARKLE</div>
            <div id="sparkleText"></div>
          </div>
          <div id="sparkleWrap" class="unicorn-wrap">
            <div id="sparkleAvatar" class="unicorn sparkle" aria-hidden="true">🦄</div>
          </div>
        </section>

        <section class="character">
          <div id="bubblesBubble" class="bubble bubbles hidden">
            <div id="bubblesText"></div>
          </div>
          <div id="bubblesWrap" class="unicorn-wrap">
            <button id="eggBtn" class="egg-btn" type="button" aria-label="Hatch Bubbles">🥚</button>
            <div id="bubblesAvatar" class="unicorn bubbles hidden" aria-hidden="true">🦄</div>
            <div id="babyBottle" class="baby-bottle hidden" aria-hidden="true">🍼</div>
          </div>
        </section>
      </section>
    </main>

    <div id="status" class="status"></div>

    <div class="dock">
      <button id="sparkleTalkBtn" class="dock-btn" type="button">🎤 <span>Sparkle</span></button>
      <button id="bubblesTalkBtn" class="dock-btn" type="button">🎤 <span>Bubbles</span></button>
      <button id="duoSongBtn" class="song-btn" type="button">🎵 <span>Magical Duo Song</span></button>
      <button id="giftSparkleBtn" class="dock-btn" type="button"><span id="giftSparkleEmoji">🍎</span> <span>For Sparkle</span></button>
      <button id="giftBubblesBtn" class="dock-btn" type="button"><span id="giftBubblesEmoji">🧁</span> <span>For Bubbles</span></button>
      <div class="volume-panel">
        <span style="font-size:30px; line-height:1;">🔊</span>
        <input id="volumeSlider" type="range" min="0" max="100" step="1" value="55" aria-label="Volume" />
      </div>
    </div>
  </div>

  <div id="setupOverlay" class="overlay" aria-hidden="true">
    <div class="panel">
      <h1>Magic Connection</h1>
      <p>Paste a Gemini API key to let the unicorns answer and speak.</p>
      <div class="field">
        <input id="keyInput" class="key-input" type="password" placeholder="Paste Gemini API key..." autocomplete="off" />
      </div>
      <div class="field">
        <input id="childNameInput" class="text-input" type="text" placeholder="Child's name (default Sisi)" maxlength="40" />
      </div>
      <label class="checkbox-row">
        <input id="rememberKey" type="checkbox" checked />
        <span>Remember my key on this device</span>
      </label>
      <div class="setup-row">
        <button id="saveKeyBtn" class="setup-btn" type="button">Start the Magic ✨</button>
        <button id="closeSetupBtn" class="secondary-btn" type="button">Close</button>
      </div>
      <div id="setupStatus" class="setup-status"></div>
      <div class="tiny">You can create a Gemini API key in Google AI Studio. Open AI Studio, generate an API key for the Gemini API, and paste it here.</div>
    </div>
  </div>

  <div id="composerOverlay" class="overlay" aria-hidden="true">
    <div class="panel">
      <h1 id="composerTitle">Talk to Sparkle</h1>
      <p id="composerHint">Type a message and send it.</p>
      <div class="field">
        <input id="composerInput" class="text-input" type="text" placeholder="Type a magical message..." maxlength="600" />
      </div>
      <div class="composer-row">
        <button id="composerSendBtn" class="send-btn" type="button">Send ✨</button>
        <button id="composerCancelBtn" class="secondary-btn" type="button">Cancel</button>
      </div>
      <div id="composerStatus" class="composer-status"></div>
    </div>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = "MAGIC_UNICORN_KEY";
      var STORAGE_REMEMBER = "MAGIC_UNICORN_REMEMBER";
      var STORAGE_VOLUME = "MAGIC_UNICORN_VOLUME";
      var STORAGE_CHILD_NAME = "MAGIC_UNICORN_CHILD_NAME";
      var NL = String.fromCharCode(10);
      var SPARKLE_VOICE = "Kore";
      var BUBBLES_VOICE = "Aoede";

      var els = {
        worldBtn: document.getElementById("worldBtn"),
        worldAvatar: document.getElementById("worldAvatar"),
        worldText: document.getElementById("worldText"),
        sparkleBubble: document.getElementById("sparkleBubble"),
        sparkleText: document.getElementById("sparkleText"),
        bubblesBubble: document.getElementById("bubblesBubble"),
        bubblesText: document.getElementById("bubblesText"),
        sparkleWrap: document.getElementById("sparkleWrap"),
        sparkleAvatar: document.getElementById("sparkleAvatar"),
        bubblesWrap: document.getElementById("bubblesWrap"),
        eggBtn: document.getElementById("eggBtn"),
        bubblesAvatar: document.getElementById("bubblesAvatar"),
        babyBottle: document.getElementById("babyBottle"),
        sparkleTalkBtn: document.getElementById("sparkleTalkBtn"),
        bubblesTalkBtn: document.getElementById("bubblesTalkBtn"),
        duoSongBtn: document.getElementById("duoSongBtn"),
        giftSparkleBtn: document.getElementById("giftSparkleBtn"),
        giftSparkleEmoji: document.getElementById("giftSparkleEmoji"),
        giftBubblesBtn: document.getElementById("giftBubblesBtn"),
        giftBubblesEmoji: document.getElementById("giftBubblesEmoji"),
        volumeSlider: document.getElementById("volumeSlider"),
        status: document.getElementById("status"),
        setupOverlay: document.getElementById("setupOverlay"),
        keyInput: document.getElementById("keyInput"),
        childNameInput: document.getElementById("childNameInput"),
        rememberKey: document.getElementById("rememberKey"),
        saveKeyBtn: document.getElementById("saveKeyBtn"),
        closeSetupBtn: document.getElementById("closeSetupBtn"),
        setupStatus: document.getElementById("setupStatus"),
        composerOverlay: document.getElementById("composerOverlay"),
        composerTitle: document.getElementById("composerTitle"),
        composerHint: document.getElementById("composerHint"),
        composerInput: document.getElementById("composerInput"),
        composerSendBtn: document.getElementById("composerSendBtn"),
        composerCancelBtn: document.getElementById("composerCancelBtn"),
        composerStatus: document.getElementById("composerStatus")
      };

      var state = {
        apiKey: "",
        hatched: false,
        recognition: null,
        volume: 0.55,
        composerTarget: "sparkle",
        sparkleResponse: "Hello Sisi! I missed you!",
        bubblesResponse: "Hi Sisi! I popped out of my egg!",
        sparkleSpeechText: "[gentle] Hello Sisi! I missed you!",
        bubblesSpeechText: "[excited] Hi Sisi! I popped out of my egg!",
        childName: "Sisi",
        sparkleGiftIndex: 0,
        bubblesGiftIndex: 0,
        lastSparkleGiftReplyIndex: -1,
        lastBubblesGiftReplyIndex: -1,
        lastDuoSongIndex: -1,
        sparkleWords: [],
        bubblesWords: [],
        audioContext: null,
        currentSource: null,
        currentHighlightTimer: null
      };

        lower = stripped.toLowerCase();

        if (lower.indexOf("oh, sweet ") === 0 && stripped.length < 28) return true;

      function base64ToFloat32(base64) {
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);

        var out = new Float32Array(pcm16.length);
        for (i = 0; i < pcm16.length; i += 1) {
          out[i] = pcm16[i] / 32768;

        return out;

      function startHighlightTimer(target, duration) {
        if (state.currentHighlightTimer) {
          window.clearInterval(state.currentHighlightTimer);
          state.currentHighlightTimer = null;
        }
        var start = performance.now();
        var totalChars = target === "sparkle"
          ? Math.max(1, state.sparkleResponse.length)
          : target === "bubbles"
            ? Math.max(1, state.bubblesResponse.length)
            : Math.max(1, state.sparkleResponse.length + state.bubblesResponse.length + 1);

        state.currentHighlightTimer = window.setInterval(function () {
          var progress = Math.max(0, Math.min(1, (performance.now() - start) / Math.max(1, duration * 1000)));
          if (target === "sparkle") {
            var idx1 = Math.floor(progress * Math.max(1, state.sparkleWords.length - 1));
            setHighlight("sparkle", idx1);
          } else if (target === "bubbles") {
            var idx2 = Math.floor(progress * Math.max(1, state.bubblesWords.length - 1));
            setHighlight("bubbles", idx2);
          } else {
            var sparkleChars = state.sparkleResponse.length;
            var duoPos = progress * totalChars;
            if (duoPos <= sparkleChars || !state.hatched) {
              var p1 = sparkleChars <= 0 ? 1 : duoPos / sparkleChars;
              var sIndex = Math.floor(Math.max(0, Math.min(1, p1)) * Math.max(1, state.sparkleWords.length - 1));
              setHighlight("sparkle", sIndex);
              setHighlight("bubbles", -1);
            } else {
              var bubbleChars = Math.max(1, state.bubblesResponse.length);

          var gain = ctx.createGain();

          var source = ctx.createBufferSource();

        if (sparkPos >= 0 && bubblePos >= 0) {
          sparkle = raw.slice(sparkPos + sparkLabel.length, bubblePos).trim();

        } else if (sparkPos >= 0) {

      function fetchGenerate(model, payload) {

          body: JSON.stringify(payload)
        }).then(function (response) {
          return response.json().catch(function () { return {}; }).then(function (data) {
            return {
              ok: response.ok,
              status: response.status,
              statusText: response.statusText,
              data: data
            };
          });
        });
      }

      function askTextModel(userText, target) {
        if (!state.apiKey) {
          showOverlay(els.setupOverlay);
          return Promise.reject(new Error("No Gemini API key set."));
        }
        var models = ["gemini-2.5-flash", "gemini-2.0-flash"];

        function runPrompt(promptText, passName) {
          var index = 0;
          var lastError = null;
          var payload = {
            contents: [{ role: "user", parts: [{ text: promptText }] }],
            generationConfig: { temperature: 0.55, maxOutputTokens: 840 }
          };

          function next() {
            if (index >= models.length) return Promise.reject(lastError || new Error("Unable to reach the Gemini API."));
            var model = models[index];
            index += 1;
            logDebug("textModelRequest", {
              target: target,
              pass: passName,
              model: model,
              maxOutputTokens: payload.generationConfig.maxOutputTokens,
              prompt: promptText
            });
            return fetchGenerate(model, payload).then(function (result) {
              if (!result.ok) {
                var msg = result.data && result.data.error && result.data.error.message ? result.data.error.message : "Request failed with " + result.status + ".";
                lastError = new Error(msg);
                return next();
              }
              var candidates = result.data && result.data.candidates ? result.data.candidates : [];
              var content = candidates.length && candidates[0].content ? candidates[0].content : null;
              var parts = content && content.parts ? content.parts : [];
              var merged = parts.map(function (part) { return part && part.text ? part.text : ""; }).join(NL).trim();
              if (!merged) {
                lastError = new Error("The model returned an empty response.");
                return next();
              }
              var parsed = parseTargetResponse(merged, target);
              logDebug("textModelResponse", {
                target: target,
                pass: passName,
                raw: merged,
                parsed: parsed,
                looksIncomplete: parsedResponseLooksIncomplete(target, parsed),
                finishReason: candidates.length && candidates[0].finishReason ? candidates[0].finishReason : null
              });
              return parsed;
            }).catch(function (error) {
              lastError = error;
              return next();
            });
          }

          return next();
        }

        return runPrompt(buildPrimaryPrompt(target, userText), "primary").then(function (parsed) {
          if (!parsedResponseLooksIncomplete(target, parsed)) {
            return parsed;
          }
          logDebug("textModelRetryIncomplete", {
            target: target,
            parsed: parsed
          });
          return runPrompt(buildRepairPrompt(target, userText), "repair").then(function (repaired) {
            if (!parsedResponseLooksIncomplete(target, repaired)) {
              return repaired;
            }
            logDebug("textModelRepairStillIncomplete", {
              target: target,
              repaired: repaired,
              fallback: parsed
            });
            var cannedFallback = target === "sparkle"
              ? { sparkle: "[gentle] My favourite colour is silver like moonlight. [happy] Ask me again and I will tell you more magical things.", bubbles: state.bubblesSpeechText }
              : target === "bubbles"
                ? { sparkle: state.sparkleSpeechText, bubbles: "[excited] I am called Bubbles because I love floaty bubbly magic. [giggly] My name feels tiny and happy, just like me!" }
                : parsed;
            logDebug("textModelUsingCannedFallback", {
              target: target,
              cannedFallback: cannedFallback
            });
            return cannedFallback;
          }).catch(function (error) {
            logDebug("textModelRepairFailed", {
              target: target,
              message: error && error.message ? error.message : String(error)
            });
            var cannedFallback = target === "sparkle"
              ? { sparkle: "[gentle] My favourite colour is silver like moonlight. [happy] Ask me again and I will tell you more magical things.", bubbles: state.bubblesSpeechText }
              : target === "bubbles"
                ? { sparkle: state.sparkleSpeechText, bubbles: "[excited] I am called Bubbles because I love floaty bubbly magic. [giggly] My name feels tiny and happy, just like me!" }
                : parsed;
            logDebug("textModelUsingCannedFallback", {
              target: target,
              cannedFallback: cannedFallback,
              reason: "repair-failed"
            });
            return cannedFallback;
          });
        });
      }

      function buildSingleTtsPayload(text, voiceName) {
        return {
          contents: [{ parts: [{ text: text }] }],
          generationConfig: {
            responseModalities: ["AUDIO"],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: { voiceName: voiceName }
              }
            }
          },
          model: "gemini-3.1-flash-tts-preview"
        };
      }

      function buildDuoTtsPayload(sparkleText, bubblesText) {
        var prompt = [
          "Sparkle sounds warm, gentle, and caring. Bubbles sounds tiny, playful, and excited.",
          "TTS the following conversation between Sparkle and Bubbles:",
          "Sparkle: " + normalizeSpaces(sparkleText),
          "Bubbles: " + normalizeSpaces(bubblesText)
        ].join(NL);
        return {
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            responseModalities: ["AUDIO"],
            speechConfig: {
              multiSpeakerVoiceConfig: {
                speakerVoiceConfigs: [
                  { speaker: "Sparkle", voiceConfig: { prebuiltVoiceConfig: { voiceName: SPARKLE_VOICE } } },
                  { speaker: "Bubbles", voiceConfig: { prebuiltVoiceConfig: { voiceName: BUBBLES_VOICE } } }
                ]
              }
            }
          },
          model: "gemini-3.1-flash-tts-preview"
        };
      }

      function requestTtsAudio(target, sparkleText, bubblesText) {
        if (!state.apiKey) return Promise.reject(new Error("No Gemini API key set."));
        var payload = target === "duo"
          ? buildDuoTtsPayload(sparkleText, bubblesText)
          : buildSingleTtsPayload(target === "sparkle" ? sparkleText : bubblesText, target === "sparkle" ? SPARKLE_VOICE : BUBBLES_VOICE);
        var maxAttempts = 3;

        function attemptRequest(attemptNumber) {
          logDebug("ttsRequest", {
            attempt: attemptNumber,
            target: target,
            model: "gemini-3.1-flash-tts-preview",
            sparkleVoice: SPARKLE_VOICE,
            bubblesVoice: BUBBLES_VOICE,
            sparkleSpeech: sparkleText,
            bubblesSpeech: bubblesText,
            singleSpeakerVoice: target === "duo" ? null : (target === "sparkle" ? SPARKLE_VOICE : BUBBLES_VOICE)
          });

          return fetchGenerate("gemini-3.1-flash-tts-preview", payload).then(function (result) {
            if (!result.ok) {
              var httpInfo = buildGeminiErrorInfo(result, "TTS request failed with " + result.status + ".");
              logDebug("ttsHttpError", {
                attempt: attemptNumber,
                target: target,
                error: httpInfo
              });
              if (attemptNumber < maxAttempts && shouldRetryTts(result, false)) {
                logDebug("ttsRetrying", {
                  attempt: attemptNumber,
                  nextAttempt: attemptNumber + 1,
                  reason: "http-error",
                  status: result.status,
                  code: httpInfo.code
                });
                return waitMs(250 * attemptNumber).then(function () {
                  return attemptRequest(attemptNumber + 1);
                });
              }
              throw new Error(httpInfo.message + (httpInfo.code !== null ? " (code " + httpInfo.code + ")" : ""));
            }

            var candidates = result.data && result.data.candidates ? result.data.candidates : [];
            var content = candidates.length && candidates[0].content ? candidates[0].content : null;
            var parts = content && content.parts ? content.parts : [];
            var inlineData = null;
            var i;
            for (i = 0; i < parts.length; i += 1) {
              if (parts[i] && parts[i].inlineData && parts[i].inlineData.data) {
                inlineData = parts[i].inlineData;
                break;
              }
            }
            var data = inlineData && inlineData.data ? inlineData.data : "";
            if (!data) {
              logDebug("ttsNoAudio", {
                attempt: attemptNumber,
                target: target,
                status: result.status,
                statusText: result.statusText,
                candidateCount: candidates.length,
                partsSummary: summarizeParts(parts),
                geminiError: result.data && result.data.error ? result.data.error : null
              });
              if (attemptNumber < maxAttempts && shouldRetryTts(result, true)) {
                logDebug("ttsRetrying", {
                  attempt: attemptNumber,
                  nextAttempt: attemptNumber + 1,
                  reason: "no-audio"
                });
                return waitMs(250 * attemptNumber).then(function () {
                  return attemptRequest(attemptNumber + 1);
                });
              }
              throw new Error("No audio returned from Gemini TTS.");
            }

            logDebug("ttsResponse", {
              attempt: attemptNumber,
              target: target,
              receivedAudio: !!data,
              partsCount: parts.length,
              mimeType: inlineData && inlineData.mimeType ? inlineData.mimeType : null,
              audioChars: data ? data.length : 0
            });
            return data;
          });
        }

        return attemptRequest(1);
      }

      function speakTarget(target) {
        if (target === "bubbles" && !state.hatched) return Promise.resolve();
        return requestTtsAudio(target, state.sparkleSpeechText, state.bubblesSpeechText).then(function (data) {
          return playPcmBase64(data, target);
        }).catch(function (error) {
          console.error(error);
          setStatus(error && error.message ? error.message : "Speech playback failed.");
        });
      }

      function hatchBubbles() {
        if (state.hatched) return;
        state.hatched = true;
        renderHatchState();
        setResponses(state.sparkleSpeechText, state.bubblesSpeechText || getDefaultBubblesSpeech(getChildName()));
        setStatus("Bubbles hatched! ✨");
        speakTarget("bubbles");
      }

      function buildGiftResponse(target) {
        if (target === "sparkle") {
          var sparkleGift = SPARKLE_GIFTS[state.sparkleGiftIndex];
          var sparkleReplyIndex = chooseDifferentIndex(SPARKLE_GIFT_TEMPLATES.length, state.lastSparkleGiftReplyIndex);
          state.lastSparkleGiftReplyIndex = sparkleReplyIndex;
          return {
            sparkle: fillTemplate(SPARKLE_GIFT_TEMPLATES[sparkleReplyIndex], sparkleGift.name),
            bubbles: state.bubblesSpeechText
          };
        }
        var bubblesGift = BUBBLES_GIFTS[state.bubblesGiftIndex];
        var bubblesReplyIndex = chooseDifferentIndex(BUBBLES_GIFT_TEMPLATES.length, state.lastBubblesGiftReplyIndex);
        state.lastBubblesGiftReplyIndex = bubblesReplyIndex;
        return {
          sparkle: state.sparkleSpeechText,
          bubbles: fillTemplate(BUBBLES_GIFT_TEMPLATES[bubblesReplyIndex], bubblesGift.name)
        };
      }

      function animateGift(symbol, fromEl, toEl) {
        return new Promise(function (resolve) {
          var fromRect = fromEl.getBoundingClientRect();
          var toRect = toEl.getBoundingClientRect();
          var fromX = fromRect.left + fromRect.width / 2;
          var fromY = fromRect.top + fromRect.height / 2;
          var toX = toRect.left + toRect.width / 2;
          var toY = toRect.top + toRect.height * 0.45;
          var gift = document.createElement("div");
          gift.className = "flying-gift";
          gift.textContent = symbol;
          gift.style.left = fromX + "px";
          gift.style.top = fromY + "px";
          document.body.appendChild(gift);
          window.requestAnimationFrame(function () {
            gift.style.transform = "translate(" + (toX - fromX) + "px, " + (toY - fromY) + "px) scale(0.14)";
            gift.style.opacity = "0.15";
          });
          window.setTimeout(function () {
            gift.remove();
            resolve();
          }, 920);
        });
      }

      function giveGift(target) {
        if (target === "bubbles" && !state.hatched) return;
        var gift = target === "sparkle" ? SPARKLE_GIFTS[state.sparkleGiftIndex] : BUBBLES_GIFTS[state.bubblesGiftIndex];
        var fromEl = target === "sparkle" ? els.giftSparkleBtn : els.giftBubblesBtn;
        var toEl = target === "sparkle" ? els.sparkleAvatar : (state.hatched ? els.bubblesAvatar : els.eggBtn);
        animateGift(gift.emoji, fromEl, toEl).then(function () {
          var response = buildGiftResponse(target);
          setResponses(response.sparkle, response.bubbles);
          setStatus(target === "sparkle" ? "Sparkle got a present. " + gift.emoji : "Bubbles got a present. " + gift.emoji);
          advanceGiftChoice(target);
          return speakTarget(target === "sparkle" ? "sparkle" : "bubbles");
        });
      }

      function playSong() {
        if (!state.hatched) hatchBubbles();
        state.lastDuoSongIndex = chooseDifferentIndex(DUO_SONGS.length, state.lastDuoSongIndex);
        var song = DUO_SONGS[state.lastDuoSongIndex];
        setResponses(song.sparkle, song.bubbles);
        setStatus("The magical duo is singing! 🎵");
        speakTarget("duo");
      }

      function openComposer(target) {
        if (target === "bubbles" && !state.hatched) {
          setStatus("Tap Bubbles' egg first so she can hatch.");
          return;
        }
        state.composerTarget = target;
        if (target === "sparkle") {
          els.composerTitle.textContent = "Talk to Sparkle";
          els.composerHint.textContent = "Type a message just for Sparkle.";
          els.composerInput.placeholder = "Type something kind for Sparkle...";
        } else if (target === "bubbles") {
          els.composerTitle.textContent = "Talk to Bubbles";
          els.composerHint.textContent = "Type a message just for Bubbles.";
          els.composerInput.placeholder = "Type something playful for Bubbles...";
        } else {
          els.composerTitle.textContent = "Talk to Both Unicorns";
          els.composerHint.textContent = "Type a message for Sparkle and Bubbles together.";
          els.composerInput.placeholder = "Type a magical message for both...";
        }
        els.composerInput.value = "";
        setComposerStatus("");
        showOverlay(els.composerOverlay);
        window.setTimeout(function () {
          if (els.composerInput && typeof els.composerInput.focus === "function") els.composerInput.focus();
        }, 0);
      }

      function handleUserMessage(text, target) {
        askTextModel(text, target).then(function (result) {
          setResponses(result.sparkle, result.bubbles);
          hideOverlay(els.composerOverlay);
          setComposerStatus("");
          setStatus("Message sent.");
          return speakTarget(target);
        }).catch(function (error) {
          console.error(error);
          var msg = error && error.message ? error.message : "Something went wrong.";
          setComposerStatus(msg);
          setStatus(msg);
        });
      }

      function sendComposerMessage() {
        var text = els.composerInput.value.trim();
        if (!text) {
          setComposerStatus("Type a message first.");
          return;
        }
        setComposerStatus("Sending...");
        handleUserMessage(text, state.composerTarget);
      }

      function startRecognition(target) {
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          openComposer(target);
          return;
        }
        if (target === "bubbles" && !state.hatched) {
          setStatus("Tap Bubbles' egg first so she can hatch.");
          return;
        }
        if (!state.recognition) {
          state.recognition = new SpeechRecognition();
          state.recognition.lang = "en-GB";
          state.recognition.interimResults = false;
          state.recognition.maxAlternatives = 1;
        }
        state.composerTarget = target;
        state.recognition.onstart = function () {
          if (target === "sparkle") setStatus("Listening for Sparkle...");
          else if (target === "bubbles") setStatus("Listening for Bubbles...");
          else setStatus("Listening for both unicorns...");
        };
        state.recognition.onend = function () {
          if (els.status.textContent && els.status.textContent.indexOf("Listening") === 0) setStatus("");
        };
        state.recognition.onerror = function (event) {
          var code = event && event.error ? event.error : "unknown-error";
          if (code !== "no-speech" && code !== "aborted") setStatus("Speech recognition error: " + code + ".");
        };
        state.recognition.onresult = function (event) {
          var first = event && event.results && event.results[0] && event.results[0][0] ? event.results[0][0] : null;
          if (!first || !first.transcript) return;
          logDebug("speechRecognitionResult", {
            target: target,
            transcript: first.transcript
          });
          handleUserMessage(first.transcript, target);
        };
        try {
          state.recognition.start();
        } catch (error) {
          openComposer(target);
        }
      }

      function saveKey() {
        var key = els.keyInput.value.trim() || state.apiKey;
        var remember = !!els.rememberKey.checked;
        var savedOk = true;
        var childName = els.childNameInput && els.childNameInput.value ? els.childNameInput.value : state.childName;
        if (!key) {
          setSetupStatus("Paste a Gemini API key first.");
          return false;
        }
        state.apiKey = key;
        setChildName(childName);
        safeStorageSet(STORAGE_CHILD_NAME, state.childName);
        safeStorageSet(STORAGE_REMEMBER, String(remember));
        if (remember) savedOk = safeStorageSet(STORAGE_KEY, key); else safeStorageRemove(STORAGE_KEY);
        setSetupStatus(savedOk ? "Settings saved." : "Using key for this session only.");
        hideOverlay(els.setupOverlay);
        setStatus("Magic connection ready.");
        return true;
      }

      function loadState() {
        var remembered = safeStorageGet(STORAGE_REMEMBER);
        var savedKey = safeStorageGet(STORAGE_KEY);
        var savedVolume = safeStorageGet(STORAGE_VOLUME);
        var savedChildName = safeStorageGet(STORAGE_CHILD_NAME);
        els.rememberKey.checked = remembered === null ? true : remembered === "true";
        state.apiKey = savedKey || "";
        state.hatched = false;
        state.volume = savedVolume === null ? 0.55 : Math.max(0, Math.min(1, Number(savedVolume) / 100));
        els.volumeSlider.value = String(Math.round(state.volume * 100));
        if (state.apiKey) els.keyInput.value = state.apiKey;
        setChildName(savedChildName || "Sisi");
        renderHatchState();
        updateGiftButtons();
        updateBubblesGiftAvailability();
        setResponses(state.sparkleSpeechText, state.bubblesSpeechText);
        if (!state.apiKey) showOverlay(els.setupOverlay);
      }

      function bindEvents() {
        els.worldBtn.addEventListener("click", function () {
          showOverlay(els.setupOverlay);
          setSetupStatus("");
        });
        els.saveKeyBtn.addEventListener("click", saveKey);
        els.closeSetupBtn.addEventListener("click", function () { hideOverlay(els.setupOverlay); });
        els.keyInput.addEventListener("keydown", function (event) {
          if (event.key === "Enter") { event.preventDefault(); saveKey(); }
        });
        els.eggBtn.addEventListener("click", hatchBubbles);
        els.sparkleTalkBtn.addEventListener("click", function () { startRecognition("sparkle"); });
        els.bubblesTalkBtn.addEventListener("click", function () { startRecognition("bubbles"); });
        els.duoSongBtn.addEventListener("click", playSong);
        els.giftSparkleBtn.addEventListener("click", function () { giveGift("sparkle"); });
        els.giftBubblesBtn.addEventListener("click", function () { giveGift("bubbles"); });
        els.volumeSlider.addEventListener("input", function () {
          state.volume = Math.max(0, Math.min(1, Number(els.volumeSlider.value) / 100));
          safeStorageSet(STORAGE_VOLUME, String(Math.round(state.volume * 100)));
        });
        els.composerSendBtn.addEventListener("click", sendComposerMessage);
        els.composerCancelBtn.addEventListener("click", function () { hideOverlay(els.composerOverlay); });
        els.composerInput.addEventListener("keydown", function (event) {
          if (event.key === "Enter") { event.preventDefault(); sendComposerMessage(); }
        });
        els.setupOverlay.addEventListener("click", function (event) {
          if (event.target === els.setupOverlay) hideOverlay(els.setupOverlay);
        });
        els.composerOverlay.addEventListener("click", function (event) {
          if (event.target === els.composerOverlay) hideOverlay(els.composerOverlay);
        });
      }

      function assert(name, condition, details, results) {
        if (!condition) throw new Error(name + (details ? " - " + details : ""));
        results.push("PASS " + name);
      }

      function runSelfTests() {
        var results = [];
        var dual = parseDualResponse(["Sparkle: Hello there", "Bubbles: Wheee!"].join(NL));
        var sparklePrompt = buildTextPrompt("sparkle", "hello");
        var bubblesPrompt = buildTextPrompt("bubbles", "hello");
        var stripped = stripEmotionTags("[gentle] Hello Sisi! [magical] You are special.");
        var taggedBubble = ensureEmotionTags("bubbles", "Tiny magic!");
        var changedIndex = chooseDifferentIndex(3, 1);
        setChildName("Sisi");
        assert("escapeHtml handles brackets", escapeHtml("<tag>").indexOf("&lt;tag&gt;") >= 0, escapeHtml("<tag>"), results);
        assert("parseDualResponse gets Sparkle", dual.sparkle === "Hello there", JSON.stringify(dual), results);
        assert("parseDualResponse gets Bubbles", dual.bubbles === "Wheee!", JSON.stringify(dual), results);
        assert("buildTextPrompt sparkle is targeted", sparklePrompt.indexOf("Do not speak for Bubbles") >= 0, sparklePrompt, results);
        assert("buildTextPrompt bubbles is targeted", bubblesPrompt.indexOf("Do not speak for Sparkle") >= 0, bubblesPrompt, results);
        assert("buildTextPrompt sparkle asks for emotion tags", sparklePrompt.indexOf("Use emotional style tags") >= 0, sparklePrompt, results);
        assert("buildTextPrompt bubbles asks for emotion tags", bubblesPrompt.indexOf("Use emotional style tags") >= 0, bubblesPrompt, results);
        assert("stripEmotionTags removes tags", stripped === "Hello Sisi! You are special.", stripped, results);
        assert("ensureEmotionTags adds a bubbles tag", taggedBubble.indexOf("[excited]") === 0, taggedBubble, results);
        assert("chooseDifferentIndex changes when possible", changedIndex !== 1, changedIndex, results);
        assert("default child name remains Sisi", getChildName() === "Sisi", getChildName(), results);
        assert("default sparkle notice uses custom name", getDefaultSparkleDisplay("Maya") === "Hello Maya! I missed you!", getDefaultSparkleDisplay("Maya"), results);
        assert("default bubbles notice uses custom name", getDefaultBubblesSpeech("Maya") === "[excited] Hi Maya! I popped out of my egg!", getDefaultBubblesSpeech("Maya"), results);
        assert("gift button updater exists", typeof updateGiftButtons === "function", typeof updateGiftButtons, results);
        assert("gift animation helper exists", typeof animateGift === "function", typeof animateGift, results);
        assert("tts payload helper exists", typeof buildDuoTtsPayload === "function", typeof buildDuoTtsPayload, results);
        assert("bubble visibility helper exists", typeof setBubbleVisible === "function", typeof setBubbleVisible, results);
        assert("retry classifier retries on no audio", shouldRetryTts({ status: 200 }, true) === true, shouldRetryTts({ status: 200 }, true), results);
        assert("retry classifier retries on 429", shouldRetryTts({ status: 429 }, false) === true, shouldRetryTts({ status: 429 }, false), results);
        assert("retry classifier does not retry on 400", shouldRetryTts({ status: 400 }, false) === false, shouldRetryTts({ status: 400 }, false), results);
        assert("duo song set has variety", DUO_SONGS.length > 1, DUO_SONGS.length, results);
        assert("bubbles gift availability helper exists", typeof updateBubblesGiftAvailability === "function", typeof updateBubblesGiftAvailability, results);
        assert("incomplete response detector flags short fragment", responseLooksIncomplete("[bouncy] Oh, Sisi!") === true, responseLooksIncomplete("[bouncy] Oh, Sisi!"), results);
        assert("incomplete response detector accepts full answer", responseLooksIncomplete("[gentle] My favourite colour is silver because it looks like moonlight. [happy] It makes me think of stars.") === false, responseLooksIncomplete("[gentle] My favourite colour is silver because it looks like moonlight. [happy] It makes me think of stars."), results);
        assert("repair prompt exists", typeof buildRepairPrompt === "function", typeof buildRepairPrompt, results);
        assert("primary prompt wrapper exists", typeof buildPrimaryPrompt === "function", typeof buildPrimaryPrompt, results);
        assert("response detector flags truncated comma ending", responseLooksIncomplete("[Magical] Oh, Sisi, it simply must be a beautiful,") === true, responseLooksIncomplete("[Magical] Oh, Sisi, it simply must be a beautiful,"), results);
        results.push("All self-tests passed.");
      }

      window.magicOpenComposer = openComposer;
      window.magicSaveKey = saveKey;

      loadState();
      bindEvents();
      runSelfTests();
    }());
  </script>
</body>
</html>
