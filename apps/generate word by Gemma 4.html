<!DOCTYPE html>
<html>
<head>
  <title>Nonsense Word Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    #nonsense-word {
      font-size: 24px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Nonsense Word Generator</h1>
  <button id="generate-button">Generate Nonsense Word and Definition</button>
  <p id="nonsense-word"></p>
  <p id="definition"></p>
  <script>
    let vowels = ['a', 'e', 'i', 'o', 'u'];
    let consonants = ['b', 'c', 'd', 'f', 'g', 'h', 'j', 'k', 'l', 'm', 'n', 'p', 'q', 'r', 's', 't', 'v', 'w', 'x', 'y', 'z'];

    document.getElementById('generate-button').addEventListener('click', generateNonsenseWordAndDefinition);

    function generateNonsenseWordAndDefinition() {
      let nonsenseWord = '';
      for (let i = 0; i < 5; i++) {
        if (i % 2 === 0) {
          nonsenseWord += consonants[Math.floor(Math.random() * consonants.length)];
        } else {
          nonsenseWord += vowels[Math.floor(Math.random() * vowels.length)];
        }
      }
      document.getElementById('nonsense-word').innerText = `The nonsense word is: ${nonsenseWord}`;

      let definitionParts = [];
      for (let i = 0; i < 3; i++) {
        if (i === 0) {
          definitionParts.push(`The ${nonsenseWord} is a noun.`);
        } else if (i === 1) {
          definitionParts.push(`It is a ${generateRandomAdjective()} adjective.`);
        } else {
          definitionParts.push(`It is often used in ${generateRandomContext()}.`);
        }
      }
      document.getElementById('definition').innerText = definitionParts.join(' ');
    }

    function generateRandomAdjective() {
      let adjectives = ['fuzzy', 'wacky', 'giggly', 'funny', 'silly', 'quirky', 'odd', 'curious', 'interesting', 'strange'];
      return adjectives[Math.floor(Math.random() * adjectives.length)];
    }

    function generateRandomContext() {
      let contexts = ['dreams', 'nightmares', 'everyday conversations', 'novels', 'poems', 'songs', 'plays', 'movies', 'commercials', 'advertisements'];
      return contexts[Math.floor(Math.random() * contexts.length)];
    }
  </script>
</body>
</html>
