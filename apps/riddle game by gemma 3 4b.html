<!DOCTYPE html>
<html>
<head>
	<title>Riddle Me That!</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			text-align: center;
		}
		
		.riddle {
			background-color: #f0f0f0;
			padding: 20px;
			border: 1px solid #ccc;
			border-radius: 10px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
		}
		
		.riddle h2 {
			margin-top: 0;
		}
		
		.riddle .answer {
			background-color: #ccc;
			padding: 10px;
			border: 1px solid #aaa;
			border-radius: 5px;
			cursor: pointer;
		}
		
		.riddle .answer:hover {
			background-color: #aaa;
		}
	</style>
</head>
<body>
	<h1>Riddle Me That!</h1>
	<div class="riddle">
		<h2>Riddle 1: What has keys but can't open locks?</h2>
		<p>Think you know the answer? Try it out!</p>
		<button class="answer" id="riddle1-answer">Submit Answer</button>
		<div id="riddle1-result"></div>
	</div>
	
	<script>
		const riddle1Answer = document.getElementById('riddle1-answer');
		const riddle1Result = document.getElementById('riddle1-result');
		
		riddle1Answer.addEventListener('click', () => {
			const userAnswer = prompt('What has keys but can\'t open locks?');
			if (userAnswer === 'piano') {
				riddle1Result.innerHTML = 'Correct! The answer is indeed "piano".';
			} else {
				riddle1Result.innerHTML = 'Sorry, that\'s not correct. The answer is indeed "piano".';
			}
		});
	</script>
	
	<!-- Add more riddles and answers as needed -->
</body>
</html>
