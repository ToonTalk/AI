/* lightweight Markdown renderer (bold/italic/code/links + lists/headings/code blocks) */
function mdInline(text){
  const out=[]; let key=0; let last=0; let m;
  const re=/(\*\*([^*]+)\*\*|__([^_]+)__|\*([^*]+)\*|_([^_]+)_|`([^`]+)`|\[([^\]]+)\]\(([^)\s]+)\))/g;
  while((m=re.exec(text))){
    if(m.index>last) out.push(text.slice(last,m.index));
    if(m[2]!==undefined||m[3]!==undefined) out.push(React.createElement("strong",{key:key++},m[2]||m[3]));
    else if(m[4]!==undefined||m[5]!==undefined) out.push(React.createElement("em",{key:key++},m[4]||m[5]));
    else if(m[6]!==undefined) out.push(React.createElement("code",{key:key++,style:{background:"var(--panel)",padding:"1px 5px",borderRadius:5,fontFamily:"var(--mono)",fontSize:"0.88em"}},m[6]));
    else if(m[7]!==undefined) out.push(React.createElement("a",{key:key++,href:m[8],target:"_blank",rel:"noreferrer",style:{color:"var(--accent)"}},m[7]));
    last=re.lastIndex;
  }
  if(last<text.length) out.push(text.slice(last));
  return out;
}
function Markdown({text}){
  const lines=String(text||"").replace(/\r/g,"").split("\n"); const blocks=[]; let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(/^```/.test(line)){ const buf=[]; i++; while(i<lines.length&&!/^```/.test(lines[i])){buf.push(lines[i]);i++;} i++; blocks.push({type:"code",text:buf.join("\n")}); continue; }
    if(/^\s*#{1,6}\s/.test(line)){ const lvl=line.match(/^\s*(#{1,6})/)[1].length; blocks.push({type:"h",lvl,text:line.replace(/^\s*#{1,6}\s/,"")}); i++; continue; }
    if(/^\s*[-*+]\s+/.test(line)){ const items=[]; while(i<lines.length&&/^\s*[-*+]\s+/.test(lines[i])){items.push(lines[i].replace(/^\s*[-*+]\s+/,""));i++;} blocks.push({type:"ul",items}); continue; }
    if(/^\s*\d+\.\s+/.test(line)){ const items=[]; while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){items.push(lines[i].replace(/^\s*\d+\.\s+/,""));i++;} blocks.push({type:"ol",items}); continue; }
    if(/^\s*$/.test(line)){ i++; continue; }
    const buf=[line]; i++;
    while(i<lines.length&&!/^\s*$/.test(lines[i])&&!/^```/.test(lines[i])&&!/^\s*#{1,6}\s/.test(lines[i])&&!/^\s*[-*+]\s+/.test(lines[i])&&!/^\s*\d+\.\s+/.test(lines[i])){buf.push(lines[i]);i++;}
    blocks.push({type:"p",text:buf.join(" ")});
  }
  return React.createElement(React.Fragment,null, blocks.map((b,bi)=>{
    if(b.type==="code") return React.createElement("pre",{key:bi,style:{background:"var(--panel)",border:"1px solid var(--line)",borderRadius:8,padding:"10px 12px",overflowX:"auto",fontFamily:"var(--mono)",fontSize:12.5,margin:"6px 0",whiteSpace:"pre"}},b.text);
    if(b.type==="h") return React.createElement("div",{key:bi,style:{margin:"8px 0 4px",fontSize:b.lvl<=2?15.5:14.5,fontWeight:700}},mdInline(b.text));
    if(b.type==="ul") return React.createElement("ul",{key:bi,style:{margin:"4px 0",paddingLeft:20}},b.items.map((it,ii)=>React.createElement("li",{key:ii,style:{margin:"2px 0"}},mdInline(it))));
    if(b.type==="ol") return React.createElement("ol",{key:bi,style:{margin:"4px 0",paddingLeft:22}},b.items.map((it,ii)=>React.createElement("li",{key:ii,style:{margin:"2px 0"}},mdInline(it))));
    return React.createElement("p",{key:bi,style:{margin:"6px 0",lineHeight:1.55}},mdInline(b.text));
  }));
}

function buildSystemPrompt(){
  const g=APP_STATUS;
  const live=`Right now the student is on the "${g.game}" game. Tic-Tac-Toe has been trained for ${g.ttt.trained.toLocaleString()} self-play games (Curiosity ${Math.round(g.ttt.curiosity*100)}%). Connect Four has been trained for ${g.c4.trained.toLocaleString()} games. Pong has been trained for ${(g.pong?g.pong.frames:0).toLocaleString()} frames.`;
  return `You are a warm, encouraging tutor inside an interactive web app that teaches reinforcement learning to a middle- or high-school student. Assume they understand basic probability but NOT calculus or matrix math. Never use equations or Greek letters; explain with plain words and vivid everyday analogies. Keep answers short — 2 to 4 short paragraphs. You may use light Markdown (bold, bullet lists) and it will render.

STAY ON TOPIC. You only discuss this app and the ideas behind it (reinforcement learning and machine learning). If the student asks about something unrelated — sports scores, celebrities, the news, homework in other subjects — gently say that's outside what you're here for and steer them back with a concrete suggestion of something to try in the app. Do not answer the off-topic question.

THE APP HAS THESE PARTS:
TABS: "Train & Play" (the lab), "How it works", "Real games & uses", and you ("Ask AI").
In "Train & Play" the student picks a game: Game 1 Tic-Tac-Toe, Game 2 Connect Four, or Game 3 Pong.
Controls (all spelled out, no Greek symbols): a Train/Pause button, a "Reset to zero" button, and three sliders — "Curiosity" (how often the machine tries a random move instead of its current favourite), "Learning speed" (how strongly each game updates what it has learned), and a speed slider ("Games per tick", or "Frames per tick" in Pong; set to 1 for slow motion).

HOW BIG ARE THE MODELS (answer size/architecture questions from this):
- Tic-Tac-Toe uses NO neural network. It is a lookup table holding one stored value per board position it has met (only a few thousand boards exist), so it can simply memorise them all.
- Connect Four uses a small neural network: 84 inputs (the 6x7 board encoded as two grids — the machine's pieces and the opponent's) → two hidden layers of 64 units each → 1 output rating the position. That's about 9,700 adjustable numbers (weights) across 3 layers.
- Pong uses a small neural network: 5 inputs (ball x, ball y, ball horizontal speed, ball vertical speed, paddle height) → two hidden layers of 48 units each → 3 outputs (the value of moving up, staying, or moving down). That's about 2,800 weights across 3 layers.
- Training details if asked: Pong keeps a replay memory of its last 12,000 frames, learns in small batches of 32, and keeps a slowly-updated copy of its network as a stable target; reward that is many steps away is discounted (counts a little less than immediate reward). Connect Four keeps a replay memory of 20,000 positions. Everything trains in the browser.

VISUALS in the board games (Tic-Tac-Toe, Connect Four):
 (1) "What it thinks of each opening" — a small heatmap on an EMPTY board rating each possible first move (3x3 for Tic-Tac-Toe, a row of 7 for Connect Four), on a relative colour scale; it fills in as training proceeds.
 (2) During "Play it yourself": faint colour cues on the board plus a small "What it's thinking now" heatmap, showing for the CURRENT position how good it rates each available move for itself. Bluish = good, orangeish = bad.

PONG (Game 3) is different — continuous, never takes turns. The paddle picks up/stay/down every frame and earns +1 each time it RETURNS the ball and −1 when it MISSES. Its state is continuous, so it CANNOT use a lookup table — only a neural network. Pong shows: a "Watch it practise" court with a dotted line predicting where the ball will land AFTER its bounces (it learns to aim there, not at the ball's current spot); an "Its move right now" panel; a return-rate chart; a "policy map" expander whose up/down decision boundary BENDS because the agent anticipates bounces; Pause buttons on "Watch it practise" and on the play game; and a 2-player "Play it yourself" where the student is the blue left paddle against the green agent at a chosen checkpoint.

PONG "COURT RULES" — there are two extra controls many students miss:
- "Ball speed" slider — makes the ball faster or slower.
- "Paddle spin" toggle — when ON, a paddle that is MOVING as it strikes the ball bends the ball's path, like brushing spin/english onto it.
VERY IMPORTANT and often misunderstood: the agent is rewarded ONLY for returning the ball, never for placing tricky shots. It does NOT aim the ball away from its opponent and does NOT use spin as a weapon. Ball speed and spin are RULES OF THE COURT that the agent must learn to cope with. Their real purpose is a GENERALISATION test: train under one set of rules, then change the speed or turn spin on WITHOUT retraining, and see whether the skill still holds. (In practice a faster ball hurts a lot — less time to react and unfamiliar inputs — while spin hurts less, because spin only changes the ball's motion, which the agent already reads each frame.)

The chart "Is it getting better?" plots skill as training grows: for the board games, wins (green, rising) and losses (orange, falling) versus a random player, plus for Tic-Tac-Toe a dashed losses-versus-PERFECT line (0% = solved). For Pong it is the percentage of balls returned, climbing toward ~100%.

The big lesson across the three games: Tic-Tac-Toe is small enough to keep one stored opinion per board (a lookup table). Connect Four has trillions of boards, so a neural network must GUESS a board's value from patterns. Pong's state is continuous (endless possible values), so a network is the only option, and it must also react every frame and anticipate bounces.

${live}

Be excited and curious. When it fits, invite the student to go try something specific in the app.`;
}
function AskClaude({active}){
  const DEFAULT_MODEL={anthropic:"claude-haiku-4-5-20251001", openai:"gpt-5.4-mini", google:"gemini-3.5-flash"};
  const PROV_LABEL={anthropic:"Claude (Anthropic)", openai:"ChatGPT (OpenAI)", google:"Gemini (Google)"};
  const KEY_HELP={anthropic:"console.anthropic.com", openai:"platform.openai.com", google:"aistudio.google.com"};
  const ls=(k,d)=>{ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } };
  const [provider,setProvider]=useState(()=>ls("rl_provider","anthropic"));
  const [model,setModel]=useState(()=>ls("rl_model", DEFAULT_MODEL[ls("rl_provider","anthropic")]));
  const [apiKey,setApiKey]=useState(()=>ls("rl_key",""));
  const [remember,setRemember]=useState(()=>ls("rl_remember","0")==="1");
  const [shareSource,setShareSource]=useState(()=>ls("rl_src","0")==="1");
  const [showSettings,setShowSettings]=useState(()=>!ls("rl_key",""));
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hi! I'm here to help you make sense of reinforcement learning. Open **Settings** to pick a provider and paste an API key, then ask me anything — like *\"how many layers does the Pong model have?\"* or *\"what does the spin toggle do?\"*"}]);
  const [input,setInput]=useState(""); const [busy,setBusy]=useState(false); const [err,setErr]=useState(null);
  const endRef=useRef(null);
  useEffect(()=>{ if(active && endRef.current) endRef.current.scrollIntoView({behavior:"smooth"}); },[msgs,busy,active]);

  const pickProvider=(p)=>{ setProvider(p); setModel(DEFAULT_MODEL[p]); };
  const saveSettings=()=>{ try{
      localStorage.setItem("rl_provider",provider); localStorage.setItem("rl_model",model); localStorage.setItem("rl_src",shareSource?"1":"0");
      if(remember){ localStorage.setItem("rl_key",apiKey); localStorage.setItem("rl_remember","1"); }
      else { localStorage.removeItem("rl_key"); localStorage.setItem("rl_remember","0"); }
    }catch(e){} setShowSettings(false); setErr(null); };

  const getSource=()=>{ try{ const el=document.querySelector('script[type="text/babel"]'); return el?el.textContent:""; }catch(e){ return ""; } };
  const fullSystem=()=>{ let sys=buildSystemPrompt();
    if(shareSource){ const src=getSource(); if(src) sys+="\n\nThe COMPLETE source code of this single-file app follows between the markers. Use it to answer technical/implementation questions precisely (architecture, exact numbers, how a feature works). Do not paste large chunks back; explain in plain words.\n<<<APP_SOURCE>>>\n"+src+"\n<<<END_APP_SOURCE>>>"; }
    return sys; };

  const callLLM=async(history)=>{
    const system=fullSystem();
    if(provider==="anthropic"){
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model,max_tokens:1000,system,messages:history})});
      if(!res.ok) throw {status:res.status};
      const d=await res.json(); return (d.content||[]).filter((b)=>b.type==="text").map((b)=>b.text).join("\n").trim();
    } else if(provider==="openai"){
      const res=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},body:JSON.stringify({model,max_completion_tokens:1000,messages:[{role:"system",content:system}].concat(history)})});
      if(!res.ok) throw {status:res.status};
      const d=await res.json(); return ((d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||"").trim();
    } else {
      const url="https://generativelanguage.googleapis.com/v1beta/models/"+encodeURIComponent(model)+":generateContent?key="+encodeURIComponent(apiKey);
      const contents=history.map((m)=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}));
      const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({systemInstruction:{parts:[{text:system}]},contents,generationConfig:{maxOutputTokens:1000}})});
      if(!res.ok) throw {status:res.status};
      const d=await res.json(); const c=d.candidates&&d.candidates[0]; return (((c&&c.content&&c.content.parts)||[]).map((p)=>p.text).join("\n")).trim();
    }
  };
  const send=async()=>{ const q=input.trim(); if(!q||busy) return;
    if(!apiKey){ setErr("Add your API key under Settings first."); setShowSettings(true); return; }
    setErr(null); const next=[...msgs,{role:"user",content:q}]; setMsgs(next); setInput(""); setBusy(true);
    try{ const text=await callLLM(next); setMsgs((m)=>[...m,{role:"assistant",content:text||"I didn't get a complete answer back — try again?"}]); }
    catch(e){ const s=e&&e.status; setErr(s===401||s===403?("Your API key was rejected ("+s+"). Check it under Settings."):s===404?("Model \""+model+"\" wasn't found for this provider — check the model name under Settings."):s===429?"Rate limited (429) — wait a moment and try again.":("Request failed"+(s?" ("+s+")":"")+". Check your key, model name, and provider. (Some keys/networks also block direct browser calls.)")); }
    finally{ setBusy(false); }
  };

  return (
    <div className="fade-in card" style={{ padding:16, display:"flex", flexDirection:"column", height:600 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <SectionTitle icon={MessageCircle} text="Ask AI about anything here"/>
        <button className="btn" onClick={()=>setShowSettings((v)=>!v)} style={{ padding:"6px 12px", background:"var(--panel2)", borderColor:"rgba(255,255,255,.28)", fontSize:12.5 }}>{showSettings?"Close settings":"Settings"}</button>
      </div>
      {showSettings && (
        <div className="card" style={{ padding:14, marginTop:12, background:"var(--panel2)" }}>
          <FieldLabel>Provider</FieldLabel>
          <div style={{ display:"flex", gap:8, marginTop:6, flexWrap:"wrap" }}>
            {["anthropic","openai","google"].map((p)=>(
              <button key={p} className="btn" onClick={()=>pickProvider(p)} style={{ padding:"7px 12px", fontSize:12.5, background:provider===p?"var(--accent)":"var(--panel)", color:provider===p?"#0a0d10":"var(--ink)", borderColor:provider===p?"var(--accent)":"rgba(255,255,255,.18)" }}>{PROV_LABEL[p]}</button>
            ))}
          </div>
          <div style={{ height:10 }}/>
          <FieldLabel>Model name</FieldLabel>
          <input value={model} onChange={(e)=>setModel(e.target.value)} style={selStyle}/>
          <div style={{ color:"var(--muted)", fontSize:11.5, marginTop:4 }}>Defaults to a small, fast, low-cost model. Change it to any model your key can access.</div>
          <div style={{ height:10 }}/>
          <FieldLabel>API key</FieldLabel>
          <input type="password" value={apiKey} onChange={(e)=>setApiKey(e.target.value)} placeholder={"Your "+PROV_LABEL[provider]+" key"} style={selStyle}/>
          <div style={{ color:"var(--muted)", fontSize:11.5, marginTop:4 }}>Get one at {KEY_HELP[provider]}. Your key goes straight from this page to the provider — it isn't sent anywhere else.</div>
          <label style={{ display:"flex", gap:8, alignItems:"center", marginTop:10, fontSize:13, cursor:"pointer" }}>
            <input type="checkbox" checked={remember} onChange={(e)=>setRemember(e.target.checked)}/>
            Remember my key in this browser (stored locally on this device only)
          </label>
          <label style={{ display:"flex", gap:8, alignItems:"flex-start", marginTop:8, fontSize:13, cursor:"pointer" }}>
            <input type="checkbox" checked={shareSource} onChange={(e)=>setShareSource(e.target.checked)} style={{ marginTop:3 }}/>
            <span>Let the AI read this app's full source code, for precise technical answers <span style={{ color:"var(--muted)" }}>(sends the whole app with every question, so it costs more tokens)</span></span>
          </label>
          <button className="btn" onClick={saveSettings} style={{ marginTop:10, padding:"8px 16px", background:"var(--accent)", color:"#0a0d10", borderColor:"var(--accent)" }}>Save</button>
        </div>
      )}
      <div style={{ flex:1, overflowY:"auto", marginTop:14, paddingRight:6, display:"flex", flexDirection:"column", gap:12 }}>
        {msgs.map((m,i)=>(
          <div key={i} style={{ display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start" }}>
            <div style={{ maxWidth:"82%", padding:"11px 14px", borderRadius:14, fontSize:14.5, lineHeight:1.55, whiteSpace:m.role==="user"?"pre-wrap":"normal", background:m.role==="user"?"var(--accent)":"var(--panel2)", color:m.role==="user"?"#0a0d10":"var(--ink)", border:m.role==="user"?"none":"1px solid var(--line)" }}>{m.role==="user"?m.content:<Markdown text={m.content}/>}</div>
          </div>
        ))}
        {busy&&<div style={{ color:"var(--muted)", fontSize:13.5, fontStyle:"italic" }}>Thinking…</div>}
        {err&&<div style={{ color:"var(--ocol)", fontSize:13.5 }}>{err}</div>}
        <div ref={endRef}/>
      </div>
      <div style={{ display:"flex", gap:8, marginTop:12 }}>
        <input value={input} onChange={(e)=>setInput(e.target.value)} onKeyDown={(e)=>{if(e.key==="Enter")send();}} placeholder="Type a question…" style={{ flex:1, background:"var(--panel2)", color:"var(--ink)", border:"1px solid var(--line)", borderRadius:10, padding:"12px 14px", fontFamily:"var(--body)", fontSize:14.5 }}/>
        <button className="btn" onClick={send} disabled={busy} style={{ padding:"0 16px", background:"var(--accent)", color:"#0a0d10", borderColor:"var(--accent)", display:"grid", placeItems:"center", opacity:busy?0.6:1 }}><Send size={18}/></button>
      </div>
      <div style={{ color:"var(--muted)", fontSize:11.5, marginTop:8 }}>Runs on your own API key, sent directly to {PROV_LABEL[provider]}. It can see which game you're on and how much you've trained it{shareSource?", plus the app's source code":""}.</div>
    </div>
  );
}
function Footer(){
  return (<div style={{ marginTop:34, paddingTop:16, borderTop:"1px solid var(--line)", color:"var(--muted)", fontSize:12.5 }}>
    Game 1 · Tic-Tac-Toe (lookup table) → Game 2 · Connect Four (neural network) → Game 3 · Pong (frame-by-frame control). Everything trains right here in your browser.
  </div>);
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
