  const q = el("textarea"); q.placeholder="Will losing its Eyes make its drawings drift from its Spark?"; c.appendChild(q);
  c.appendChild(el("label","","Judge instructions (fixed for the whole experiment — edit now, not during)"));
  const judge = el("textarea"); judge.value="Judge how closely the work matches the artist's Spark. Reward work that feels true to that dream."; c.appendChild(judge);
  c.insertAdjacentHTML("beforeend", bigIdea("judge"));
  const estimate = el("p","hint",""); c.appendChild(estimate);
  function updEst(){ const n=Math.min(12,Math.max(1,+rounds.value||6)); const base=getAgent(sel.value); const phases = base.anatomy.eyes.enabled?5:4; estimate.textContent="Roughly "+(2*n*(phases+1))+" helper calls (2 minds × "+n+" rounds × make/look/reflect/distill + judge)."; }
  rounds.oninput=updEst; sel.addEventListener("change",updEst); updEst();
  const go = el("button","run","Clone, change one thing, and run"); go.style.cssText="font-size:15px;padding:10px 18px;margin-top:12px";
  const prog = el("p","hint","");
  const tools = el("div","row"); tools.style.marginTop="8px";   // holds Resume / Delete after a failure
  let exp = null;   // created once, on the first run; resumed on retry
  async function runIt(){
    go.disabled=true; tools.innerHTML=""; if (!prog.parentNode) c.appendChild(prog);
    if (!exp){
      // create the clones + experiment exactly once
      const base = getAgent(sel.value);
      const variant = cloneAgent(base, " (variant)");
      const baseClone = cloneAgent(base, " (baseline)");
      const key = partSel.value;
      if (key.endsWith("enabled")||key.endsWith("remember")) setPart(variant, key, !getPart(base,key));
      else setPart(variant, key, $("expVal").value);
      state.agents.push(baseClone, variant);
      exp = { id:uid(), name:"Experiment "+(state.experiments.length+1), question:q.value.trim(),
        baselineAgentId:baseClone.id, variantAgentId:variant.id, changedPart:key,
        rounds:Math.min(12,Math.max(1,+rounds.value||6)), results:[],
        judgeSpec:{ prompt:judge.value.trim(), providerRole:"judge", model:roleModel("judge") },   // fix the judge model for the whole run
        createdAt:now() };
      baseClone.experimentId = variant.experimentId = exp.id;   // tag clones so they fold out of the Studio grid
      state.experiments.push(exp); save();
    }
    go.textContent="Running… (this makes many calls)";
    try { await runExperiment(exp, prog); back.remove(); nav("science"); }
    catch(e){
      go.style.display="none";
      const resume = el("button","run","Resume"); resume.onclick=()=>{ go.style.display=""; runIt(); };
      const del = el("button","small-btn danger","Delete this experiment");
      del.onclick=()=>{ // remove the partial experiment and its clones, let the student start over
        state.experiments = state.experiments.filter(x=>x.id!==exp.id);
        state.agents = state.agents.filter(a=>a.experimentId!==exp.id);
        state.works = state.works.filter(w=>state.agents.some(a=>a.id===w.agentId));
        save(); back.remove(); nav("science");
      };
      tools.appendChild(resume); tools.appendChild(del);
    }
  }
  go.onclick = runIt;
  c.appendChild(go); c.appendChild(tools);
  const back = modal("New experiment — change one thing", c);
}

const _str = (v,max)=> String(v==null?"":v).slice(0, max||4000);
function sanitizeAgent(a){
  if (!a || typeof a!=="object") throw new Error("This file has no mind in it.");
  const an = a.anatomy && typeof a.anatomy==="object" ? a.anatomy : {};
  const eyes = an.eyes && typeof an.eyes==="object" ? an.eyes : {};
  const sm = an.studioManner && typeof an.studioManner==="object" ? an.studioManner : {};
  const mem = a.memory && typeof a.memory==="object" ? a.memory : {};
  return {
    id: uid(), createdAt: a.createdAt || now(),
    name: _str(a.name,80) || "Imported mind",
    medium: a.medium==="turtle" ? "turtle" : "poet",
    look: {
      color: (typeof a.look==="object" && /^#[0-9A-Fa-f]{6}$/.test(a.look.color)) ? a.look.color : "#7B6CF6",
      emoji: _str(a.look && a.look.emoji, 8) || "🌀"
    },
    anatomy: {
      spark: _str(an.spark), hands: _str(an.hands), innerVoice: _str(an.innerVoice),
      form: an.form==="story" ? "story" : (an.form==="poem" ? "poem" : undefined),
      eyes: { enabled: eyes.enabled!==false, remember: eyes.remember!==false, looking: _str(eyes.looking,2000) },
      studioManner: { presenting: _str(sm.presenting,2000), critic: _str(sm.critic,2000) }
    },
    memory: {
      lessons: Array.isArray(mem.lessons) ? mem.lessons.slice(0,50).map(l=>({ id:uid(), text:_str(l&&l.text,300), active:!!(l&&l.active), source:(l&&l.source==="student")?"student":"agent" })) : [],
      journal: Array.isArray(mem.journal) ? mem.journal.slice(0,500).map(j=>({ round:(+(j&&j.round))||0, text:_str(j&&j.text,2000), createdAt:(j&&j.createdAt)||now() })) : []
    },
    stats: { roundsRun: (+(a.stats&&a.stats.roundsRun))||0 }
  };
}
function sanitizeWork(w, agentId){
  if (!w || typeof w!=="object") return null;
  const p = w.payload && typeof w.payload==="object" ? w.payload : {};
  return {
    id: uid(), agentId, round: (+w.round)||0,
    medium: w.medium==="turtle" ? "turtle" : "poet",
    form: w.form==="story" ? "story" : (w.form==="poem" ? "poem" : undefined),
    seed: (w.seed>>>0) || ((Math.random()*0xFFFFFFFF)>>>0),
    payload: { code: p.code!=null?_str(p.code,20000):undefined, poem: p.poem!=null?_str(p.poem,2000):undefined },
    title: _str(w.title,120), artistStatement: _str(w.artistStatement,500), intention: _str(w.intention,500),
    observations: _str(w.observations,1000),
    selfRating: (w.selfRating>=1&&w.selfRating<=5)?+w.selfRating:null,
    humanEdited: !!w.humanEdited, error: w.error?_str(w.error,500):undefined,
    critiques: Array.isArray(w.critiques) ? w.critiques.slice(0,30).map(c=>({ from:_str(c&&c.from,40), text:_str(c&&c.text,500), createdAt:(c&&c.createdAt)||now(), readByAgent:!!(c&&c.readByAgent) })) : [],
    createdAt: w.createdAt || now()
  };
}
function importTradingCard(json){
  const d = JSON.parse(json);
  if (d.kind!=="atelier-trading-card") throw new Error("That doesn't look like a trading card.");
  const agent = sanitizeAgent(d.agent);
  agent.name = agent.name + " (imported)";
  state.agents.push(agent);
  (Array.isArray(d.works)?d.works:[]).forEach(w=>{ const sw=sanitizeWork(w, agent.id); if(sw) state.works.push(sw); });
  agent.stats.roundsRun = Math.max(0,...state.works.filter(w=>w.agentId===agent.id).map(w=>w.round));
  save(); render(); toast("Imported "+agent.name+".");
}
function importFlow(){
  const inp = el("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const fr=new FileReader();
    fr.onload=()=>{ try{ const txt=fr.result; const d=JSON.parse(txt);
      if (d.kind==="atelier-trading-card") importTradingCard(txt); else importAll(txt);
      toast("Imported.");
    }catch(e){ toast("Could not import: "+e.message); } };
    fr.readAsText(f); };
  inp.click();
}
async function exportGalleryHTML(agentId){
  const works = state.works.filter(w=>!w.error && (agentId==="all"||w.agentId===agentId)).sort((a,b)=>a.createdAt-b.createdAt);
  let body = "";
  for (const w of works){
    const a = getAgent(w.agentId)||{name:"?",look:{color:"#7B6CF6",emoji:"?"}};
    const thumb = w.medium==="turtle" ? await getThumbnail(w) : null;
    const art = thumb ? '<img src="'+thumb+'" style="width:100%;border-radius:8px">'
      : '<div style="border-left:5px solid '+a.look.color+';padding:12px;white-space:pre-wrap;font-size:15px;line-height:1.6">'+esc(w.payload.poem||"")+'</div>';
    body += '<div style="break-inside:avoid;background:#fff;border:2px solid #E3ECF4;border-radius:14px;padding:12px;margin-bottom:14px">'+art+
      '<p style="font-weight:800;margin:8px 0 2px">'+esc(w.title)+'</p>'+
      '<p style="font-size:12px;color:#5A6B8C;margin:0">'+esc(a.look.emoji)+' '+esc(a.name)+' · round '+w.round+'</p>'+
      (w.artistStatement?'<p style="font-style:italic;color:#5A6B8C;font-size:13px">“'+esc(w.artistStatement)+'”</p>':'')+'</div>';
  }
  const html = '<!doctype html><html><head><meta charset="utf-8"><title>Atelier Gallery</title></head>'+
    '<body style="font-family:system-ui;background:#F7FAFC;margin:0;padding:24px"><h1 style="font-family:Trebuchet MS">The Atelier — Gallery</h1>'+
    '<div style="column-width:240px;column-gap:16px">'+body+'</div></body></html>';
  if (await uiConfirm("This makes a single web page of the selected works (with pictures inside it). Share only with people you trust. Download it?", {title:"Save the gallery?", okText:"Download"}))
    download("atelier-gallery.html", html, "text/html");
}
// Save one mind's whole set of rounds as a single self-contained web page (pictures inline, no code needed to view).
async function exportRoundsHTML(agent){
  const works = worksFor(agent.id).slice().sort((a,b)=>a.round-b.round);
  if (!works.length){ toast("Run a round first, then you can save it."); return; }
  let body = "";
  for (const w of works){
    const thumb = (w.medium==="turtle" && !w.error) ? await getThumbnail(w) : null;
    const art = w.error ? '<p style="color:#B23">It crashed: '+esc(w.error)+'</p>'
      : (thumb
          ? '<img src="'+thumb+'" style="width:260px;max-width:100%;border-radius:8px;border:1px solid #E3ECF4">'
          : '<div style="border-left:5px solid '+agent.look.color+';padding:12px;white-space:pre-wrap;font-size:15px;line-height:1.6">'+esc(w.payload.poem||"")+'</div>');
    const j = agent.memory.journal.find(x=>x.round===w.round);
    const rating = w.selfRating ? " · "+"★".repeat(w.selfRating)+"☆".repeat(5-w.selfRating) : "";
    body += '<section style="break-inside:avoid;background:#fff;border:2px solid #E3ECF4;border-radius:14px;padding:14px;margin-bottom:16px">'
      + '<h2 style="font-family:Trebuchet MS,sans-serif;margin:0 0 8px">Round '+w.round+rating+'</h2>'
      + (w.intention? '<p style="margin:0 0 8px"><b>It set out to:</b> '+esc(w.intention)+'</p>':'')
      + art
      + '<p style="font-weight:800;margin:8px 0 2px">“'+esc(w.title)+'”'+(w.humanEdited?' ✍️ (you edited this)':'')+'</p>'
      + (w.observations? '<p style="color:#5A6B8C;font-size:13.5px;margin:4px 0"><b>It looked and saw:</b> '+esc(w.observations)+'</p>':'')
      + (j? '<p style="color:#5A6B8C;font-size:13.5px;margin:4px 0"><b>Journal:</b> '+esc(j.text)+'</p>':'')
      + '</section>';
  }
  const html = '<!doctype html><html><head><meta charset="utf-8"><title>'+esc(agent.name)+' — rounds</title></head>'
    + '<body style="font-family:system-ui,sans-serif;background:#F7FAFC;margin:0;padding:24px"><div style="max-width:720px;margin:0 auto">'
    + '<h1 style="font-family:Trebuchet MS,sans-serif">'+esc(agent.look.emoji)+' '+esc(agent.name)+'</h1>'
    + '<p style="color:#5A6B8C">Its dream: '+esc(agent.anatomy.spark||"")+'</p>'
    + body + '<p style="color:#9BAAC4;font-size:12px">Made with The Atelier.</p></div></body></html>';
  if (await uiConfirm("This makes a single web page of "+agent.name+"'s "+works.length+" round"+(works.length===1?"":"s")+" (with pictures inside it). Share only with people you trust. Download it?", {title:"Save these rounds?", okText:"Download"}))
    download("atelier-"+agent.name.replace(/\W+/g,"-").toLowerCase()+"-rounds.html", html, "text/html");
}
// Clear a mind's history so it can begin a fresh set of rounds, keeping the mind the student built.
async function restartRounds(agent){
  if (!worksFor(agent.id).length && !agent.stats.roundsRun){ toast(agent.name+" hasn't run any rounds yet."); return; }
  if (!await uiConfirm("Start a fresh set of rounds for "+agent.name+"?\n\nIt keeps the mind you built (Spark, Hands, Eyes and so on) and any lessons you added by hand, but it forgets the works it made, its journal, the lessons it taught itself, and its round count goes back to zero.\n\nIf you want to keep this set, press Cancel and use “Save these rounds” first.", {title:"Start a fresh set of rounds?", okText:"Start fresh", danger:true})) return;
  state.works = state.works.filter(w=>w.agentId!==agent.id);
  agent.memory.journal = [];
  agent.memory.lessons = agent.memory.lessons.filter(l=>l.source==="student");   // keep what the student taught it
  agent.stats.roundsRun = 0;
  save(); toast("Fresh start — "+agent.name+" is ready for round 1.");
  render();
}
function exportNotebookMd(){
  let md = "# My Atelier Notebook\n\n";
  state.notebook.forEach(n=>{ md += "## "+new Date(n.createdAt).toLocaleString()+"\n\n";
    if (n.prompt) md += "_"+n.prompt+"_\n\n"; md += n.text+"\n\n"; });
  download("atelier-notebook.md", md, "text/markdown");
}

/* ===== SECTION: BOOT ===== */
const hadSavedState = STORAGE_OK && !!localStorage.getItem(LS_KEY);
load();

// A double-clicked file (not embedded, nothing saved yet) can't use keyless artifact mode, so start it
// in a mode that works on the first try: standalone with the pretend helper on. The student can change both.
if (!hadSavedState && !inEmbeddedFrame){
  state.settings.runtimeMode = "standalone";
  state.settings.useMock = true;
}

// Seed a first agent on a truly fresh start so the studio isn't empty.
if (!state.agents.length){
  const seed = agentFromTemplate(TEMPLATES[0]);
  state.agents.push(seed); save();
}

// If storage is unavailable (e.g. inside an artifact), say so plainly — the studio won't survive a reload here.
if (!STORAGE_OK){
  const banner = el("div","no-storage-banner","⚠️ This place can’t save your studio between visits (you may be inside a Claude artifact). Use Settings → Export to keep a backup of your minds.");
  document.body.insertBefore(banner, document.getElementById("tabs"));
}

$("homeLink").onclick = ()=>nav("studio",{agentId:null});
$("askFab").onclick = openAskAI;

// On-brand favicon: a little green turtle spiral drawn on a canvas (no external file).
(function setFavicon(){
  try {
    const c = document.createElement("canvas"); c.width = c.height = 64;
    const x = c.getContext("2d");
    x.fillStyle = "#F7FAFC";
    x.beginPath(); const rr=14; // rounded paper tile
    x.moveTo(rr,0); x.arcTo(64,0,64,64,rr); x.arcTo(64,64,0,64,rr); x.arcTo(0,64,0,0,rr); x.arcTo(0,0,64,0,rr); x.closePath(); x.fill();
    x.strokeStyle = "#2E9E6B"; x.lineWidth = 4.2; x.lineCap = "round"; x.lineJoin = "round";
    x.beginPath();
    for (let t=0; t<=Math.PI*6; t+=0.12){ const r = 2 + t*1.28, px = 32 + Math.cos(t)*r, py = 33 + Math.sin(t)*r; t===0 ? x.moveTo(px,py) : x.lineTo(px,py); }
    x.stroke();
    const link = $("favicon") || document.createElement("link");
    link.rel = "icon"; link.href = c.toDataURL("image/png");
    if (!link.parentNode) document.head.appendChild(link);
  } catch(e){ /* keep the static SVG fallback */ }
})();

render();

// Tiny test hook for the Playwright harness.
window.__atelier = {
  state,
  get settings(){ return state.settings; },
  setMock(on){ state.settings.useMock = !!on; save(); },
  renderTurtle(code, seed){ return runTurtleSandbox(code, seed).then(r=>({ ops:r.ops, opCount:r.opCount, thumbnail:snapshotOps(r.ops) })); },
  runRound(agentId, opts){ return runRound(agentId || (state.agents[0]&&state.agents[0].id), opts||{}); },
  runPhase(agentId){ return runRound(agentId || (state.agents[0]&&state.agents[0].id), { silentNotebook:true }); },
  newFromTemplate(i){ const a=agentFromTemplate(TEMPLATES[i||0]); state.agents.push(a); save(); render(); return a.id; },
  reset(){ try{ localStorage.removeItem(LS_KEY); }catch(_){} }
};
