<!DOCTYPE html>
<html>
<head>
	<title>Nonsense Word Generator</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			text-align: center;
		}
		#nonsense-word {
			font-size: 36px;
			font-weight: bold;
			margin-bottom: 20px;
		}
		#button {
			background-color: #4CAF50;
			color: #fff;
			padding: 10px 20px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}
		#button:hover {
			background-color: #3e8e41;
		}
	</style>
</head>
<body>
	<h1>Nonsense Word Generator</h1>
	<p id="nonsense-word"></p>
	<button id="button">Generate Nonsense Word</button>
	<script>
		let consonants = ['b', 'c', 'd', 'f', 'g', 'h', 'j', 'k', 'l', 'm', 'n', 'p', 'q', 'r', 's', 't', 'v', 'w', 'x', 'y', 'z'];
		let vowels = ['a', 'e', 'i', 'o', 'u'];
		let nonsenseWord = '';

		document.getElementById('button').addEventListener('click', generateNonsenseWord);

		function generateNonsenseWord() {
			for (let i = 0; i < 5; i++) {
				let randomConsonant = consonants[Math.floor(Math.random() * consonants.length)];
				let randomVowel = vowels[Math.floor(Math.random() * vowels.length)];
				nonsenseWord += randomConsonant + randomVowel;
			}
			document.getElementById('nonsense-word').innerText = nonsenseWord;
			nonsenseWord = '';
		}
	</script>
</body>
</html>
