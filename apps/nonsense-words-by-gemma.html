<!DOCTYPE html>
<html>
<head>
<title>Nonsense Word Generator</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
  }
  button {
    padding: 10px 20px;
    font-size: 16px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  #nonsense-word {
    font-size: 32px;
    margin-top: 20px;
  }
</style>
</head>
<body>
  <h1>Nonsense Word Generator</h1>
  <button onclick="generateNonsenseWord()">Generate</button>
  <div id="nonsense-word"></div>

  <script>
    function generateNonsenseWord() {
      const consonants = ['b', 'c', 'd', 'f', 'g', 'h', 'j', 'k', 'l', 'm', 'n', 'p', 'q', 'r', 's', 't', 'v', 'w', 'x', 'y', 'z'];
      const vowels = ['a', 'e', 'i', 'o', 'u'];

      let nonsenseWord = vowels[Math.floor(Math.random() * vowels.length)];
      for (let i = 0; i < Math.floor(Math.random() * 3); i++) {
        nonsenseWord += consonants[Math.floor(Math.random() * consonants.length)];
        nonsenseWord += vowels[Math.floor(Math.random() * vowels.length)];
      }

      document.getElementById('nonsense-word').textContent = nonsenseWord;
    }
  </script>
</body>
</html>
