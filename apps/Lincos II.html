        <g>
          <animateTransform attributeName="transform" type="translate"
            values="${aStartX},${yAxis};${aMeetX},${yAxis};${aMeetX},${yAxis};${aStartX},${yAxis};${aStartX},${yAxis}"
            keyTimes="0;${tApproachEnd};${tExchangeEnd};${tDepartEnd};1"
            calcMode="linear" dur="${totalDur}s" repeatCount="indefinite"/>
          ${turtleShape(13)}
        </g>
      `;
      // Turtle B (rotated to face left)
      const turtleB = `
        <g>
          <animateTransform attributeName="transform" type="translate"
            values="${bStartX},${yAxis};${bMeetX},${yAxis};${bMeetX},${yAxis};${bStartX},${yAxis};${bStartX},${yAxis}"
            keyTimes="0;${tApproachEnd};${tExchangeEnd};${tDepartEnd};1"
            calcMode="linear" dur="${totalDur}s" repeatCount="indefinite"/>
          <g><animateTransform attributeName="transform" type="rotate" values="180" dur="${totalDur}s" repeatCount="indefinite"/>
            ${turtleShape(13)}
          </g>
        </g>
      `;

      // Trade symbol — appears between the two turtles during the exchange phase
      const tradeSymbolY = yAxis - 38;
      const tradeSymbolX = 400;
      const tShowSymbol = ((tApproachEnd + 0.005)).toFixed(4);
      const tHideSymbol = ((tExchangeEnd + 0.005)).toFixed(4);
      const tradeSymbolSvg = `
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0;0"
            keyTimes="0;${tApproachEnd};${tShowSymbol};${tExchangeEnd};${tHideSymbol};1"
            calcMode="discrete" dur="${totalDur}s" repeatCount="indefinite"/>
          ${tradeSym(tradeSymbolX, tradeSymbolY)}
        </g>
      `;

      // Tallies
      const aCount = 4, bCount = 2;
      const tallyR = 4;
      const tallySp = 11;
      const tallyDy = -22;

      let dotsSvg = '';
      // A's stationary dots (positions 0..aCount-2 in centered tally)
      for (let i = 0; i < aCount - 1; i++) {
        const xRel = (i - (aCount - 1) / 2) * tallySp;
        dotsSvg += `<circle cx="0" cy="0" r="${tallyR}" fill="#ffb649">
          <animateTransform attributeName="transform" type="translate"
            values="${aStartX + xRel},${yAxis + tallyDy};${aMeetX + xRel},${yAxis + tallyDy};${aMeetX + xRel},${yAxis + tallyDy};${aStartX + xRel},${yAxis + tallyDy};${aStartX + xRel},${yAxis + tallyDy}"
            keyTimes="0;${tApproachEnd};${tExchangeEnd};${tDepartEnd};1"
            calcMode="linear" dur="${totalDur}s" repeatCount="indefinite"/>
        </circle>`;
      }
      // B's stationary dots
      for (let i = 0; i < bCount - 1; i++) {
        const xRel = (i - (bCount - 1) / 2) * tallySp;
        dotsSvg += `<circle cx="0" cy="0" r="${tallyR}" fill="#ffb649">
          <animateTransform attributeName="transform" type="translate"
            values="${bStartX + xRel},${yAxis + tallyDy};${bMeetX + xRel},${yAxis + tallyDy};${bMeetX + xRel},${yAxis + tallyDy};${bStartX + xRel},${yAxis + tallyDy};${bStartX + xRel},${yAxis + tallyDy}"
            keyTimes="0;${tApproachEnd};${tExchangeEnd};${tDepartEnd};1"
            calcMode="linear" dur="${totalDur}s" repeatCount="indefinite"/>
        </circle>`;
      }

      // Travelling token A → B
      const aRightRel = (aCount - 1 - (aCount - 1) / 2) * tallySp;
      const bLeftRel = (0 - (bCount - 1) / 2) * tallySp;
      const aFromX1 = aStartX + aRightRel;
      const aFromX2 = aMeetX + aRightRel;
      const bArriveX1 = bMeetX + (bCount - 1 - (bCount - 1) / 2) * tallySp;
      const bArriveX2 = bStartX + (bCount - 1 - (bCount - 1) / 2) * tallySp;
      dotsSvg += `<circle cx="0" cy="0" r="${tallyR}" fill="#ffb649">
        <animateTransform attributeName="transform" type="translate"
          values="${aFromX1},${yAxis + tallyDy};${aFromX2},${yAxis + tallyDy};${bArriveX1},${yAxis + tallyDy};${bArriveX2},${yAxis + tallyDy};${aFromX1},${yAxis + tallyDy}"
          keyTimes="0;${tApproachEnd};${tExchangeEnd};${tDepartEnd};1"
          calcMode="linear" dur="${totalDur}s" repeatCount="indefinite"/>
      </circle>`;

      // Travelling token B → A
      const bFromX1 = bStartX + bLeftRel;
      const bFromX2 = bMeetX + bLeftRel;
      const aArriveX1 = aMeetX + (aCount - 1 - (aCount - 1) / 2) * tallySp;
      const aArriveX2 = aStartX + (aCount - 1 - (aCount - 1) / 2) * tallySp;
      dotsSvg += `<circle cx="0" cy="0" r="${tallyR}" fill="#ffb649">
        <animateTransform attributeName="transform" type="translate"
          values="${bFromX1},${yAxis + tallyDy};${bFromX2},${yAxis + tallyDy};${aArriveX1},${yAxis + tallyDy};${aArriveX2},${yAxis + tallyDy};${bFromX1},${yAxis + tallyDy}"
          keyTimes="0;${tApproachEnd};${tExchangeEnd};${tDepartEnd};1"
          calcMode="linear" dur="${totalDur}s" repeatCount="indefinite"/>
      </circle>`;

      return `${turtleA}${turtleB}${dotsSvg}${tradeSymbolSvg}`;
    }
  },

  // ============================================
  //  XXII. ULTERIORA — what comes after
  // ============================================
  {
    num: 'XXII', name: 'ULTERIORA',
    caption: 'with these primitives — bits, frames, turtles, sequences, repetition, named procedures, inputs, agents, dynamics — anything computable can be expressed; lists are bracketed sequences of bracketed sequences; functions are named procedures returning values; networks of weighted nodes can compute, learn, even reason about language; the message could in principle contain such a network\'s weights, and the receiver could run it',
    svg: () => {
      const p1cx = 175, p1cy = 280;
      const p1 = `
        <g transform="translate(${p1cx},${p1cy})">
          <line x1="-70" y1="-22" x2="-70" y2="22" stroke="#ffb649" stroke-width="1.5"/>
          <line x1="-70" y1="-22" x2="-65" y2="-22" stroke="#ffb649" stroke-width="1.5"/>
          <line x1="-70" y1="22" x2="-65" y2="22" stroke="#ffb649" stroke-width="1.5"/>
          <line x1="70" y1="-22" x2="70" y2="22" stroke="#ffb649" stroke-width="1.5"/>
          <line x1="70" y1="-22" x2="65" y2="-22" stroke="#ffb649" stroke-width="1.5"/>
          <line x1="70" y1="22" x2="65" y2="22" stroke="#ffb649" stroke-width="1.5"/>
          <g transform="translate(-35,0)">
            <line x1="-15" y1="-13" x2="-15" y2="13" stroke="#ffb649" stroke-width="1"/>
            <line x1="-15" y1="-13" x2="-12" y2="-13" stroke="#ffb649" stroke-width="1"/>
            <line x1="-15" y1="13" x2="-12" y2="13" stroke="#ffb649" stroke-width="1"/>
            <line x1="15" y1="-13" x2="15" y2="13" stroke="#ffb649" stroke-width="1"/>
            <line x1="15" y1="-13" x2="12" y2="-13" stroke="#ffb649" stroke-width="1"/>
            <line x1="15" y1="13" x2="12" y2="13" stroke="#ffb649" stroke-width="1"/>
            <circle cx="-5" cy="0" r="3" fill="#ffb649"/>
            <circle cx="5" cy="0" r="3" fill="#ffb649"/>
          </g>
          <g transform="translate(35,0)">
            <line x1="-15" y1="-13" x2="-15" y2="13" stroke="#ffb649" stroke-width="1"/>
            <line x1="-15" y1="-13" x2="-12" y2="-13" stroke="#ffb649" stroke-width="1"/>
            <line x1="-15" y1="13" x2="-12" y2="13" stroke="#ffb649" stroke-width="1"/>
            <line x1="15" y1="-13" x2="15" y2="13" stroke="#ffb649" stroke-width="1"/>
            <line x1="15" y1="-13" x2="12" y2="-13" stroke="#ffb649" stroke-width="1"/>
            <line x1="15" y1="13" x2="12" y2="13" stroke="#ffb649" stroke-width="1"/>
            <circle cx="-5" cy="0" r="3" fill="#ffb649"/>
            <circle cx="5" cy="0" r="3" fill="#ffb649"/>
          </g>
        </g>
      `;

      const p2cx = 400, p2cy = 280;
      const p2 = `
        <g transform="translate(${p2cx},${p2cy})">
          <rect x="-95" y="-12" width="14" height="14" fill="#ffb649"/>
          <rect x="-79" y="-12" width="14" height="14" fill="none" stroke="#3a3530" stroke-width="1"/>
          <rect x="-63" y="-12" width="14" height="14" fill="#ffb649"/>
          <line x1="-46" y1="-5" x2="-30" y2="-5" stroke="#6b6660" stroke-width="1"/>
          <polygon points="-30,-9 -22,-5 -30,-1" fill="#6b6660"/>
          <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#ffb649" stroke-width="1.5"/>
          <line x1="22" y1="-5" x2="38" y2="-5" stroke="#6b6660" stroke-width="1"/>
          <polygon points="38,-9 46,-5 38,-1" fill="#6b6660"/>
          <rect x="46" y="-12" width="14" height="14" fill="none" stroke="#3a3530" stroke-width="1"/>
          <rect x="62" y="-12" width="14" height="14" fill="#ffb649"/>
          <rect x="78" y="-12" width="14" height="14" fill="#ffb649"/>
        </g>
      `;

      const p3cx = 625, p3cy = 280;
      const nodeR = 5;
      let p3nodes = '';
      let p3edges = '';
      const nodePositions = [];
      const layers = [4, 5, 3];
      const layerX = [-50, 0, 50];
      layers.forEach((cnt, li) => {
        nodePositions.push([]);
        for (let i = 0; i < cnt; i++) {
          const yPos = (i - (cnt - 1) / 2) * 14;
          nodePositions[li].push({x: layerX[li], y: yPos});
        }
      });
      for (let li = 0; li < layers.length - 1; li++) {
        nodePositions[li].forEach(n1 => {
          nodePositions[li + 1].forEach(n2 => {
            p3edges += `<line x1="${n1.x}" y1="${n1.y}" x2="${n2.x}" y2="${n2.y}" stroke="#3a3530" stroke-width="0.5"/>`;
          });
        });
      }
      nodePositions.forEach(layer => {
        layer.forEach(n => {
          p3nodes += `<circle cx="${n.x}" cy="${n.y}" r="${nodeR}" fill="#ffb649"/>`;
        });
      });
      const p3 = `
        <g transform="translate(${p3cx},${p3cy})">
          ${p3edges}
          ${p3nodes}
        </g>
      `;

      return `${p1}${p2}${p3}`;
    }
  }


];

// =========================================================
//  Player / controller
// =========================================================
const stage = document.getElementById('stage');
const captionEl = document.getElementById('caption');
const lessonNumEl = document.getElementById('lesson-num');
const lessonNameEl = document.getElementById('lesson-name');
const progressEl = document.getElementById('progress');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const playBtn = document.getElementById('play');
const playIcon = document.getElementById('play-icon');

let current = 0;
let playing = false;
let autoTimer = null;
const AUTO_INTERVAL = 9000; // ms per scene when auto-playing

function renderProgress() {
  progressEl.innerHTML = '';
  SCENES.forEach((_, i) => {
    const t = document.createElement('button');
    t.className = 'progress-tick' + (i === current ? ' active' : (i < current ? ' complete' : ''));
    t.setAttribute('aria-label', `Scene ${i + 1}`);
    t.addEventListener('click', () => goTo(i));
    progressEl.appendChild(t);
  });
}

function showScene(i) {
  current = i;
  const scene = SCENES[i];
  // Add base shared SVG defs/styles each time
  stage.innerHTML = `
    <style>
      .lncs-label { font-family: 'JetBrains Mono', monospace; fill: #6b6660; font-size: 11px; letter-spacing: 0.2em; font-weight: 300; }
      .lncs-wire { stroke: #6b6660; stroke-width: 1; fill: none; }
      .lncs-gate { stroke: #d4d0c8; stroke-width: 1; fill: none; }
    </style>
    ${scene.svg()}
  `;
  // restart fade
  stage.classList.remove('scene-fade');
  void stage.offsetWidth;
  stage.classList.add('scene-fade');

  lessonNumEl.textContent = `— ${scene.num} —`;
  lessonNameEl.textContent = scene.name;
  captionEl.textContent = scene.caption;

  renderProgress();
  prevBtn.disabled = (i === 0);
  nextBtn.disabled = (i === SCENES.length - 1);
}

function goTo(i) {
  i = Math.max(0, Math.min(SCENES.length - 1, i));
  showScene(i);
  if (playing) restartAuto();
}

function next() {
  if (current < SCENES.length - 1) goTo(current + 1);
  else { setPlaying(false); }
}
function prev() { goTo(current - 1); }

function setPlaying(on) {
  playing = on;
  if (on) {
    playBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
    restartAuto();
  } else {
    if (autoTimer) clearInterval(autoTimer);
    autoTimer = null;
    playBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20"/></svg>`;
  }
}

function restartAuto() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(() => {
    if (current < SCENES.length - 1) {
      goTo(current + 1);
    } else {
      setPlaying(false);
    }
  }, AUTO_INTERVAL);
}

prevBtn.addEventListener('click', prev);
nextBtn.addEventListener('click', next);
playBtn.addEventListener('click', () => setPlaying(!playing));

// keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); setPlaying(!playing); }
});

// init
showScene(0);
</script>
