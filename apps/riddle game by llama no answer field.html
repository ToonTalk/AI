<!DOCTYPE html>
<html>
<head>
  <title>Riddle Me That!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    #riddle-container {
      width: 80%;
      margin: 40px auto;
      background-color: #f0f0f0;
      padding: 20px;
      border: 1px solid #ccc;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    #riddle-container h2 {
      margin-top: 0;
    }
    #riddle-container p {
      font-size: 16px;
    }
    #answer-button {
      background-color: #4CAF50;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #answer-button:hover {
      background-color: #3e8e41;
    }
  </style>
</head>
<body>
  <div id="riddle-container">
    <h2>Riddle Me That!</h2>
    <p id="riddle"></p>
    <button id="answer-button">Answer</button>
    <p id="answer" style="display: none"></p>
  </div>

  <script>
    let riddles = [
      {
        riddle: "What has keys but can't open locks?",
        answer: "A piano!"
      },
      {
        riddle: "What has a face but no eyes, nose, or mouth?",
        answer: "A clock!"
      }
    ];

    let currentRiddleIndex = 0;

    function displayRiddle() {
      document.getElementById("riddle").innerText = riddles[currentRiddleIndex].riddle;
      document.getElementById("answer-button").addEventListener("click", checkAnswer);
    }

    function checkAnswer() {
      if (document.getElementById("riddle").innerText === riddles[currentRiddleIndex].answer) {
        document.getElementById("answer").style.display = "block";
        document.getElementById("answer").innerText = "Correct! You're a riddle-solving master!";
      } else {
        document.getElementById("answer").style.display = "block";
        document.getElementById("answer").innerText = "Sorry, try again! The correct answer is: " + riddles[currentRiddleIndex].answer;
      }
      currentRiddleIndex++;
      if (currentRiddleIndex >= riddles.length) {
        currentRiddleIndex = 0;
      }
      displayRiddle();
    }

    displayRiddle();
  </script>
</body>
</html>
