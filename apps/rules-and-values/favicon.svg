<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Rule debugger">
  <!-- App identity: a balance scale, tipped slightly, because you are always
       weighing a trade-off and never perfectly balanced (every rule leaks).
       Palette: terracotta tile (accent b5532f), cream figure (bg2 f6f4ee). -->
  <rect width="64" height="64" rx="14" fill="#b5532f"/>
  <g fill="none" stroke="#f6f4ee" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- post + base -->
    <line x1="32" y1="14" x2="32" y2="47"/>
    <path d="M26 51 L32 46 L38 51"/>
    <line x1="21" y1="51" x2="43" y2="51"/>
    <!-- beam, gently tilted -->
    <line x1="13" y1="22" x2="51" y2="17"/>
    <!-- left pan (the heavier side, hanging lower) -->
    <path d="M13 22 L9 31 M13 22 L17 31"/>
    <path d="M7 31 Q13 39 19 31"/>
    <!-- right pan (the lighter side) -->
    <path d="M51 17 L47 26 M51 17 L55 26"/>
    <path d="M45 26 Q51 34 57 26"/>
  </g>
  <!-- finial -->
  <circle cx="32" cy="12.5" r="2.8" fill="#f6f4ee"/>
</svg>
