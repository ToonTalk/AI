<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Space Travel Games Construction Kit</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">BBC Jam inspired reconstruction</p>
          <h1>Space Travel Games Construction Kit</h1>
        </div>
        <div class="mission-switch" role="group" aria-label="Mission">
          <button class="segmented active" type="button" data-scenario="rescue">Rescue</button>
          <button class="segmented" type="button" data-scenario="lander">Lander</button>
        </div>
      </header>

      <section class="workspace" aria-label="Construction kit workspace">
        <aside class="team-panel" aria-label="Virtual teammates">
          <div class="panel-header">
            <span class="label">Studio</span>
            <button id="nextPhase" class="icon-button" type="button" title="Advance phase" aria-label="Advance phase">></button>
          </div>
          <div id="phaseBadge" class="phase-badge">Phase 1</div>
          <nav class="team-tabs" aria-label="Teammates">
            <button class="team-tab active" type="button" data-role="designer">Designer</button>
            <button class="team-tab" type="button" data-role="scientist">Scientist</button>
            <button class="team-tab" type="button" data-role="programmer">Programmer</button>
            <button class="team-tab" type="button" data-role="historian">Historian</button>
          </nav>
          <article class="teammate">
            <h2 id="teamName">Designer</h2>
            <p id="teamLine"></p>
          </article>
          <div class="status-stack">
            <div>
              <span>Goal</span>
              <strong id="goalText"></strong>
            </div>
            <div>
              <span>Result</span>
              <strong id="resultText">Ready</strong>
            </div>
          </div>
        </aside>

        <section class="game-column">
          <div class="game-toolbar" aria-label="Game controls">
            <button id="startPause" class="primary" type="button">Start</button>
            <button id="resetGame" type="button">Reset</button>
            <button id="recordAuto" type="button">Record</button>
            <button id="playAuto" type="button">Autopilot</button>
            <div class="scoreboard">
              <span>Time <strong id="timeReadout">0.0</strong>s</span>
              <span>Fuel <strong id="fuelReadout">0</strong></span>
              <span>Speed <strong id="speedReadout">0.0</strong></span>
            </div>
          </div>
          <canvas id="gameCanvas" width="960" height="560" aria-label="Game construction canvas"></canvas>
          <div class="gauge-grid" aria-label="Gauges">
            <div class="gauge">
              <div><span>Vertical speed</span><strong id="vyValue">0.0</strong></div>
              <canvas id="vyGauge" width="220" height="78"></canvas>
            </div>
            <div class="gauge">
              <div><span>Height</span><strong id="heightValue">0</strong></div>
              <canvas id="heightGauge" width="220" height="78"></canvas>
            </div>
            <div class="gauge">
              <div><span>Fuel / rocks</span><strong id="fuelValue">0</strong></div>
              <canvas id="fuelGauge" width="220" height="78"></canvas>
            </div>
          </div>
        </section>

        <aside class="kit-panel" aria-label="Behaviour gadgets">
          <div class="panel-header">
            <span class="label">Behaviour gadgets</span>
            <button id="helpButton" class="icon-button" type="button" title="Ask the team" aria-label="Ask the team">?</button>
          </div>
          <div id="gadgets" class="gadgets"></div>

          <section class="code-panel" aria-label="Code fragments">
            <div class="panel-header">
              <span class="label">Code boxes</span>
              <button id="openAllCode" class="icon-button" type="button" title="Show all code" aria-label="Show all code">{ }</button>
            </div>
            <pre id="codeBox"></pre>
          </section>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
