// Resumable: skips (agent, round) pairs already in exp.results, so a failed run can continue without
// re-cloning or double-counting. The judge uses the model snapshotted in exp.judgeSpec at creation.
async function runExperiment(exp, progressEl){
  const base = getAgent(exp.baselineAgentId), variant = getAgent(exp.variantAgentId);
  if (!base || !variant) throw new Error("This experiment's minds are missing — it can't run.");
  const total = exp.rounds * 2;
  // seed the novelty baselines from each arm's most recent already-judged work (matters when resuming)
  const prevHash = {}, prevPoem = {};
  for (const ag of [base, variant]){
    const lastDone = exp.results.filter(x=>x.agentId===ag.id).sort((a,b)=>a.round-b.round).slice(-1)[0];
    prevHash[ag.id] = null; prevPoem[ag.id] = null;
    if (lastDone){ const w = state.works.find(w=>w.id===lastDone.workId);
      if (w && w.medium==="turtle"){ const t = await getThumbnail(w); if (t) prevHash[ag.id] = await aHash(t); }
      else if (w) prevPoem[ag.id] = w.payload.poem; }
  }
  let done = exp.results.length;
  for (let r=1; r<=exp.rounds; r++){
    for (const ag of [base, variant]){
      if (exp.results.some(x=>x.agentId===ag.id && x.round===r)) continue;   // already done — resume past it
      let work, judgeRating=null, novelty=null;
      try {
        work = await runRound(ag.id, { mount:null, silentNotebook:true, critiques:[] });
        const thumb = work.medium==="turtle" ? await getThumbnail(work) : null;
        const images = thumb ? [thumb] : null;
        const jRes = await llm.complete({ role:"judge", fixedModel:exp.judgeSpec.model, system:PREAMBLE+KINDNESS,
          userText: judgePrompt(ag, work, exp.judgeSpec), images, meta:{ round:r, medium:work.medium, agentId:ag.id } });
        judgeRating = parseRating(jRes.text);
        if (thumb){ const h = await aHash(thumb); novelty = turtleNovelty(prevHash[ag.id], h); prevHash[ag.id]=h; }
        else if (work.medium==="poet"){ novelty = poemNovelty(prevPoem[ag.id], work.payload.poem); prevPoem[ag.id]=work.payload.poem; }
      } catch(e){
        if (progressEl) progressEl.textContent = "Stopped at round "+r+" ("+(ag===base?"baseline":"variant")+"): "+e.message;
        throw e;   // results so far are saved; the wizard offers Resume
      }
      exp.results.push({ agentId:ag.id, round:r, workId:work.id, selfRating:work.selfRating, judgeRating, novelty });
      done++; if (progressEl) progressEl.textContent = "Running… "+done+" of "+total+" rounds done.";
      save();
    }
  }
  save();
  return exp;
}
function experimentCSV(exp){
  const rows = [["experimentId","agentId","agentName","round","metric","value"]];
  exp.results.forEach(r=>{
    const nm = (getAgent(r.agentId)||{}).name || r.agentId;
    rows.push([exp.id, r.agentId, nm, r.round, "selfRating", r.selfRating==null?"":r.selfRating]);
    rows.push([exp.id, r.agentId, nm, r.round, "judgeRating", r.judgeRating==null?"":r.judgeRating]);
    rows.push([exp.id, r.agentId, nm, r.round, "novelty", r.novelty==null?"":r.novelty.toFixed(4)]);
  });
  return rows.map(r=>r.map(c=>/[",\n]/.test(String(c))?'"'+String(c).replace(/"/g,'""')+'"':c).join(",")).join("\n");
}

/* hand-rolled SVG line chart */
function svgLineChart(series, opts){
  opts = opts||{};
  const W=opts.w||360, H=opts.h||160, pad=28;
  const maxY = opts.maxY!=null?opts.maxY:Math.max(1,...series.flatMap(s=>s.points.map(p=>p.y||0)));
  const maxX = Math.max(1,...series.flatMap(s=>s.points.map(p=>p.x)));
  const px = x => pad + (x-1)/(Math.max(1,maxX-1)) * (W-pad*2);
  const py = y => H-pad - (y/maxY) * (H-pad*2);
  let svg = '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:'+W+'px">';
  svg += '<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#C9D9E8"/>';
  svg += '<line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(H-pad)+'" stroke="#C9D9E8"/>';
  svg += '<text x="'+(pad-4)+'" y="'+(py(maxY))+'" font-size="9" fill="#5A6B8C" text-anchor="end">'+ (Number.isInteger(maxY)?maxY:maxY.toFixed(1)) +'</text>';
  svg += '<text x="'+(pad-4)+'" y="'+(H-pad)+'" font-size="9" fill="#5A6B8C" text-anchor="end">0</text>';
  series.forEach(s=>{
    const pts = s.points.filter(p=>p.y!=null);
    if (!pts.length) return;
    const d = pts.map((p,i)=>(i?"L":"M")+px(p.x)+","+py(p.y)).join(" ");
    svg += '<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="2.5"/>';
    pts.forEach(p=> svg += '<circle cx="'+px(p.x)+'" cy="'+py(p.y)+'" r="3" fill="'+s.color+'"/>');
  });
  svg += '</svg>';
  // legend
  svg += '<div class="row" style="font-size:11.5px;gap:12px">'+series.map(s=>'<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+s.color+'"></span> '+esc(s.name)+'</span>').join("")+'</div>';
  return svg;
}

/* --- Creation flow (3 steps) --- */
function openCreationFlow(){
  const content = el("div");
  const choice = { medium:null, look:{ emoji:"🌀", color:"#2E9E6B" }, template:null };
  const step = el("div");
  content.appendChild(step);
  const EMOJIS = ["🌀","🌧️","🏛️","✨","🐌","❓","📜","📖","🌈","💛","🎨","🐢","🦋","🌙","🔭","🌸"];
  const COLORS = ["#2E9E6B","#4A78C9","#B5722E","#7B6CF6","#C94A8B","#FF6B5E","#FFC94D","#C99A1E"];

  function renderStep1(){
    step.innerHTML = "<p class='hint'>Step 1 of 3 — what will your mind make?</p>";
    const row = el("div","row");
    [["turtle","🐢 It draws","Turtle drawings on a canvas"],["poet","📝 It writes","Short poems"]].forEach(([m,t,d])=>{
      const b = el("div","template-pick"); b.style.flex="1"; b.style.textAlign="center";
      b.innerHTML = "<div class='te'>"+t.split(" ")[0]+"</div><strong>"+t.slice(t.indexOf(' ')+1)+"</strong><p class='hint'>"+d+"</p>";
      b.onclick = ()=>{ choice.medium=m; renderStep2(); };
      row.appendChild(b);
    });
    step.appendChild(row);
    // Or bring in a mind someone saved as a trading card.
    const orRow = el("div"); orRow.style.cssText="margin-top:14px;text-align:center";
    orRow.appendChild(el("p","hint","— or —"));
    const imp = el("button","small-btn","📥 Import a saved mind (a trading card)");
    imp.onclick = ()=>{ back2.remove(); importFlow(); };
    orRow.appendChild(imp);
    step.appendChild(orRow);
  }
  function renderStep2(){
    step.innerHTML = "<p class='hint'>Step 2 of 3 — pick a look</p>";
    const ep = el("div","emoji-pick");
    EMOJIS.forEach(e=>{ const b=el("button", choice.look.emoji===e?"sel":"", e); b.onclick=()=>{ choice.look.emoji=e; renderStep2(); }; ep.appendChild(b); });
    const cp = el("div","color-pick"); cp.style.marginTop="10px";
    COLORS.forEach(c=>{ const b=el("button", choice.look.color===c?"sel":""); b.style.background=c; b.onclick=()=>{ choice.look.color=c; renderStep2(); }; cp.appendChild(b); });
    const next = el("button","small-btn primary","Next"); next.style.marginTop="12px"; next.onclick=renderStep3;
    const back = el("button","small-btn","Back"); back.style.marginTop="12px"; back.onclick=renderStep1;
    step.appendChild(el("p","hint","Emoji")); step.appendChild(ep);
    step.appendChild(el("p","hint","Colour")); step.appendChild(cp);
    step.appendChild(el("div","row",""));
    const r=el("div","row"); r.appendChild(back); r.appendChild(next); step.appendChild(r);
  }
  function renderStep3(){
    step.innerHTML = "<p class='hint'>Step 3 of 3 — choose a starter mind (you can edit everything after)</p>";
    const grid = el("div","template-grid");
    TEMPLATES.filter(t=>t.medium===choice.medium).forEach(t=>{
      const b = el("div","template-pick"+(choice.template===t?" sel":""));
      b.innerHTML = "<div class='te'>"+esc(t.look.emoji)+"</div><strong>"+esc(t.name)+"</strong><p class='hint'>"+esc(t.anatomy.spark.slice(0,80))+"…</p>";
      b.onclick = ()=>{ choice.template=t; grid.querySelectorAll(".template-pick").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); };
      grid.appendChild(b);
    });
    const scratch = el("div","template-pick"+(choice.template==="scratch"?" sel":""));
    scratch.innerHTML = "<div class='te'>📄</div><strong>Start from scratch</strong><p class='hint'>Empty cards you fill in yourself.</p>";
    scratch.onclick = ()=>{ choice.template="scratch"; grid.querySelectorAll(".template-pick").forEach(x=>x.classList.remove("sel")); scratch.classList.add("sel"); };
    grid.appendChild(scratch);
    step.appendChild(grid);
    const create = el("button","run","Make this mind"); create.style.cssText="margin-top:14px;font-size:16px;padding:11px 22px";
    const back = el("button","small-btn","Back"); back.style.marginTop="14px"; back.style.marginLeft="8px"; back.onclick=renderStep2;
    create.onclick = ()=>{
      if (!choice.template){ toast("Pick a starter mind first."); return; }
      const agent = choice.template==="scratch" ? blankAgent(choice.medium, choice.look)
        : agentFromTemplate(choice.template, { emoji:choice.look.emoji, color:choice.look.color });
      state.agents.push(agent); save();
      back2.remove(); nav("mind",{agentId:agent.id});
    };
    step.appendChild(create); step.appendChild(back);
  }
  renderStep1();
  const back2 = modal("Make a new mind", content);
}

      const dRes = await llm.complete({ role:"reflect", system:PREAMBLE, userText:distillPrompt(agent), meta:{ round:agent.stats.roundsRun, medium:agent.medium, distill:true } });
      const fresh = parseLessons(dRes.text);

// A non-live phase card, used when rebuilding rounds that already happened.
function staticPhase(name, icon, bodyHTML){
  const ph = el("div","phase");
  ph.style.setProperty("--phase-color", PHASE_COLORS[name]||"#ccc");
  ph.innerHTML = '<div class="phase-name">'+icon+" "+name+'</div><div class="body">'+bodyHTML+'</div>';

// Rebuild the timeline for rounds this mind already ran, from saved works + journal (read-only; no peek-under-the-hood, which isn't stored).
function renderPastRounds(agent, mount){
  const works = worksFor(agent.id).slice().sort((a,b)=>a.round-b.round);
  works.forEach((work, idx)=>{
    const prev = works[idx-1];
    const roundBox = el("div","round");
    roundBox.appendChild(el("div","round-head",'<span class="badge">Round '+work.round+'</span>'));
    const phases = el("div","phases"); roundBox.appendChild(phases);
    phases.appendChild(staticPhase("Make","✏️","<strong>"+esc(work.intention||work.title||"")+"</strong>"));
    let renderHTML;
    if (work.medium==="turtle"){
      renderHTML = work.error ? "😕 "+esc(work.error) : esc(work.title||"");
      if (prev && !work.error && prev.payload.code && work.payload.code) renderHTML += diffDetails(prev.payload.code, work.payload.code, "code");
    } else {
      renderHTML = writingCardHTML(work, agent.look.color);
      if (prev && prev.payload.poem) renderHTML += diffDetails(prev.payload.poem, work.payload.poem, work.form==="story"?"story":"poem");
    }
    const renderPh = staticPhase("Render", work.medium==="turtle"?"🐢":"📝", renderHTML);
    if (work.medium==="turtle" && !work.error){
      const body = renderPh.querySelector(".body");
      body.prepend(thumbImgEl(work, "thumb"));
      appendReadonlyCode(body, work);                       // "see the code" (+ Show as Logo)
      if (prev && prev.payload.code && work.payload.code)   // experimental: changes shown in Logo
        appendLogoDiffButton(body, prev.payload.code, work.payload.code, work);
    }
    phases.appendChild(renderPh);
    if (work.observations) phases.appendChild(staticPhase("Look","👀", esc(work.observations).replace(/\n/g,"<br>")));
    const j = agent.memory.journal.find(x=>x.round===work.round);
    if (j) phases.appendChild(staticPhase("Reflect","💭", esc(j.text).replace(/\n/g,"<br>")+(work.selfRating?"<br>"+stars(work.selfRating):"")));
    mount.prepend(roundBox);   // oldest first in the loop, prepended → newest ends on top, like a live run
  });
}

// Notes left on a mind's latest work that it hasn't heard yet (these feed its next Make).
function pendingCritiques(agent){ const w = lastWork(agent.id); return w ? (w.critiques||[]).filter(c=>!c.readByAgent) : []; }
function critSpeaker(turn){
  if (turn.kind==="moderator") return { name:"You", look:{ emoji:"🧑", color:"#FFC94D" } };
  return getAgent(turn.speaker) || { name:"A mind", look:{ emoji:"❓", color:"#ccc" } };
}
// One turn of a Show & Tell, used live and when rebuilding a saved transcript.
function critTurnEl(turn){
  const sp = critSpeaker(turn);
  if (turn.kind==="error"){
    const e = el("div","crit-turn error");
    e.innerHTML = '<div class="av" style="background:#F6C4BD55">😕</div><div class="bub"><div class="who">'+esc(sp.name)+'</div>'+esc(turn.text)+'</div>';
    return e;
  }
  const work = turn.workId ? state.works.find(w=>w.id===turn.workId) : null;
  // the work may have been cleared by "start a fresh set of rounds" — don't render empty quotes
  const ttl = work ? '“'+esc(work.title)+'”' : "an earlier work";
  const head = turn.kind==="present" ? " shows "+ttl : (turn.kind==="critique" ? " on "+ttl : "");
  const t = el("div","crit-turn"+(turn.kind==="moderator"?" student":""));
  t.innerHTML = '<div class="av" style="background:'+sp.look.color+'22">'+esc(sp.look.emoji)+'</div>'+
    '<div class="bub"><div class="who">'+esc(sp.name)+head+'</div>'+esc(turn.text)+'</div>';
  return t;
}
// After a Show & Tell: say plainly that the notes are saved and what each mind will do with them.
function afterCritSummary(sess, transcriptEl){
  const box = el("div");
  const waiting = (sess.participantAgentIds||[]).map(getAgent).filter(Boolean).filter(a=>pendingCritiques(a).length);
  const sum = el("div","card"); sum.style.borderColor="var(--turtle)";
  let html = '<label>✅ The notes are saved</label>';
  if (waiting.length){
    html += '<p class="hint">A mind only learns from a note when it next makes something. The next time these minds run a round, each will read the notes about its work and can answer them:</p>';
    html += '<ul class="how-list">'+waiting.map(a=>{ const n=pendingCritiques(a).length;
      return '<li>'+esc(a.look.emoji)+' '+esc(a.name)+' — '+n+' new note'+(n===1?'':'s')+' waiting '+
        '<button class="small-btn" onclick="nav(\'runner\',{agentId:\''+a.id+'\'})">Run a round</button></li>'; }).join("")+'</ul>';
  } else {
    html += '<p class="hint">Every mind here has already read its notes.</p>';
  }
  sum.innerHTML = html;
  box.appendChild(sum);
  // your-own-words box (the "moderator")
  const mc = el("div","card"); mc.innerHTML="<label>Add your own words</label><p class='hint'>Join the talk — your note is saved with this Show & Tell.</p>";
  const ta = el("textarea"); ta.placeholder="You might say…";
  const b = el("button","small-btn primary","Add to the talk"); b.style.marginTop="6px";
  b.onclick=()=>{ if(ta.value.trim()){ const turn={ kind:"moderator", text:ta.value.trim() }; sess.transcript.push(turn); save();
    if (transcriptEl) transcriptEl.appendChild(critTurnEl(turn)); ta.value=""; toast("Added to the talk."); } };
  mc.appendChild(ta); mc.appendChild(b); box.appendChild(mc);
  return box;
}

function openExperimentWizard(){
  const baseMinds = state.agents.filter(a=>!a.experimentId);   // don't let experiment clones become new bases
  if (!baseMinds.length){ toast("Make a mind first."); return; }
  const c = el("div");
  const sel = el("select"); sel.innerHTML = baseMinds.map(a=>'<option value="'+a.id+'">'+esc(a.name)+' ('+a.medium+')</option>').join("");
  c.appendChild(el("label","","Base mind to study")); c.appendChild(sel);
  c.appendChild(el("label","","Change exactly ONE part on the variant"));
  const partSel = el("select"); partSel.innerHTML = ANATOMY_PARTS.map(p=>'<option value="'+p.key+'">'+esc(p.label)+'</option>').join(""); c.appendChild(partSel);
  const valWrap = el("div"); c.appendChild(valWrap);
  function renderVal(){
    const base = getAgent(sel.value); const key=partSel.value;
    valWrap.innerHTML="";
    if (key.endsWith("enabled")||key.endsWith("remember")){
      const cur = !!getPart(base,key);
      const sw=el("div","switch"); const cb=el("input"); cb.type="checkbox"; cb.checked=!cur; cb.id="expToggle";
      sw.appendChild(cb); sw.appendChild(el("span","","New value (flipped from the base): "+(!cur?"ON":"OFF")));
      valWrap.appendChild(el("p","hint","The base is "+(cur?"ON":"OFF")+". The variant will be the opposite.")); valWrap.appendChild(sw);
    } else {
      valWrap.appendChild(el("label","","New text for the variant's "+key));
      const ta=el("textarea"); ta.id="expVal"; ta.value=getPart(base,key)||""; valWrap.appendChild(ta);
    }
  }
  sel.onchange=renderVal; partSel.onchange=renderVal; renderVal();
  c.appendChild(el("label","","How many rounds each? (max 12)"));
  const rounds = el("input"); rounds.type="number"; rounds.value="6"; rounds.min="1"; rounds.max="12"; c.appendChild(rounds);
  c.appendChild(el("label","","Your question / hypothesis"));
  const q = el("textarea"); q.placeholder="Will losing its Eyes make its drawings drift from its Spark?"; c.appendChild(q);
  c.appendChild(el("label","","Judge instructions (fixed for the whole experiment — edit now, not during)"));
  const judge = el("textarea"); judge.value="Judge how closely the work matches the artist's Spark. Reward work that feels true to that dream."; c.appendChild(judge);
  c.insertAdjacentHTML("beforeend", bigIdea("judge"));
  const estimate = el("p","hint",""); c.appendChild(estimate);
  function updEst(){ const n=Math.min(12,Math.max(1,+rounds.value||6)); const base=getAgent(sel.value); const phases = base.anatomy.eyes.enabled?5:4; estimate.textContent="Roughly "+(2*n*(phases+1))+" helper calls (2 minds × "+n+" rounds × make/look/reflect/distill + judge)."; }
  rounds.oninput=updEst; sel.addEventListener("change",updEst); updEst();
  const go = el("button","run","Clone, change one thing, and run"); go.style.cssText="font-size:15px;padding:10px 18px;margin-top:12px";
  const prog = el("p","hint","");
  const tools = el("div","row"); tools.style.marginTop="8px";   // holds Resume / Delete after a failure
  let exp = null;   // created once, on the first run; resumed on retry
  async function runIt(){
    go.disabled=true; tools.innerHTML=""; if (!prog.parentNode) c.appendChild(prog);
    if (!exp){
      // create the clones + experiment exactly once
      const base = getAgent(sel.value);
      const variant = cloneAgent(base, " (variant)");
      const baseClone = cloneAgent(base, " (baseline)");
      const key = partSel.value;
      if (key.endsWith("enabled")||key.endsWith("remember")) setPart(variant, key, !getPart(base,key));
      else setPart(variant, key, $("expVal").value);
      state.agents.push(baseClone, variant);
      exp = { id:uid(), name:"Experiment "+(state.experiments.length+1), question:q.value.trim(),
        baselineAgentId:baseClone.id, variantAgentId:variant.id, changedPart:key,
        rounds:Math.min(12,Math.max(1,+rounds.value||6)), results:[],
        judgeSpec:{ prompt:judge.value.trim(), providerRole:"judge", model:roleModel("judge") },   // fix the judge model for the whole run
        createdAt:now() };
      baseClone.experimentId = variant.experimentId = exp.id;   // tag clones so they fold out of the Studio grid
      state.experiments.push(exp); save();
    }
    go.textContent="Running… (this makes many calls)";
    try { await runExperiment(exp, prog); back.remove(); nav("science"); }
    catch(e){
      go.style.display="none";
      const resume = el("button","run","Resume"); resume.onclick=()=>{ go.style.display=""; runIt(); };
      const del = el("button","small-btn danger","Delete this experiment");
      del.onclick=()=>{ // remove the partial experiment and its clones, let the student start over
        state.experiments = state.experiments.filter(x=>x.id!==exp.id);
        state.agents = state.agents.filter(a=>a.experimentId!==exp.id);
        state.works = state.works.filter(w=>state.agents.some(a=>a.id===w.agentId));
        save(); back.remove(); nav("science");
      };
      tools.appendChild(resume); tools.appendChild(del);
    }
  }
  go.onclick = runIt;
  c.appendChild(go); c.appendChild(tools);
  const back = modal("New experiment — change one thing", c);
}

// Imported files are untrusted (cards are meant for kid-to-kid sharing). Coerce every field to a safe shape;
// in particular look.color is interpolated into HTML unescaped, so it must be a strict hex colour.
const _str = (v,max)=> String(v==null?"":v).slice(0, max||4000);
function sanitizeAgent(a){
  if (!a || typeof a!=="object") throw new Error("This file has no mind in it.");
  const an = a.anatomy && typeof a.anatomy==="object" ? a.anatomy : {};
  const eyes = an.eyes && typeof an.eyes==="object" ? an.eyes : {};
  const sm = an.studioManner && typeof an.studioManner==="object" ? an.studioManner : {};
  const mem = a.memory && typeof a.memory==="object" ? a.memory : {};
  return {
    id: uid(), createdAt: a.createdAt || now(),
    name: _str(a.name,80) || "Imported mind",
    medium: a.medium==="turtle" ? "turtle" : "poet",
    look: {
      color: (typeof a.look==="object" && /^#[0-9A-Fa-f]{6}$/.test(a.look.color)) ? a.look.color : "#7B6CF6",
      emoji: _str(a.look && a.look.emoji, 8) || "🌀"
    },
    anatomy: {
      spark: _str(an.spark), hands: _str(an.hands), innerVoice: _str(an.innerVoice),
      form: an.form==="story" ? "story" : (an.form==="poem" ? "poem" : undefined),
      eyes: { enabled: eyes.enabled!==false, remember: eyes.remember!==false, looking: _str(eyes.looking,2000) },
      studioManner: { presenting: _str(sm.presenting,2000), critic: _str(sm.critic,2000) }
    },
    memory: {
      lessons: Array.isArray(mem.lessons) ? mem.lessons.slice(0,50).map(l=>({ id:uid(), text:_str(l&&l.text,300), active:!!(l&&l.active), source:(l&&l.source==="student")?"student":"agent" })) : [],
      journal: Array.isArray(mem.journal) ? mem.journal.slice(0,500).map(j=>({ round:(+(j&&j.round))||0, text:_str(j&&j.text,2000), createdAt:(j&&j.createdAt)||now() })) : []
    },
    stats: { roundsRun: (+(a.stats&&a.stats.roundsRun))||0 }
  };
}
function sanitizeWork(w, agentId){
  if (!w || typeof w!=="object") return null;
  const p = w.payload && typeof w.payload==="object" ? w.payload : {};
  return {
    id: uid(), agentId, round: (+w.round)||0,
    medium: w.medium==="turtle" ? "turtle" : "poet",
    form: w.form==="story" ? "story" : (w.form==="poem" ? "poem" : undefined),
    seed: (w.seed>>>0) || ((Math.random()*0xFFFFFFFF)>>>0),
    payload: { code: p.code!=null?_str(p.code,20000):undefined, poem: p.poem!=null?_str(p.poem,2000):undefined },
    title: _str(w.title,120), artistStatement: _str(w.artistStatement,500), intention: _str(w.intention,500),
    observations: _str(w.observations,1000),
    selfRating: (w.selfRating>=1&&w.selfRating<=5)?+w.selfRating:null,
    humanEdited: !!w.humanEdited, error: w.error?_str(w.error,500):undefined,
    critiques: Array.isArray(w.critiques) ? w.critiques.slice(0,30).map(c=>({ from:_str(c&&c.from,40), text:_str(c&&c.text,500), createdAt:(c&&c.createdAt)||now(), readByAgent:!!(c&&c.readByAgent) })) : [],
    createdAt: w.createdAt || now()
  };
}
function importTradingCard(json){
  const d = JSON.parse(json);
  if (d.kind!=="atelier-trading-card") throw new Error("That doesn't look like a trading card.");
  const agent = sanitizeAgent(d.agent);
  agent.name = agent.name + " (imported)";
  state.agents.push(agent);
  (Array.isArray(d.works)?d.works:[]).forEach(w=>{ const sw=sanitizeWork(w, agent.id); if(sw) state.works.push(sw); });
  agent.stats.roundsRun = Math.max(0,...state.works.filter(w=>w.agentId===agent.id).map(w=>w.round));
  save(); render(); toast("Imported "+agent.name+".");
}
function importFlow(){
  const inp = el("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const fr=new FileReader();
    fr.onload=()=>{ try{ const txt=fr.result; const d=JSON.parse(txt);

      toast("Imported.");
    }catch(e){ toast("Could not import: "+e.message); } };
    fr.readAsText(f); };
  inp.click();
}

(function setFavicon(){
  try {
    const c = document.createElement("canvas"); c.width = c.height = 64;
    const x = c.getContext("2d");
    x.fillStyle = "#F7FAFC";
    x.beginPath(); const rr=14; // rounded paper tile
    x.moveTo(rr,0); x.arcTo(64,0,64,64,rr); x.arcTo(64,64,0,64,rr); x.arcTo(0,64,0,0,rr); x.arcTo(0,0,64,0,rr); x.closePath(); x.fill();
    x.strokeStyle = "#2E9E6B"; x.lineWidth = 4.2; x.lineCap = "round"; x.lineJoin = "round";
    x.beginPath();
    for (let t=0; t<=Math.PI*6; t+=0.12){ const r = 2 + t*1.28, px = 32 + Math.cos(t)*r, py = 33 + Math.sin(t)*r; t===0 ? x.moveTo(px,py) : x.lineTo(px,py); }
    x.stroke();
    const link = $("favicon") || document.createElement("link");
    link.rel = "icon"; link.href = c.toDataURL("image/png");
    if (!link.parentNode) document.head.appendChild(link);
  } catch(e){ /* keep the static SVG fallback */ }
})();

/* =====================================================================
   GUIDED VOICE DEMO  (added layer — does not change the app underneath)
   - Speech synthesis narrates a tour and drives the real UI.
   - Speech recognition (with a typed fallback) lets the user ask questions
     at any time; answers are spoken and can steer the app.
   - Pause / Resume. Taking control auto-pauses; on Resume the guide reads
     the live studio state and reacts to whatever the user did.
   All narration of the backbone tour is pre-written for a young, non-technical
   listener; question-answering and resume-reactions go through the same keyless
   Claude the app already uses, and adapt their level to how the user asks.
   ===================================================================== */
(function(){
  "use strict";
  const ttsOK = ("speechSynthesis" in window) && ("SpeechSynthesisUtterance" in window);
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const sttOK = !!SR;
  const reduceMotion = !!(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches);

  const Guide = {
    started:false, ended:false, playing:false, paused:false, awaitingChoice:false,
    step:0, plan:[], planIdx:0, onPlanDone:null, tok:0, _t:null,
    voice:null, voices:[], rec:null, recognizing:false,
    qa:[], stateAtPause:null, userTook:false,
    spot:null, highlightSel:null, els:{}
  };

  /* ---- speech synthesis: sentence-by-sentence with a token so we can stop cleanly ---- */
  function setSpeakingState(on){ if(on) setStatus("Speaking…",true); else if(Guide.els.status && Guide.els.status.textContent==="Speaking…") setStatus(""); }
  function _speakNext(){
    if(Guide.paused) return;
    if(Guide.planIdx>=Guide.plan.length){ const d=Guide.onPlanDone; Guide.onPlanDone=null; setSpeakingState(false); if(d) d(); return; }
    const myTok=Guide.tok;
    const u=new SpeechSynthesisUtterance(Guide.plan[Guide.planIdx]);
    if(Guide.voice) u.voice=Guide.voice;
    u.rate=0.97; u.pitch=1.06; u.lang=(Guide.voice&&Guide.voice.lang)||"en-US";
    u.onend=()=>{ if(myTok!==Guide.tok||Guide.paused) return; Guide.planIdx++; _speakNext(); };
    u.onerror=()=>{ if(myTok!==Guide.tok||Guide.paused) return; Guide.planIdx++; _speakNext(); };

  }

  function onMain(){ if(!Guide.started||Guide.ended) startTour(); else if(Guide.paused) resumeTour(); else pauseTour(); }
  // ---- tour memory: which beats this person has already been shown (kept in saved state, so "Start over" forgets it too) ----
  function guideSeenSet(){ try{ return new Set(state.settings.guideSeen||[]); }catch(_){ return new Set(); } }
  function markBeatSeen(i){ const b=BEATS[i]; if(!b) return; const arr=state.settings.guideSeen||(state.settings.guideSeen=[]); if(arr.indexOf(b.topic)<0){ arr.push(b.topic); try{ save(); }catch(_){} } }
  function nextUnseenBeat(from){ const seen=guideSeenSet(); for(let i=from+1;i<BEATS.length;i++){ if(!seen.has(BEATS[i].topic)) return i; } return -1; }
  // fromStart=true (Restart / "watch it again") replays every beat; otherwise show only what's new.
  function startTour(fromStart){
    Guide.started=true; Guide.ended=false; Guide.paused=false; Guide.demoAll=!!fromStart;
    if(Guide.demoAll){ Guide.playing=true; Guide.step=0; runBeat(0); return; }
    const seen=guideSeenSet();
    const firstUnseen=BEATS.findIndex(b=>!seen.has(b.topic));
    if(firstUnseen<0){                                  // seen the lot already → offer the whole thing again and wait
      Guide.playing=false; Guide.step=BEATS.length-1; updateDock();
      say("You've already been all the way round the studio with me. Would you like to watch the whole tour again from the start?", ()=>{
        Guide.paused=true; setStatus("");
        showChoices({ choices:[
          { label:"Yes, from the start \u25B6", primary:true, go:()=>startTour(true) },
          { label:"No thanks", go:()=>{ logMsg("guide","No problem. Tap the mic or type to ask me anything, any time."); endTour(); } }
        ]});
        updateDock();
      });
      return;

    if(BEATS.some(b=>seen.has(b.topic))){               // been here before but there's something new → welcome back, then only the new parts
      say("Welcome back! You've seen most of this already, so let me just show you the parts that are new.", ()=>{ if(Guide.playing) runBeat(firstUnseen); });
    } else {
      runBeat(firstUnseen);                             // first visit → the whole tour (firstUnseen is 0)
    }
  }
  function runBeat(i){

  async function adaptiveResume(before,after){

  /* ---- watch a mind run a real round, narrating the result ---- */
  // A short, one-off spoken line for the live play-by-play. Does NOT touch the tour plan
  // or trigger advance, and stays quiet (just captions) if the user has paused / taken control.
  function sayNow(text){
    logMsg("guide", text);
    if(!ttsOK || Guide.paused) return;
    Guide.tok++; try{ speechSynthesis.cancel(); }catch(_){}
    const u=new SpeechSynthesisUtterance(text);
    if(Guide.voice) u.voice=Guide.voice; u.rate=1.0; u.pitch=1.06; u.lang=(Guide.voice&&Guide.voice.lang)||"en-US";
    setSpeakingState(true); u.onend=()=>setSpeakingState(false);
    try{ speechSynthesis.speak(u); }catch(_){}
  }
  // A serial queue for the round play-by-play: each phase line is spoken in full before the next, so
  // quick back-to-back phases (Make → Render land almost together) no longer cut each other off. The
  // spotlight is moved from the queue too (opts.hl / opts.clearHl), so it tracks the SPOKEN line rather
  // than racing ahead as each phase's content lands.
  function rqReset(){ Guide.rq={ items:[], busy:false }; }
  function rqSay(text, opts){
    opts=opts||{};
    logMsg("guide", text);
    if(!Guide.rq) rqReset();
    Guide.rq.items.push({ text, onFinal:opts.onFinal, hl:opts.hl, clearHl:opts.clearHl });
    if(!Guide.rq.busy) rqStep();
  }
  function rqStep(){
    const rq=Guide.rq; if(!rq) return;
    if(Guide.paused || !rq.items.length){ rq.busy=false; return; }
    rq.busy=true;
    const it=rq.items.shift(); const myTok=Guide.tok;
    if(it.clearHl) clearHighlight(); else if(it.hl) highlight(it.hl);   // spotlight follows the spoken line
    const done=()=>{ if(it.onFinal){ try{ it.onFinal(); }catch(_){} } rqStep(); };
    if(!ttsOK){ const ms=Math.min(6000,Math.max(1900,it.text.length*46)); setTimeout(()=>{ if(myTok!==Guide.tok){ rq.busy=false; return; } setSpeakingState(false); done(); }, ms); return; }
    const u=new SpeechSynthesisUtterance(it.text);
    if(Guide.voice) u.voice=Guide.voice; u.rate=1.0; u.pitch=1.06; u.lang=(Guide.voice&&Guide.voice.lang)||"en-US";
    setSpeakingState(true);
    u.onend=()=>{ if(myTok!==Guide.tok){ rq.busy=false; return; } setSpeakingState(false); done(); };
    u.onerror=()=>{ if(myTok!==Guide.tok){ rq.busy=false; return; } done(); };
    try{ speechSynthesis.speak(u); }catch(_){ done(); }
  }
  function phaseLine(name, medium){
    if(/Make/i.test(name))    return null;   // merged into Render, so "dreams it up + makes it" is one line when the work appears — no two lines landing on top of each other
    if(/Render/i.test(name))  return medium==="turtle" ? "First it dreams up an idea, then draws it on the easel." : "First it dreams up an idea, then writes it out.";
    if(/Look/i.test(name))    return "Now its eyes study its own work.";
    if(/Reflect/i.test(name)) return "Now it's thinking it over in its journal.";
    if(/Distill/i.test(name)) return "Now it's boiling its notes down to a few lessons.";
    return null;   // Exhibit / Critique appear instantly — not worth a separate line
  }
  let _phaseObs=null;
  // Speak a phase's line only once its content has arrived. The round runner marks a phase ".working" while it loads
  // and drops that class when it's done, so we wait for that — never narrating an empty "…" box.
  function _phaseConsider(node, ag){
    if(!ag || node.nodeType!==1 || !node.classList) return;
    if(!node.classList.contains("phase") || node.classList.contains("phases")) return;
    if(node.classList.contains("working")) return;             // still loading → wait for its content
    if(!Guide._phaseSpoken) Guide._phaseSpoken=new WeakSet();
    if(Guide._phaseSpoken.has(node)) return;                    // narrate each phase once
    const ne=node.querySelector(".phase-name"); const name=ne?ne.textContent:"";
    const line=phaseLine(name, ag.medium); if(!line) return;
    Guide._phaseSpoken.add(node);
    if(Guide.paused) return;   // user paused or is driving — mark it done but don't speak under them
    // For Render, follow the easel/page where the art actually appears; otherwise follow the step itself.
    const target=(/Render/i.test(name) ? document.getElementById(ag.medium==="turtle"?"stage":"poemStage") : null) || node;
    rqSay(line, { hl:()=>target });   // the spotlight moves to this step WHEN its line is spoken (highlight() scrolls it into view then)
  }
  function _phaseHandle(muts, ag){
    if(!ag) return;
    muts.forEach(m=>{
      if(m.type==="childList"){ m.addedNodes && m.addedNodes.forEach(n=>_phaseConsider(n, ag)); }
      else if(m.type==="attributes" && m.target){ _phaseConsider(m.target, ag); }   // ".working" dropped → content is ready
    });
  }
  function startPhaseNarration(ag){
    const mount=$("roundTimeline"); if(!mount) return;
    stopPhaseNarration();
    Guide._phaseAgent=ag; Guide._phaseSpoken=new WeakSet();
    _phaseObs=new MutationObserver(muts=>_phaseHandle(muts, Guide._phaseAgent));
    _phaseObs.observe(mount,{ childList:true, subtree:true, attributes:true, attributeFilter:["class"] });
  }
  function stopPhaseNarration(){
    if(_phaseObs){
      // Flush any records still queued before disconnect() discards them (matters when a round completes very fast).
      try{ const recs=_phaseObs.takeRecords(); if(recs && recs.length) _phaseHandle(recs, Guide._phaseAgent); }catch(_){}
      try{ _phaseObs.disconnect(); }catch(_){}
      _phaseObs=null;
    }
  }

  async function tourRunRound(thenAdvance, targetAgent){
    const ag=targetAgent || runnerAgent() || firstAgent();
    if(!ag){ say("Make a mind first, then I can show you a round."); return; }
    if(state.ui.screen!=="runner"||state.ui.agentId!==ag.id) nav("runner",{agentId:ag.id});
    clearChoices(); clearHighlight(); updateDock();
    dbg("run", "start on "+ag.name+" ["+ag.medium+"]");
    logMsg("guide","Okay, watch "+ag.name+" work \u2014 I'll tell you what it's doing at each step.");   // caption only; the spoken play-by-play starts with the first step
    rqReset();
    startPhaseNarration(ag);
    const finish=(line)=>{
      stopPhaseNarration();
      if(Guide.paused){ clearHighlight(); logMsg("guide",line); return; }   // paused or user took control → caption only, don't speak under them
      rqSay(line, { clearHl:true, onFinal:()=>{   // clear the spotlight WHEN the wrap-up is spoken, so the last step stays lit through its own line
        if(thenAdvance){ Guide.playing=true; advance(); }
        else if(Guide.playing) advance();
        else { Guide.paused=true; Guide.stateAtPause=safeState(); setStatus("Paused"); updateDock(); }   // one-off run (e.g. from a question) — pause so Resume carries the tour on; baseline now so this run isn't later read as the user's doing
      } });
    };
    try{
      window.__mm_paceMock = true;   // if we're on the pretend helper, unfold the phases at a watchable pace
      await runRound(ag.id, { mount:$("roundTimeline"), stageCanvas:$("stage"), stageEl:$("poemStage") });
      const w=lastWork(ag.id); let line;
      if(!w){ line="Hmm, nothing came out that time. We can try again in a minute."; dbg("run", "done: no work"); }
      else if(w.error){ line="Oops, its drawing hit a snag. That's okay, mistakes are how it learns, and it even writes down why."; dbg("run", "done: error work"); }
      else { const what=w.medium==="turtle"?"a drawing":(w.form==="story"?"a tiny story":"a poem"); line="And there it is! "+ag.name+" made "+what+" and called it, "+(w.title||"untitled")+". It looked at its own work and wrote itself a note, which becomes a lesson it keeps for next time."; dbg("run", "done: “"+(w.title||"untitled")+"”"); }
      finish(line);
    }catch(e){ dbg("run", "error: "+(e&&e.message||e)); finish("The art helper is busy right now, so that round didn't finish. We can try again in a minute. Either way, that's how a round works."); }
    finally{ window.__mm_paceMock = false; }
  }

    if(!ag){ tourRunRound(thenAdvance); return; }

  // Actually run a Show & Tell: pick minds that have made something, tick them, and stream the turns into the real screen.
  async function tourCritique(thenAdvance){
    if(state.ui.screen!=="crit") nav("crit");
    clearChoices(); clearHighlight(); updateDock();
    const nonExp = ()=>state.agents.filter(a=>!a.experimentId);
    let withWork = nonExp().filter(a=>lastWork(a.id));
    // Need at least two minds that each have a work to show. Bootstrap by quietly running a round or two if short.
    if(withWork.length<2){
      if(nonExp().length<2){ finishActivity("A Show and Tell needs at least two minds. Make another in the Studio and run a round for each, then I can show you one.", thenAdvance); return; }
      dbg("critique","only "+withWork.length+" with work — bootstrapping");
      logMsg("guide","First, a couple of minds each need something to show, so let me have them make one.");
      say("First, a couple of minds each need something to show, so let me have them make one.", ()=>{});
      const need = nonExp().filter(a=>!lastWork(a.id));
      for(const a of need){ if(nonExp().filter(x=>lastWork(x.id)).length>=2) break;
        dbg("critique","bootstrap round on "+a.name);
        try{ await runRound(a.id,{ mount:null, silentNotebook:true, critiques:[] }); }catch(e){ dbg("critique","bootstrap failed: "+(e&&e.message||e)); }
      }
      nav("crit");                                   // re-render so the new works enable the pickers
      withWork = nonExp().filter(a=>lastWork(a.id));
    }
    if(withWork.length<2){ finishActivity("I couldn't get two minds ready just now. We can try again in a minute.", thenAdvance); return; }
    const chosen = withWork.slice(0,3);              // two or three keeps the demo lively but not long
    const ids = chosen.map(a=>a.id);
    const workIds = ids.map(id=>lastWork(id).id);
    ids.forEach(id=>{ const cb=document.querySelector('[data-critpick="'+id+'"]'); if(cb && !cb.checked) cb.checked=true; });
    const startB=document.querySelector('[data-tour="critstart"]'); if(startB) startB.classList.add("guide-press"), setTimeout(()=>{try{startB.classList.remove("guide-press");}catch(_){}} ,500);
    dbg("critique","start with "+chosen.map(a=>a.name).join(", "));
    logMsg("guide","Here we go \u2014 "+chosen.map(a=>a.name).join(", ")+" will each show their newest work.");
    say("Here we go. Each of these minds shows its newest work, and the others leave a kind, gentle note. Watch them talk to each other.", ()=>{});
    const tEl=document.getElementById("critTranscript"); if(tEl) tEl.innerHTML="";
    const aEl=document.getElementById("critAfter"); if(aEl) aEl.innerHTML="";
    const onTurn=(turn)=>{ if(tEl){ const node=critTurnEl(turn); tEl.appendChild(node); try{ node.scrollIntoView({behavior:reduceMotion?"auto":"smooth", block:"center"}); }catch(_){} } };
    try{
      window.__mm_paceMock = true;
      const sess=await runCritSession(ids, workIds, tEl, onTurn);
      window.__mm_paceMock = false;
      if(aEl) aEl.appendChild(afterCritSummary(sess, tEl));
      dbg("critique","done, turns="+((sess.transcript||[]).length));
      finishActivity("That's a Show and Tell. Each mind kept the notes about its own work, and it will read them the next time it makes something.", thenAdvance);
    }catch(e){
      window.__mm_paceMock = false;
      dbg("critique","error: "+(e&&e.message||e));
      finishActivity("The art helper got busy, so the Show and Tell stopped early. That's okay \u2014 you can start it again from this screen.", thenAdvance);
    }
  }

  /* ---- question answering (voice or typed); answers can also drive the app ---- */
  const MIND_PARTS=["spark","hands","eyes","innerVoice","manner","memory"];
  function parseAction(s){ const m=String(s).match(/<<\s*(go|show|run|resume|open|newmind|critique)\s*:?\s*([^>]*)>>/i); return m?{kind:m[1].toLowerCase(),arg:(m[2]||"").trim()}:null; }
  function stripAction(s){ return String(s).replace(/<<[^>]*>>/g," ").replace(/\s+/g," ").trim(); }
  function mapScreen(a){ a=(a||"").toLowerCase(); const m={studio:"studio",home:"studio",gallery:"gallery",pictures:"gallery",showandtell:"crit",show:"crit",crit:"crit",notebook:"notebook",journal:"notebook",science:"science",settings:"settings",mind:"mind",editor:"mind",runner:"runner",round:"runner"}; return m[a]||null; }
  function mediumFromWord(w){ w=(w||"").toLowerCase();
    if(/poet|poem|poetry|write|writer|writing|story|stories|word|text|haiku|verse/.test(w)) return "poet";
    if(/turtle|draw|drawing|picture|paint|art|shape|spiral|graphic/.test(w)) return "turtle";
    return null; }
  // Resolve an action arg to a specific existing mind by name (so "open:Kind Critic" opens THAT mind, not just any poet).
  function findAgentByName(q){
    q=(q||"").trim().toLowerCase(); if(!q) return null;
    if(/^(poet|poem|poetry|writer|write|turtle|drawing|drawer|picture|art)s?$/.test(q)) return null;   // bare kind word, not a name
    const ags=state.agents.filter(a=>!a.experimentId);
    return ags.find(a=>(a.name||"").toLowerCase()===q)
        || ags.find(a=>(a.name||"").toLowerCase().startsWith(q))
        || ags.find(a=>(a.name||"").toLowerCase().includes(q))
        || ags.find(a=>(a.name||"").length>2 && q.includes((a.name||"").toLowerCase()))
        || null;
  }
  function makeMind(medium){
    // For a writer, prefer a template that actually writes poems (not the prose "Tiny Story") so a poetry ask gets a poetry mind.
    const tpl = medium==="poet"
      ? (TEMPLATES.filter(t=>t.medium==="poet" && (t.anatomy.form||"poem")!=="story")[0] || TEMPLATES.filter(t=>t.medium==="poet")[0])
      : TEMPLATES.filter(t=>t.medium===medium)[0];
    if(!tpl) return null; const a=agentFromTemplate(tpl); state.agents.push(a); save(); return a;
  }
  // Bring a mind of the asked-for kind to the editor, making one if needed; for writers, prefer an actual poem-writer.
  function openMind(medium, forceNew){
    let a=null;
    if(!forceNew){ const pool=state.agents.filter(x=>!x.experimentId && x.medium===medium);
      a = medium==="poet" ? (pool.find(x=>writeForm(x)==="poem") || pool[0]) : pool[0]; }
    if(!a) a=makeMind(medium);
    if(a) nav("mind",{agentId:a.id});
    return a;
  }
  function resolveRunTarget(arg){
    const named=findAgentByName(arg); if(named) return named;
    const m=mediumFromWord(arg);
    if(m){ const p=state.agents.filter(x=>!x.experimentId && x.medium===m); if(p.length) return m==="poet"?(p.find(y=>writeForm(y)==="poem")||p[0]):p[0]; }
    return focusAgent();
  }
  function spotSparkSoon(ag){ if(ag) setTimeout(()=>highlight('[data-tour="spark"]'),0); }
  // Friendly label for a "shall I do X?" confirmation button.
  function offerLabel(act){
    if(act.kind==="run"){ const t=findAgentByName(act.arg); return t?("Yes, run "+t.name+" \u25B6"):"Yes, run it \u25B6"; }
    if(act.kind==="open"){ const t=findAgentByName(act.arg); return t?("Yes, open "+t.name):"Yes, show me"; }
    if(act.kind==="newmind") return "Yes, make one";
    if(act.kind==="go") return "Yes, take me there";
    return "Yes please";
  }
  // The model offered to do something AND asked. Don't just do it — turn it into a real choice and wait for the person.
  function offerAction(act, resumeAfter){
    dbg("offer", act.kind+(act.arg?(":"+act.arg):""));
    Guide.playing=false; Guide.paused=true; setStatus("Paused");
    showChoices({ choices:[
      { label:offerLabel(act), primary:true, go:()=>runAction(act, resumeAfter) },
      { label:"Not yet", go:()=>{ dbg("offer","declined"); if(resumeAfter) resumeTourFlow(); else { logMsg("guide","Okay, no rush. Ask me anytime, or press Resume to keep looking around."); } } }
    ]});
    updateDock();
  }
  // A Q&A detour is over. If the tour was playing when they asked, carry it on instead of dead-stopping on a manual Resume.
  function resumeTourFlow(){ Guide.playing=true; Guide.paused=false; setStatus(""); updateDock(); advance(); }
  function runAction(a, resumeAfter){
    dbg("action", a.kind+(a.arg?(":"+a.arg):""));
    if(a.kind==="resume"){ Guide.playing=true; Guide.paused=false; updateDock(); if(Guide.plan.length&&Guide.planIdx<Guide.plan.length) continuePlan(); else advance(); return; }
    const cur=runnerAgent()||firstAgent();
    const settle=()=>{ if(resumeAfter) resumeTourFlow(); else { Guide.playing=false; Guide.paused=true; Guide.stateAtPause=safeState(); setStatus("Paused"); updateDock(); } };   // baseline AFTER the action, so a mind/change the guide just made isn't later read back as the user's
    // Timed, narrated activities manage their own ending, then advance-or-pause via their thenAdvance flag:
    if(a.kind==="run"){ const ag=resolveRunTarget(a.arg); dbg("do","run "+(ag?ag.name:"(none)")); Guide.playing=false; Guide.paused=false; runWithCursor(ag, !!resumeAfter); return; }
    if(a.kind==="critique"){ dbg("do","critique"); Guide.playing=false; Guide.paused=false; tourCritique(!!resumeAfter); return; }
    Guide.playing=false; Guide.paused=true; Guide.stateAtPause=safeState();
    if(a.kind==="go"){ const s=mapScreen(a.arg);
      if(s){ dbg("do","go "+s);
        const goNav=()=>{ nav(s, s==="studio"?{agentId:null}:{}); if(s!=="science") highlight('[data-tabid="'+s+'"]');
          if(s==="crit" && state.agents.filter(x=>!x.experimentId && lastWork(x.id)).length<2){   // Show & Tell needs two minds that each have a work; an empty tab is a dead end, so run the demo (tourCritique bootstraps the missing works, then you can start your own from here)
            dbg("do","Show & Tell not ready — running the demo so it isn't a dead end");
            Guide.playing=false; Guide.paused=false; tourCritique(!!resumeAfter); return;
          }
          settle(); };
        if(document.querySelector('[data-tabid="'+s+'"]')) cursorClick('[data-tabid="'+s+'"]', goNav); else goNav();
      } else settle(); }
    else if(a.kind==="open"){
      const named=findAgentByName(a.arg);                                  // honour an exact mind name first
      const ag = named || (()=>{ const m=mediumFromWord(a.arg) || (cur&&cur.medium==="poet"?"turtle":"poet"); const pool=state.agents.filter(x=>!x.experimentId && x.medium===m); let x = m==="poet"?(pool.find(y=>writeForm(y)==="poem")||pool[0]):pool[0]; if(!x) x=makeMind(m); return x; })();
      dbg("do","open "+(ag?ag.name:"(none)"));
      if(ag){ if(state.ui.screen!=="studio") nav("studio",{agentId:null}); cursorClick('[data-editfor="'+ag.id+'"]', ()=>{ nav("mind",{agentId:ag.id}); spotSparkSoon(ag); settle(); }); }
      else settle();
    }
    else if(a.kind==="newmind"){ const m=mediumFromWord(a.arg) || (cur&&cur.medium==="poet"?"turtle":"poet"); dbg("do","newmind "+m); cursorClick('[data-tour="newmind"]', ()=>{ spotSparkSoon(openMind(m,true)); settle(); }); }
    else if(a.kind==="show"){ const ag=cur; if(ag){ const al=a.arg.toLowerCase(); const part=MIND_PARTS.indexOf(al)>=0?al:"spark"; dbg("do","show "+part+" on "+ag.name); if(state.ui.screen!=="mind"||state.ui.agentId!==ag.id) nav("mind",{agentId:ag.id}); highlight('[data-tour="'+part+'"]'); } settle(); }
    else settle();
  }
  // No real art helper connected (pretend/mock). The tour still works, but free questions need a real model — so ask for a key.
  function promptForKey(resumeAfter){

    Guide.qa.push({who:"ai",text:msg});

    startPlan(msg, ()=>{

      showChoices({ choices:[
        { label:"Open Settings", primary:true, go:()=>{ dbg("qa","opening Settings for key"); if(state.ui.screen!=="settings") nav("settings"); setTimeout(()=>{ const k=document.querySelector('[data-guidekeys]'); if(k){ try{ k.scrollIntoView({behavior:reduceMotion?"auto":"smooth", block:"center"}); }catch(_){} } }, 80); updateDock(); } },
        { label:"Not now", go:()=>{ if(resumeAfter) resumeTourFlow(); else logMsg("guide","Okay \u2014 ask me anytime, or press Resume to keep looking around."); } }
      ]});

  function qaPrompt(q){
    let p="STUDIO STATE (right now):\n"+(safeState()||"(unavailable)")+"\n";
    if(Guide.qa.length) p+="\nEarlier in our talk:\n"+Guide.qa.slice(-4).map(e=>(e.who==="you"?"Person: ":"You: ")+e.text).join("\n")+"\n";
    p+="\nWhere we are in the tour: "+(BEATS[Guide.step]?BEATS[Guide.step].topic:"wrapping up the tour")+".\n\nThey asked, out loud: "+q;
    return p;
  }
  // When a yes/no choice is on screen, a spoken or typed "yes"/"no" should trigger it, not go to the Q&A brain.
  function routeChoice(q){
    const choices=Guide.activeChoices || (BEATS[Guide.step]&&BEATS[Guide.step].choices);
    if(!choices||!choices.length) return false;
    const t=q.toLowerCase();
    const yes=/\b(yes|yeah|yep|yup|sure|okay|ok|please|go|do it|run it|watch|let'?s|sounds good|why not|go ahead)\b/.test(t);
    const no =/\b(no|nope|nah|skip|later|not now|not yet|next|move on|pass)\b/.test(t);
    const primary=choices.find(c=>c.primary)||choices[0];
    const other  =choices.find(c=>!c.primary);
    if(no && other){ dbg("choice", "“"+q+"” → "+other.label); logMsg("you",q); clearChoices(); other.go(); return true; }
    if(yes && primary){ dbg("choice", "“"+q+"” → "+primary.label); logMsg("you",q); clearChoices(); primary.go(); return true; }
    return false;
  }
  async function answer(q){
    q=(q||"").trim(); if(!q) return;
    if(Guide.recognizing){ try{ Guide.rec.stop(); }catch(_){} }
    if(Guide.awaitingChoice && routeChoice(q)) return;          // "yes"/"no" answers the on-screen choice
    const resumeAfter=Guide.playing;
    const snap={ plan:Guide.plan.slice(), idx:Guide.planIdx, done:Guide.onPlanDone };
    Guide.tok++; try{ speechSynthesis.cancel(); }catch(_){}; setSpeakingState(false);
    if(Guide.rq) Guide.rq.items.length=0;   // a question interrupts any queued round play-by-play
    Guide.qa.push({who:"you",text:q}); logMsg("you",q); dbg("Q", q);
    pauseHighlight();   // while we handle the question, the app isn't dimmed
    if(state.settings.useMock || /[?&]mock=1/.test(location.search)){ promptForKey(resumeAfter); return; }   // no real helper — ask for a key rather than deflecting
    setStatus("Thinking…",true);
    const pending=logMsg("guide","\u2026");
    const restore=()=>{ if(resumeAfter && Guide.playing){ Guide.plan=snap.plan; Guide.planIdx=snap.idx; Guide.onPlanDone=snap.done; Guide.paused=false; restoreHighlight(); continuePlan(); } };
    try{
      const res=await llm.complete({ role:"ask", system:GUIDE_QA_SYSTEM, userText:qaPrompt(q), maxTokens:380, meta:{ask:true} });
      dbg("model", window.__mm_lastModel||"?"); dbg("raw", res.text);
      let ans=stripMd(res.text); const act=parseAction(ans); ans=stripAction(ans)||"Okay!";
      Guide.qa.push({who:"ai",text:ans});
      pending.innerHTML='<span class="w">Guide</span>'+esc(ans); setStatus("");
      startPlan(ans, ()=>{
        if(act){
          const heavy = (act.kind==="open"||act.kind==="newmind"||act.kind==="run"||act.kind==="go"||act.kind==="critique");
          const asksFirst = /\?\s*$/.test(ans.trim()) || /\b(want me to|shall i|should i|would you like|want to see|do you want|shall we|should we)\b/i.test(ans);
          if(heavy && asksFirst){ offerAction(act, resumeAfter); return; }   // it asked AND acted — wait for a real yes/no
          runAction(act, resumeAfter); return;
        }
        restore();
      });
    }catch(e){
      dbg("error", "Q&A: "+(e&&e.message||e));
      setStatus(""); const m="Sorry, I couldn't reach my brain just now. Let's try again in a moment.";
      pending.innerHTML='<span class="w">Guide</span>'+esc(m); startPlan(m, restore);
    }
  }

  /* ---- speech recognition (push to talk), with graceful fallbacks ---- */
  function toggleListen(){ if(Guide.recognizing){ try{ Guide.rec.stop(); }catch(_){}; return; } startListen(); }
  function startListen(){
    if(!sttOK){ Guide.els.input.focus(); return; }
    try{
      const rec=new SR(); rec.lang="en-US"; rec.interimResults=false; rec.maxAlternatives=1; rec.continuous=false;
      Guide.rec=rec; Guide.recognizing=true;
      Guide.tok++; try{ speechSynthesis.cancel(); }catch(_){}; setSpeakingState(false);
      setStatus("Listening\u2026",true); Guide.els.micB.classList.add("on");
      let got=false;
      rec.onresult=ev=>{ got=true; const t=ev.results[0][0].transcript; Guide.recognizing=false; Guide.els.micB.classList.remove("on"); setStatus(""); answer(t); };
      rec.onerror=ev=>{ Guide.recognizing=false; Guide.els.micB.classList.remove("on"); setStatus("");
        if(ev.error==="not-allowed"||ev.error==="service-not-allowed"){ logMsg("guide","I can't reach the microphone. You can type your question in the box instead."); Guide.els.input.focus(); }
        else if(ev.error==="no-speech"){ logMsg("guide","I didn't catch that. Tap the mic and try again, or type it."); } };
      rec.onend=()=>{ Guide.recognizing=false; Guide.els.micB.classList.remove("on"); if(!got && Guide.els.status.textContent==="Listening\u2026") setStatus(""); };
      rec.start();
    }catch(e){ Guide.recognizing=false; if(Guide.els.micB) Guide.els.micB.classList.remove("on"); logMsg("guide","Speech listening isn't available here, so please type your question."); Guide.els.input.focus(); }
  }

  /* ---- spotlight: dims the page except the highlighted element; lets clicks through ---- */
  function ensureSpot(){ if(Guide.spot) return Guide.spot; const s=document.createElement("div"); s.className="guide-spot"; s.style.display="none"; document.body.appendChild(s); Guide.spot=s; return s; }
  function resolveSel(sel){ try{ return typeof sel==="function"?sel():document.querySelector(sel); }catch(_){ return null; } }
  let _spotListening=false;
  function attachSpotListeners(){ if(_spotListening) return; _spotListening=true; window.addEventListener("scroll",positionSpot,true); window.addEventListener("resize",positionSpot); }
  function detachSpotListeners(){ if(!_spotListening) return; _spotListening=false; window.removeEventListener("scroll",positionSpot,true); window.removeEventListener("resize",positionSpot); }
  function positionSpot(){
    const sel=Guide.highlightSel, s=ensureSpot();
    if(Guide.paused){ s.style.display="none"; return; }   // paused → app is never dimmed
    if(!sel){ s.style.display="none"; return; }
    const elx=resolveSel(sel); if(!elx){ s.style.display="none"; return; }
    const r=elx.getBoundingClientRect();
    if(r.width===0 && r.height===0){ s.style.display="none"; return; }
    const pad=8; s.style.display="block";
    s.style.top=(window.scrollY+r.top-pad)+"px"; s.style.left=(window.scrollX+r.left-pad)+"px";
    s.style.width=(r.width+pad*2)+"px"; s.style.height=(r.height+pad*2)+"px";
  }
  function highlight(sel){ Guide.highlightSel=sel; const elx=resolveSel(sel); if(elx){ try{ elx.scrollIntoView({behavior:reduceMotion?"auto":"smooth",block:"center"}); }catch(_){} } requestAnimationFrame(positionSpot); setTimeout(positionSpot,260); attachSpotListeners(); }
  function clearHighlight(){ Guide.highlightSel=null; if(Guide.spot) Guide.spot.style.display="none"; detachSpotListeners(); }
  // On pause: drop the dim, spotlight and teaching cursor so the app looks normal — but remember the target.
  function pauseHighlight(){
    if(Guide.spot) Guide.spot.style.display="none"; detachSpotListeners();
    if(Guide.cursor) Guide.cursor.style.display="none"; if(Guide.ripple) Guide.ripple.style.display="none";
  }
  // On resume: bring the remembered highlight back (the current beat keeps pointing where it was).
  function restoreHighlight(){ if(Guide.highlightSel){ requestAnimationFrame(positionSpot); setTimeout(positionSpot,60); attachSpotListeners(); } }

  /* ---- dock UI ---- */
  function mkBtn(label,cls){ const b=document.createElement("button"); b.className="gd-btn"+(cls?" "+cls:""); b.textContent=label; return b; }
  function logMsg(who,text){
    const m=document.createElement("div"); m.className="gd-msg "+(who==="you"?"you":"g");
    m.innerHTML='<span class="w">'+(who==="you"?"You":"Guide")+'</span>'+esc(text);
    Guide.els.log.appendChild(m); Guide.els.log.scrollTop=Guide.els.log.scrollHeight; return m;
  }
  function setStatus(s,live){ const e=Guide.els.status; if(!e) return; e.textContent=s||""; e.classList.toggle("live",!!live && !!s); }
  function showChoices(spec){
    const c=Guide.els.choices; c.innerHTML=""; c.style.display="flex";
    const choices=(spec&&spec.choices)||[];
    Guide.activeChoices=choices;
    choices.forEach(ch=>{ const b=mkBtn(ch.label, ch.primary?"primary":""); b.onclick=()=>{ clearChoices(); ch.go(); }; c.appendChild(b); });
    Guide.awaitingChoice=true;
  }
  function clearChoices(){ const c=Guide.els.choices; if(c){ c.innerHTML=""; c.style.display="none"; } Guide.awaitingChoice=false; Guide.activeChoices=null; }
  function updateDock(){
    const b=Guide.els.mainB; if(!b) return;
    if(!Guide.started||Guide.ended){ b.textContent="\u25B6 Start tour"; b.classList.add("primary"); }
    else if(Guide.paused){ b.textContent="\u25B6 Resume"; b.classList.add("primary"); }
    else { b.textContent="\u23F8 Pause"; b.classList.remove("primary"); }
    Guide.els.skipB.style.display=(Guide.started&&!Guide.ended)?"":"none";
  }
  function hideGuide(){ stopSpeaking(); clearHighlight(); if(Guide.recognizing){ try{ Guide.rec.stop(); }catch(_){} } document.body.classList.remove("guideon"); Guide.els.dock.style.display="none"; Guide.els.reopen.style.display="block"; }
  function showGuide(){ document.body.classList.add("guideon"); Guide.els.dock.style.display=""; Guide.els.reopen.style.display="none"; updateDock(); }

  function buildUI(){
    const style=document.createElement("style"); style.textContent = `
      body.guideon{ padding-bottom:188px; }
      body.guideon #askFab{ display:none !important; }
      .guide-spot{ position:absolute; z-index:60; border-radius:14px; pointer-events:none;
        box-shadow:0 0 0 4px var(--violet,#7B6CF6), 0 0 0 9999px rgba(20,28,46,.42);
        ${reduceMotion?'':'transition:top .25s ease,left .25s ease,width .25s ease,height .25s ease;'} }
      .guide-cursor{ position:fixed; z-index:100000; width:34px; height:34px; pointer-events:none;
        filter:drop-shadow(0 3px 5px rgba(0,0,0,.4)) drop-shadow(0 0 8px rgba(123,108,246,.65));
        ${reduceMotion?'':'transition:top .5s cubic-bezier(.4,.05,.2,1), left .5s cubic-bezier(.4,.05,.2,1);'} }
      .guide-ripple{ position:fixed; z-index:99999; width:16px; height:16px; margin:-8px 0 0 -8px; border-radius:50%;
        background:rgba(123,108,246,.4); border:2.5px solid var(--violet,#7B6CF6); pointer-events:none; opacity:0; }
      .guide-ripple.go{ animation:gdRipple .55s ease-out; }
      @keyframes gdRipple{ 0%{ transform:scale(.3); opacity:.95 } 100%{ transform:scale(4); opacity:0 } }
      .guide-press{ box-shadow:0 0 0 3px var(--violet,#7B6CF6) !important; ${reduceMotion?'':'transition:transform .12s ease;'} transform:scale(.94); }
      #guideDock{ position:fixed; left:0; right:0; bottom:0; z-index:90; background:#fff;
        border-top:2px solid var(--card-line,#E3ECF4); box-shadow:0 -6px 24px rgba(28,43,74,.10);
        font-family:var(--body,system-ui),system-ui,sans-serif; color:var(--ink,#1C2B4A); }
      #guideDock .gd-inner{ max-width:1200px; margin:0 auto; padding:9px 14px 11px; }
      #guideDock .gd-log{ max-height:96px; overflow-y:auto; display:flex; flex-direction:column; gap:5px; margin-bottom:8px; padding-right:2px; }
      #guideDock .gd-msg{ font-size:13px; line-height:1.42; border-radius:11px; padding:5px 10px; max-width:90%; }
      #guideDock .gd-msg.g{ background:#F3F0FE; border:1.5px solid #D9CFFA; align-self:flex-start; }
      #guideDock .gd-msg.you{ background:#EFF5FA; border:1.5px solid var(--card-line,#E3ECF4); align-self:flex-end; }
      #guideDock .gd-msg .w{ font-family:var(--display,inherit); font-weight:800; font-size:10px; color:var(--ink-soft,#5A6B8C); margin-right:6px; text-transform:uppercase; letter-spacing:.5px; }
      #guideDock .gd-row{ display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
      #guideDock .gd-status{ font-size:11.5px; font-weight:700; color:var(--violet,#7B6CF6); min-width:62px; }
      #guideDock .gd-status.live::before{ content:"\\25CF"; margin-right:5px; animation:gdPulse 1s infinite; }
      @keyframes gdPulse{0%,100%{opacity:.25}50%{opacity:1}}
      #guideDock button.gd-btn{ font:inherit; font-family:var(--display,inherit); font-weight:800; font-size:13px;
        border:1.5px solid var(--card-line,#E3ECF4); background:#fff; color:var(--ink,#1C2B4A); border-radius:999px; padding:7px 13px; cursor:pointer; }
      #guideDock button.gd-btn:hover{ background:#F2F6FA; }
      #guideDock button.gd-btn.primary{ background:var(--violet,#7B6CF6); border-color:var(--violet,#7B6CF6); color:#fff; }
      #guideDock button.gd-btn.mic.on{ background:var(--coral,#FF6B5E); border-color:var(--coral,#FF6B5E); color:#fff; }
      #guideDock input.gd-in{ flex:1; min-width:130px; border:1.5px solid var(--card-line,#E3ECF4); border-radius:999px;
        padding:8px 13px; font:inherit; font-size:13.5px; background:#FBFDFF; color:var(--ink,#1C2B4A); }
      #guideDock .gd-choices{ display:flex; gap:7px; flex-wrap:wrap; margin-bottom:8px; }
      #guideDock button:focus-visible, #guideDock input:focus-visible{ outline:3px solid var(--sun,#FFC94D); outline-offset:1px; }
      #guideReopen{ position:fixed; right:18px; bottom:18px; z-index:90; font-family:var(--display,inherit); font-weight:800;
        background:var(--violet,#7B6CF6); color:#fff; border:none; border-radius:999px; padding:11px 17px; cursor:pointer;
        box-shadow:0 6px 18px rgba(0,0,0,.22); display:none; }
      #guideIntro{ position:fixed; inset:0; z-index:100; background:rgba(28,43,74,.45); display:flex; align-items:center; justify-content:center; padding:20px; }
      #guideIntro .gi-card{ background:#fff; border-radius:20px; max-width:430px; width:100%; padding:22px; box-shadow:0 14px 44px rgba(28,43,74,.3); text-align:center; }
      #guideIntro .gi-emoji{ font-size:40px; }
      #guideIntro h3{ font-family:var(--display,inherit); font-weight:800; font-size:22px; margin:6px 0 4px; color:var(--ink,#1C2B4A); }
      #guideIntro p{ font-size:14px; color:var(--ink-soft,#5A6B8C); margin:0 0 16px; line-height:1.5; }
      #guideIntro .gi-row{ display:flex; gap:9px; justify-content:center; flex-wrap:wrap; }
      #guideIntro button{ font:inherit; font-family:var(--display,inherit); font-weight:800; font-size:15px; border-radius:999px; padding:11px 20px; cursor:pointer; border:2px solid var(--violet,#7B6CF6); }
      #guideIntro button.go{ background:var(--violet,#7B6CF6); color:#fff; }
      #guideIntro button.skip{ background:#fff; color:var(--violet,#7B6CF6); }
      @media (max-width:520px){ #guideDock .gd-status{ min-width:0; } }
    `; document.head.appendChild(style);

    const dock=document.createElement("div"); dock.id="guideDock"; dock.setAttribute("aria-label","Tour guide");
    const inner=document.createElement("div"); inner.className="gd-inner"; dock.appendChild(inner);
    const log=document.createElement("div"); log.className="gd-log"; log.setAttribute("aria-live","polite"); inner.appendChild(log);
    const choices=document.createElement("div"); choices.className="gd-choices"; choices.style.display="none"; inner.appendChild(choices);
    const row=document.createElement("div"); row.className="gd-row"; inner.appendChild(row);
    const status=document.createElement("span"); status.className="gd-status"; row.appendChild(status);
    const mainB=mkBtn("\u25B6 Start tour","primary"); row.appendChild(mainB);
    const skipB=mkBtn("Skip \u25B6",""); skipB.style.display="none"; row.appendChild(skipB);
    const restartB=mkBtn("\u21BA",""); restartB.title="Restart the tour"; row.appendChild(restartB);
    const micB=mkBtn("\uD83C\uDFA4 Ask",""); micB.classList.add("mic"); if(!sttOK) micB.style.display="none"; row.appendChild(micB);
    const input=document.createElement("input"); input.className="gd-in"; input.type="text"; input.placeholder=sttOK?"\u2026or type a question":"Type a question for me"; row.appendChild(input);
    const sendB=mkBtn("Ask",""); row.appendChild(sendB);
    const dbgB=mkBtn("\uD83D\uDC1E",""); dbgB.title="Copy a debug log (for troubleshooting)"; dbgB.style.opacity=".6"; row.appendChild(dbgB);
    const hideB=mkBtn("\u2715",""); hideB.title="Hide the guide"; row.appendChild(hideB);
    document.body.appendChild(dock); document.body.classList.add("guideon");
    const reopen=document.createElement("button"); reopen.id="guideReopen"; reopen.textContent="\uD83C\uDFA7 Guide"; document.body.appendChild(reopen);

    Object.assign(Guide.els,{dock,log,choices,status,mainB,skipB,restartB,micB,input,sendB,dbgB,hideB,reopen});
    mainB.onclick=onMain;
    skipB.onclick=()=>{ stopSpeaking(); Guide.paused=false; clearChoices(); Guide.started=true; advance(); };
    restartB.onclick=()=>{ stopSpeaking(); Guide.qa=[]; Guide.userTook=false; clearChoices(); startTour(true); };
    micB.onclick=()=> sttOK ? toggleListen() : input.focus();
    sendB.onclick=()=>{ const v=input.value.trim(); if(v){ input.value=""; answer(v); } };
    input.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); const v=input.value.trim(); if(v){ input.value=""; answer(v); } } });
    dbgB.onclick=showDebug;
    hideB.onclick=hideGuide; reopen.onclick=showGuide;
    updateDock();
  }
  // Debug log modal — copy button plus a pre-selected textarea (clipboard writes are often blocked in the artifact sandbox).
  function showDebug(){
    const text=debugText();
    const wrap=document.createElement("div"); wrap.id="guideDbg";
    wrap.style.cssText="position:fixed;inset:0;z-index:101;background:rgba(28,43,74,.5);display:flex;align-items:center;justify-content:center;padding:18px";
    const card=document.createElement("div");
    card.style.cssText="background:#fff;border-radius:16px;max-width:680px;width:100%;max-height:82vh;display:flex;flex-direction:column;padding:16px;box-shadow:0 14px 44px rgba(28,43,74,.3);font-family:var(--body,system-ui),system-ui,sans-serif";
    const h=document.createElement("div"); h.style.cssText="font-family:var(--display,inherit);font-weight:800;font-size:16px;color:var(--ink,#1C2B4A);margin-bottom:8px"; h.textContent="Debug log";
    const ta=document.createElement("textarea"); ta.readOnly=true; ta.value=text;
    ta.style.cssText="flex:1;min-height:280px;width:100%;box-sizing:border-box;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;line-height:1.45;border:1.5px solid var(--card-line,#E3ECF4);border-radius:10px;padding:9px;background:#FBFDFF;color:#22314F;white-space:pre;overflow:auto";
    const rowb=document.createElement("div"); rowb.style.cssText="display:flex;gap:8px;justify-content:flex-end;margin-top:10px;align-items:center";
    const note=document.createElement("span"); note.style.cssText="font-size:11.5px;color:var(--ink-soft,#5A6B8C);margin-right:auto"; note.textContent="Select all + copy, then paste it back to me.";
    const copyB=mkBtn("Copy","primary"); const closeB=mkBtn("Close","");
    copyB.onclick=()=>{ ta.focus(); ta.select();
      let ok=false; try{ ok=document.execCommand&&document.execCommand("copy"); }catch(_){}
      if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(()=>{ copyB.textContent="Copied!"; }, ()=>{ copyB.textContent = ok?"Copied!":"Press Ctrl/Cmd+C"; }); }
      else copyB.textContent = ok?"Copied!":"Press Ctrl/Cmd+C";
    };
    closeB.onclick=()=>wrap.remove();
    wrap.onclick=e=>{ if(e.target===wrap) wrap.remove(); };
    rowb.appendChild(note); rowb.appendChild(copyB); rowb.appendChild(closeB);
    card.appendChild(h); card.appendChild(ta); card.appendChild(rowb); wrap.appendChild(card); document.body.appendChild(wrap);
    setTimeout(()=>{ ta.focus(); ta.select(); },30);
  }

  function buildIntro(){
    const wrap=document.createElement("div"); wrap.id="guideIntro";
    const card=document.createElement("div"); card.className="gi-card";
    let note = ttsOK ? "I'll talk you through it out loud, so it's best with your sound on."
                     : "Your browser can't speak out loud here, so I'll show all my words on the screen as we go.";
    const askNote = sttOK ? "You can press the microphone and ask me anything, any time."
                          : "You can type a question to me any time.";
    card.innerHTML='<div class="gi-emoji">\uD83C\uDFA7</div><h3>Want a quick tour?</h3>'+
      '<p>'+esc(note)+' '+esc(askNote)+' And you can take over and play with it whenever you like.</p>';
    const r=document.createElement("div"); r.className="gi-row";
    const go=document.createElement("button"); go.className="go"; go.textContent="Start the tour";
    const skip=document.createElement("button"); skip.className="skip"; skip.textContent="I'll look around";
    r.appendChild(go); r.appendChild(skip); card.appendChild(r); wrap.appendChild(card); document.body.appendChild(wrap);
    Guide.els.intro=wrap;
    go.onclick=()=>{ wrap.remove(); Guide.els.intro=null; startTour(); };           // click is the gesture that unlocks audio
    skip.onclick=()=>{ wrap.remove(); Guide.els.intro=null; logMsg("guide","No problem, explore away! Press Start tour, tap the mic, or type whenever you'd like me."); };
  }

  /* taking control of the real app auto-pauses the tour */
  function onGlobalPointer(e){
    if(!e.isTrusted) return;
    const t=e.target;
    if(Guide.els.dock && Guide.els.dock.contains(t)) return;
    if(Guide.els.intro && Guide.els.intro.contains(t)) return;
    if(Guide.els.reopen && t===Guide.els.reopen) return;
    const activelyRunning = Guide.started && !Guide.ended && (Guide.playing || (ttsOK && speechSynthesis.speaking) || Guide.awaitingChoice);
    if(!activelyRunning) return;
    pauseTour("took");
    logMsg("guide","You're driving now. Press Resume when you'd like me to carry on.");
  }

  function chooseVoice(vs){
    if(!vs||!vs.length) return null;
    const en=vs.filter(v=>/^en(-|_|$)/i.test(v.lang||"")); const pool=en.length?en:vs;
    const pref=["Google UK English Female","Google US English","Samantha","Karen","Moira","Tessa","Microsoft Aria","Microsoft Jenny","Microsoft Zira","Female"];
    for(const name of pref){ const f=pool.find(v=>(v.name||"").toLowerCase().includes(name.toLowerCase())); if(f) return f; }
    return pool[0];
  }
  function init(){
    buildUI();
    if(ttsOK){ const pick=()=>{ const vs=speechSynthesis.getVoices()||[]; Guide.voices=vs; Guide.voice=chooseVoice(vs); }; pick(); try{ speechSynthesis.onvoiceschanged=pick; }catch(_){} }
    const appEl=$("app"); if(appEl){ try{ const mo=new MutationObserver(()=>{ if(Guide.highlightSel) requestAnimationFrame(positionSpot); }); mo.observe(appEl,{childList:true,subtree:true}); }catch(_){} }
    document.addEventListener("pointerdown", onGlobalPointer, true);
    try{ dbg("env", "tts="+ttsOK+" stt="+sttOK+" reduceMotion="+reduceMotion+" runtime="+state.settings.runtimeMode+" mock="+state.settings.useMock+" artifactModel="+(MODEL_DEFAULTS&&MODEL_DEFAULTS.artifact)); }catch(_){}
    buildIntro();
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", init); else init();
})();
</script>
