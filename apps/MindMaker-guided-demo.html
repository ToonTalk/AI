<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Maker</title>
<link id="favicon" rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'&gt;&lt;rect width='64' height='64' rx='14' fill='%23F7FAFC'/&gt;&lt;circle cx='32' cy='32' r='6' fill='%232E9E6B'/&gt;&lt;/svg&gt;">
<style>
/* ===== SECTION: STYLES ===== */
:root{
  --paper:#F7FAFC; --grid:#DCE8F0; --ink:#1C2B4A; --ink-soft:#5A6B8C;
  --turtle:#2E9E6B; --turtle-deep:#1F7A50; --sun:#FFC94D; --violet:#7B6CF6;
  --coral:#FF6B5E; --card-line:#E3ECF4; --dash:#C9D9E8;
  --display:ui-rounded,"Hiragino Maru Gothic ProN",Quicksand,Comfortaa,"Trebuchet MS",system-ui,sans-serif;
  --body:system-ui,-apple-system,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
body{
  margin:0; color:var(--ink); font-family:var(--body); font-size:15px; line-height:1.45;
  background-color:var(--paper);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:24px 24px;
}
header{display:flex; align-items:center; gap:14px; flex-wrap:wrap; max-width:1200px; margin:0 auto; padding:18px 20px 4px}
header h1{font-family:var(--display); font-weight:800; font-size:28px; margin:0; letter-spacing:.3px; cursor:pointer}
header h1 .turtle-dot{color:var(--turtle)}
.meter{margin-left:auto; font-size:12.5px; color:var(--ink-soft); background:#fff; border:2px solid var(--card-line); border-radius:999px; padding:5px 14px}

/* nav tabs */
nav.tabs{max-width:1200px; margin:6px auto 0; padding:0 16px; display:flex; gap:6px; flex-wrap:wrap}
nav.tabs button{
  font:inherit; font-family:var(--display); font-weight:700; font-size:13.5px; color:var(--ink-soft);
  background:#fff; border:2px solid var(--card-line); border-bottom:none; border-radius:12px 12px 0 0;
  padding:8px 14px; cursor:pointer; display:flex; align-items:center; gap:6px;
}
nav.tabs button.active{color:var(--ink); background:var(--paper); border-color:var(--turtle); position:relative; top:2px}
nav.tabs button:hover:not(.active){background:#EFF5FA}
nav.tabs button.new-mind-tab{margin-left:auto; align-self:center; color:var(--turtle-deep); background:#F0FAF4; border:2px solid var(--turtle); border-radius:999px}
nav.tabs button.new-mind-tab:hover{background:#E1F5E9}
nav.tabs .adv-only{display:none}
body.advanced nav.tabs .adv-only{display:flex}

main#app{max-width:1200px; margin:0 auto 60px; padding:18px 20px; border-top:2px solid var(--card-line)}

h2.screen-title{font-family:var(--display); font-weight:800; font-size:22px; margin:0 0 4px}
p.screen-sub{color:var(--ink-soft); margin:0 0 18px; font-size:14px}

.card{background:#fff; border:2px solid var(--card-line); border-radius:14px; padding:13px 14px; margin-bottom:12px; box-shadow:0 2px 0 rgba(28,43,74,.04)}
.card label{font-family:var(--display); font-weight:700; font-size:14px; display:flex; align-items:center; gap:7px; margin-bottom:6px}
.card label .dot{width:9px; height:9px; border-radius:50%}
.hint{font-size:12px; color:var(--ink-soft); margin:0 0 7px}
textarea,input[type=text],input[type=password],input[type=number],select{
  width:100%; border:1.5px dashed var(--dash); border-radius:10px; padding:8px 9px;
  font:inherit; font-size:13.5px; color:var(--ink); background:#FBFDFF; resize:vertical;
}
textarea{min-height:60px}
input[type=text],input[type=password],input[type=number],select{border-style:solid; border-color:var(--card-line)}
textarea:focus-visible,input:focus-visible,button:focus-visible,select:focus-visible{outline:3px solid var(--sun); outline-offset:1px}

details.bigidea{margin-top:7px; font-size:12.5px; color:var(--ink-soft)}
details.bigidea summary{cursor:pointer; color:var(--violet); font-weight:700; list-style:none}
details.bigidea summary::before{content:"? "}
details.bigidea p{margin:5px 0 0; background:#F4F2FF; border-radius:8px; padding:7px 9px}

.switch{display:flex; align-items:center; gap:8px; font-size:13px; margin-bottom:6px}
.switch input{width:18px; height:18px; accent-color:var(--turtle)}

button.run{font-family:var(--display); font-weight:800; font-size:17px; color:#fff; background:var(--turtle);
  border:none; border-radius:999px; padding:12px 24px; cursor:pointer; box-shadow:0 3px 0 var(--turtle-deep)}
button.run:hover:not(:disabled){transform:translateY(-1px)}
button.run:disabled{background:#B9C7D6; box-shadow:none; cursor:wait}
.small-btn{font:inherit; font-size:13px; font-weight:700; color:var(--ink); background:#EFF5FA; border:1.5px solid var(--card-line); border-radius:999px; padding:6px 13px; cursor:pointer}
.small-btn:hover{background:#E2EDF6}
.small-btn.danger{color:#B33; background:#FFF0EE; border-color:#F6C4BD}
.small-btn.primary{color:#fff; background:var(--violet); border-color:var(--violet)}
.row{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
.spacer{flex:1}

/* agent cards grid */
.agent-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px}
.agent-card{background:#fff; border:2px solid var(--card-line); border-radius:16px; padding:14px; display:flex; flex-direction:column; gap:8px}
.agent-card .av{font-size:38px; width:58px; height:58px; border-radius:14px; display:flex; align-items:center; justify-content:center}
.agent-card .nm{font-family:var(--display); font-weight:800; font-size:18px; margin:0}
.agent-card .medium-tag{font-size:11.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.5px}
.agent-card .spark-snip{font-size:13px; color:var(--ink-soft); margin:0; flex:1}
.new-mind{border:2px dashed var(--dash); background:#FBFDFF; align-items:center; justify-content:center; cursor:pointer; min-height:180px; color:var(--turtle-deep); font-family:var(--display); font-weight:800; font-size:18px}
.new-mind:hover{background:#F0FAF4; border-color:var(--turtle)}

/* mind editor layout */
.mind-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
@media (max-width:760px){.mind-grid{grid-template-columns:1fr}}

/* lessons + journal */
.lesson{display:flex; align-items:flex-start; gap:7px; background:#FFF7E0; border:1.5px solid #F2DFA4; border-radius:10px; padding:6px 9px; margin:6px 0; font-size:13px}
.lesson .star{color:#C99A1E}
.lesson .x{margin-left:auto; border:none; background:none; color:var(--ink-soft); cursor:pointer; font-size:14px; padding:0 2px}
.lesson .pin{border:none;background:none;cursor:pointer;color:var(--ink-soft)}
.lesson.inactive{opacity:.5}
.lesson-add{display:flex; gap:6px; margin-top:8px}
.lesson-add input{flex:1}
.journal-entry{border-left:4px solid var(--violet); background:#FAF9FF; border-radius:0 10px 10px 0; padding:7px 10px; margin:8px 0; font-size:13px}
.journal-entry .when{font-weight:700; font-family:var(--display); font-size:12px; color:var(--violet)}
.empty-note{font-size:13px; color:var(--ink-soft); font-style:italic}

/* studio stage / round runner */
.stage-wrap{background:#fff; border:2px solid var(--card-line); border-radius:16px; padding:14px; margin-bottom:14px}
.stage-row{display:flex; gap:14px; flex-wrap:wrap; align-items:flex-start}
#stage{width:min(420px,100%); aspect-ratio:1/1; border:2px solid var(--card-line); border-radius:12px; background:#fff; display:block}
.poem-stage{width:min(420px,100%); min-height:300px; border:2px solid var(--card-line); border-radius:12px; background:#fff; padding:20px; display:flex; flex-direction:column; justify-content:center}
.stage-side{flex:1; min-width:220px; display:flex; flex-direction:column; gap:10px}
.latest-title{font-family:var(--display); font-weight:800; font-size:18px; margin:0}
.latest-sub{font-size:13px; color:var(--ink-soft); margin:0}
.speed-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-soft)}

/* round timeline */
.round-head{display:flex; align-items:center; gap:10px; margin:14px 0 6px}
.round-head .badge{font-family:var(--display); font-weight:800; background:var(--ink); color:#fff; border-radius:999px; padding:3px 13px; font-size:14px}
.phases{border-left:3px dotted #AFC6D8; margin-left:11px; padding-left:20px}
.phase{position:relative; margin:0 0 12px}
.phase::before{content:""; position:absolute; left:-31px; top:6px; width:15px; height:15px; border-radius:50%; background:var(--phase-color,#ccc); border:3px solid var(--paper)}
.phase .phase-name{font-family:var(--display); font-weight:800; font-size:14px; display:flex; align-items:center; gap:7px}
.phase .body{background:#fff; border:2px solid var(--card-line); border-radius:12px; padding:9px 11px; margin-top:5px; font-size:13.5px; overflow-wrap:anywhere}
.phase.working .phase-name::after{content:""; width:9px; height:9px; border-radius:50%; background:var(--sun); animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}
.phase.error .body{border-color:#F6C4BD; background:#FFF6F5}
.phase img.thumb{width:120px; height:120px; border:1.5px solid var(--card-line); border-radius:8px; float:right; margin:0 0 6px 10px; background:#fff}
.stars{color:#C99A1E; letter-spacing:1px}
details.hood{margin-top:7px; font-size:12px; color:var(--ink-soft)}
details.hood summary{cursor:pointer; font-weight:700}
details.hood pre{white-space:pre-wrap; background:#F2F6FA; border-radius:8px; padding:8px; max-height:240px; overflow:auto; font-size:11.5px}
details.codeview{margin-top:6px; font-size:12.5px}
details.codeview summary{cursor:pointer; font-weight:700; color:var(--turtle-deep)}
details.codeview pre,.codeview textarea{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px}
.codeview pre.code-ro{white-space:pre-wrap; background:#F2F6FA; border-radius:8px; padding:8px; max-height:240px; overflow:auto; margin:4px 0 0}
pre.logo-view{white-space:pre-wrap; background:#EAF6EF; border:1.5px solid #BFE3CE; border-radius:8px; padding:8px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; color:#1F5138; margin:6px 0 0}
.err-card{background:#FFF6F5; border:2px solid #F6C4BD; border-radius:12px; padding:10px 12px; font-size:13.5px}
.diffbox{margin-top:6px; border:1.5px solid var(--card-line); border-radius:8px; padding:7px 9px; background:#FBFDFF; font-size:12.5px}
.diffbox.code{font-family:ui-monospace,Menlo,Consolas,monospace; white-space:pre-wrap}
.diffbox.poem{font-family:var(--display); line-height:1.7}
.diffbox.story{font-family:var(--body); line-height:1.6; white-space:pre-wrap}
.diffbox .diff-add{background:#DDF3E4; border-radius:4px; padding:0 3px}
.diffbox .diff-del{background:#FBE2DE; border-radius:4px; padding:0 3px; text-decoration:line-through; opacity:.7}
.diffbox .diff-legend{font-family:var(--body); font-size:11px; color:var(--ink-soft); margin-bottom:4px}
.critique-chip{font-size:12.5px; background:#FFEAE7; border:1.5px solid #F6C4BD; border-radius:10px; padding:5px 9px; margin-top:6px}

/* gallery */
.gallery{column-width:220px; column-gap:14px}
.work-card{break-inside:avoid; background:#fff; border:2px solid var(--card-line); border-radius:14px; padding:10px; margin-bottom:14px; cursor:pointer}
.work-card img{width:100%; border-radius:8px; display:block; background:#fff}
.work-card .wc-title{font-family:var(--display); font-weight:800; font-size:15px; margin:6px 0 2px}
.work-card .wc-meta{font-size:12px; color:var(--ink-soft); display:flex; align-items:center; gap:6px}
.poem-card{background:#fff; border-radius:8px; padding:14px; font-family:var(--display); font-size:15px; line-height:1.7; white-space:pre-wrap; border-left:5px solid var(--accent,#7B6CF6)}
.poem-card.prose{font-family:var(--body); font-size:14.5px; line-height:1.6; text-align:left}
.carried-lessons{margin-top:6px; font-size:12.5px; color:var(--ink-soft)}
.carried-lessons ul{margin:3px 0 0; padding-left:16px}
.distill-lessons{margin:6px 0 8px; padding-left:18px; font-size:13px}
.distill-lessons li{margin:2px 0}
.distill-lessons li.lesson-new{background:#DDF3E4; border-radius:4px; padding:1px 4px; list-style:none; margin-left:-14px}
.distill-lessons li.lesson-drop{background:#FBE2DE; border-radius:4px; padding:1px 4px; text-decoration:line-through; opacity:.75; list-style:none; margin-left:-14px}

/* show & tell */
.crit-turn{display:flex; gap:10px; margin:10px 0}
.crit-turn .av{font-size:24px; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0}
.crit-turn .bub{background:#fff; border:2px solid var(--card-line); border-radius:12px; padding:8px 11px; font-size:13.5px}
.crit-turn.student .bub{background:#FFF7E0; border-color:#F2DFA4}
.crit-turn.error .bub{background:#FFF6F5; border-color:#F6C4BD}
.crit-turn .who{font-family:var(--display); font-weight:800; font-size:12.5px; margin-bottom:2px}
.how-list{margin:4px 0 6px; padding-left:20px; font-size:13.5px}
.how-list li{margin:3px 0}
.waiting-note{margin:6px 0 0; font-size:12.5px; font-weight:700; color:var(--sun-deep,#B8860B); background:#FFF7E0; border:1.5px solid #F2DFA4; border-radius:8px; padding:5px 8px}
.no-storage-banner{max-width:1200px; margin:6px auto 0; padding:8px 14px; font-size:13px; color:#7A4B00; background:#FFF3D6; border:1.5px solid #F2DFA4; border-radius:10px}
#askFab{position:fixed; right:18px; bottom:18px; z-index:70; font-family:var(--display); font-weight:800; font-size:14.5px;
  color:#fff; background:var(--violet); border:none; border-radius:999px; padding:11px 18px; cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,.22); display:flex; align-items:center; gap:7px}
#askFab:hover{filter:brightness(1.07)}
.ask-log{max-height:46vh; overflow-y:auto; display:flex; flex-direction:column; gap:8px; margin:8px 0; padding-right:2px}
.ask-msg{border-radius:12px; padding:8px 11px; font-size:13.5px; line-height:1.5; max-width:92%}
.ask-msg.you{background:#EDE9FE; align-self:flex-end; border:1.5px solid #C9BEF7}
.ask-msg.ai{background:#fff; align-self:flex-start; border:1.5px solid var(--card-line)}
.ask-msg .who{font-family:var(--display); font-weight:800; font-size:11.5px; color:var(--ink-soft); margin-bottom:2px}
.ask-suggest{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px}
.ask-suggest button{font:inherit; font-size:12px; color:var(--violet); background:#F3F0FE; border:1.5px solid #D9CFFA; border-radius:999px; padding:4px 10px; cursor:pointer}

/* science corner */
.exp-strip{display:flex; gap:6px; flex-wrap:wrap; align-items:flex-start}
.exp-strip .cell{width:74px; text-align:center; font-size:10.5px; color:var(--ink-soft)}
.exp-strip .cell img{width:70px; height:70px; border:1.5px solid var(--card-line); border-radius:6px}
.exp-strip .cell .mini-poem{width:70px;height:70px;border:1.5px solid var(--card-line);border-radius:6px;font-size:7px;padding:3px;overflow:hidden;text-align:left;line-height:1.2}
.exp-strip .cell{cursor:pointer}
.exp-strip .cell img:hover, .exp-strip .cell .mini-poem:hover{border-color:var(--turtle); box-shadow:0 0 0 2px #2E9E6B33}
.zoom-img{display:block; margin:0 auto; width:100%; max-width:512px; height:auto; border:2px solid var(--card-line); border-radius:10px; background:#fff}
.zoom-code{white-space:pre-wrap; word-break:break-word; background:#F4F7FA; border:1.5px solid var(--card-line); border-radius:8px; padding:9px 11px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; max-height:280px; overflow:auto; margin:6px 0 0}
table.roles{width:100%; border-collapse:collapse; font-size:13px}
table.roles th,table.roles td{border:1px solid var(--card-line); padding:6px 8px; text-align:left}
table.roles th{background:#EFF5FA; font-family:var(--display)}

/* modal */
.modal-back{position:fixed; inset:0; background:rgba(28,43,74,.35); display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow:auto; z-index:50}
.modal{background:#fff; border-radius:18px; max-width:680px; width:100%; padding:20px; box-shadow:0 12px 40px rgba(28,43,74,.25)}
.modal h3{font-family:var(--display); font-weight:800; margin:0 0 8px; font-size:20px}
.modal .close{float:right; border:none; background:none; font-size:22px; cursor:pointer; color:var(--ink-soft)}

/* creation wizard */
.template-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px}
.template-pick{border:2px solid var(--card-line); border-radius:12px; padding:10px; cursor:pointer; background:#fff}
.template-pick:hover,.template-pick.sel{border-color:var(--turtle); background:#F0FAF4}
.template-pick .te{font-size:26px}
.emoji-pick{display:flex; gap:6px; flex-wrap:wrap}
.emoji-pick button{font-size:22px; width:40px; height:40px; border:2px solid var(--card-line); border-radius:10px; background:#fff; cursor:pointer}
.emoji-pick button.sel{border-color:var(--turtle); background:#F0FAF4}
.color-pick{display:flex; gap:6px; flex-wrap:wrap}
.color-pick button{width:30px; height:30px; border-radius:50%; border:3px solid #fff; box-shadow:0 0 0 2px var(--card-line); cursor:pointer}
.color-pick button.sel{box-shadow:0 0 0 3px var(--ink)}

/* charts */
.chart-box{background:#fff; border:2px solid var(--card-line); border-radius:12px; padding:10px; margin-bottom:10px}
.chart-box h4{font-family:var(--display); margin:0 0 4px; font-size:14px}

footer{max-width:1200px; margin:0 auto; padding:0 20px 40px; font-size:12.5px; color:var(--ink-soft)}
footer .guide-links{margin-top:6px}
footer .guide-links a{color:var(--turtle-deep,#1F7A50); font-weight:700; text-decoration:none}
footer .guide-links a:hover{text-decoration:underline}
@media (prefers-reduced-motion: reduce){.phase.working .phase-name::after{animation:none}}
</style>
</head>
<body>
<header>
  <h1 id="homeLink">Mind Maker <span class="turtle-dot">·</span></h1>
  <span class="meter" id="meter"></span>
</header>
<nav class="tabs" id="tabs"></nav>
<main id="app"></main>
<button id="askFab" title="Ask the helper about the app or your minds">🤖 Ask</button>
<footer>Mind Maker — a place to build little minds that make, look, and learn. Everything lives only in this browser unless you export it.
<div class="guide-links">Guides:
<a href="guides/guide-young-students.html" target="_blank" rel="noopener">For young makers</a> ·
<a href="guides/guide-older-students.html" target="_blank" rel="noopener">For older students</a> ·
<a href="guides/guide-teachers.html" target="_blank" rel="noopener">For teachers</a></div></footer>

<script>
"use strict";
/* ===== SECTION: CONSTANTS & MODEL_DEFAULTS ===== */
const SCHEMA = "atelier.v1";
const LS_KEY = "atelier.v1";
// Whether localStorage actually works here. Inside a Claude artifact it's sandboxed away, so nothing persists.
const STORAGE_OK = (()=>{ try { localStorage.setItem(LS_KEY+"__probe","1"); localStorage.removeItem(LS_KEY+"__probe"); return true; } catch(_){ return false; } })();

// Model ids verified against the owner's environment (knowledge cutoff Jan 2026).
// Users may type any model id in Settings; these are only defaults.
const MODEL_FALLBACK_ARTIFACT = "claude-sonnet-4-20250514";   // known-good keyless model; used if a newer id isn't accepted by the artifact proxy
const MODEL_DEFAULTS = {
  artifact: "claude-sonnet-5",                 // keyless Claude inside an artifact, all roles (auto-falls back to MODEL_FALLBACK_ARTIFACT if the proxy rejects it)
  anthropic: { maker:"claude-haiku-4-5-20251001", eyes:"claude-sonnet-5", judge:"claude-sonnet-5", reflect:"claude-haiku-4-5-20251001" },
  openai:    { maker:"gpt-5.4-mini", eyes:"gpt-5.4-mini", judge:"gpt-5.4-mini", reflect:"gpt-5.4-mini" },
  google:    { maker:"gemini-2.5-flash", eyes:"gemini-2.5-pro", judge:"gemini-2.5-pro", reflect:"gemini-2.5-flash" }
};
// rough cost guess per 1k tokens (USD) — labelled "rough guess" in UI
const COST_GUESS = { anthropic:0.004, openai:0.004, google:0.002, artifact:0, mock:0 };

const PHASE_COLORS = { Make:"#7B6CF6", Render:"#2E9E6B", Look:"#FFC94D", Exhibit:"#FF6B5E", Critique:"#FF6B5E", Reflect:"#7B6CF6", Distill:"#FFC94D" };

const TURTLE_API = "forward(n), back(n), left(deg), right(deg), penUp(), penDown(), penColor('css color'), penWidth(n), goTo(x,y), home(), setHeading(deg)";

/* ===== SECTION: COPY & TEMPLATES ===== */
// Every child-facing seed string lives here for easy editing.
const PREAMBLE =
  'You are part of "Mind Maker", an art studio app for children aged 9 and up. Everything you write may be read by a child. ' +
  'Use warm, simple language a 9-year-old understands. Never include violence, romance, scary themes, or anything not suitable for children. ' +
  'Write in plain sentences only — never use markdown: no asterisks, no # headings, no bold, and no bullet points unless the instructions ask for lines starting with "- ".\n\n';

const KINDNESS =
  'Kindness rules when you talk about anyone else\'s work: be specific, name one real thing that works first, then offer exactly one gentle wish for next time. ' +
  'Never mock, never compare one maker to another, talk about the work and not the maker.\n';

// What the in-app "Ask" helper knows about how the app works.
const APP_GUIDE =
  'Mind Maker is a single web page where a person builds little software "minds" that make art and learn over rounds. Key ideas:\n' +

    runtimeMode: "artifact",                 // "artifact" | "standalone" (auto-detected, overridable)
    provider: "anthropic",                   // active provider in standalone mode

    roleModels: {                            // role -> {provider, model}; provider follows active provider by default
      maker:{}, eyes:{}, judge:{}, reflect:{}
    },
    budgets: { maxTokensPerCall:1000 },
    ui: { language:"simple" }

}

function stripCacheReplacer(k, v){ return (k==="_ops" || k==="thumbnail") ? undefined : v; }
// Debounced save for high-frequency edits (typing in anatomy textareas) so we don't stringify the whole state per keystroke.
let _saveTimer = null;
function saveSoon(){ clearTimeout(_saveTimer); _saveTimer = setTimeout(save, 300); }
let _storageWarned = false;
function save(){
  // Keys are stored only when the student opts in (rememberKeys); never in exports/trading cards.
  const persistSettings = JSON.parse(JSON.stringify(state.settings));
  if (!state.settings.rememberKeys) persistSettings.providers = { anthropicKey:"", openaiKey:"", googleKey:"" };
  const out = {
    schemaVersion: SCHEMA,
    settings: persistSettings,
    agents: state.agents, works: state.works,
    critSessions: state.critSessions, experiments: state.experiments, notebook: state.notebook,
    askChat: state.askChat.slice(-40)   // keep the recent Ask conversation
  };
  if (!STORAGE_OK) return;   // no localStorage here (e.g. inside an artifact); the boot banner explains, so stay quiet
  try { localStorage.setItem(LS_KEY, JSON.stringify(out, stripCacheReplacer)); _storageWarned = false; }
  catch(e){
    console.warn("Could not save to localStorage:", e);
    if (!_storageWarned){ _storageWarned = true; toast("This browser's storage is full. Open Settings and export a backup to be safe."); }
  }
}
function scrubKeys(s){ const c = JSON.parse(JSON.stringify(s)); c.providers = { anthropicKey:"", openaiKey:"", googleKey:"" }; return c; }

function load(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.settings) state.settings = Object.assign(defaultSettings(), d.settings);
    state.agents = d.agents || [];
    state.works = d.works || [];
    state.critSessions = d.critSessions || [];
    state.experiments = d.experiments || [];
    state.notebook = d.notebook || [];
    state.askChat = Array.isArray(d.askChat) ? d.askChat : [];
  } catch(e){ console.warn("Could not load saved state:", e); }
}

function getAgent(id){ return state.agents.find(a => a.id === id); }
function worksFor(agentId){ return state.works.filter(w => w.agentId === agentId).sort((a,b)=>a.round-b.round); }
function lastWork(agentId){ const w = worksFor(agentId); return w[w.length-1] || null; }

function exportAll(){
  const clean = scrubKeys(state.settings);
  return JSON.stringify({ schemaVersion:SCHEMA, exportedAt:now(),
    settings:clean, agents:state.agents, works:state.works,
    critSessions:state.critSessions, experiments:state.experiments, notebook:state.notebook }, stripCacheReplacer, 2);
}
function importAll(json){
  const d = JSON.parse(json);
  if (!d || typeof d!=="object" || !Array.isArray(d.agents)) throw new Error("This doesn't look like an Mind Maker backup.");
  // Sanitize untrusted agents/works; keep a map from old agent ids to new so works still line up.
  const idMap = {};
  state.agents = d.agents.map(a=>{ const sa=sanitizeAgent(a); if(a&&a.id) idMap[a.id]=sa.id; return sa; });
  state.works = (Array.isArray(d.works)?d.works:[]).map(w=> sanitizeWork(w, idMap[w&&w.agentId] || (w&&w.agentId))).filter(Boolean);
  state.notebook = Array.isArray(d.notebook) ? d.notebook.map(n=>({ id:uid(), prompt:n&&n.prompt?_str(n.prompt,300):null, text:_str(n&&n.text,4000), context:_str(n&&n.context,40), agentId:n&&n.agentId?(idMap[n.agentId]||n.agentId):undefined, round:(+(n&&n.round))||undefined, createdAt:(n&&n.createdAt)||now() })) : [];
  // crit sessions and experiments reference ids only (no HTML interpolation); keep them but remap agent ids defensively
  state.critSessions = Array.isArray(d.critSessions) ? d.critSessions : [];
  state.experiments = Array.isArray(d.experiments) ? d.experiments : [];
  state.askChat = Array.isArray(d.askChat) ? d.askChat.filter(m=>m&&(m.who==="you"||m.who==="ai")).map(m=>({ who:m.who, text:_str(m.text,4000) })) : [];
  if (d.settings){ const keep = state.settings.providers; state.settings = Object.assign(defaultSettings(), d.settings); state.settings.providers = keep; }
  save(); render();
}

/* ===== SECTION: LLM ADAPTERS ===== */
// One interface: llm.complete({role, system, userText, images?, maxTokens, meta}) -> {text, usage}

// Roles that have no model row of their own borrow a sensible one. Critic may be shown a drawing,
// so it borrows the vision-capable "eyes" model; "ask" (the in-app helper) borrows it too.
const ROLE_ALIAS = { critic:"eyes", ask:"eyes" };
function roleModel(role){
  const s = state.settings;
  const alias = ROLE_ALIAS[role];
  // an aliased role with no row of its own borrows the person's settings for its alias (e.g. critic follows eyes)
  const rm = s.roleModels[role] || (alias && s.roleModels[alias]) || {};
  const provider = rm.provider || (s.runtimeMode === "artifact" ? "artifact" : s.provider);
  let model = rm.model;
  if (!model){
    if (provider === "artifact") model = MODEL_DEFAULTS.artifact;
    else {
      const table = MODEL_DEFAULTS[provider] || {};
      // try the role, then its alias, then a final fallback so no role can ever end up with no model
      model = table[role] || (alias && table[alias]) || table.eyes || table.maker;
    }
  }
  return { provider, model };
}

const llm = {
  async complete(opts){
    const s = state.settings;
    const role = opts.role || "maker";
    const max = Math.min(opts.maxTokens || s.budgets.maxTokensPerCall, s.budgets.maxTokensPerCall);
    if (s.useMock || /[?&]mock=1/.test(location.search)) return mockComplete(opts);

    // opts.fixedModel lets a caller pin a {provider, model} (used so an experiment's judge stays constant).
    const { provider, model } = (opts.fixedModel && opts.fixedModel.model) ? opts.fixedModel : roleModel(role);
    let result;
    const run = async () => {
      if (provider === "artifact") return callAnthropic(model, opts, max, /*keyless*/true);
      if (provider === "anthropic") return callAnthropic(model, opts, max, false);
      if (provider === "openai") return callOpenAI(model, opts, max);
      if (provider === "google") return callGoogle(model, opts, max);
      throw new Error("Unknown provider: " + provider);
    };
    try { result = await run(); }
    catch(e){
      // retry once only on transient failures; network/CORS/auth/model errors won't fix themselves
      if (!(e.status === 429 || e.status >= 500)) throw e;
      await sleep(800);
      result = await run();
    }
    state.session.calls++;
    state.session.tokens += (result.usage && result.usage.total) || estTokens(opts);
    renderMeter();
    return result;
  }
};

function estTokens(opts){
  const t = (opts.system||"").length + (opts.userText||"").length;
  return Math.round(t/4) + (opts.images ? opts.images.length*900 : 0);
}
const sleep = ms => new Promise(r=>setTimeout(r,ms));

// Turn an HTTP status into a kid-readable explanation of what happened and what to do.
function statusHelp(status){
  if (status===429) return "The art helper is busy and turned us away for now — that means too many requests in a short time, or a usage limit was reached. Wait a minute, then press “Try this round again”.";
  if (status===401 || status===403) return "The art helper would not let us in. Your API key is missing, wrong, or has run out of credit. Open Settings and check the key.";
  if (status===404) return "The art helper could not find that model. Open Settings and check the model id you typed for this job.";
  if (status===400 || status===422) return "The art helper could not understand the request. If you typed your own model id in Settings, make sure it is spelled correctly and can do this kind of work.";
  if (status>=500) return "The art helper is having trouble on its own end right now — this is not your fault. Wait a moment, then press “Try this round again”.";
  return "The art helper answered with an error (status "+status+"). Wait a moment and try the round again.";
}
// Shared fetch: friendly network message on connection/CORS failure, friendly status message otherwise.
async function apiFetch(url, options, netMsg){
  let res;
  try { res = await fetch(url, options); }
  catch(e){ const err = new Error(netMsg); err.network = true; throw err; }   // fetch rejects on network/CORS failure
  if (!res.ok){
    let detail = "";
    try {
      const j = await res.json();
      const e = j.error || j;
      // prefer a human-readable message; never dump a raw JSON object at the child
      detail = (e && (e.message || e.code || e.type)) || j.message || "";
      if (detail && typeof detail !== "string") detail = "";
    } catch(_){}
    detail = String(detail).replace(/\s+/g," ").trim().slice(0,140);
    const err = new Error(statusHelp(res.status) + (detail ? "\n\nWhat the helper said: "+detail : ""));
    err.status = res.status;
    throw err;
  }
  return res.json();
}

async function callAnthropic(model, opts, max, keyless){
  const headers = { "Content-Type":"application/json" };
  if (!keyless){
    const key = state.settings.providers.anthropicKey;
    if (!key) throw new Error("No Anthropic key is set. Open Settings to add one — or switch to artifact mode, or turn on the pretend helper (mock).");
    headers["x-api-key"] = key;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const netMsg = keyless
    ? "We could not reach the art helper. Keyless mode only works inside a real Claude artifact — if you opened this file on its own, open Settings and either switch to “Standalone (use your own API key)” or turn on the pretend helper (mock)."
    : "We could not reach Anthropic. Check that you are online, then try again.";
  const content = [];
  (opts.images||[]).forEach(d => content.push({ type:"image", source:{ type:"base64", media_type:"image/png", data:d.split(",")[1] } }));
  content.push({ type:"text", text: opts.userText });
  const body = { model, max_tokens:max, messages:[{ role:"user", content }] };
  if (opts.system) body.system = opts.system;
  let data;
  try {
    data = await apiFetch("https://api.anthropic.com/v1/messages", { method:"POST", headers, body:JSON.stringify(body) }, netMsg);
  } catch(e){
    // Inside an artifact, the keyless proxy allow-lists model ids; a brand-new one may not be accepted yet.
    // Retry once with a known-good id so switching to a newer model can never break every call.
    const looksLikeModelError = e.status===404 || e.status===400 || e.status===422 || (e.status===403 && /model/i.test(e.message||""));
    if (keyless && model !== MODEL_FALLBACK_ARTIFACT && looksLikeModelError){
      body.model = MODEL_FALLBACK_ARTIFACT;
      data = await apiFetch("https://api.anthropic.com/v1/messages", { method:"POST", headers, body:JSON.stringify(body) }, netMsg);
    } else throw e;
  }
  const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
  if (!text) throw new Error("The art helper sent back an empty reply. Try the round again.");
  try{ window.__mm_lastModel = body.model; }catch(_){}   // for the debug log: the id that actually served the call (may be the fallback)
  return { text, usage:{ total:(data.usage? (data.usage.input_tokens+data.usage.output_tokens):0) } };
}

async function callOpenAI(model, opts, max){
  const key = state.settings.providers.openaiKey;
  if (!key) throw new Error("No OpenAI key is set. Open Settings to add one.");
  const userContent = [{ type:"text", text:opts.userText }];
  (opts.images||[]).forEach(d => userContent.push({ type:"image_url", image_url:{ url:d } }));
  const messages = [];
  if (opts.system) messages.push({ role:"system", content:opts.system });
  messages.push({ role:"user", content:userContent });
  // OpenAI does not allow calls straight from a web page (no CORS headers), so a plain network failure means exactly that.
  const netMsg = "OpenAI does not allow calls straight from a web page, so Mind Maker cannot use it without your own small proxy server. For now, open Settings and choose Anthropic or Google instead, or turn on the pretend helper (mock).";
  const url = "https://api.openai.com/v1/chat/completions";
  const headers = { "Content-Type":"application/json", "Authorization":"Bearer "+key };
  // Reasoning models (gpt-5 / o-series) can spend the whole budget thinking and return empty content,
  // so give OpenAI extra room. Newer models also require max_completion_tokens; older ones use max_tokens.
  const oaMax = Math.max(max, 2000);
  let data;
  try {
    data = await apiFetch(url, { method:"POST", headers, body:JSON.stringify({ model, max_completion_tokens:oaMax, messages }) }, netMsg);
  } catch(e){
    if (e.status===400 && /max_completion_tokens/i.test(e.message))
      data = await apiFetch(url, { method:"POST", headers, body:JSON.stringify({ model, max_tokens:oaMax, messages }) }, netMsg);
    else throw e;
  }
  const text = (data.choices && data.choices[0] && data.choices[0].message.content || "").trim();
  if (!text) throw new Error("The art helper replied but with no words — a reasoning model may have used its whole thinking budget. Try again, or raise 'Most tokens per call' in Settings, or pick a non-reasoning model.");
  return { text, usage:{ total:(data.usage? data.usage.total_tokens:0) } };
}

async function callGoogle(model, opts, max){
  const key = state.settings.providers.googleKey;
  if (!key) throw new Error("No Google key is set. Open Settings to add one.");
  const parts = [{ text:opts.userText }];
  (opts.images||[]).forEach(d => parts.push({ inline_data:{ mime_type:"image/png", data:d.split(",")[1] } }));
  const body = { contents:[{ role:"user", parts }], generationConfig:{ maxOutputTokens:max } };
  if (opts.system) body.systemInstruction = { parts:[{ text:opts.system }] };
  const url = "https://generativelanguage.googleapis.com/v1beta/models/"+encodeURIComponent(model)+":generateContent";
  const netMsg = "We could not reach Google. Check that you are online. Note: from 19 June 2026 Google rejects unrestricted keys (existing ones too) — in Google AI Studio, add the 'Restrict to Gemini API' setting to your key.";
  const data = await apiFetch(url, { method:"POST",
    headers:{ "Content-Type":"application/json", "x-goog-api-key":key }, body:JSON.stringify(body) }, netMsg);
  const text = ((((data.candidates||[])[0]||{}).content||{}).parts||[]).map(p=>p.text||"").join("").trim();
  if (!text) throw new Error("The art helper sent back an empty reply. Try the round again.");
  return { text, usage:{ total:(data.usageMetadata? data.usageMetadata.totalTokenCount:0) } };
}

/* deterministic mock provider — full loop & experiments with zero API calls */
function mockComplete(opts){
  state.session.calls++; state.session.tokens += 200; renderMeter();
  const m = opts.meta || {};
  const role = opts.role, r = m.round || 1, medium = m.medium || "turtle";
  let text = "";
  if (m.logo){
    // pretend Logo translation, so the Show-as-Logo buttons work in mock mode
    if (/@@BEFORE@@/.test(opts.system||"") || /BEFORE:/.test(opts.userText||"")){
      text = "@@BEFORE@@\nSETPENCOLOR 4\nREPEAT 36 [ FORWARD 40 RIGHT 10 ]\n@@AFTER@@\nSETPENCOLOR 4\nREPEAT 36 [ FORWARD 48 RIGHT 10 ]";
    } else {
      text = "SETPENCOLOR 4\nPENWIDTH 2\nREPEAT 40 [ FORWARD 12 RIGHT 9 ]";
    }
    return Promise.resolve({ text, usage:{ total:200 } });
  }
  if (role === "maker"){
    if (medium === "turtle"){
      const turns = 40 + r*8, step = 2 + r*0.4, ang = 10 + (r%3);
      text = "INTENTION: This round I will let the spiral open up a little more.\nTITLE: Spiral Study "+r+"\n```js\n"+
        "penColor('hsl("+((r*47)%360)+",60%,45%)'); penWidth("+(1+ (r%3))+");\n"+
        "for(let i=0;i<"+turns+";i++){ forward("+step.toFixed(2)+"*i*0.1+4); right("+ang+"); }\n```";
    } else if (m.form === "story"){
      const who = ["a small snail","a shy lantern","one round pebble","a sleepy kite","a lost button","a quiet spoon"];
      const c = who[(r-1)%who.length];
      text = "INTENTION: This round I will let one small thing change by the end.\nTITLE: The Turning "+r+"\nSTORY:\n"+
        "At first "+c+" did not want to move. The morning was cold and everything felt too big. "+
        "But then a thin line of sun reached the floor, and "+c+" leaned toward it. "+
        "By the time the light was warm, it had decided to try.";
    } else {
      const subjects = ["a dewdrop","a slow cloud","a small stone","the first light","a quiet leaf","one warm crumb","a folded note","a sleepy cat"];
      const s1 = subjects[(r-1)%subjects.length], s2 = subjects[r%subjects.length];
      text = "INTENTION: This round I will hold one small picture still.\nTITLE: Small Thing "+r+"\nPOEM:\n"+
        s1+" waits\nbeside "+s2+"\nand the morning leans in"+(r%2? "\nwhat is it listening for?":"");
    }
  } else if (role === "eyes"){
    // vary by round and speak the right language for the medium (no "shapes" talk for writers)
    if (medium === "turtle"){
      const obs = ["The lines feel calmer than last time.","One corner got bolder and I like it.","It leans closer to my Spark now, but the edges are busy.","The middle is strong; the outside wanders a little."];
      text = "Round "+r+": "+obs[(r-1)%obs.length]+" Next time I want to try one small new thing near the edge.";
    } else if (m.form === "story"){
      const obs = ["The change at the end landed a little softer this time.","The first sentence is doing a lot of work; the last one earns it.","Something does shift by the end, but the middle could be clearer.","It feels kinder than last time, and the turning is gentle."];
      text = "Round "+r+": "+obs[(r-1)%obs.length]+" Next time I want the ending to surprise me a little more.";
    } else {
      const obs = ["One line is the quiet heart of it this time.","A word in the middle is doing nothing — I could cut it.","It holds one small picture more clearly than before.","The sound is gentler than last round."];
      text = "Round "+r+": "+obs[(r-1)%obs.length]+" Next time I want to keep only the words that earn their place.";
    }
  } else if (role === "reflect" && m.distill){
    // keep two stable lessons and rotate a third, so each distill visibly changes the lesson set
    const rotating = ["Keep the middle strong and let the edges breathe","Be braver near the edges next time","Leave one small surprise in every piece","Cut anything that does not earn its place"];
    text = "- Start with one clear idea before making\n- Change one thing at a time so I can see what helped\n- "+rotating[(Math.floor(r/3)-1+rotating.length)%rotating.length];
  } else if (role === "reflect"){
    const rating = Math.min(5, 2 + Math.floor(r/2));
    text = "This round I tried to open things up, and I think it worked a little. I noticed the middle feels strongest. Next time I want to be braver near the edges.\nRATING: "+rating+"/5";
  } else if (role === "critic"){
    text = "I really like how the centre holds together — it draws my eye. One small wish: let one part near the edge surprise me next time.";
  } else if (role === "judge"){
    // vary by agent so the two experiment arms visibly differ in mock mode (not just by round)
    let off = 0; const aid = m.agentId || ""; for (let i=0;i<aid.length;i++) off = (off + aid.charCodeAt(i)) % 3;
    const score = Math.max(1, Math.min(5, 1 + Math.floor((m.round||1)/2) + off));
    text = "RATING: "+score+"/5 — it sits "+(off>=2?"very ":"")+"close to its Spark and feels intentional.";
  } else if (role === "ask"){
    // practice helper: answer from real state so the feature is testable without a connection
    const n = state.agents.length;
    const names = state.agents.map(a=>a.name+" ("+a.stats.roundsRun+" rounds)").join(", ");
    const works = state.works.filter(w=>!w.error).length;
    text = "I'm the practice helper, so this is a simple answer with no internet. Right now your studio has "+n+" mind"+(n===1?"":"s")+
      (n? ": "+names : "")+", and "+works+" work"+(works===1?"":"s")+" made so far. "+
      "Connect a real art helper in Settings and I can answer fuller questions about how Mind Maker works and what your minds have been making.";
  } else { text = "Okay."; }
  const out = { text, usage:{ total:200 } };
  // During a guided-demo round/Show & Tell with no real helper, space the mock out so phases don't all land at once.
  // Gated on a flag the guide sets (and cleared right after), so Science-Corner experiments and the Q&A stay instant.
  if (typeof window!=="undefined" && window.__mm_paceMock && role!=="ask" && role!=="judge"){
    return new Promise(res=>setTimeout(()=>res(out), 2800 + Math.floor(Math.random()*600)));
  }
  return Promise.resolve(out);
}

/* ===== SECTION: PROMPT COMPOSITION ===== */
function identity(agent){
  return "You are "+agent.name+", a small software "+(agent.medium==="turtle"?"artist who draws":"writer")+".\n" +
         "Your dream (your Spark): "+agent.anatomy.spark.trim()+"\n";
}
function activeLessons(agent){ return agent.memory.lessons.filter(l=>l.active); }
// Writers can make verse ("poem") or prose ("story"). Default to poem for older agents with no form set.
function writeForm(agent){ return (agent.anatomy && agent.anatomy.form === "story") ? "story" : "poem"; }

function makerPrompt(agent, ctx){
  const last = lastWork(agent.id);
  let p = identity(agent);
  p += "\nYour maker instructions (your Hands): "+agent.anatomy.hands.trim()+"\n";
  const lessons = activeLessons(agent).map(l=>"- "+l.text).join("\n");
  p += "\nLessons you carry:\n"+(lessons || "(none yet — this is your first try, be brave)")+"\n";
  if (last && !last.error){
    if (agent.medium==="turtle"){
      p += "\nYour previous drawing was called \""+last.title+"\". Its code:\n```js\n"+(last.payload.code||"")+"\n```\n";
    } else {
      p += "\nYour previous poem was called \""+last.title+"\":\n"+(last.payload.poem||"")+"\n";
    }
    if (last.humanEdited && last.diffNote) p += "NOTE: a human collaborator revised your last work by hand. Here is what changed:\n"+last.diffNote+"\nTreat it as a gift to learn from.\n";
  }
  if (last && last.error) p += "\nYour previous try crashed with this error: "+last.error+" — fix that mistake this round.\n";
  const lastJ = agent.memory.journal[agent.memory.journal.length-1];
  if (lastJ) p += "\nYour journal from last round:\n“"+lastJ.text+"”\nIf you said you wanted to try something, this is your chance.\n";
  // Critiques left on the last work (from Show & Tell, the Gallery, or a visitor) that this mind hasn't heard yet.
  const unread = (last && last.critiques) ? last.critiques.filter(c=>!c.readByAgent) : [];
  if (unread.length){
    p += "\nAt your last exhibit, people responded to “"+last.title+"”:\n" +
      unread.map(c=>{ const who = c.from==="student" ? "A visitor" : (getAgent(c.from)||{name:"Another artist"}).name; return "- "+who+" said: “"+c.text+"”"; }).join("\n") +
      "\nTake what helps you and try it this round.\n";

  if (ctx.critiques && ctx.critiques.length) p += "\nA visitor also pinned a note for you right now:\n"+ctx.critiques.map(c=>"“"+c.text+"”").join("\n")+"\n";

  if (agent.medium==="turtle"){
    p += "\nNow make round "+ctx.round+". Write JavaScript using ONLY this turtle API:\n"+TURTLE_API+"\n";
    p += "Plain loops, functions and Math are fine. The canvas is 512x512; the turtle starts at the centre (256,256) pointing up. Stay roughly inside the canvas.\n";
    p += "Keep it under 60 lines. Every loop must contain at least one turtle command. No comments needed.\n";
    p += "Reply in EXACTLY this format:\nINTENTION: one sentence about what you will try\nTITLE: a short title\n```js\nyour code\n```";
  } else if (writeForm(agent)==="story"){
    p += "\nNow make round "+ctx.round+". Write a tiny STORY in plain prose sentences — not a poem. It should tell a small moment where one thing gently changes from the first sentence to the last.\n";
    p += "Keep it short: about 2 to 5 sentences and 60 words or fewer, in simple, warm language. Write flowing sentences, not short broken-up lines.\n";
    p += "Reply in EXACTLY this format:\nINTENTION: one sentence about what you will try\nTITLE: a short title\nSTORY:\nyour story in sentences";
  } else {
    p += "\nNow make round "+ctx.round+". Make your piece by following your Hands above — write it in whatever form your Hands describe (for example a poem, a tiny story, a list). Do not turn it into a poem unless your Hands ask for one.\n";
    p += "Keep it short: 8 lines or fewer and 60 words or fewer, in simple, warm language.\n";
    p += "Reply in EXACTLY this format:\nINTENTION: one sentence about what you will try\nTITLE: a short title\nWRITING:\nyour lines";
  }
  return p;

    if (lessons.length) s += " Lessons it carries: "+lessons.map(l=>l.text).join(" | ");
    if (last){ s += " Latest work (round "+last.round+"): \""+last.title+"\""+(last.selfRating?" ("+last.selfRating+"/5)":"");
      const excerpt = last.medium==="poet" ? (last.payload.poem||"").replace(/\n/g," ").slice(0,90) : (last.intention||"").slice(0,90);
      if (excerpt) s += " — "+excerpt; }
    const lastJ = a.memory.journal[a.memory.journal.length-1];

    lines.push(s);
  });
  lines.push("Total works made: "+state.works.filter(w=>!w.error).length+". Notebook entries: "+state.notebook.length+".");
  if (state.experiments && state.experiments.length){
    lines.push("Experiments ("+state.experiments.length+"):");
    state.experiments.forEach(e=>{
      let s = "- \""+(e.name||"untitled")+"\": question: "+(e.question||"(none)")+". Changed part: "+(e.changedPart||"?")+", "+(e.rounds||0)+" rounds.";

/* ===== SECTION: METRICS (aHash, Jaccard, diff) ===== */
async function aHash(dataURL){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      const c = document.createElement("canvas"); c.width=8; c.height=8;
      const ctx = c.getContext("2d"); ctx.fillStyle="#fff"; ctx.fillRect(0,0,8,8);
      ctx.drawImage(img,0,0,8,8);
      const d = ctx.getImageData(0,0,8,8).data;
      const g = []; let sum=0;
      for (let i=0;i<64;i++){ const v=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2]; g.push(v); sum+=v; }
      const avg = sum/64;
      let bits=""; for (let i=0;i<64;i++) bits += g[i]>=avg? "1":"0";
      resolve(bits);
    };
    img.onerror = ()=>resolve("0".repeat(64));
    img.src = dataURL;
  });
}
function hamming(a,b){ let d=0; for (let i=0;i<Math.min(a.length,b.length);i++) if (a[i]!==b[i]) d++; return d; }
function turtleNovelty(prevHash, curHash){ if (!prevHash) return null; return hamming(prevHash,curHash)/64; }
function poemNovelty(prevPoem, curPoem){
  if (!prevPoem) return null;
  const ws = s => new Set(String(s).toLowerCase().match(/[a-z']+/g) || []);
  const a = ws(prevPoem), b = ws(curPoem);
  const inter = [...a].filter(w=>b.has(w)).length;
  const uni = new Set([...a,...b]).size || 1;
  return 1 - inter/uni;
}
function lineDiff(before, after){
  const a = String(before||"").split("\n"), b = String(after||"").split("\n");
  const setA = new Set(a), setB = new Set(b);
  const added = b.filter(l=>l.trim() && !setA.has(l)).slice(0,6);
  const removed = a.filter(l=>l.trim() && !setB.has(l)).slice(0,6);
  let note = "";
  if (added.length) note += "Lines added/changed:\n"+added.map(l=>"+ "+l).join("\n")+"\n";
  if (removed.length) note += "Lines removed:\n"+removed.map(l=>"- "+l).join("\n")+"\n";
  return note.trim() || "Small tweaks were made.";
}
// Render the new output with changed lines highlighted green, and removed lines struck out in red.
function diffRowsHTML(before, after){
  const a = String(before==null?"":before).split("\n"), b = String(after||"").split("\n");
  const aTrim = new Set(a.map(s=>s.trim())), bTrim = new Set(b.map(s=>s.trim()));
  let rows = b.map(line => {
    const isNew = line.trim() && !aTrim.has(line.trim());
    return '<div class="'+(isNew?"diff-add":"")+'">'+(esc(line)||"&nbsp;")+'</div>';
  }).join("");
  a.filter(line => line.trim() && !bTrim.has(line.trim())).forEach(line => { rows += '<div class="diff-del">'+esc(line)+'</div>'; });
  return rows;
}
function diffDetails(before, after, kind){
  if (before == null) return "";
  return '<details class="codeview diff-changes"><summary>what changed since last round</summary>'+
    '<div class="diffbox '+kind+'"><div class="diff-legend">green = new this round · struck red = removed</div>'+diffRowsHTML(before,after)+'</div></details>';
}

// Turtle code is authored and run as JavaScript; these helpers translate it to Logo for READING only,
// honouring the app's Papert lineage. Translations are cached per work so each one costs at most one call.
const _logoCache = new Map();       // work.id -> Logo string
const _logoPairCache = new Map();   // work.id -> { before, after } Logo strings for the diff
const LOGO_SYS =
  "You translate turtle-graphics JavaScript into Logo (the classic children's language, UCBLogo style). " +
  "Use FORWARD/BACK/LEFT/RIGHT, PENUP/PENDOWN, SETPENCOLOR, and REPEAT n [ ... ]; use MAKE \"name value with :name for variables, " +
  "and TO/END only if the program needs a helper. Keep it faithful to what the JavaScript draws. " +
  "Output ONLY Logo code — no explanation, no comments, no markdown fences.";
function cleanLogo(t){
  let s = String(t||"").trim();
  const fence = s.match(/```[a-zA-Z]*\s*([\s\S]*?)```/);   // pull contents out of a ```...``` block if present
  if (fence) s = fence[1];
  s = s.replace(/^```[a-zA-Z]*\s*/,"").replace(/```\s*$/,"");   // or drop a stray leading/trailing fence line
  return s.replace(/\*\*([^*]+)\*\*/g,"$1").trim();            // remove any stray bold, leave code intact
}
async function translateToLogo(code){
  const res = await llm.complete({ role:"reflect", system:LOGO_SYS,
    userText:"Translate this turtle JavaScript into Logo:\n\n"+code, maxTokens:1000, meta:{ logo:true } });
  return cleanLogo(res.text);
}
async function translatePairToLogo(beforeCode, afterCode){
  const res = await llm.complete({ role:"reflect",
    system:LOGO_SYS+"\nYou will get TWO programs, BEFORE and AFTER. Translate BOTH in the SAME style, keeping identical lines identical so they compare line by line. Output EXACTLY:\n@@BEFORE@@\n<logo>\n@@AFTER@@\n<logo>",
    userText:"BEFORE:\n"+beforeCode+"\n\nAFTER:\n"+afterCode, maxTokens:1500, meta:{ logo:true } });
  const t = String(res.text||"");
  return {
    before: cleanLogo((t.match(/@@BEFORE@@\s*([\s\S]*?)@@AFTER@@/)||[,""])[1]),
    after:  cleanLogo((t.match(/@@AFTER@@\s*([\s\S]*)/)||[,""])[1])
  };
}

/* ===== SECTION: TURTLE ENGINE & SANDBOX ===== */
// Untrusted maker code runs ONLY inside a sandboxed null-origin iframe. It records turtle
// ops and posts them back; the parent paints/animates plain data (the code never runs here).
// Drawings are deterministic: random comes from a seeded PRNG (mulberry32) bound to the work's seed,
// and Date/performance are shadowed to undefined so code can't sneak in time-based nondeterminism.
// That makes {code, seed} the whole durable record — pixels regenerate identically on demand.
const SANDBOX_SRCDOC =
'<!doctype html><html><head><meta charset="utf-8"></head><body><script>'+
'function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}'+
'function execTurtle(code,seed){'+
'var ops=[],x=256,y=256,h=-90,pen=true,col="#1C2B4A",w=2,count=0;'+
'function step(){ if(++count>100000) throw new Error("Too many steps (over 100,000). Try smaller loops."); }'+
'function push(o){ o.h=h; ops.push(o); }'+
'function move(d){ step(); var nx=x+Math.cos(h*Math.PI/180)*d, ny=y+Math.sin(h*Math.PI/180)*d; push({t:pen?"L":"M",x1:x,y1:y,x2:nx,y2:ny,c:col,w:w}); x=nx; y=ny; }'+
'function jump(nx,ny){ step(); push({t:pen?"L":"M",x1:x,y1:y,x2:nx,y2:ny,c:col,w:w}); x=nx; y=ny; }'+
'var M=Object.create(Math); M.random=mulberry32((seed>>>0)||1);'+   // seeded Math: methods inherit from real Math, random is deterministic
'var fn=new Function("forward","back","left","right","penUp","penDown","penColor","penWidth","goTo","home","setHeading","Math","Date","performance","\\"use strict\\";\\n"+code);'+
'fn(function(d){move(+d||0)},function(d){move(-(+d||0))},function(a){step();h-=(+a||0);push({t:"H",x2:x,y2:y})},function(a){step();h+=(+a||0);push({t:"H",x2:x,y2:y})},'+
'function(){step();pen=false},function(){step();pen=true},function(c){step();col=String(c)},function(n){step();w=Math.max(0.5,Math.min(20,+n||1))},'+
'function(nx,ny){jump(+nx||0,+ny||0)},function(){jump(256,256);h=-90},function(a){step();h=+a||0;push({t:"H",x2:x,y2:y})},M,undefined,undefined);'+
'return ops; }'+
'window.addEventListener("message",function(e){'+
'var d=e.data||{}; if(d.kind!=="run") return;'+
'var reply={kind:"result",id:d.id};'+
'try{ reply.ops=execTurtle(d.code,d.seed); reply.opCount=reply.ops.length; }catch(err){ reply.error=String(err&&err.message||err); }'+
'(e.source||parent).postMessage(reply,"*");'+
'});'+
'parent.postMessage({kind:"ready"},"*");'+
'<\/script></body></html>';

let _sandbox = null, _sandboxReady = null, _runSeq = 0, _sandboxListener = null;
const _pending = {};
function ensureSandbox(){
  if (_sandbox) return _sandboxReady;
  _sandbox = document.createElement("iframe");
  _sandbox.setAttribute("sandbox","allow-scripts");
  _sandbox.style.cssText = "position:absolute;width:1px;height:1px;left:-9999px;border:0";
  _sandbox.srcdoc = SANDBOX_SRCDOC;
  _sandboxReady = new Promise(res=>{
    _sandboxListener = function onMsg(e){
      const d = e.data||{};
      if (d.kind==="ready"){ res(); }
      else if (d.kind==="result" && _pending[d.id]){ _pending[d.id](d); delete _pending[d.id]; }
    };
    window.addEventListener("message", _sandboxListener);
  });
  document.body.appendChild(_sandbox);
  return _sandboxReady;
}
// A hung run leaves the iframe wedged; drop it so the next run builds a fresh one.
function teardownSandbox(){
  if (_sandboxListener){ window.removeEventListener("message", _sandboxListener); _sandboxListener = null; }
  if (_sandbox && _sandbox.parentNode) _sandbox.remove();
  _sandbox = null; _sandboxReady = null;
}
function runTurtleSandbox(code, seed){
  return ensureSandbox().then(()=> new Promise((resolve,reject)=>{
    const id = ++_runSeq;
    const timer = setTimeout(()=>{ delete _pending[id]; teardownSandbox(); reject(new Error("The drawing took too long (over 3 seconds).")); }, 3000);
    _pending[id] = d => { clearTimeout(timer); if (d.error) reject(new Error(d.error)); else resolve(d); };
    _sandbox.contentWindow.postMessage({ kind:"run", id, code, seed:(seed>>>0)||1 }, "*");
  }));
}
// Thumbnails are pure cache now: regenerate a work's PNG from its {code, seed} on demand, keep it in memory.
const _thumbCache = new Map();
async function getThumbnail(work){
  if (!work || work.medium!=="turtle" || work.error) return null;
  if (work.thumbnail) return work.thumbnail;                 // freshly made this session, or a legacy stored one
  if (_thumbCache.has(work.id)) return _thumbCache.get(work.id);
  if (!work.payload || !work.payload.code) return null;
  try { const r = await runTurtleSandbox(work.payload.code, work.seed); const url = snapshotOps(r.ops); _thumbCache.set(work.id, url); return url; }
  catch(_){ return null; }
}
// An <img> that fills itself once the thumbnail is (re)generated — for synchronous render sites.
function thumbImgEl(work, className, styleText){
  const img = el("img", className||""); img.alt = work.title || "";
  if (styleText) img.style.cssText = styleText;
  getThumbnail(work).then(url=>{ if(url) img.src = url; });
  return img;
}

function paintOps(ctx, ops, upTo){
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,512,512); ctx.lineCap="round";
  const n = (upTo===undefined)? ops.length : upTo;
  for (let i=0;i<n;i++){ const o=ops[i]; if (o.t!=="L") continue;
    ctx.strokeStyle=o.c; ctx.lineWidth=o.w; ctx.beginPath(); ctx.moveTo(o.x1,o.y1); ctx.lineTo(o.x2,o.y2); ctx.stroke(); }
}
function snapshotOps(ops){
  const c=document.createElement("canvas"); c.width=512; c.height=512;
  paintOps(c.getContext("2d"), ops); return c.toDataURL("image/png");
}
let animToken=0, animSpeed=1;
function animateOnStage(canvas, ops){
  const token = ++animToken;
  const ctx = canvas.getContext("2d");
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const instant = /[?&]instant=1/.test(location.search);
  if (reduced || instant || ops.length===0){ paintOps(ctx,ops); return Promise.resolve(); }
  const perFrame = Math.max(2, Math.ceil(ops.length/240) * animSpeed);
  let i=0;
  return new Promise(resolve=>{
    function frame(){
      if (token!==animToken) return resolve();
      i = Math.min(ops.length, i+perFrame);
      paintOps(ctx,ops,i);
      const o = ops[i-1];
      if (o){ const px=(o.x2!==undefined)?o.x2:256, py=(o.y2!==undefined)?o.y2:256, a=(o.h||-90)*Math.PI/180;
        ctx.save(); ctx.translate(px,py); ctx.rotate(a+Math.PI/2); ctx.fillStyle="#2E9E6B";
        ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(6,7); ctx.lineTo(-6,7); ctx.closePath(); ctx.fill(); ctx.restore(); }
      if (i<ops.length) requestAnimationFrame(frame); else { paintOps(ctx,ops); resolve(); }
    }
    requestAnimationFrame(frame);
  });
}

/* ===== SECTION: PARSING ===== */
function parseMaker(text, round, medium, form){
  const intention = stripMd((text.match(/INTENTION:\s*(.+)/i) || [,"Round "+round])[1].trim());
  const title = stripMd((text.match(/TITLE:\s*(.+)/i) || [,"Untitled "+round])[1].trim());
  if (medium==="turtle"){
    const code = (text.match(/```(?:js|javascript)?\s*([\s\S]*?)```/) || [,""])[1].trim();
    if (!code) throw new Error("The maker forgot to include code. Try the round again.");
    return { intention, title, payload:{ code } };
  } else {
    // accept STORY:/WRITING: (new), or POEM:/PIECE:/TEXT: (older / other phrasings)
    let poem = (text.match(/(?:STORY|WRITING|POEM|PIECE|TEXT):\s*([\s\S]+)/i) || [,""])[1].trim();
    poem = stripMd(poem);
    if (!poem) throw new Error("The writer forgot to include any writing. Try the round again.");
    if (form==="story"){
      // prose: keep sentences flowing; drop blank lines, soft-cap the length
      poem = poem.split("\n").map(l=>l.trim()).filter(Boolean).join("\n");
      if (poem.length > 700) poem = poem.slice(0,700).replace(/\s+\S*$/,"") + "…";
    } else {
      poem = poem.split("\n").slice(0,8).join("\n");   // soft length guard for verse
    }
    return { intention, title, payload:{ poem } };
  }
}
function parseReflect(text){
  const m = text.match(/RATING:\s*([1-5])\s*\/?\s*5?/i);
  const rating = m? +m[1] : null;
  const body = stripMd(text.replace(/RATING:.*$/im,"").trim());
  return { body, rating };
}
function parseRating(text){ const m=text.match(/RATING:\s*([1-5])/i); return m? +m[1] : null; }
function parseLessons(text){
  const lines = String(text||"").split("\n").map(l=>l.trim()).filter(Boolean);
  // 1) bullet markers (- • *) or numbered lists (1. 1))
  let items = lines.map(l => (l.match(/^[-•*]\s*(.+)/) || l.match(/^\d+[.)]\s*(.+)/) || [])[1]).filter(Boolean);
  // 2) fall back to plain lines (some models drop the bullets), skipping an intro line like "Here are your lessons:"
  if (!items.length) items = lines.filter(l => !/:\s*$/.test(l) && l.length <= 160);
  return items.map(stripMd).map(s => s.replace(/^["“”'`]+|["“”'`]+$/g,"").trim()).filter(Boolean).slice(0,4);
}

// An in-app confirm dialog. Native confirm()/alert() are blocked inside a sandboxed artifact iframe
// (no allow-modals), so they silently return false; this DOM modal works everywhere. Returns a Promise<boolean>.
function uiConfirm(message, opts){
  opts = opts || {};
  return new Promise(resolve=>{
    const c = el("div");
    const msg = el("p"); msg.style.cssText = "white-space:pre-wrap;margin:0 0 14px;font-size:14.5px;line-height:1.55";
    msg.textContent = message;
    const row = el("div","row"); row.style.cssText = "gap:8px;justify-content:flex-end";
    const cancel = el("button","small-btn", opts.cancelText || "Cancel");
    const ok = el("button","small-btn primary"+(opts.danger?" danger":""), opts.okText || "Yes");
    row.appendChild(cancel); row.appendChild(ok);
    c.appendChild(msg); c.appendChild(row);
    const back = modal(opts.title || "Just checking", c);
    let done = false;
    const finish = v => { if (done) return; done = true; obs.disconnect(); if (document.body.contains(back)) back.remove(); resolve(v); };
    // dismissing the modal (Escape, backdrop, ×) counts as Cancel
    const obs = new MutationObserver(()=>{ if (!document.body.contains(back)) finish(false); });
    obs.observe(document.body, { childList:true });
    ok.onclick = ()=>finish(true);
    cancel.onclick = ()=>finish(false);
    setTimeout(()=>ok.focus(), 50);
  });
}

// True when the app runs inside another page's frame (e.g. a Claude artifact), where file downloads are blocked.
const inEmbeddedFrame = (()=>{ try { return window.self !== window.top; } catch(_){ return true; } })();
function download(name, text, type){
  // Try a normal download (works standalone / from a static server or file://).
  try {
    const blob = new Blob([text], { type:type||"application/json" });
    const a = el("a"); a.href = URL.createObjectURL(blob); a.download = name; a.rel="noopener";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
  } catch(_){}
  // Inside an artifact the click above does nothing, so offer a copy-and-paste fallback.
  if (inEmbeddedFrame) showCopyFallback(name, text);
}
// Show the file's contents to copy by hand and save as a file — for environments that block downloads.
function showCopyFallback(name, text){
  const c = el("div");
  c.appendChild(el("p","hint","If the file did not download (this happens inside a Claude artifact), copy everything below and save it on your computer as a file named “"+name+"”."));
  const ta = el("textarea"); ta.value = text; ta.readOnly = true;
  ta.style.cssText = "width:100%;min-height:220px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;white-space:pre;overflow:auto";
  c.appendChild(ta);
  const row = el("div","row"); row.style.marginTop="8px";
  const copyB = el("button","small-btn primary","Copy everything");
  copyB.onclick = async ()=>{
    try { await navigator.clipboard.writeText(text); toast("Copied! Now paste it into a new file named "+name); }
    catch(_){ ta.focus(); ta.select(); try{ document.execCommand("copy"); toast("Selected — press Ctrl/Cmd + C to copy."); }catch(__){ toast("Select all the text, then press Ctrl/Cmd + C."); } }
  };
  row.appendChild(copyB); c.appendChild(row);
  modal("Save “"+name+"”", c);
  setTimeout(()=>{ ta.focus(); ta.select(); }, 50);
}

/* ===== SECTION: ROUND ENGINE ===== */
// Persist each phase as it finishes so a refresh mid-round loses nothing.
async function runRound(agentId, opts){
  opts = opts || {};
  const agent = getAgent(agentId);
  if (!agent) throw new Error("No such agent");
  const mount = opts.mount || $("roundTimeline");
  const round = agent.stats.roundsRun + 1;
  const medium = agent.medium;

  const roundBox = el("div","round");
  roundBox.appendChild(el("div","round-head",'<span class="badge">Round '+round+'</span>'));
  const phases = el("div","phases"); roundBox.appendChild(phases);
  if (mount) mount.prepend(roundBox);

  function addPhase(name, icon){
    const ph = el("div","phase working");
    ph.style.setProperty("--phase-color", PHASE_COLORS[name]||"#ccc");
    ph.innerHTML = '<div class="phase-name">'+icon+" "+name+'</div><div class="body">…</div>';
    phases.appendChild(ph);
    // no auto-scroll — let the reader stay where they are and scroll when they choose
    return { node:ph, body:ph.querySelector(".body"),
      done(html){ ph.classList.remove("working"); ph.querySelector(".body").innerHTML=html; },
      fail(msg){ ph.classList.remove("working"); ph.classList.add("error"); ph.querySelector(".body").innerHTML="😕 "+esc(msg); } };
  }

  const form = medium==="poet" ? writeForm(agent) : null;
  const seed = (Math.random()*0xFFFFFFFF)>>>0;   // per-work seed makes its drawing reproducible from code alone
  const work = { id:uid(), agentId, round, medium, form, seed, payload:{}, thumbnail:null, title:"", artistStatement:"",
    selfRating:null, critiques:[], humanEdited:false, createdAt:now() };
  const pending = (opts.critiques || []).slice();

  try {
    /* 1 · MAKE */
    let ph = addPhase("Make","✏️");
    const lastConsumed = lastWork(agentId);   // its unread critiques are fed into this Make
    work._critiquesUsed = pending.map(c=>c.text).join(" / ") || null;
    const makePrompt = makerPrompt(agent,{round, critiques:pending});   // capture the EXACT prompt sent (state changes below)
    const makeRes = await llm.complete({ role:"maker", system:PREAMBLE,
      userText: makePrompt, meta:{ round, medium, form, agentName:agent.name } });
    const made = parseMaker(makeRes.text, round, medium, form);
    Object.assign(work, { intention:made.intention, title:made.title, payload:made.payload });
    work.artistStatement = made.intention;
    // the mind has now heard the critiques on its previous work — don't feed them again next round
    if (lastConsumed) lastConsumed.critiques.forEach(c=>{ c.readByAgent = true; });
    state.works.push(work); save();
    ph.done("<strong>"+esc(work.intention)+"</strong>"+carriedLessonsHTML(agent)+hoodView("Make", makePrompt, makeRes.text));

    /* 2 · RENDER */
    ph = addPhase("Render", medium==="turtle"?"🐢":"📝");
    // the most recent earlier work (for highlighting what changed this round)
    const prevWork = worksFor(agentId).filter(w=>w.id!==work.id && !w.error && (medium==="turtle"?w.payload.code:w.payload.poem)).slice(-1)[0];
    if (medium==="turtle"){
      try {
        const r = await runTurtleSandbox(work.payload.code, work.seed);
        work._ops = r.ops; work.thumbnail = snapshotOps(r.ops); save();
        ph.done('<img class="thumb" src="'+work.thumbnail+'" alt="'+esc(work.title)+'">'+r.opCount+" turtle steps. Watch the easel!");
        attachTurtleEditor(ph.body, work, agent);
        if (prevWork) ph.body.insertAdjacentHTML("beforeend", diffDetails(prevWork.payload.code, work.payload.code, "code"));
        if (prevWork) appendLogoDiffButton(ph.body, prevWork.payload.code, work.payload.code, work);
        if (opts.stageCanvas) await animateOnStage(opts.stageCanvas, r.ops);
      } catch(e){ work.error = e.message; save();
        ph.fail("The drawing crashed: "+e.message+" — "+agent.name+" will think about why."); }
    } else {
      ph.done(writingCardHTML(work, agent.look.color));
      attachPoemEditor(ph.body, work, agent);
      if (prevWork) ph.body.insertAdjacentHTML("beforeend", diffDetails(prevWork.payload.poem, work.payload.poem, form==="story"?"story":"poem"));
      if (opts.stageEl){ opts.stageEl.innerHTML = writingCardHTML(work, agent.look.color); }
    }

    /* 3 · LOOK */
    if (!work.error && agent.anatomy.eyes.enabled){
      ph = addPhase("Look","👀");
      const remember = agent.anatomy.eyes.remember !== false;
      const prev = remember ? worksFor(agentId).filter(w=>w!==work && !w.error && (medium==="turtle"?w.payload.code:w.payload.poem)).slice(-1)[0] : null;
      let images = null;
      if (medium==="turtle"){
        const pics = prev ? [await getThumbnail(prev), await getThumbnail(work)] : [await getThumbnail(work)];
        images = pics.filter(Boolean);
      }
      const lookPrompt = eyesPrompt(agent,work,prev);
      const eRes = await llm.complete({ role:"eyes", system:PREAMBLE, userText:lookPrompt,
        images: medium==="turtle"? images : null, meta:{ round, medium, form } });
      work.observations = stripMd(eRes.text); save();
      ph.done(esc(work.observations).replace(/\n/g,"<br>")+
        (prev? '<p class="hint" style="margin:6px 0 0">👀 Compared with “'+esc(prev.title)+'”.</p>':"")+
        hoodView("Look", lookPrompt, eRes.text));
    } else if (!work.error){
      addPhase("Look","👀").done("<em>Eyes closed — it cannot look at what it made.</em>");
    }

    /* 4 · EXHIBIT */
    if (!work.error){
      addPhase("Exhibit","🖼️").done('Hung on the Gallery Wall as <strong>“'+esc(work.title)+'”</strong>.'+
        (pending.length? "<br>It read your note before making this.":""));
    }

    /* 5 · CRITIQUE (student notes attach to the work; they were already fed into THIS Make, so mark them read) */
    pending.forEach(c => work.critiques.push({ from:"student", text:c.text, createdAt:now(), readByAgent:true }));
    if (pending.length) save();

    /* 6 · REFLECT */
    ph = addPhase("Reflect","💭");
    const reflPrompt = reflectPrompt(agent,work);   // capture before journal.push changes "your last journal entry"
    const rRes = await llm.complete({ role:"reflect", system:PREAMBLE, userText:reflPrompt, meta:{ round, medium, form } });
    const refl = parseReflect(rRes.text);
    work.selfRating = refl.rating;
    agent.memory.journal.push({ round, text:refl.body, createdAt:now() }); save();
    ph.done(esc(refl.body).replace(/\n/g,"<br>")+(refl.rating? "<br>"+stars(refl.rating):"")+hoodView("Reflect", reflPrompt, rRes.text));

    /* 7 · DISTILL — every 3rd round */
    if (round % 3 === 0){
      ph = addPhase("Distill","⭐");
      const beforeTexts = activeLessons(agent).map(l=>l.text);   // remember the lessons it had, to show what changed
      const distPrompt = distillPrompt(agent);   // capture before lessons are replaced (the hood must show what was actually sent)
      const dRes = await llm.complete({ role:"reflect", system:PREAMBLE, userText:distPrompt, meta:{ round, medium, form, distill:true } });
      const fresh = parseLessons(dRes.text);
      let msg;
      if (fresh.length){
        agent.memory.lessons = agent.memory.lessons.filter(l=>l.source==="student")
          .concat(fresh.map(t=>({ id:uid(), text:t, active:true, source:"agent" })));
        msg = "Every 3 rounds it squeezes its journal into a few lessons. Here is what it remembers now (edit them under “Edit its mind” → Memory):";
      } else {
        // model gave nothing we could read as lessons; keep what it already has rather than wiping memory
        msg = "It thought about its lessons but kept the ones it already had:";
      }
      save();
      ph.done("<div>"+msg+"</div>"+lessonChangeHTML(beforeTexts, activeLessons(agent))+distillJumpHTML(agent.id)+hoodView("Distill", distPrompt, dRes.text));
    }

    agent.stats.roundsRun = round; save();
    // offer a notebook prompt (non-blocking)
    if (!opts.silentNotebook) offerNotebookPrompt(agent, round);
  } catch(e){
    const working = phases.querySelector(".phase.working");
    if (working){ working.classList.remove("working"); working.classList.add("error"); working.querySelector(".body").innerHTML="😕 "+esc(e.message).replace(/\n/g,"<br>"); }
    // the phase card above already shows the full message — keep this card short to avoid repeating it
    const card = el("div","err-card","<strong>This round hit a snag.</strong> The step above explains what happened.<br>");
    const retry = el("button","small-btn","Try this round again"); retry.style.marginTop="6px";
    retry.onclick = ()=>{ // discard everything this failed attempt wrote, so the rerun starts clean
      state.works = state.works.filter(w => w.id !== work.id);
      agent.memory.journal = agent.memory.journal.filter(j => j.round !== round);   // Reflect may have written one before a later phase failed
      roundBox.remove(); save();
      runRound(agentId, opts);
    };
    card.appendChild(retry); phases.appendChild(card);
    throw e;
  }
  return work;
}

function offerNotebookPrompt(agent, round){
  const bar = $("notebookNudge");
  if (!bar) return;
  const prompt = NOTEBOOK_PROMPTS[(state.notebook.length + round) % NOTEBOOK_PROMPTS.length];
  bar.innerHTML = "";
  const c = el("div","card","");
  c.style.borderColor = "var(--violet)";
  c.innerHTML = '<label><span class="dot" style="background:var(--violet)"></span>A note for your notebook (you can skip this)</label><p class="hint">'+esc(prompt)+'</p>';
  const ta = el("textarea"); ta.placeholder = "Your thoughts…";
  const row = el("div","row"); row.style.marginTop="6px";
  const saveBtn = el("button","small-btn primary","Save to notebook");
  const skip = el("button","small-btn","Skip");
  saveBtn.onclick = ()=>{ if(ta.value.trim()){ state.notebook.push({ id:uid(), prompt, text:ta.value.trim(), context:"round", agentId:agent.id, round, createdAt:now() }); save(); toast("Saved to your notebook."); } bar.innerHTML=""; };
  skip.onclick = ()=>{ bar.innerHTML=""; };
  row.appendChild(saveBtn); row.appendChild(skip);
  c.appendChild(ta); c.appendChild(row); bar.appendChild(c);
}

/* ===== SECTION: CRIT ROOM ===== */
async function runCritSession(agentIds, workIds, transcriptEl, onTurn){
  const sess = { id:uid(), participantAgentIds:agentIds.slice(), workIds:workIds.slice(), transcript:[], createdAt:now() };
  for (let i=0;i<agentIds.length;i++){
    const author = getAgent(agentIds[i]);
    const work = state.works.find(w=>w.id===workIds[i]);
    if (!author || !work) continue;
    // author presents
    const present = { speaker:author.id, kind:"present", workId:work.id,
      text: work.artistStatement || work.intention || ("This is "+work.title+".") };
    sess.transcript.push(present); onTurn && onTurn(present, author, work);
    // others critique
    for (const cid of agentIds){
      if (cid===author.id) continue;
      const critic = getAgent(cid);
      const prior = findPriorCritique(cid, author.id);
      const images = work.medium==="turtle" ? [await getThumbnail(work)].filter(Boolean) : null;
      let res;
      try {
        res = await llm.complete({ role:"critic", system:PREAMBLE+KINDNESS, userText:criticPrompt(critic,author,work,prior),
          images, meta:{ round:work.round, medium:work.medium } });
      } catch(e){
        // one critic failing shouldn't end the whole crit — show what happened, in place, and carry on
        onTurn && onTurn({ speaker:critic.id, kind:"error", workId:work.id, text:critic.name+" couldn't answer just now. "+e.message }, critic, work);
        continue;
      }
      const turn = { speaker:critic.id, kind:"critique", workId:work.id, targetAuthor:author.id, text:stripMd(res.text), createdAt:now() };
      sess.transcript.push(turn);
      // attach critique to the work so it feeds the author's next Make
      work.critiques.push({ from:critic.id, text:turn.text, createdAt:now() });
      save();
      onTurn && onTurn(turn, critic, work);
    }
  }
  state.critSessions.push(sess); save();
  return sess;
}
function findPriorCritique(criticId, authorId){
  for (let i=state.critSessions.length-1;i>=0;i--){
    const t = state.critSessions[i].transcript;
    for (let j=t.length-1;j>=0;j--){ if (t[j].speaker===criticId && t[j].targetAuthor===authorId) return t[j].text; }
  }
  return null;
}

const ANATOMY_PARTS = [
  { key:"spark", label:"Spark" }, { key:"hands", label:"Hands" },
  { key:"eyes.looking", label:"Eyes — looking text" }, { key:"eyes.enabled", label:"Eyes on/off (toggle)" },

  { key:"studioManner.presenting", label:"Manner — presenting" }, { key:"studioManner.critic", label:"Manner — critic" }

function getPart(agent, key){ return key.split(".").reduce((o,k)=>o&&o[k], agent.anatomy); }
function setPart(agent, key, val){
